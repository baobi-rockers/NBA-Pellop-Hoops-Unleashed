// ============================================================
// EXECUTE ACTION — rebuilt with new ENGINE calls
// ============================================================

async function executeAction(act) {
  const isP  = act.execTeam === 'player';
  const atks = isP ? playerActive : enemyActive;
  const defs = isP ? enemyActive  : playerActive;
  const atkC = atks[act.actorIdx];
  if (!atkC || atkC.isDead) return;
  const whoLabel = isP ? 'You' : 'Bot';
  const ack = atkC._instanceId;

  if (act.actionType === 'pass') { logMsg('sys', whoLabel, `${shortName(getCardName(atkC))} passes.`); return; }

  // ── SWAP ──
  if (act.actionType === 'swap') {
    const bArr     = isP ? playerBench : enemyBench;
    const incoming = bArr[act.targetIdx];
    if (!incoming) return;

    // GC: clear all non-persistent auras from the leaving card
    const fullAll = [...atks, ...bArr];
    ENGINE.gcAuras(atkC, fullAll);

    incoming.battleRole = atkC.battleRole;
    if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
    atks[act.actorIdx] = incoming;
    bArr[act.targetIdx] = atkC;

    logMsg('sys', whoLabel, `Swap: ${shortName(getCardName(atkC))} → ${shortName(getCardName(incoming))}`);

    // Boot new card
    incoming._activeRound = 1;
    ENGINE.bootPassiveAbilities(incoming, atks, incoming.battleRole);

    // Fire ENTER_ACTIVE_LINEUP for new card
    const effects = ENGINE.bootEnterActiveLineup(incoming, atks, [...atks,...bArr]);
    effects.forEach(({ targetCard, action }) => {
      if (action.type === 'UNTARGETABLE_BY') ENGINE._applyUntargetableFlags(targetCard, action.spec);
      else ENGINE.applyPassiveFlag(targetCard, action);
    });

    // Fire roster events for full team
    const fullRoster = [...atks, ...bArr];
    ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', 'own', incoming, atks, fullRoster);
    ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', 'own', incoming, atks, fullRoster);

    // Fire CARD_EXIT triggers for the leaving card's ID
    const exitId = _getPlayerId(atkC) || atkC._instanceId;
    ENGINE.evalCardExitTriggers(exitId, atks, fullRoster);

    renderArena(); renderBenchStacks(); await delay(700); return;
  }

  let sk = null;
  if (act.actionType === 'skill' && act.skillIdx != null) { sk = atkC.Skills[act.skillIdx]; }

  const castNature  = sk ? (sk.Nature || 'Offensive') : 'Base';
  const castType    = act.actionType === 'basic' ? 'basic' : 'skill';
  const ownTeam     = atks;
  const enemyTeam   = defs;

  // ── Evaluate ON:SELF_CAST rules (pre-attack flags) ──
  const selfCastFlags = ENGINE.evalSelfCastAbilities(
    atkC, castNature, castType, null,
    sk?.Skill_ID || sk?.Name || null,
    ownTeam
  );

  // ── Skill disable check ──
  if (sk && isSkillDisabled(ack, sk.Name)) {
    logMsg('sys', whoLabel, `${sk.Name} is disabled!`); return;
  }

  // ── Check target ──
  let defC = defs[act.targetIdx], dIdx = act.targetIdx;
  if (!defC || defC.isDead) {
    const vt = getValidTargets(atkC, defs);
    if (!vt.length) { ENGINE.clearTempAttackFlags(atkC); return; }
    defC = vt[0].c; dIdx = vt[0].i;
  }
  if (defC._fullyUntargetable) {
    logMsg('sys','System',`${shortName(getCardName(defC))} is completely untargetable!`);
    ENGINE.clearTempAttackFlags(atkC); return;
  }

  // ── Check full-offensive immunity (Yao, Shaq-Fu, Dwight) ──
  if (defC._immuneAllOffensive && castType === 'skill') {
    logMsg('sys','System',`${shortName(getCardName(defC))} is immune to offensive skills!`);
    if(sk){sk._usesLeft--;sk._usesThisTurn++;} ENGINE.clearTempAttackFlags(atkC); return;
  }
  if (defC._immuneCloseShot && castNature.toLowerCase().includes('close_shot')) {
    logMsg('sys','System',`${shortName(getCardName(defC))} is immune to close shots!`);
    if(sk){sk._usesLeft--;sk._usesThisTurn++;} ENGINE.clearTempAttackFlags(atkC); return;
  }
  if (defC._immuneJumpShot && castNature.toLowerCase().includes('jump_shot')) {
    logMsg('sys','System',`${shortName(getCardName(defC))} is immune to jump shots!`);
    if(sk){sk._usesLeft--;sk._usesThisTurn++;} ENGINE.clearTempAttackFlags(atkC); return;
  }

  // ── Shutdown check ──
  const dck = defC._instanceId;
  if (_shutdown[dck]) {
    const sdDelay = (_shutdownDelays && _shutdownDelays[dck]) || 0;
    if (_shutdown[dck] > sdDelay) {
      logMsg('sys','System',`${shortName(getCardName(defC))} is shutdown!`);
      ENGINE.clearTempAttackFlags(atkC); return;
    }
  }

  // ── ON:ENEMY_CAST / ON:ENEMY_RESOLVE triggers on defending team ──
  const { mitigationFlat, mitigationMult } = ENGINE.evaluateEnemyCastTriggers(
    defs, atkC, defC, castNature, castType, defs, atks
  );

  // ── Compute raw damage ──
  let dmgRaw = 0;
  if (act.actionType === 'basic') {
    dmgRaw = getEffectiveDMG(atkC, false);
    if (selfCastFlags.thisAttackBaseDmgBonus) dmgRaw += selfCastFlags.thisAttackBaseDmgBonus;
  } else if (sk) {
    // Evaluate skill's Modifiers for damage
    const modParsed = ENGINE.parseActionString(sk.Modifiers || '');
    if (modParsed.type === 'STAT_BUFF_SKILL_DMG' || modParsed.type === 'STAT_BUFF_BASE_DMG') {
      dmgRaw = Math.abs(modParsed.value || 0) + getEffectiveDMG(atkC, true);
      if (selfCastFlags.thisAttackSkillDmgBonus) dmgRaw += selfCastFlags.thisAttackSkillDmgBonus;
    } else {
      // Parse numeric damage from Display_DMG as fallback
      const numMatch = String(sk.Display_DMG || '0').match(/(\d+)/);
      dmgRaw = numMatch ? parseInt(numMatch[1]) : getEffectiveDMG(atkC, true);
    }
  }

  // Apply ability-driven mitigation from ENEMY_CAST/RESOLVE
  dmgRaw = Math.floor(dmgRaw * mitigationMult);
  dmgRaw = Math.max(0, dmgRaw - mitigationFlat);

  // ── Coin flip check ──
  const needsCoin   = sk?._td?.special === 'COIN_FLIP' || String(sk?.Conditions || '').includes('Coin_Flip');
  const immuneCoin  = atkC._immuneForcedCoin || atkC._noMiss || selfCastFlags.noMiss;
  let missedCoin    = false;

  if (needsCoin && !immuneCoin) {
    const flip = Math.random() < 0.5;
    await animateCoinFlip(shortName(getCardName(atkC)), sk?.Name || 'Attack', flip);
    logMsg('coin','Coin',`${flip?'HEADS — Hit!':'TAILS — Miss!'}`);
    if (!flip) {
      missedCoin = true;
      // Fire ON:SELF_CAST FAIL stacking (T-Mac, Larry Bird, etc.)
      ENGINE.evalSelfCastStackingAbilities(atkC, castNature, castType, 'FAIL', sk?.Name, ownTeam);
      // Check rebound abilities
      await checkReboundTriggers(act, atkC, ownTeam, isP);
      // Check teammate-fail (LeBron putback)
      await checkTeammateFail(act, atkC, defs, ownTeam, isP);
      if(sk){sk._usesLeft--;sk._usesThisTurn++;}
      ENGINE.clearTempAttackFlags(atkC); return;
    }
  }

  // ── Prompt defensive reactive skills ──
  const blocked = await promptReactiveSkills(act, sk, atkC, defC, dIdx, isP, defs, castNature);
  if (blocked) {
    ENGINE.evalSelfCastStackingAbilities(atkC, castNature, castType, 'FAIL', sk?.Name, ownTeam);
    await checkReboundTriggers(act, atkC, ownTeam, isP);
    await checkTeammateFail(act, atkC, defs, ownTeam, isP);
    // Check ENEMY_RETALIATE (Harden bonus damage on block)
    const bonusDmg = ENGINE.evaluateRetaliateAbilities(atkC, 'Block', castNature);
    if (bonusDmg > 0 && defC && !defC.isDead) {
      logMsg('atk', whoLabel, `${shortName(getCardName(atkC))} bonus damage on block: ${bonusDmg}`);
      await playCombatAnimation(`${isP?'player':'enemy'}-${act.actorIdx}`,`${isP?'enemy':'player'}-${dIdx}`,bonusDmg,defC,dIdx,isP?'enemy':'player');
      if(defC.currentHp<=0) handleKO(defC,isP?'enemy':'player',dIdx);
    }
    if(sk){sk._usesLeft--;sk._usesThisTurn++;} ENGINE.clearTempAttackFlags(atkC); return;
  }

  // ── Apply damage ──
  logMsg(isP?'atk':'def', whoLabel,
    `[${atkC.battleRole}] ${shortName(getCardName(atkC))} → ${sk?.Name||'Basic'} on [${defC.battleRole}] ${shortName(getCardName(defC))} — ${dmgRaw} DMG`
  );
  await playCombatAnimation(
    `${isP?'player':'enemy'}-${act.actorIdx}`,
    `${isP?'enemy':'player'}-${dIdx}`,
    dmgRaw, defC, dIdx, isP?'enemy':'player'
  );

  if(sk){sk._usesLeft--;sk._usesThisTurn++;}

  // Fire ON:SELF_CAST:HIT stacking abilities
  ENGINE.evalSelfCastStackingAbilities(atkC, castNature, castType, 'HIT', sk?.Name, ownTeam);

  logMsg('hp','HP',`${shortName(getCardName(defC))}: ${defC.currentHp}/${getCardHP(defC)}`);
  if(defC.currentHp<=0) handleKO(defC, isP?'enemy':'player', dIdx);

  // Re-evaluate conditional ON:ALWAYS after HP change
  ENGINE.evaluateAlwaysConditional(defC, defs);
  ENGINE.evaluateAlwaysConditional(atkC, atks);

  // Check HP threshold/state triggers on damaged card
  _checkHPTriggers(defC, defs);

  ENGINE.clearTempAttackFlags(atkC);
  renderArena();
}

/** Fire HP_THRESHOLD_ONCE and HP_STATE triggers after a card takes damage. */
function _checkHPTriggers(card, ownTeam) {
  const threshold = ENGINE.checkHPThreshold(card, ownTeam);
  if (threshold) {
    logMsg('sys','System',`${shortName(getCardName(card))} HP Threshold triggered!`);
    ENGINE._applyStatBuff(card, threshold);
  }
  const states = ENGINE.checkHPState(card, ownTeam);
  states.forEach(action => {
    if (action.type === 'APPLY_PROP_UNTARGETABLE') {
      card._fullyUntargetable = true;
      logMsg('sys','System',`${shortName(getCardName(card))} is untargetable for the rest of this turn!`);
      addTrackedEffect('HP Event', card._instanceId, shortName(getCardName(card)), 'untargetable', 'Untargetable: REST_OF_TURN', 1);
    }
    if (action.type === 'APPLY_PRIORITY') {
      addTimedBuff(card, { skillBonus: 0, basicBonus: 0, priorityBoost: action.multiplier }, 1, 1);
      logMsg('sys','System',`${shortName(getCardName(card))} gains ${action.multiplier}x priority next turn!`);
    }
  });
}

// ── Rebound triggers (Bird, Moses, Kevin Love) ──
async function checkReboundTriggers(failedAct, failedCard, ownTeamArr, isP) {
  for (const [i, c] of ownTeamArr.entries()) {
    if (!c || c.isDead) continue;
    for (const [si, rsk] of (c.Skills||[]).entries()) {
      if (!rsk._isReactive) continue;
      if (rsk._usesLeft <= 0) continue;
      if (!ENGINE.canReactiveSkillTrigger(rsk, 'Offensive', 'skill')) continue;
      const modParsed = ENGINE.parseActionString(rsk.Modifiers || '');
      if (modParsed.type !== 'REBOUND_AND_DEAL_BASE_DMG') continue;

      rsk._usesLeft--; rsk._usesThisTurn++;
      const defs = isP ? enemyActive : playerActive;
      const vt = getValidTargets(failedCard, defs);
      if (!vt.length) continue;
      const tgt = vt[Math.floor(Math.random()*vt.length)];
      logMsg('sys', isP?'You':'Bot', `${shortName(getCardName(c))} rebounds and deals base DMG!`);
      await playCombatAnimation(
        `${isP?'player':'enemy'}-${ownTeamArr.indexOf(failedCard)}`,
        `${isP?'enemy':'player'}-${tgt.i}`,
        getEffectiveDMG(failedCard, false), tgt.c, tgt.i, isP?'enemy':'player'
      );
      if(tgt.c.currentHp<=0) handleKO(tgt.c, isP?'enemy':'player', tgt.i);
      renderArena(); return;
    }
  }
}

// ── Teammate fail (LeBron Heatlemania putback) ──
async function checkTeammateFail(failedAct, failedCard, defs, ownTeam, isP) {
  for (const reactCard of ownTeam) {
    if (!reactCard || reactCard.isDead || reactCard === failedCard) continue;
    const action = ENGINE.evalTeammateFail(reactCard, failedCard, 'Offensive', ownTeam);
    if (!action) continue;
    if (action.type === 'LBJ_PUTBACK') {
      const vt = getValidTargets(reactCard, defs);
      if (!vt.length) continue;
      const tgt = vt[Math.floor(Math.random()*vt.length)];
      logMsg('sys', isP?'You':'Bot', `${shortName(getCardName(reactCard))} putback!`);
      await playCombatAnimation(
        `${isP?'player':'enemy'}-${ownTeam.indexOf(reactCard)}`,
        `${isP?'enemy':'player'}-${tgt.i}`,
        getEffectiveDMG(reactCard, false), tgt.c, tgt.i, isP?'enemy':'player'
      );
      if(tgt.c.currentHp<=0) handleKO(tgt.c, isP?'enemy':'player', tgt.i);
      renderArena();
    }
  }
}


// ============================================================
// REACTIVE SKILLS — updated to use ENGINE helpers
// ============================================================

async function promptReactiveSkills(act, sk, atkC, defC, dIdx, isP, defs, castNature) {
  const defTeam = isP ? enemyActive : playerActive;
  let valids = [];

  for (const [i, c] of defTeam.entries()) {
    if (c.isDead) continue;
    for (const [si, rsk] of (c.Skills||[]).entries()) {
      if (!rsk._isReactive) continue;
      if (rsk._usesLeft <= 0) continue;
      if (rsk._usesPerTurn && rsk._usesThisTurn >= rsk._usesPerTurn) continue;
      if (!ENGINE.canReactiveSkillTrigger(rsk, castNature, act.actionType)) continue;

      const modParsed = ENGINE.parseActionString(rsk.Modifiers || '');

      // Attacker immunity checks
      if (modParsed.type === 'BLOCK') {
        if (atkC._skillsUnblockable && act.actionType==='skill') continue;
        if (atkC._baseUnblockable   && act.actionType==='basic') continue;
      }
      if (modParsed.type === 'CONTEST') {
        if (atkC._skillsUncontestable && act.actionType==='skill') continue;
        if (atkC._baseUncontestable   && act.actionType==='basic') continue;
      }
      if (modParsed.type === 'INTERCEPT' && atkC._immuneIntercept) continue;

      valids.push({cIdx:i, sIdx:si, rsk, c});
    }
  }

  if (!valids.length) return false;

  let chosen = null;
  if (isP) {
    if (Math.random() < 0.45) chosen = valids[Math.floor(Math.random()*valids.length)];
  } else {
    const choice = await showModal(
      'INCOMING ATTACK',
      `${shortName(getCardName(atkC))} uses ${sk?.Name||'Basic Attack'} on ${shortName(getCardName(defC))}. React?`,
      valids.map(v => ({ label:`[${v.c.battleRole}] ${shortName(getCardName(v.c))}: ${v.rsk.Name}`, color:'purple' })),
      'SKIP (No Defense)'
    );
    if (choice !== null) chosen = valids[choice];
  }

  if (!chosen) return false;

  const { rsk, c: reactCard } = chosen;
  rsk._usesLeft--; rsk._usesThisTurn++;
  const reactWho = isP ? 'Bot' : 'You';
  logMsg('block', reactWho, `${shortName(getCardName(reactCard))} reacts: ${rsk.Name}!`);

  const modParsed = ENGINE.parseActionString(rsk.Modifiers || '');
  switch (modParsed.type) {
    case 'BLOCK':
      logMsg('block', reactWho, 'Complete block!');
      return true;
    case 'CONTEST': {
      const flip = Math.random() < 0.5;
      await animateCoinFlip(shortName(getCardName(reactCard)), 'Contest', flip);
      logMsg('coin','Coin',flip?'HEADS — Hit!':'TAILS — Contested & Missed!');
      if (!flip) { logMsg('block',reactWho,'Contest successful — shot missed!'); return true; }
      logMsg('block',reactWho,'Contest failed — shot lands!'); return false;
    }
    case 'INTERCEPT':
      logMsg('block', reactWho, `${shortName(getCardName(reactCard))} intercepts!`);
      return true;
    case 'DMG_REDUCTION_FLAT':
      defC._dmgReductionFlat = (defC._dmgReductionFlat || 0) + modParsed.value;
      logMsg('block', reactWho, `Damage reduced by ${modParsed.value}!`);
      return false;
    case 'FORCED_COIN_FLIP_ON': {
      const flip = Math.random() < 0.5;
      await animateCoinFlip(shortName(getCardName(reactCard)), 'Forced Coin Flip', flip);
      if (!flip) { logMsg('block',reactWho,'Forced coin flip missed!'); return true; }
      return false;
    }
    case 'REBOUND_AND_DEAL_BASE_DMG':
      return false; // handled by checkReboundTriggers
    default:
      return false;
  }
}

async function playCombatAnimation(atkId, defId, dmgIn, targetObj, defIdx, defTeamStr) {
  const aE = document.getElementById(`wrap-${atkId}`), dE = document.getElementById(`wrap-${defId}`);
  if (aE) aE.classList.add('doing-attack');
  await delay(360);
  let dmg = dmgIn;
  if (targetObj._dmgReductionFlat && !targetObj._passiveReductionApplied) {
    // Reactive flat reduction (Rodman, Wallace) applied here
    dmg = Math.max(0, dmg - targetObj._dmgReductionFlat);
    targetObj._dmgReductionFlat = 0; // consume reactive reduction
    logMsg('block','Mitigation',`Damage reduced! → ${dmg}`);
  }
  playAttackSound();
  if (dE && dmg > 0) {
    dE.querySelector('.battle-card')?.classList.add('anim-shake');
    const p = document.createElement('div'); p.className='dmg-popup'; p.textContent=`-${dmg}`;
    (dE.querySelector('.battle-card')||dE).appendChild(p);
    setTimeout(()=>{dE.querySelector('.battle-card')?.classList.remove('anim-shake');p.remove();},900);
  }
  targetObj.currentHp = Math.max(0, targetObj.currentHp - dmg);
  const hpMax = getCardHP(targetObj), pct = Math.max(0,(targetObj.currentHp/hpMax)*100);
  const fill = document.getElementById(`hpf-${defId}`);
  if (fill) { fill.style.width=pct+'%'; fill.style.background=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B'; }
  const hpt = document.getElementById(`hpt-${defId}`);
  if (hpt) hpt.textContent=`${targetObj.currentHp}/${hpMax}`;
  await delay(660);
  if (aE) aE.classList.remove('doing-attack');
}


// ============================================================
// KO & SURVIVE — updated to use ENGINE.checkSurviveAbility
// ============================================================

function handleKO(defCard, teamStr, dIdx) {
  if (defCard.currentHp > 0) return;
  if (_tryActivateSurvive(defCard)) { renderArena(); return; }
  defCard.isDead = true;

  // GC: clear auras sourced from this card across all cards
  const allCards = [...playerActive,...playerBench,...enemyActive,...enemyBench];
  ENGINE.gcAuras(defCard, allCards);
  ENGINE.clearCardAuras(defCard);

  if (teamStr==='enemy') playerScore++; else enemyScore++;
  $('score-player').textContent=playerScore; $('score-enemy').textContent=enemyScore;
  const cardEl = document.getElementById(`card-${teamStr}-${dIdx}`);
  if (cardEl) cardEl.classList.add('dead-card');
  logMsg('ko','KO',`${shortName(getCardName(defCard))} knocked out!`);
  removeEffectsForTarget(defCard._instanceId);

  // Fire roster-leave events for dead card
  const isPlayer = teamStr === 'player';
  const ownTeam  = isPlayer ? playerActive : enemyActive;
  const fullRoster = [...ownTeam, ...(isPlayer?playerBench:enemyBench)];
  const exitId = defCard.UI_Frontend_Data?.Player_ID || defCard._instanceId;
  ENGINE.evalCardExitTriggers(exitId, ownTeam, fullRoster.filter(c=>c&&!c.isDead));
}

function _tryActivateSurvive(card) {
  if (!card || card.currentHp > 0) return false;
  const id = card._instanceId;
  if (_surviveUsed[id]) return false;

  if (!ENGINE.checkSurviveAbility(card)) {
    // Check HP_THRESHOLD_ONCE for heal-on-death
    const threshold = ENGINE.checkHPThreshold(card, []);
    if (threshold && (threshold.type === 'STAT_BUFF_HP' || threshold.type === 'STAT_BUFF_MAX_HP')) {
      _surviveUsed[id] = true;
      ENGINE._applyStatBuff(card, threshold);
      card.currentHp = Math.max(1, card.currentHp);
      logMsg('sys','System',`${shortName(getCardName(card))} survives with ${card.currentHp} HP!`);
      addTrackedEffect('HP Threshold', id, shortName(getCardName(card)), 'survive', 'Survived — HP recovered', 1);
      return true;
    }
    return false;
  }

  _surviveUsed[id] = true;
  card.currentHp = 1;
  _frozen[id] = true; // frozen for the rest of this action
  logMsg('sys','System',`${shortName(getCardName(card))} survives at 1 HP!`);
  addTrackedEffect('Survive', id, shortName(getCardName(card)), 'survive', 'Survived at 1 HP', 1);
  // Immediately fire HP_STATE checks (Luka untargetable etc.)
  _checkHPTriggers(card, []);
  return true;
}

// ── STAT BUFF SYSTEM ─────────────────────────────────────────
let _statBuffs = {};

function ensureBuff(id) { if (!_statBuffs[id]) _statBuffs[id] = {dmgBonus:0,basicBonus:0,skillBonus:0,turnsLeft:999,startTurn:turnCount,started:true,delay:0}; }
function getBuff(id) { const b=_statBuffs[id]; if(!b||!b.started||b.delay>0) return null; return b; }
function getEffectiveDMG(card, isSkill = false) {
  const base = getCardDMG(card);
  const b = getBuff(card._instanceId);
  if (!b) return base;
  return base + (b.dmgBonus || 0) + (isSkill ? (b.skillBonus || 0) : (b.basicBonus || 0));
}
function tickBuffs() {
  Object.keys(_statBuffs).forEach(k => {
    const b = _statBuffs[k];
    if (!b.started) return;
    if (b.delay > 0) { b.delay--; if (b.delay <= 0) { b.started = true; logMsg('eff','Effect',`Delayed buff on ${shortName(getCardName(CARDS.find(x=>x._instanceId===k)||{UI_Frontend_Data:{Name:'?'}}))} activates!`); } return; }
    if (b.turnsLeft !== 999) { b.turnsLeft--; if (b.turnsLeft <= 0) delete _statBuffs[k]; }
  });
}
function addTimedBuff(card, bonusObj, turns, delay) {
  ensureBuff(card._instanceId);
  const b = _statBuffs[card._instanceId];
  Object.assign(b, bonusObj);
  b.turnsLeft = turns || 999;
  b.delay = delay || 0;
  if (delay > 0) b.started = false; // don't activate until delay passes
  else b.started = true;
}
function tickSkillDisables() {
  Object.keys(_skillDisables).forEach(k => {
    _skillDisables[k] = _skillDisables[k].filter(d => { d.turnsLeft--; return d.turnsLeft > 0; });
    if (_skillDisables[k].length === 0) delete _skillDisables[k];

}
function isSkillDisabled(targetId, skillName) {

  if (!dis) return false;

}
function addSkillDisable(targetId, skillName, turnsLeft, sourceName, all) {
  if (!_skillDisables[targetId]) _skillDisables[targetId] = [];
  _skillDisables[targetId].push({ skillName, turnsLeft, sourceName, all: !!all });
}
function tickContestTracking() {
  Object.keys(_contestTracking).forEach(k => {
    _contestTracking[k].turnsLeft--;
    if (_contestTracking[k].turnsLeft <= 0) delete _contestTracking[k];

}

    const ct = _contestTracking[k];

}

let playerActive=[],playerBench=[],enemyActive=[],enemyBench=[];
let playerScore=0,enemyScore=0,turnCount=1,isAnimating=false;
let uiState='IDLE',pendingAction=null,stagedActions=[];
let playerBenchOpen=false;

function cloneCard(c, team) {
  const cc = JSON.parse(JSON.stringify(c));
  cc.currentHp = getCardHP(cc);
  cc.isDead = false;
  cc._instanceId = mkId(team, getCardName(cc));
  cc._priorityBonus = 1;
  cc._skillDmgBonus = 0;
  // Boot passive ability flags from ENGINE
  ENGINE.bootPassiveAbilities(cc, []);
  // Init skill use counters from UM string
  (cc.Skills || []).forEach(sk => {
    const um = ENGINE.parseUM(sk.UM);
    sk._usesLeft = um.maxUses;
    sk._usesThisTurn = 0;
    sk._priority = um.priority;
    sk._usesPerTurn = um.usesPerTurn;
    // Parse skill metadata once
    sk._parsed = ENGINE.parseSkill(sk);
  });
  return cc;
}

function buildEnemyRoster() {
  const dr={PG:[],SG:[],SF:[],PF:[],C:[]};
  const p=[...CARDS].sort(()=>Math.random()-.5);
  for(const c of p){for(const po of getCardPos(c)){if(POSITIONS.includes(po)&&dr[po].length<2){if(!POSITIONS.some(x=>dr[x].some(y=>getCardName(y)===getCardName(c)))){dr[po].push(c);break;}}}if(POSITIONS.every(x=>dr[x].length>=2))break;}
  const st=[],be=[];POSITIONS.forEach(po=>{if(dr[po][0]){const c=cloneCard(dr[po][0],'enemy');c.battleRole=po;st.push(c);}if(dr[po][1]){const c=cloneCard(dr[po][1],'enemy');c.battleRole=po;be.push(c);}});
  return {st,be};
}

function startBattle() {
  playerActive=POSITIONS.map(po=>{if(!activeLineup[po])return null;const c=cloneCard(activeLineup[po],'player');c.battleRole=po;return c;}).filter(Boolean);
  playerBench=benchRoster.filter(c=>!playerActive.some(ac=>getCardName(ac)===getCardName(c))).map(c=>cloneCard(c,'player'));
  const eR=buildEnemyRoster();enemyActive=eR.st;enemyBench=eR.be;
  playerScore=0;enemyScore=0;turnCount=1;stagedActions=[];uiState='IDLE';
  _statBuffs={};_activeEffects=[];_synergyApplied=new Set();
  _frozen={};_shutdown={};_drained={};_invulnerable={};_screened={};_surviveUsed={};

  // Boot synergy abilities for everyone on their teams
  [...playerActive,...playerBench].forEach(c=>{if(c) ENGINE.evalRosterAbilities(c, [...playerActive,...playerBench]);});
  [...enemyActive,...enemyBench].forEach(c=>{if(c) ENGINE.evalRosterAbilities(c, [...enemyActive,...enemyBench]);});

  $('battle-log').innerHTML='';
  logMsg('sys','System','Match initiated. First to 8 KOs wins.');
  $('score-player').textContent='0';$('score-enemy').textContent='0';$('checkout-panel').style.display='none';
  $('turn-indicator').textContent='TURN 1 — STAGING';showScreen('battle-screen');initBattleAudio();renderArena();
}

function renderBenchStacks(){
  $('enemy-bench-stack').innerHTML=enemyBench.filter(c=>!c.isDead).map((c,i)=>`<div class="bench-stack-card face-down" style="top:${i*5}px;left:${i*5}px;z-index:${i};" onmouseenter="showEnemyBenchTooltip(event,${enemyBench.filter(x=>!x.isDead).length})" onmouseleave="hideEnemyBenchTooltip()"></div>`).join('');
  const pB=$('player-bench-stack');pB.innerHTML='';
  playerBench.filter(c=>!c.isDead).forEach((c,i)=>{const div=document.createElement('div');div.className='bench-stack-card';const img=document.createElement('img');img.src=getImgUrl(getCardImg(c),getCardName(c));img.onerror=()=>handleImgError(img,getCardName(c));div.appendChild(img);div.style.top=(i*5)+'px';div.style.left=(i*5)+'px';div.style.zIndex=i;div.onmouseenter=e=>{if(!playerBenchOpen)showTooltip(e,getCardName(c));};div.onmouseleave=hideTooltip;div.onmousemove=positionTooltip;div.onclick=e=>{e.stopPropagation();openBenchFan();};pB.appendChild(div);});
}
function renderArena(){renderBenchStacks();$('enemy-active-row').innerHTML=renderFanned(enemyActive,true);$('player-active-row').innerHTML=renderFanned(playerActive,false);}
function renderFanned(team,isEnemy){
  const n=team.length;if(!n)return '';
  return team.map((c,i)=>{
    const mid=(n-1)/2,offset=i-mid,arcY=isEnemy?-(offset*offset*12):(offset*offset*12),rot=isEnemy?(-offset*8):(offset*8);
    const hpMax=getCardHP(c),pct=Math.max(0,(c.currentHp/hpMax)*100),clr=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B';
    const isStaged=!isEnemy&&stagedActions.some(a=>a.actorIdx===i);
    let isValidTgt=false;
    if(isEnemy&&uiState==='AWAITING_TARGET'&&pendingAction){const actor=playerActive[pendingAction.actorIdx];if(actor)isValidTgt=getValidTargets(actor,enemyActive).some(v=>v.i===i);}
    const ck=c._instanceId;
    let badges='';
    if(_frozen[ck]) badges+=`<div class="card-status-badge badge-frozen">❄ FROZEN</div>`;
    if(_drained[ck]) badges+=`<div class="card-status-badge badge-drained">💤 DRAINED</div>`;
    if(_shutdown[ck]) badges+=`<div class="card-status-badge badge-shutdown">🚫 SHUTDOWN</div>`;
    if(_statBuffs[ck]&&_statBuffs[ck].started) badges+=`<div class="card-status-badge badge-buffed">⬆ BUFFED</div>`;
    if(_screened[ck]) badges+=`<div class="card-status-badge badge-screened">🛡 SCREENED</div>`;
    const wrapClass=isEnemy?'enemy-card-wrap':'active-card-wrap';
    const cardClass=`battle-card ${c.isDead?'dead-card':''} ${isStaged?'staged':''} ${isValidTgt?'valid-target':''}`;
    const tN=escapeJS(getCardName(c));
    return `<div class="${wrapClass}" id="wrap-${isEnemy?'enemy':'player'}-${i}" style="--base-rot:${rot}deg;--base-y:${arcY}px;transform:rotate(var(--base-rot)) translateY(var(--base-y));transform-origin:${isEnemy?'top center':'bottom center'};" onclick="onCardClick('${isEnemy?'enemy':'player'}',${i},event)" onmousemove="handleTooltipHover(event,'${tN}',this)" onmouseleave="hideTooltip()">${isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-enemy-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}<div class="${cardClass}" id="card-${isEnemy?'enemy':'player'}-${i}"><img src="${getImgUrl(getCardImg(c),getCardName(c))}" onerror="handleImgError(this,'${tN}')">${badges}</div>${isStaged?`<button class="undo-btn" onclick="event.stopPropagation();undoAction(${i})">✕</button>`:''}${!isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-player-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}<div class="hp-text" id="hpt-${isEnemy?'enemy':'player'}-${i}">${c.currentHp}/${hpMax}</div></div>`;
  }).join('');
}
