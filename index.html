<script>
// ============================================================
// COMBAT ENGINE v2 — Full Vocabulary, Aura System, State GC
// Covers every trigger, condition operator, action string and
// modifier documented in the Ability Engine Definition Sheet.
// ============================================================

const ENGINE = (() => {

  // ─────────────────────────────────────────────────────────
  // 1. UTILITY HELPERS
  // ─────────────────────────────────────────────────────────

  /**
   * parseHeight — converts "6'6"" → 78 (total inches).
   * Used any time Height is compared with < / <= / > / >=.
   */
  function parseHeight(h) {
    if (h == null) return 0;
    const s = String(h).replace(/\s/g, '');
    // Formats: 6'6", 6'6, 6ft6, 76 (already inches)
    let m = s.match(/^(\d+)'(\d+)/);
    if (m) return parseInt(m[1]) * 12 + parseInt(m[2]);
    m = s.match(/^(\d+)ft(\d+)/i);
    if (m) return parseInt(m[1]) * 12 + parseInt(m[2]);
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;   // bare number treated as inches
  }

  /**
   * parseUM — "U:∞ | M:∞ | P:1"  →  { usesPerTurn, maxUses, priority }
   * ∞ stored as Infinity.
   */
  function parseUM(umStr) {
    const out = { usesPerTurn: Infinity, maxUses: Infinity, priority: 1 };
    if (!umStr) return out;
    String(umStr).split('|').forEach(p => {
      p = p.trim();
      const m = p.match(/^([UMP]):(∞|-?\d+)/);
      if (!m) return;
      const v = m[2] === '∞' ? Infinity : parseInt(m[2]);
      if (m[1] === 'U') out.usesPerTurn = v;
      else if (m[1] === 'M') out.maxUses = v;
      else if (m[1] === 'P') out.priority = v;
    });
    return out;
  }

  /**
   * parseTD — "T:2 | D:0"  →  { turns, delay }
   * Special string values: THIS_ATTACK, REST_OF_TURN, REST_OF_ROUND, Next_Turn
   */
  function parseTD(tdStr) {
    const out = { turns: 1, delay: 0, special: null };
    if (!tdStr || tdStr === 'DEFAULT') return out;
    const s = String(tdStr);
    // Check for T: with a special string value
    const tSpecial = s.match(/T:(THIS_ATTACK|REST_OF_TURN|REST_OF_ROUND|Next_Turn)/i);
    if (tSpecial) { out.special = tSpecial[1].toUpperCase(); out.turns = 1; }
    else {
      const tNum = s.match(/T:(\d+)/);
      if (tNum) out.turns = parseInt(tNum[1]);
    }
    // D: can also be Next_Turn keyword or a number
    const dSpecial = s.match(/D:(Next_Turn|\d+)/i);
    if (dSpecial) {
      out.delay = dSpecial[1].toLowerCase() === 'next_turn' ? 1 : parseInt(dSpecial[1]);
    }
    return out;
  }

  // ─────────────────────────────────────────────────────────
  // 2. TRIGGER PARSER
  //    Returns a structured object the dispatcher uses.
  // ─────────────────────────────────────────────────────────

  /**
   * parseTrigger
   * All trigger tag formats per the definition sheet:
   *
   *  ON:ALWAYS
   *  ON:SELF_CAST:[Nature:X]
   *  ON:SELF_CAST:[Nature:X]:HIT
   *  ON:SELF_CAST:[Nature:X]:FAIL
   *  ON:SELF_CAST:[SKILL_ID]:HIT           ← named skill stacking (Chef Curry)
   *  ON:ENEMY_CAST:[Nature:X]
   *  ON:ENEMY_CAST:[Nature:X]:[Self]
   *  ON:ENEMY_CAST:[Nature:X]:[!Self]       ← not targeting self
   *  ON:ENEMY_RESOLVE:[Nature:X]:[Self]
   *  ON:ENEMY_RESOLVE:[Nature:X]:[Targeted_Teammate]
   *  ON:ENEMY_RETALIATE:[Nature:Defensive:Block]:[Nature:Base:Self]
   *  ON:ENEMY_RETALIATE:[Nature:Defensive:Block]:[Nature:Offensive:Self]
   *  ON:ROSTER_JOIN:TEAM_MATCH
   *  ON:ROSTER_LEAVE:TEAM_MATCH
   *  ON:ROSTER_LEAVE_LAST:TEAM_MATCH
   *  ON:ROSTER_JOIN:CARD_MATCH
   *  ON:ROSTER_LEAVE:CARD_MATCH
   *  ON:ROSTER_LEAVE_LAST:CARD_MATCH
   *  ON:ENEMY_ROSTER_JOIN:TEAM_MATCH
   *  ON:ENEMY_ROSTER_LEAVE_LAST:TEAM_MATCH
   *  ON:DEPLOY:POS_MATCH
   *  ON:DEPLOY:SIXTH_MAN
   *  ON:ENTER_ACTIVE_LINEUP
   *  ON:HP_THRESHOLD_ONCE
   *  ON:HP_STATE
   *  ON:TURN_START_AFTER_SURVIVE
   *  ON:AND_PAIR                            ← not a real trigger; AND logic connector
   *  ON:[CARD_ID]:EXIT                      ← e.g. ON:GSW_SCU:EXIT
   *  ON:TEAMMATE_FAIL:[Actor:…]:[Nature:X]
   */
  function parseTrigger(raw) {
    const s = String(raw || '').trim();
    const out = {
      raw: s,
      type: 'UNKNOWN',      // canonical event key
      nature: null,         // nature filter string (may contain / for OR)
      scope: 'any',         // 'self' | 'teammate' | 'not_self' | 'any'
      subtype: null,        // HIT / FAIL / RETALIATE etc.
      matchMode: null,      // TEAM_MATCH | CARD_MATCH
      side: 'own',          // 'own' | 'enemy'
      cardId: null,         // for ON:[CARD_ID]:EXIT
      actorSpec: null,      // for TEAMMATE_FAIL
    };

    if (s === 'ON:ALWAYS') { out.type = 'ALWAYS'; return out; }
    if (s === 'ON:AND_PAIR') { out.type = 'AND_PAIR'; return out; }
    if (s === 'ON:ENTER_ACTIVE_LINEUP') { out.type = 'ENTER_ACTIVE_LINEUP'; return out; }
    if (s === 'ON:HP_THRESHOLD_ONCE') { out.type = 'HP_THRESHOLD_ONCE'; return out; }
    if (s === 'ON:HP_STATE') { out.type = 'HP_STATE'; return out; }
    if (s === 'ON:TURN_START_AFTER_SURVIVE') { out.type = 'TURN_START_AFTER_SURVIVE'; return out; }
    if (s === 'ON:DEPLOY:POS_MATCH') { out.type = 'DEPLOY_POS_MATCH'; return out; }
    if (s === 'ON:DEPLOY:SIXTH_MAN') { out.type = 'DEPLOY_SIXTH_MAN'; return out; }

    // Roster events
    const rosterM = s.match(/^ON:(ENEMY_)?ROSTER_(JOIN|LEAVE|LEAVE_LAST):(TEAM_MATCH|CARD_MATCH)$/);
    if (rosterM) {
      out.side = rosterM[1] ? 'enemy' : 'own';
      out.type = `ROSTER_${rosterM[2]}`;   // ROSTER_JOIN | ROSTER_LEAVE | ROSTER_LEAVE_LAST
      out.matchMode = rosterM[3];           // TEAM_MATCH | CARD_MATCH
      return out;
    }

    // ON:[CARD_ID]:EXIT  e.g. ON:GSW_SCU:EXIT
    const exitM = s.match(/^ON:([A-Z0-9_]+):EXIT$/);
    if (exitM) { out.type = 'CARD_EXIT'; out.cardId = exitM[1]; return out; }

    // ON:SELF_CAST:[Nature:X] / :HIT / :FAIL / ON:SELF_CAST:[SKILL_ID]:HIT
    const selfCastM = s.match(/^ON:SELF_CAST:\[([^\]]+)\](?::(HIT|FAIL))?$/);
    if (selfCastM) {
      out.type = 'SELF_CAST';
      const inner = selfCastM[1]; // e.g. "Nature:Offensive" or "Nature:Offensive/Defensive/Utility/Base" or "GSW_SCU_G02_S2"
      if (inner.startsWith('Nature:')) out.nature = inner.slice(7); // strip "Nature:"
      else out.skillId = inner; // named skill ID
      out.subtype = selfCastM[2] || null; // HIT | FAIL | null
      return out;
    }

    // ON:ENEMY_CAST:[Nature:X] / :[Self] / :[!Self]
    const enemyCastM = s.match(/^ON:ENEMY_CAST:\[([^\]]+)\](?::\[([^\]]+)\])?$/);
    if (enemyCastM) {
      out.type = 'ENEMY_CAST';
      out.nature = enemyCastM[1].startsWith('Nature:') ? enemyCastM[1].slice(7) : enemyCastM[1];
      if (enemyCastM[2]) {
        if (enemyCastM[2] === 'Self') out.scope = 'self';
        else if (enemyCastM[2] === '!Self') out.scope = 'not_self';
      }
      return out;
    }

    // ON:ENEMY_RESOLVE:[Nature:X]:[Self|Targeted_Teammate]
    const resolveM = s.match(/^ON:ENEMY_RESOLVE:\[([^\]]+)\]:\[([^\]]+)\]$/);
    if (resolveM) {
      out.type = 'ENEMY_RESOLVE';
      out.nature = resolveM[1].startsWith('Nature:') ? resolveM[1].slice(7) : resolveM[1];
      out.scope = resolveM[2] === 'Self' ? 'self' : 'teammate';
      return out;
    }

    // ON:ENEMY_RETALIATE:[Nature:Defensive:Block]:[Nature:Base/Offensive:Self]
    const retaliateM = s.match(/^ON:ENEMY_RETALIATE:\[([^\]]+)\]:\[([^\]]+)\]$/);
    if (retaliateM) {
      out.type = 'ENEMY_RETALIATE';
      out.retaliateDefenseNature = retaliateM[1];  // e.g. "Nature:Defensive:Block"
      out.retaliateOffenseNature = retaliateM[2];  // e.g. "Nature:Base:Self"
      return out;
    }

    // ON:TEAMMATE_FAIL:[Actor:ID:X/Position:Y]:[Nature:Z]
    const teamFailM = s.match(/^ON:TEAMMATE_FAIL:\[([^\]]+)\]:\[([^\]]+)\]$/);
    if (teamFailM) {
      out.type = 'TEAMMATE_FAIL';
      out.actorSpec = teamFailM[1];
      out.nature = teamFailM[2].startsWith('Nature:') ? teamFailM[2].slice(7) : teamFailM[2];
      return out;
    }

    // Unknown: return as-is
    out.type = s;
    return out;
  }

  // ─────────────────────────────────────────────────────────
  // 3. CONDITION EVALUATOR
  //    Full support for:
  //      - Pipe (|) as OR in values
  //      - Self_Height / Self_SPD / Self_Weight dynamic self-refs
  //      - Height string → inches conversion
  //      - All condition targets: Self, Own_Team, Enemy_Team,
  //        Casting_Enemy, Targeted_Enemy, Targeted_Teammate
  // ─────────────────────────────────────────────────────────

  /**
   * evalCondition
   *
   * ctx = {
   *   self          : card,
   *   ownTeam       : card[],   // full lineup + bench, or just active
   *   enemyTeam     : card[],
   *   castingEnemy  : card | null,
   *   castingTeammate: card | null,
   *   targetEnemy   : card | null,
   *   targetTeammate: card | null,
   * }
   *
   * cond = {
   *   attribute : string,    // Height | SPD | HP | Weight | Team_ID | Player_ID |
   *                          // Pos | Nature | Player_Count | State | Self_Active_Round
   *   operator  : string,    // = | != | < | <= | > | >=
   *   value     : string,    // may contain | for OR
   *   target    : string,    // Self | Own_Team | Enemy_Team | Casting_Enemy |
   *                          // Targeted_Enemy | Targeted_Teammate
   * }
   */
  function evalCondition(cond, ctx) {
    // Null / "always" / bare "Self" → unconditional pass
    if (!cond) return true;
    if (typeof cond === 'string') {
      const s = cond.trim();
      if (!s || s === 'Self' || s.toLowerCase() === 'always') return true;
      // Try to parse structured condition from string
      cond = _parseConditionString(s, ctx);
      if (!cond) return true;
    }

    const { attribute, operator, value, target } = cond;
    const subject = _resolveTarget(target, ctx);
    if (subject === null) return false;

    // ── Team / Array subjects ──
    if (Array.isArray(subject)) {
      return _evalTeamCondition(attribute, operator, value, subject, ctx);
    }

    // ── Single-card subjects ──
    return _evalCardCondition(attribute, operator, value, subject, ctx);
  }

  function _resolveTarget(target, ctx) {
    switch (target) {
      case 'Self':              return ctx.self;
      case 'Own_Team':          return ctx.ownTeam || [];
      case 'Enemy_Team':        return ctx.enemyTeam || [];
      case 'Casting_Enemy':     return ctx.castingEnemy || null;
      case 'Casting_Teammate':  return ctx.castingTeammate || null;
      case 'Targeted_Enemy':    return ctx.targetEnemy || null;
      case 'Targeted_Teammate': return ctx.targetTeammate || null;
      default:                  return ctx.self;
    }
  }

  /** Evaluate a condition against a team array. */
  function _evalTeamCondition(attribute, operator, value, teamArr, ctx) {
    // Normalise value list (pipe = OR)
    const values = String(value).split('|').map(v => v.trim());

    switch (attribute) {
      case 'Team_ID': {
        const alive = teamArr.filter(c => c && !c.isDead && c !== ctx.self);
        if (operator === '=' || operator === '==') {
          return alive.some(c => values.includes(getCardTeam(c)));
        }
        // != means NONE of the alive team match
        return !alive.some(c => values.includes(getCardTeam(c)));
      }
      case 'Player_ID': {
        // Alive teammates matching any of the pipe-separated IDs
        const alive = teamArr.filter(c => c && !c.isDead && c !== ctx.self);
        const match = alive.some(c => values.some(v => _getPlayerId(c) === v));
        return (operator === '=' || operator === '==') ? match : !match;
      }
      case 'Player_Count': {
        // Count alive members (excluding self)
        const alive = teamArr.filter(c => c && !c.isDead && c !== ctx.self);
        return _compare(alive.length, operator, parseInt(value));
      }
      case 'Pos': {
        const alive = teamArr.filter(c => c && !c.isDead && c !== ctx.self);
        const match = alive.some(c => values.some(v => getCardPos(c).includes(v)));
        return (operator === '=' || operator === '==') ? match : !match;
      }
      default: return true;
    }
  }

  /** Evaluate a condition against a single card. */
  function _evalCardCondition(attribute, operator, value, card, ctx) {
    const values = String(value).split('|').map(v => v.trim());

    switch (attribute) {
      case 'Height': {
        const lhs = parseHeight(getCardHeight(card));
        // Support Self_Height dynamic reference
        const rhs = _resolveValue('Height', value, ctx);
        return _compare(lhs, operator, parseHeight(String(rhs)));
      }
      case 'Weight': {
        const lhs = card.UI_Frontend_Data?.Weight || 0;
        const rhs = _resolveValue('Weight', value, ctx);
        return _compare(lhs, operator, parseFloat(String(rhs)));
      }
      case 'SPD': {
        const lhs = getCardSPD(card);
        const rhs = _resolveValue('SPD', value, ctx);
        return _compare(lhs, operator, parseFloat(String(rhs)));
      }
      case 'HP': {
        const lhs = card.currentHp != null ? card.currentHp : getCardHP(card);
        const rhs = parseFloat(String(value));
        return _compare(lhs, operator, rhs);
      }
      case 'Team_ID': {
        const lhs = getCardTeam(card);
        if (operator === '!=' || operator === '!') return !values.includes(lhs);
        return values.includes(lhs);
      }
      case 'Player_ID': {
        const lhs = _getPlayerId(card);
        if (operator === '!=' || operator === '!') return !values.includes(lhs);
        return values.includes(lhs);
      }
      case 'Pos': {
        const positions = getCardPos(card);
        // Each value in the pipe list is checked; any match = true
        const match = values.some(v => positions.includes(v));
        return (operator === '=' || operator === '==') ? match : !match;
      }
      case 'Nature': {
        // Card's ongoing action nature — stored on ctx
        const lhs = (ctx.castNature || '').toLowerCase();
        const match = values.some(v => lhs.includes(v.toLowerCase().replace('offensive:', '').replace('nature:', '')));
        return (operator === '=' || operator === '==') ? match : !match;
      }
      case 'Self_Active_Round': {
        const lhs = card._activeRound || 1;
        return _compare(lhs, operator, parseInt(value));
      }
      case 'State': {
        const lhs = card._state || '';
        const match = values.some(v => lhs === v || (card._states && card._states.has(v)));
        return (operator === '=' || operator === '==') ? match : !match;
      }
      case 'Player_Count': {
        // Fallback: own team
        const alive = (ctx.ownTeam || []).filter(c => c && !c.isDead && c !== ctx.self);
        return _compare(alive.length, operator, parseInt(value));
      }
      default: return true;
    }
  }

  /**
   * _resolveValue — if value starts with "Self_", fetch from self.
   * e.g. "Self_Height" → parseHeight(self's height)
   *      "Self_SPD"    → getCardSPD(self)
   */
  function _resolveValue(attribute, value, ctx) {
    const v = String(value).trim();
    if (!v.startsWith('Self_')) return v;
    const selfCard = ctx.self;
    if (!selfCard) return v;
    const attr = v.slice(5).toUpperCase();
    if (attr === 'HEIGHT') return getCardHeight(selfCard);
    if (attr === 'SPD')    return getCardSPD(selfCard);
    if (attr === 'WEIGHT') return selfCard.UI_Frontend_Data?.Weight || 0;
    if (attr === 'HP')     return selfCard.currentHp != null ? selfCard.currentHp : getCardHP(selfCard);
    return v;
  }

  function _compare(a, op, b) {
    switch (op) {
      case '<=': case '=<': return a <= b;
      case '>=': case '=>': return a >= b;
      case '<':             return a < b;
      case '>':             return a > b;
      case '!=': case '!': return a != b;
      default:              return a == b;
    }
  }

  /**
   * _parseConditionString — parses a raw string like
   * "Casting_EnemyHeight<=6'6\"" or "Own_TeamTeam_ID=GSW"
   * into a structured {attribute, operator, value, target} object.
   * Handles the concatenated format produced by the JSON Logic Fragment formula.
   */
  function _parseConditionString(s, ctx) {
    if (!s || s === 'Self' || s.toLowerCase() === 'always') return null;

    // Try standard "Target.Attribute OP Value" format first
    let m;

    // "Casting_Enemy.Height <= 6'6\""
    m = s.match(/^(Self|Own_Team|Enemy_Team|Casting_Enemy|Casting_Teammate|Targeted_Enemy|Targeted_Teammate)\.(\w+)\s*([<>=!]+)\s*(.+)$/);
    if (m) return { target: m[1], attribute: m[2], operator: m[3], value: m[4].trim() };

    // Concatenated format from JSON Logic Fragment: "Own_TeamTeam_ID=GSW"
    const TARGETS = ['Casting_Enemy', 'Casting_Teammate', 'Targeted_Enemy', 'Targeted_Teammate', 'Enemy_Team', 'Own_Team', 'Self'];
    for (const tgt of TARGETS) {
      if (s.startsWith(tgt)) {
        const rest = s.slice(tgt.length);
        const om = rest.match(/^(\w+)\s*([<>=!]+)\s*(.+)$/);
        if (om) return { target: tgt, attribute: om[1], operator: om[2], value: om[3].trim() };
      }
    }

    // "Self_HP:<=960" shorthand
    m = s.match(/^Self_(\w+):([<>=!]+)(.+)$/);
    if (m) return { target: 'Self', attribute: m[1], operator: m[2], value: m[3].trim() };

    return null;
  }

  /** Return the Player_ID from a card's data. */
  function _getPlayerId(card) {
    return card?.UI_Frontend_Data?.Player_ID ||
           card?.UI_Frontend_Data?.Card_ID   ||
           '';
  }

  // ─────────────────────────────────────────────────────────
  // 4. ACTION STRING PARSER
  //    Maps every documented action string format to a
  //    structured { type, ...params } object.
  // ─────────────────────────────────────────────────────────

  function parseActionString(raw) {
    if (!raw) return { type: 'NONE' };
    const s = String(raw).trim();
    if (!s || s.startsWith('(') || s.startsWith('#REF')) return { type: 'NONE' };

    let m;

    // ── Apply_Aura ──────────────────────────────────────────
    // Apply_Aura:[AbilityID]:[stat/state]
    m = s.match(/^Apply_Aura:([^:]+):(.+)$/);
    if (m) return { type: 'APPLY_AURA', abilityId: m[1].trim(), spec: m[2].trim() };

    // Remove_Aura:[AbilityID]
    m = s.match(/^Remove_Aura:([^:]+)$/);
    if (m) return { type: 'REMOVE_AURA', abilityId: m[1].trim() };

    // ── Stat_Buff ────────────────────────────────────────────
    // Stat_Buff:+300_DMG:Nature:Base:Self:This_Attack
    // Stat_Buff:+300_MAX_HP:Self
    // Stat_Buff:+500_HP:Self
    // Stat_Buff:+1_SPD:Self
    // Stat_Buff:+300_DMG:Nature:Offensive_Skills:Self:Stack_Per_Hit:Permanent
    // Stat_Buff:+100_DMG:Nature:Offensive/Base:Self:Stack_Per_Miss:Permanent
    m = s.match(/^Stat_Buff:([+-]\d+)_MAX_HP(?::.*)?$/);
    if (m) {
      const stack = _parseStackSuffix(s);
      return { type: 'STAT_BUFF_MAX_HP', value: parseInt(m[1]), ...stack };
    }
    m = s.match(/^Stat_Buff:([+-]\d+)_HP(?::.*)?$/);
    if (m) {
      return { type: 'STAT_BUFF_HP', value: parseInt(m[1]) };
    }
    m = s.match(/^Stat_Buff:([+-]\d+)_SPD(?::.*)?$/);
    if (m) {
      return { type: 'STAT_BUFF_SPD', value: parseInt(m[1]) };
    }
    // Stat_Buff:+N_DMG:Nature:...:Self[:This_Attack|:Stack_Per_*:Permanent]
    m = s.match(/^Stat_Buff:([+-]\d+)_DMG:Nature:([^:]+)(?::Self)?(.*)$/);
    if (m) {
      const stack   = _parseStackSuffix(s);
      const thisAtk = s.includes(':This_Attack') || s.includes(':THIS_ATTACK');
      return { type: 'STAT_BUFF_SKILL_DMG', value: parseInt(m[1]), natureScope: m[2].trim(), thisAttack: thisAtk, ...stack };
    }
    // Stat_Buff:+N_DMG:Base:Self[:This_Attack]   (legacy / shorthand)
    m = s.match(/^Stat_Buff:([+-]\d+)_DMG:Base(?::Self)?(.*)$/);
    if (m) {
      const thisAtk = s.includes(':This_Attack') || s.includes(':THIS_ATTACK');
      return { type: 'STAT_BUFF_BASE_DMG', value: parseInt(m[1]), thisAttack: thisAtk };
    }

    // ── Untargetable_By ───────────────────────────────────────
    if (s.startsWith('Untargetable_By:')) {
      return { type: 'UNTARGETABLE_BY', spec: s.slice('Untargetable_By:'.length) };
    }

    // ── Apply_Property ────────────────────────────────────────
    // Apply_Property:No_Miss:Nature:Offensive
    // Apply_Property:Untargetable
    // Apply_Property:Survive_At_1HP
    // Apply_Property:Stat_Lock:HP+DMG+SPD+Skills
    m = s.match(/^Apply_Property:([^:]+)(?::(.+))?$/);
    if (m) {
      const prop = m[1].trim().toUpperCase();
      const rest = m[2] ? m[2].trim() : null;
      if (prop === 'NO_MISS')         return { type: 'APPLY_PROP_NO_MISS', natureScope: rest };
      if (prop === 'UNTARGETABLE')    return { type: 'APPLY_PROP_UNTARGETABLE', duration: null };
      if (prop === 'SURVIVE_AT_1HP')  return { type: 'APPLY_PROP_SURVIVE_AT_1HP' };
      if (prop === 'STAT_LOCK')       return { type: 'APPLY_PROP_STAT_LOCK', locks: (rest || '').split('+') };
      return { type: 'APPLY_PROPERTY', prop: m[1].trim(), spec: rest };
    }

    // ── Apply_Modifier ────────────────────────────────────────
    // Apply_Modifier:Damage_Reduction:x0.5:Nature:Offensive:Close_Shot
    // Apply_Modifier:Damage_Reduction:100_Flat
    // Apply_Modifier:Damage_Reduction:200_Flat:Nature:Offensive:Base
    // Apply_Modifier:Bonus_Damage:300
    // Apply_Modifier:Retaliatory_Damage:300
    // Apply_Modifier:Rebound_And_Deal_Base_DMG
    // Apply_Modifier:Forced_Coin_Flip_On:Offensive:Base
    // Apply_Modifier:LBJ_Putback
    if (s.startsWith('Apply_Modifier:')) {
      const rest = s.slice('Apply_Modifier:'.length);

      m = rest.match(/^Damage_Reduction:x([\d.]+)(?::Nature:(.+))?$/);
      if (m) return { type: 'DMG_REDUCTION_MULT', mult: parseFloat(m[1]), natureScope: m[2] || null };

      m = rest.match(/^Damage_Reduction:(\d+)_Flat(?::Nature:(.+))?$/);
      if (m) return { type: 'DMG_REDUCTION_FLAT', value: parseInt(m[1]), natureScope: m[2] || null };

      m = rest.match(/^Bonus_Damage:(\d+)$/);
      if (m) return { type: 'BONUS_DAMAGE', value: parseInt(m[1]) };

      m = rest.match(/^Retaliatory_Damage:(\d+)$/);
      if (m) return { type: 'RETALIATORY_DAMAGE', value: parseInt(m[1]) };

      if (rest === 'Rebound_And_Deal_Base_DMG') return { type: 'REBOUND_AND_DEAL_BASE_DMG' };

      m = rest.match(/^Forced_Coin_Flip_On:(.+)$/);
      if (m) return { type: 'FORCED_COIN_FLIP_ON', natureSpec: m[1].trim() };

      if (rest === 'LBJ_Putback') return { type: 'LBJ_PUTBACK' };

      return { type: 'APPLY_MODIFIER_UNKNOWN', raw: rest };
    }

    // ── Apply_Priority ────────────────────────────────────────
    // Apply_Priority:Nature:Offensive/Base:3x
    // Apply_Priority:Nature:Offensive+Base:3x
    m = s.match(/^Apply_Priority:Nature:([^:]+):(\d+)x$/);
    if (m) return { type: 'APPLY_PRIORITY', natureScope: m[1].trim(), multiplier: parseInt(m[2]) };

    // ── Apply_State ───────────────────────────────────────────
    // Apply_State:Sixth_Man:Priority:-10:Targetable_Via_Teammate
    m = s.match(/^Apply_State:(.+)$/);
    if (m) return { type: 'APPLY_STATE', raw: m[1].trim() };

    // ── Behavior_Modifier ─────────────────────────────────────
    // Behavior_Modifier:Force_Enemy_Lock_Attack_On_Self:Nature:Offensive:Damage_Skills+Base
    m = s.match(/^Behavior_Modifier:Force_Enemy_Lock_Attack_On_Self(?::(.+))?$/);
    if (m) return { type: 'FORCE_LOCK_ON_SELF', natureScope: m[1] || null };

    // ── Simple keywords (defensive actions used in skill modifiers) ──
    const upper = s.toUpperCase();
    if (upper === 'BLOCK')     return { type: 'BLOCK' };
    if (upper === 'CONTEST')   return { type: 'CONTEST' };
    if (upper === 'INTERCEPT') return { type: 'INTERCEPT' };
    if (upper === 'FREEZE')    return { type: 'FREEZE' };
    if (upper === 'STEAL')     return { type: 'STEAL' };

    return { type: 'UNKNOWN', raw: s };
  }

  /** Extract :Stack_Per_Hit:Permanent or :Stack_Per_Miss:Permanent */
  function _parseStackSuffix(s) {
    if (s.includes('Stack_Per_Hit:Permanent'))  return { stacking: 'HIT',  permanent: true };
    if (s.includes('Stack_Per_Miss:Permanent')) return { stacking: 'MISS', permanent: true };
    return {};
  }

  // ─────────────────────────────────────────────────────────
  // 5. NATURE MATCHING HELPERS
  //    Natures may be separated by / (OR) or + (AND) in triggers.
  //    Attack natures are checked against these filter strings.
  // ─────────────────────────────────────────────────────────

  /**
   * natureMatches(filter, attackNature, attackType)
   *
   * filter      — the nature string from the trigger/action (may contain / or +)
   * attackNature— the nature tag of the incoming attack (e.g. "Offensive:Jump_Shot")
   * attackType  — 'skill' | 'basic' | 'defensive' | 'utility'
   */
  function natureMatches(filter, attackNature, attackType) {
    if (!filter) return true;  // no filter = matches all
    const f = filter.toLowerCase();
    const a = (attackNature || '').toLowerCase();
    const t = (attackType  || '').toLowerCase();

    // Split by / → OR
    const parts = f.split('/');
    return parts.some(part => _singleNatureMatch(part.trim(), a, t));
  }

  function _singleNatureMatch(filter, attackNature, attackType) {
    // Special compound shorthand
    if (filter === 'offensive_skills') return attackNature.includes('offensive') && attackType === 'skill';
    if (filter === 'offensive+base' || filter === 'offensive/base')
      return attackNature.includes('offensive') || attackType === 'basic';

    if (filter === 'offensive') return attackNature.includes('offensive') || attackType === 'basic';
    if (filter === 'base')      return attackType === 'basic';
    if (filter === 'defensive') return attackNature.includes('defensive') || attackType === 'defensive';
    if (filter === 'utility')   return attackNature.includes('utility');

    // Specific sub-natures
    if (filter.includes(':')) {
      const sub = filter.split(':').slice(1).join(':');
      return attackNature.includes(sub);
    }
    return attackNature.includes(filter);
  }

  // ─────────────────────────────────────────────────────────
  // 6. PASSIVE FLAG APPLICATION
  //    Maps parsed action to runtime flags on the card object.
  // ─────────────────────────────────────────────────────────

  function applyPassiveFlag(card, parsed) {
    if (!card || !parsed) return;
    switch (parsed.type) {
      case 'UNTARGETABLE_BY':
        _applyUntargetableFlags(card, parsed.spec);
        break;
      case 'FORCE_LOCK_ON_SELF':
        card._forcedTarget = true;
        break;
      case 'DMG_REDUCTION_MULT':
        if (!card._dmgReductionMult || parsed.mult < card._dmgReductionMult)
          card._dmgReductionMult = parsed.mult;   // keep the stronger reduction
        break;
      case 'DMG_REDUCTION_FLAT':
        card._dmgReductionFlat = (card._dmgReductionFlat || 0) + parsed.value;
        break;
      case 'APPLY_PRIORITY':
        card._priorityMult = Math.max(card._priorityMult || 1, parsed.multiplier);
        break;
      case 'APPLY_PROP_NO_MISS':
        card._noMiss = true;
        break;
      case 'APPLY_PROP_UNTARGETABLE':
        card._fullyUntargetable = true;
        break;
      case 'APPLY_PROP_SURVIVE_AT_1HP':
        card._surviveProp = true;
        break;
      case 'APPLY_PROP_STAT_LOCK':
        card._statLocks = new Set(parsed.locks.map(l => l.toUpperCase()));
        break;
      case 'APPLY_STATE':
        _applyState(card, parsed.raw);
        break;
    }
  }

  function _applyUntargetableFlags(card, spec) {
    const su = spec.toUpperCase();

    // Whole defensive family
    if (su === 'NATURE:DEFENSIVE') { card._immuneAllDefensive = true; return; }
    // Full offensive immunity
    if (su === 'NATURE:OFFENSIVE')  { card._immuneAllOffensive = true; return; }
    if (su === 'NATURE:OFFENSIVE+BASE') { card._immuneAllOffensive = true; card._immuneBasicAttack = true; return; }
    if (su === 'NATURE:OFFENSIVE:CLOSE_SHOT') { card._immuneCloseShot = true; return; }
    if (su.includes('CLOSE_SHOT')) card._immuneCloseShot = true;
    if (su.includes('JUMP_SHOT'))  card._immuneJumpShot  = true;

    // Specific defensive sub-types
    if (su.includes('DEFENSIVE:STEAL'))        card._immuneSteal        = true;
    if (su.includes('DEFENSIVE:FREEZE'))       card._immuneFreeze       = true;
    if (su.includes('DEFENSIVE:INTERCEPT'))    card._immuneIntercept    = true;
    if (su.includes('DEFENSIVE:FORCED_COIN_FLIP')) card._immuneForcedCoin = true;

    // Block / Contest + optional nature scope
    const hasScope = su.includes(':NATURE:');
    if (su.includes('DEFENSIVE:BLOCK+CONTEST') || (su.includes('DEFENSIVE:BLOCK') && su.includes('CONTEST'))) {
      card._skillsUnblockable    = !hasScope || su.includes('OFFENSIVE_SKILLS') || su.includes('OFFENSIVE');
      card._skillsUncontestable  = !hasScope || su.includes('OFFENSIVE_SKILLS') || su.includes('OFFENSIVE');
      if (!hasScope) { card._baseUnblockable = true; card._baseUncontestable = true; }
    } else if (su.includes('DEFENSIVE:BLOCK')) {
      card._skillsUnblockable = !hasScope || su.includes('OFFENSIVE_SKILLS') || su.includes('OFFENSIVE');
      if (!hasScope) card._baseUnblockable = true;
    } else if (su.includes('DEFENSIVE:CONTEST')) {
      card._skillsUncontestable = !hasScope || su.includes('OFFENSIVE_SKILLS') || su.includes('OFFENSIVE');
      if (!hasScope) card._baseUncontestable = true;
    }

    // Utility Nullify — defensive skills can't be nullified
    if (su.includes('UTILITY:NULLIFY')) card._defensiveUnnullifiable = true;
  }

  function _applyState(card, raw) {
    // e.g. "Sixth_Man:Priority:-10:Targetable_Via_Teammate"
    const parts = raw.split(':');
    const stateName = parts[0];
    if (!card._states) card._states = new Set();
    card._states.add(stateName);
    // Parse additional params
    for (let i = 1; i < parts.length - 1; i += 2) {
      const k = parts[i], v = parts[i + 1];
      if (k === 'Priority') card._statePriority = parseInt(v);
      if (k === 'Targetable_Via_Teammate') card._targetableViaTeammate = true;
    }
  }

  // ─────────────────────────────────────────────────────────
  // 7. STAT BUFF APPLICATION (direct stat mutation)
  // ─────────────────────────────────────────────────────────

  function _applyStatBuff(card, parsed) {
    if (!card || !parsed) return;
    // Respect Stat_Lock
    const locks = card._statLocks;

    switch (parsed.type) {
      case 'STAT_BUFF_MAX_HP':
        if (!locks?.has('HP')) {
          card.UI_Frontend_Data.Stats.HP = Math.max(0, card.UI_Frontend_Data.Stats.HP + parsed.value);
          if (parsed.value > 0)
            card.currentHp = Math.min(card.currentHp + parsed.value, card.UI_Frontend_Data.Stats.HP);
          else
            card.currentHp = Math.max(0, Math.min(card.currentHp, card.UI_Frontend_Data.Stats.HP));
        }
        break;
      case 'STAT_BUFF_HP':
        if (!locks?.has('HP')) {
          const maxHp = card.UI_Frontend_Data.Stats.HP;
          card.currentHp = Math.max(0, Math.min(card.currentHp + parsed.value, maxHp));
        }
        break;
      case 'STAT_BUFF_BASE_DMG':
        if (!locks?.has('DMG')) {
          card.UI_Frontend_Data.Stats.Base_DMG = Math.max(0, card.UI_Frontend_Data.Stats.Base_DMG + parsed.value);
        }
        break;
      case 'STAT_BUFF_SPD':
        if (!locks?.has('SPD')) {
          card.UI_Frontend_Data.Stats.Speed = Math.max(1, card.UI_Frontend_Data.Stats.Speed + parsed.value);
        }
        break;
      case 'STAT_BUFF_SKILL_DMG':
        if (!locks?.has('DMG')) {
          card._skillDmgBonus = (card._skillDmgBonus || 0) + parsed.value;
        }
        break;
    }
  }

  // ─────────────────────────────────────────────────────────
  // 8. AURA SYSTEM
  //    Named auras keyed by AbilityID.
  //    Apply_Aura is idempotent — won't stack the same ID twice.
  //    Remove_Aura is a no-op if the aura isn't active.
  // ─────────────────────────────────────────────────────────

  // Global aura registry: Map<instanceId, Map<abilityId, AuraEntry>>
  const _auraRegistry = new Map();

  function _getAuras(card) {
    if (!_auraRegistry.has(card._instanceId)) _auraRegistry.set(card._instanceId, new Map());
    return _auraRegistry.get(card._instanceId);
  }

  /**
   * applyAura — applies a named aura to a card.
   * spec is the payload after the abilityId (e.g. "+850_MAX_HP").
   * Idempotent: calling twice with the same abilityId is safe.
   */
  function applyAura(card, abilityId, spec) {
    const auras = _getAuras(card);
    if (auras.has(abilityId)) return; // already active — no double-stack

    const parsed = parseActionString('Stat_Buff:' + spec);
    // Store the aura entry
    auras.set(abilityId, { spec, parsed, sourceCard: card._instanceId });

    // Apply the stat / flag
    if (parsed.type.startsWith('STAT_BUFF')) {
      _applyStatBuff(card, parsed);
    } else if (parsed.type === 'UNTARGETABLE_BY') {
      _applyUntargetableFlags(card, parsed.spec);
    } else {
      // Try full action apply
      applyPassiveFlag(card, parsed);
    }
  }

  /**
   * removeAura — removes a named aura and reverses its effect.
   * No-op if the aura was not active.
   */
  function removeAura(card, abilityId) {
    const auras = _getAuras(card);
    if (!auras.has(abilityId)) return;
    const aura = auras.get(abilityId);
    auras.delete(abilityId);

    // Reverse the stat change
    const parsed = aura.parsed;
    if (!parsed) return;

    const rev = { ...parsed };
    if (rev.type === 'STAT_BUFF_MAX_HP')     rev.value = -rev.value;
    if (rev.type === 'STAT_BUFF_HP')         rev.value = -rev.value;
    if (rev.type === 'STAT_BUFF_BASE_DMG')   rev.value = -rev.value;
    if (rev.type === 'STAT_BUFF_SPD')        rev.value = -rev.value;
    if (rev.type === 'STAT_BUFF_SKILL_DMG')  rev.value = -rev.value;
    _applyStatBuff(card, rev);

    // For flag-type auras (untargetable etc.), re-derive all active flags
    // from remaining auras + base ability rules
    if (rev.type === 'UNTARGETABLE_BY') _recomputeUntargetableFlags(card);
  }

  /**
   * _recomputeUntargetableFlags — clears all flag-type untargetable flags
   * then re-applies them from remaining active auras + ON:ALWAYS rules.
   */
  function _recomputeUntargetableFlags(card) {
    // Clear all flag-type immunity flags
    const flagKeys = ['_immuneAllDefensive','_immuneAllOffensive','_immuneBasicAttack',
      '_immuneCloseShot','_immuneJumpShot','_immuneSteal','_immuneFreeze',
      '_immuneIntercept','_immuneForcedCoin','_skillsUnblockable','_skillsUncontestable',
      '_baseUnblockable','_baseUncontestable','_defensiveUnnullifiable','_forcedTarget',
      '_noMiss','_fullyUntargetable','_surviveProp'];
    flagKeys.forEach(k => delete card[k]);

    // Re-apply from remaining auras
    const auras = _getAuras(card);
    auras.forEach(entry => {
      const p = parseActionString('Untargetable_By:' + (entry.spec || ''));
      if (p.type === 'UNTARGETABLE_BY') _applyUntargetableFlags(card, p.spec);
    });

    // Re-apply from base ON:ALWAYS rules
    (card.Ability?.Rules || []).forEach(rule => {
      const t = parseTrigger(rule.trigger || '');
      if (t.type !== 'ALWAYS') return;
      const p = parseActionString(rule.action_string || rule.action || '');
      applyPassiveFlag(card, p);
    });
  }

  /**
   * gcAuras — Global Garbage Collection.
   * When a card leaves the active lineup, clear all non-persistent auras
   * originating FROM that card from all other cards.
   */
  function gcAuras(leavingCard, allCards) {
    const srcId = leavingCard._instanceId;
    allCards.forEach(target => {
      if (!target) return;
      const auras = _getAuras(target);
      const toRemove = [];
      auras.forEach((entry, abilityId) => {
        if (entry.sourceCard === srcId) toRemove.push(abilityId);
      });
      toRemove.forEach(id => removeAura(target, id));
    });
  }

  /** Remove all auras on a card (used when card is eliminated). */
  function clearCardAuras(card) {
    const auras = _getAuras(card);
    const ids = [...auras.keys()];
    ids.forEach(id => removeAura(card, id));
    _auraRegistry.delete(card._instanceId);
  }

  // ─────────────────────────────────────────────────────────
  // 9. PASSIVE ABILITY BOOT
  //    Called once when a card enters the lineup.
  //    Processes ON:ALWAYS and ON:DEPLOY rules.
  // ─────────────────────────────────────────────────────────

  function bootPassiveAbilities(card, ownTeam, pos) {
    const rules = card.Ability?.Rules;
    if (!rules) return;

    card._dynamicAlwaysRules = [];

    rules.forEach(rule => {
      const trigger  = parseTrigger(rule.trigger || rule.trigger_tag || '');
      const action   = parseActionString(rule.action_string || rule.action || '');
      const condition = rule.condition;

      if (trigger.type === 'ALWAYS') {
        const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [] };
        const met = condition ? evalCondition(
          typeof condition === 'string' ? _parseConditionString(condition, ctx) : condition,
          ctx
        ) : true;

        if (met) {
          if (action.type.startsWith('STAT_BUFF')) _applyStatBuff(card, action);
          else applyPassiveFlag(card, action);
        }
        if (condition && condition !== 'Self') card._dynamicAlwaysRules.push(rule);
      }

      if (trigger.type === 'DEPLOY_POS_MATCH' && pos) {
        const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [] };
        const condObj = { target: 'Self', attribute: 'Pos', operator: '=', value: pos };
        if (evalCondition(condObj, ctx)) {
          if (action.type.startsWith('STAT_BUFF')) _applyStatBuff(card, action);
          else applyPassiveFlag(card, action);
        }
      }

      if (trigger.type === 'DEPLOY_SIXTH_MAN') {
        applyPassiveFlag(card, action);
      }
    });
  }

  /**
   * bootEnterActiveLineup — fires ON:ENTER_ACTIVE_LINEUP rules.
   * Returns array of {targetCard, action, td} entries for the
   * calling layer to execute (timed effects for teammates).
   */
  function bootEnterActiveLineup(card, ownTeam, allCards) {
    const rules = card.Ability?.Rules;
    if (!rules) return [];
    const effects = [];

    rules.forEach(rule => {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'ENTER_ACTIVE_LINEUP') return;

      const action = parseActionString(rule.action_string || rule.action || '');
      const td = parseTD(rule.td || rule.TD || 'DEFAULT');
      const actionTarget = rule.action_target || 'Self';
      const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [] };

      // AND_PAIR check: look at condition_logic to see if this fires with another row
      const cond = rule.condition;
      const met = cond ? evalCondition(
        typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond, ctx
      ) : true;
      if (!met) return;

      // Resolve targets (Teammates:Pos:PG/SG, etc.)
      const targets = _resolveActionTarget(actionTarget, card, ownTeam, []);
      targets.forEach(targetCard => {
        effects.push({ targetCard, action, td, sourceCard: card });
      });
    });
    return effects;
  }

  /**
   * Re-evaluates conditional ON:ALWAYS rules. Called after HP changes.
   */
  function evaluateAlwaysConditional(card, ownTeam) {
    const dynRules = card._dynamicAlwaysRules;
    if (!dynRules?.length) return;
    const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [] };

    dynRules.forEach(rule => {
      const action = parseActionString(rule.action_string || rule.action || '');
      const cond   = rule.condition;
      if (!cond) return;
      const condParsed = typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond;
      const met = evalCondition(condParsed, ctx);

      // Toggle stat-based dynamic buffs
      const trackKey = `_dynAlways_${rule._ruleId || JSON.stringify(cond)}`;
      const hasBuff = !!card[trackKey];

      if (met && !hasBuff) {
        if (action.type.startsWith('STAT_BUFF')) _applyStatBuff(card, action);
        else applyPassiveFlag(card, action);
        card[trackKey] = true;
      } else if (!met && hasBuff) {
        // Reverse
        if (action.type === 'STAT_BUFF_BASE_DMG') {
          _applyStatBuff(card, { ...action, value: -action.value });
        }
        card[trackKey] = false;
      }
    });
  }

  // ─────────────────────────────────────────────────────────
  // 10. ROSTER-CHANGE ABILITY PROCESSOR
  //     Handles APPLY_AURA / REMOVE_AURA on ROSTER_JOIN/LEAVE events.
  //     Call this whenever the active lineup changes.
  // ─────────────────────────────────────────────────────────

  /**
   * evalRosterEvent
   * eventType: 'JOIN' | 'LEAVE' | 'LEAVE_LAST'
   * matchMode: 'TEAM_MATCH' | 'CARD_MATCH'
   * side:      'own' | 'enemy'
   * joiningCard: the card that just joined/left
   * affectedCards: all cards whose abilities should be re-checked
   * teamSnapshot: current state of the relevant team (after the change)
   */
  function evalRosterEvent(eventType, matchMode, side, joiningCard, affectedCards, teamSnapshot) {
    affectedCards.forEach(card => {
      if (!card || card.isDead) return;
      const rules = card.Ability?.Rules;
      if (!rules) return;

      rules.forEach(rule => {
        const trigger = parseTrigger(rule.trigger || '');
        // Match the trigger type and side
        if (trigger.type !== `ROSTER_${eventType}`) return;
        if (trigger.matchMode !== matchMode) return;
        if (trigger.side !== side) return;

        const ctx = {
          self: card,
          ownTeam: teamSnapshot || [],
          enemyTeam: [],
          castingEnemy: null,
        };

        // Check condition against the team snapshot
        const cond = rule.condition;
        const condParsed = cond
          ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
          : null;
        if (condParsed && !evalCondition(condParsed, ctx)) return;

        const action = parseActionString(rule.action_string || rule.action || '');
        _executeRosterAction(card, action, rule);
      });
    });
  }

  function _executeRosterAction(card, action, rule) {
    switch (action.type) {
      case 'APPLY_AURA':
        applyAura(card, action.abilityId, action.spec);
        break;
      case 'REMOVE_AURA':
        removeAura(card, action.abilityId);
        break;
      case 'STAT_BUFF_MAX_HP':
      case 'STAT_BUFF_HP':
      case 'STAT_BUFF_BASE_DMG':
      case 'STAT_BUFF_SPD':
      case 'STAT_BUFF_SKILL_DMG':
        _applyStatBuff(card, action);
        break;
      default:
        applyPassiveFlag(card, action);
    }
  }

  // ─────────────────────────────────────────────────────────
  // 11. ENEMY_CAST / ENEMY_RESOLVE TRIGGER EVALUATION
  //    Returns total flat mitigation from defender-side passives.
  // ─────────────────────────────────────────────────────────

  /**
   * evaluateEnemyCastTriggers
   * Fires ON:ENEMY_CAST / ON:ENEMY_RESOLVE rules on the defending team.
   * Returns { mitigation, blocked } where blocked=true means the attack is cancelled.
   */
  function evaluateEnemyCastTriggers(
    defendingTeam, castingCard, targetCard,
    castNature, castType,
    fullDefendingTeam, fullAttackingTeam
  ) {
    let totalMitigationFlat = 0;
    let totalMitigationMult = 1.0;

    defendingTeam.forEach(card => {
      if (!card || card.isDead) return;
      const rules = card.Ability?.Rules;
      if (!rules) return;

      rules.forEach(rule => {
        const trigger = parseTrigger(rule.trigger || '');
        if (trigger.type !== 'ENEMY_CAST' && trigger.type !== 'ENEMY_RESOLVE') return;

        // Scope check
        if (trigger.scope === 'self' && targetCard !== card) return;
        if (trigger.scope === 'not_self' && targetCard === card) return;
        if (trigger.scope === 'teammate' && targetCard === card) return;

        // Nature check
        if (trigger.nature && !natureMatches(trigger.nature, castNature, castType)) return;

        const ctx = {
          self: card,
          ownTeam: fullDefendingTeam,
          enemyTeam: fullAttackingTeam,
          castingEnemy: castingCard,
          targetEnemy: targetCard,
          castNature,
        };

        const cond = rule.condition;
        const condParsed = cond
          ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
          : null;
        if (condParsed && !evalCondition(condParsed, ctx)) return;

        const action = parseActionString(rule.action_string || rule.action || '');

        switch (action.type) {
          case 'DMG_REDUCTION_MULT':
            totalMitigationMult = Math.min(totalMitigationMult, action.mult);
            break;
          case 'DMG_REDUCTION_FLAT':
            totalMitigationFlat += action.value;
            break;
          case 'UNTARGETABLE_BY':
            // Reactive untargetable (Iverson, Yao, Shaq-Fu, etc.)
            // Apply temporarily for this attack resolution
            _applyUntargetableFlags(card, action.spec);
            break;
          default:
            applyPassiveFlag(card, action);
        }
      });
    });

    return { mitigationFlat: totalMitigationFlat, mitigationMult: totalMitigationMult };
  }

  // ─────────────────────────────────────────────────────────
  // 12. ENEMY_RETALIATE TRIGGER (Harden, Embiid bonus damage on block)
  // ─────────────────────────────────────────────────────────

  /**
   * evaluateRetaliateAbilities
   * Fires when a block resolves against attacker.
   * Returns bonus damage to deal to the original target.
   */
  function evaluateRetaliateAbilities(attackerCard, blockNature, attackNature) {
    let bonusDmg = 0;
    const rules = attackerCard.Ability?.Rules;
    if (!rules) return bonusDmg;

    rules.forEach(rule => {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'ENEMY_RETALIATE') return;

      // Check defense nature matches (e.g. Defensive:Block)
      if (!trigger.retaliateDefenseNature?.toLowerCase().includes(blockNature.toLowerCase())) return;
      // Check offense nature matches (Base or Offensive)
      const offN = (trigger.retaliateOffenseNature || '').toLowerCase();
      const atkN = (attackNature || '').toLowerCase();
      if (offN.includes('base') && !atkN.includes('base') && attackNature !== 'basic') return;
      if (offN.includes('offensive') && atkN.includes('base')) return;

      const action = parseActionString(rule.action_string || rule.action || '');
      if (action.type === 'BONUS_DAMAGE') bonusDmg += action.value;
    });

    return bonusDmg;
  }

  // ─────────────────────────────────────────────────────────
  // 13. REACTIVE SKILL TRIGGER CHECK
  //    Can a given reactive skill fire against a particular attack?
  // ─────────────────────────────────────────────────────────

  function canReactiveSkillTrigger(skill, attackNature, attackType) {
    const timing = String(skill.Timing || '');
    if (timing.includes('On_Enemy_Nature:Offensive:Close_Shot'))  return natureMatches('Offensive:Close_Shot', attackNature, attackType);
    if (timing.includes('On_Enemy_Nature:Offensive:Jump_Shot'))   return natureMatches('Offensive:Jump_Shot', attackNature, attackType);
    if (timing.includes('On_Enemy_Nature:Offensive+Base'))        return natureMatches('Offensive+Base', attackNature, attackType);
    if (timing.includes('On_Enemy_Nature:Offensive'))             return natureMatches('Offensive', attackNature, attackType);
    if (timing.includes('On_Enemy_Nature:Defensive'))             return natureMatches('Defensive', attackNature, attackType);
    if (timing.includes('On_Enemy_Nature:Utility:Assist'))        return natureMatches('Utility:Assist', attackNature, attackType);
    if (timing.includes('On_Teammate_Action:Miss|Block|Contest')) return true; // rebound triggers
    if (timing.includes('On_Teammate_Nature:Offensive'))          return natureMatches('Offensive', attackNature, attackType);
    // Generic reactive
    if (timing.includes('Reactive')) return true;
    return false;
  }

  // ─────────────────────────────────────────────────────────
  // 14. HP EVENT TRIGGERS
  // ─────────────────────────────────────────────────────────

  /** checkHPThreshold — fires ON:HP_THRESHOLD_ONCE if HP ≤ threshold (once per game). */
  function checkHPThreshold(card, ownTeam) {
    const used = card._hpThresholdUsed;
    if (used) return null;
    const rules = card.Ability?.Rules;
    if (!rules) return null;

    for (const rule of rules) {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'HP_THRESHOLD_ONCE') continue;

      const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [] };
      const cond = rule.condition;
      const condParsed = cond
        ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
        : null;
      if (condParsed && !evalCondition(condParsed, ctx)) continue;

      card._hpThresholdUsed = true;
      return parseActionString(rule.action_string || rule.action || '');
    }
    return null;
  }

  /** checkHPState — fires ON:HP_STATE if HP exactly matches condition. */
  function checkHPState(card, ownTeam) {
    const results = [];
    const rules = card.Ability?.Rules;
    if (!rules) return results;

    rules.forEach(rule => {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'HP_STATE') return;

      const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [] };
      const cond = rule.condition;
      const condParsed = cond
        ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
        : null;
      if (condParsed && !evalCondition(condParsed, ctx)) return;

      results.push(parseActionString(rule.action_string || rule.action || ''));
    });
    return results;
  }

  /** checkSurviveAbility — checks if a card has a survive-at-1HP rule. */
  function checkSurviveAbility(card) {
    const rules = card.Ability?.Rules;
    if (!rules) return false;
    return rules.some(r =>
      String(r.action_string || r.action || '').includes('Survive_At_1HP') ||
      r.type === 'APPLY_PROP_SURVIVE_AT_1HP' ||
      card._surviveProp
    );
  }

  // ─────────────────────────────────────────────────────────
  // 15. TEAMMATE_FAIL TRIGGER (LeBron Heatlemania putback)
  // ─────────────────────────────────────────────────────────

  /**
   * evalTeammateFail
   * Call when a teammate's offensive move fails.
   * Returns the action to execute (e.g. LBJ_PUTBACK) or null.
   */
  function evalTeammateFail(reactingCard, failedCard, failNature, ownTeam) {
    const rules = reactingCard.Ability?.Rules;
    if (!rules) return null;

    for (const rule of rules) {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'TEAMMATE_FAIL') return null;

      // Check actor spec (Actor:ID:X / Position:Y)
      const actorSpec = trigger.actorSpec || '';
      const posMatch  = actorSpec.match(/Position:([^/\]]+)/);
      const idMatch   = actorSpec.match(/ID:([^/\]]+)/);
      let specOk = true;
      if (posMatch) specOk = getCardPos(failedCard).some(p => posMatch[1].split('/').includes(p));
      if (idMatch  && specOk) specOk = _getPlayerId(failedCard) === idMatch[1];

      if (!specOk) continue;
      if (trigger.nature && !natureMatches(trigger.nature, failNature, 'skill')) continue;

      const ctx = { self: reactingCard, ownTeam: ownTeam || [], castingTeammate: failedCard };
      const cond = rule.condition;
      const condParsed = cond
        ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
        : null;
      if (condParsed && !evalCondition(condParsed, ctx)) continue;

      return parseActionString(rule.action_string || rule.action || '');
    }
    return null;
  }

  // ─────────────────────────────────────────────────────────
  // 16. SELF_CAST TRIGGER (ON:SELF_CAST - Untargetable, No_Miss)
  //    Returns flags to apply to card for this attack resolution.
  // ─────────────────────────────────────────────────────────

  /**
   * evalSelfCastAbilities
   * Call when a card is about to cast a skill/basic attack.
   * Returns { tempFlags } — flags to set for this attack only.
   */
  function evalSelfCastAbilities(card, castNature, castType, subtype, skillId, ownTeam) {
    // subtype: null | 'HIT' | 'FAIL'
    const flags = {};
    const rules = card.Ability?.Rules;
    if (!rules) return flags;

    rules.forEach(rule => {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'SELF_CAST') return;

      // Nature check
      if (trigger.nature && !natureMatches(trigger.nature, castNature, castType)) return;
      // Named skill check
      if (trigger.skillId && trigger.skillId !== skillId) return;
      // Subtype check (HIT / FAIL)
      if (trigger.subtype && trigger.subtype !== subtype) return;
      if (!trigger.subtype && subtype) return; // e.g. rule has no subtype but we're in HIT phase

      const ctx = { self: card, ownTeam: ownTeam || [], enemyTeam: [], castNature };
      const cond = rule.condition;
      const condParsed = cond
        ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
        : null;
      if (condParsed && !evalCondition(condParsed, ctx)) return;

      const action = parseActionString(rule.action_string || rule.action || '');
      switch (action.type) {
        case 'UNTARGETABLE_BY':
          // Applies this-attack only flags (unblockable, etc.)
          _applyUntargetableFlags(card, action.spec);
          break;
        case 'APPLY_PROP_NO_MISS':
          flags.noMiss = true;
          card._noMiss = true;
          break;
        case 'STAT_BUFF_BASE_DMG':
          if (action.thisAttack) flags.thisAttackBaseDmgBonus = (flags.thisAttackBaseDmgBonus || 0) + action.value;
          break;
        case 'STAT_BUFF_SKILL_DMG':
          if (action.thisAttack) flags.thisAttackSkillDmgBonus = (flags.thisAttackSkillDmgBonus || 0) + action.value;
          break;
        case 'APPLY_PRIORITY':
          flags.priorityBoost = Math.max(flags.priorityBoost || 1, action.multiplier);
          break;
        // Stacking buffs (Klay Captain Klay, T-Mac)
        case 'STAT_BUFF_SKILL_DMG':
          if (action.stacking === 'HIT' && subtype === 'HIT') {
            _applyStatBuff(card, { type: 'STAT_BUFF_SKILL_DMG', value: action.value });
          }
          if (action.stacking === 'MISS' && subtype === 'FAIL') {
            _applyStatBuff(card, { type: 'STAT_BUFF_SKILL_DMG', value: action.value });
          }
          break;
        case 'STAT_BUFF_BASE_DMG':
          if (action.stacking === 'MISS' && subtype === 'FAIL') {
            _applyStatBuff(card, { type: 'STAT_BUFF_BASE_DMG', value: action.value });
          }
          break;
        default:
          applyPassiveFlag(card, action);
      }
    });

    return flags;
  }

  /**
   * evalSelfCastStackingAbilities
   * Called specifically after HIT or FAIL to process stacking rules.
   */
  function evalSelfCastStackingAbilities(card, castNature, castType, subtype, skillId, ownTeam) {
    const rules = card.Ability?.Rules;
    if (!rules) return;

    rules.forEach(rule => {
      const trigger = parseTrigger(rule.trigger || '');
      if (trigger.type !== 'SELF_CAST') return;
      if (!trigger.subtype) return; // only fire subtyped rules here
      if (trigger.subtype !== subtype) return;
      if (trigger.nature && !natureMatches(trigger.nature, castNature, castType)) return;
      if (trigger.skillId && trigger.skillId !== skillId) return;

      const action = parseActionString(rule.action_string || rule.action || '');
      if (action.stacking === 'HIT' && subtype === 'HIT') {
        _applyStatBuff(card, { type: action.type, value: action.value });
      }
      if (action.stacking === 'MISS' && subtype === 'FAIL') {
        _applyStatBuff(card, { type: action.type, value: action.value });
      }
    });
  }

  // ─────────────────────────────────────────────────────────
  // 17. CARD_EXIT TRIGGER (ON:GSW_SCU:EXIT etc.)
  // ─────────────────────────────────────────────────────────

  /**
   * evalCardExitTriggers
   * Call when a specific card (exitingCard) leaves the lineup.
   * Checks all rules of affectedCard for ON:[CARD_ID]:EXIT triggers.
   */
  function evalCardExitTriggers(exitingCardId, affectedCards, teamSnapshot) {
    affectedCards.forEach(card => {
      if (!card || card.isDead) return;
      const rules = card.Ability?.Rules;
      if (!rules) return;

      rules.forEach(rule => {
        const trigger = parseTrigger(rule.trigger || '');
        if (trigger.type !== 'CARD_EXIT') return;
        if (trigger.cardId !== exitingCardId) return;

        const ctx = { self: card, ownTeam: teamSnapshot || [], enemyTeam: [] };
        const cond = rule.condition;
        const condParsed = cond
          ? (typeof cond === 'string' ? _parseConditionString(cond, ctx) : cond)
          : null;
        if (condParsed && !evalCondition(condParsed, ctx)) return;

        const action = parseActionString(rule.action_string || rule.action || '');
        _executeRosterAction(card, action, rule);
      });
    });
  }

  // ─────────────────────────────────────────────────────────
  // 18. ACTION TARGET RESOLVER
  //    "Self", "Casting_Enemy", "Original_Target",
  //    "Teammates:Pos:PG/SG", "Enemy:Pos:C", "All_Ally:All"
  // ─────────────────────────────────────────────────────────

  function _resolveActionTarget(actionTarget, self, ownTeam, enemyTeam) {
    const t = String(actionTarget || 'Self');
    if (t === 'Self') return [self];
    if (t === 'Casting_Enemy')  return [];   // handled by caller context
    if (t === 'Original_Target') return [];  // handled by caller context
    if (t === 'All_Ally:All')    return (ownTeam || []).filter(c => c && !c.isDead);

    // Teammates:Pos:PG/SG
    const tPosM = t.match(/^Teammates:Pos:(.+)$/);
    if (tPosM) {
      const positions = tPosM[1].split('/');
      return (ownTeam || []).filter(c => c && !c.isDead && positions.some(p => getCardPos(c).includes(p)));
    }

    // Enemy:Pos:C
    const ePosM = t.match(/^Enemy:Pos:(.+)$/);
    if (ePosM) {
      const positions = ePosM[1].split('/');
      return (enemyTeam || []).filter(c => c && !c.isDead && positions.some(p => getCardPos(c).includes(p)));
    }

    return [self];
  }

  // ─────────────────────────────────────────────────────────
  // 19. DAMAGE CALCULATOR
  // ─────────────────────────────────────────────────────────

  function calculateDamage(actionParsed, actorCard, targetCard, ownTeam, thisAttackFlags) {
    let dmg = 0;
    switch (actionParsed.type) {
      case 'STAT_BUFF_SKILL_DMG': // used as damage source (DEAL_FLAT_DMG equiv via Stat_Buff)
      case 'DEAL_FLAT_DMG':
        dmg = actionParsed.value || 0;
        break;
      default:
        dmg = 0;
    }

    // Per-attack bonuses from SELF_CAST rules
    if (thisAttackFlags?.thisAttackSkillDmgBonus) dmg += thisAttackFlags.thisAttackSkillDmgBonus;
    if (thisAttackFlags?.thisAttackBaseDmgBonus)  dmg += thisAttackFlags.thisAttackBaseDmgBonus;

    // Target passive reductions
    if (targetCard._dmgReductionMult) dmg = Math.floor(dmg * targetCard._dmgReductionMult);
    if (targetCard._dmgReductionFlat) dmg = Math.max(0, dmg - targetCard._dmgReductionFlat);

    return Math.max(0, dmg);
  }

  // ─────────────────────────────────────────────────────────
  // 20. TEMP-FLAG CLEANUP (called after each attack resolves)
  // ─────────────────────────────────────────────────────────

  /**
   * clearTempAttackFlags — wipes all per-attack-only flags from a card.
   * These are flags that should only last for a single attack resolution.
   */
  function clearTempAttackFlags(card) {
    const tempFlags = [
      '_skillsUnblockable', '_skillsUncontestable',
      '_baseUnblockable', '_baseUncontestable',
      '_noMiss', '_tempUntargetableBy',
      '_fullyUntargetable',
    ];
    // Only clear if the flag was NOT set by a permanent aura/passive
    // Strategy: re-derive from active auras + ON:ALWAYS after clearing
    _recomputeUntargetableFlags(card);
    delete card._noMiss;
    if (!card._surviveProp) delete card._fullyUntargetable;
  }

  // ─────────────────────────────────────────────────────────
  // PUBLIC API
  // ─────────────────────────────────────────────────────────

  return {
    // Parsers
    parseHeight,
    parseUM,
    parseTD,
    parseTrigger,
    parseActionString,

    // Condition
    evalCondition,

    // Passive boot
    bootPassiveAbilities,
    bootEnterActiveLineup,
    evaluateAlwaysConditional,

    // Roster events
    evalRosterEvent,
    evalCardExitTriggers,

    // Aura system
    applyAura,
    removeAura,
    gcAuras,
    clearCardAuras,

    // Combat triggers
    evaluateEnemyCastTriggers,
    evaluateRetaliateAbilities,
    evalSelfCastAbilities,
    evalSelfCastStackingAbilities,
    evalTeammateFail,
    canReactiveSkillTrigger,

    // HP events
    checkHPThreshold,
    checkHPState,
    checkSurviveAbility,

    // Helpers
    applyPassiveFlag,
    _applyStatBuff,
    _applyUntargetableFlags,
    calculateDamage,
    clearTempAttackFlags,
    natureMatches,
    _resolveActionTarget,
  };
})();


// ============================================================
// GLOBAL HELPERS — unchanged, kept exactly as-is

const $ = id => document.getElementById(id);
const GITHUB = 'https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/';
const POSITIONS = ['PG','SG','SF','PF','C'];
const TARGET_MATRIX = {PG:['PG','SG'],SG:['SG','SF'],SF:['SG','SF','PF'],PF:['PF','C'],C:['C','PF']};

let _ic = 0;
const mkId = (team, name) => `${team}_${(name||'card').replace(/\s+/g,'_')}_${++_ic}`;
const delay = ms => new Promise(r => setTimeout(r, ms));

function getCardName(c) { return c?.UI_Frontend_Data?.Formatted_Name || c?.UI_Frontend_Data?.Name || 'Unknown'; }
function getCardRawName(c) { return c?.UI_Frontend_Data?.Name || ''; }
function getCardVariant(c) { const fn = getCardName(c); const m = fn.match(/\((.+)\)$/); return m ? m[1] : ''; }
function getCardImg(c) { return c?.UI_Frontend_Data?.Image_File || ''; }
function getCardHP(c) { return c?.UI_Frontend_Data?.Stats?.HP || 0; }
function getCardDMG(c) { return c?.UI_Frontend_Data?.Stats?.Base_DMG || 0; }
function getCardSPD(c) { return c?.UI_Frontend_Data?.Stats?.Speed || 0; }
function getCardHeight(c) { return c?.UI_Frontend_Data?.Height || ''; }
function getCardTeam(c) { return c?.UI_Frontend_Data?.Team_ID || c?.UI_Frontend_Data?.Team || ''; }
function getCardTier(c) { return c?.UI_Frontend_Data?.Tier || ''; }
function getCardPos(c) { const p = c?.UI_Frontend_Data?.Positions; return p ? [p.Primary, p.Secondary, p.Third].filter(Boolean) : []; }
function getCardPosStr(c) { const p = c?.UI_Frontend_Data?.Positions; return p ? p.Primary + (p.Secondary ? '/' + p.Secondary : '') : 'N/A'; }
function getCardSkills(c) { return c?.Skills || []; }
function getAbility(c) { return c?.Ability || null; }


// ============================================================
// STAT BUFF SYSTEM — updated to use ENGINE.applyAura where applicable
// ============================================================

let _statBuffs = {};       // timed DMG bonuses (not permanent stats)
let _skillDisables = {};
let _contestTracking = {};

function ensureBuff(id) {
  if (!_statBuffs[id]) _statBuffs[id] = { dmgBonus:0, basicBonus:0, skillBonus:0, turnsLeft:999, started:true, delay:0 };
}
function getBuff(id) {
  const b = _statBuffs[id];
  if (!b || !b.started || b.delay > 0) return null;
  return b;
}
function getEffectiveDMG(card, isSkill = false) {
  const base = getCardDMG(card);
  const b = getBuff(card._instanceId);
  if (!b) return base + (card._skillDmgBonus || 0);
  return base + (b.dmgBonus || 0) + (isSkill ? (b.skillBonus || 0) : (b.basicBonus || 0));
}
function tickBuffs() {
  Object.keys(_statBuffs).forEach(k => {
    const b = _statBuffs[k];
    if (!b.started) return;
    if (b.delay > 0) { b.delay--; if (b.delay <= 0) b.started = true; return; }
    if (b.turnsLeft !== 999) { b.turnsLeft--; if (b.turnsLeft <= 0) delete _statBuffs[k]; }
  });
}
function addTimedBuff(card, bonusObj, turns, delay) {
  ensureBuff(card._instanceId);

  Object.assign(b, bonusObj);
  b.turnsLeft = turns || 999;
  b.delay = delay || 0;
  b.started = delay <= 0;
}
function tickSkillDisables() {

    _skillDisables[k] = _skillDisables[k].filter(d => { d.turnsLeft--; return d.turnsLeft > 0; });
    if (_skillDisables[k].length === 0) delete _skillDisables[k];
  });
}
function isSkillDisabled(targetId, skillName) {
  const dis = _skillDisables[targetId];
  if (!dis) return false;
  return dis.some(d => d.all || d.skillName === skillName);
}
function addSkillDisable(targetId, skillName, turnsLeft, sourceName, all) {
  if (!_skillDisables[targetId]) _skillDisables[targetId] = [];
  _skillDisables[targetId].push({ skillName, turnsLeft, sourceName, all: !!all });
}
function tickContestTracking() {
  Object.keys(_contestTracking).forEach(k => {
    _contestTracking[k].turnsLeft--;
    if (_contestTracking[k].turnsLeft <= 0) delete _contestTracking[k];
  });
}

function cloneCard(c, team) {
  const cc = JSON.parse(JSON.stringify(c));
  cc.currentHp   = getCardHP(cc);
  cc.isDead      = false;
  cc._instanceId = mkId(team, getCardName(cc));
  cc._priorityMult = 1;
  cc._skillDmgBonus = 0;
  cc._activeRound   = 0;   // incremented when card enters active lineup

  // Boot passive ability flags (ON:ALWAYS + ON:DEPLOY rules)
  ENGINE.bootPassiveAbilities(cc, [], null);

  // Init skill use counters
  (cc.Skills || []).forEach(sk => {
    const um = ENGINE.parseUM(sk.UM);
    sk._usesLeft      = isFinite(um.maxUses) ? um.maxUses : Infinity;
    sk._usesThisTurn  = 0;
    sk._priority      = um.priority;
    sk._usesPerTurn   = isFinite(um.usesPerTurn) ? um.usesPerTurn : Infinity;
    sk._td            = ENGINE.parseTD(sk.TD || sk.td || 'DEFAULT');
    sk._isReactive    = (sk.Timing || '').startsWith('Reactive');
    sk._isFree        = (sk.Timing || '').includes('_Free');
  });
  return cc;
}

function startBattle() {
  playerActive = POSITIONS.map(po => {
    if (!activeLineup[po]) return null;
    const c = cloneCard(activeLineup[po], 'player');
    c.battleRole = po;
    c._activeRound = 1;
    return c;
  }).filter(Boolean);

  playerBench = benchRoster
    .filter(c => !playerActive.some(ac => getCardName(ac) === getCardName(c)))
    .map(c => cloneCard(c, 'player'));

  const eR = buildEnemyRoster();
  enemyActive = eR.st;
  enemyBench  = eR.be;

  playerScore=0; enemyScore=0; turnCount=1; stagedActions=[]; uiState='IDLE';
  _statBuffs={}; _activeEffects=[]; _frozen={}; _shutdown={}; _shutdownDelays={};
  _drained={}; _invulnerable={}; _screened={}; _surviveUsed={};

  // Boot enter-active-lineup effects for starting 5
  _fireEnterActiveLineupEffects(playerActive, playerBench, 'player');
  _fireEnterActiveLineupEffects(enemyActive,  enemyBench,  'enemy');

  // Roster synergy boot (auras)
  _evalFullRosterSynergies(playerActive, [...playerActive,...playerBench], 'own');
  _evalFullRosterSynergies(enemyActive,  [...enemyActive,...enemyBench],   'own');

  $('battle-log').innerHTML = '';
  logMsg('sys','System','Match initiated. First to 8 KOs wins.');
  $('score-player').textContent='0'; $('score-enemy').textContent='0';
  $('checkout-panel').style.display='none';
  $('turn-indicator').textContent='TURN 1 — STAGING';
  showScreen('battle-screen'); initBattleAudio(); renderArena();
}

/** Fire ON:ENTER_ACTIVE_LINEUP for every card in a starting lineup. */
function _fireEnterActiveLineupEffects(activeArr, benchArr, side) {
  activeArr.forEach(card => {
    if (!card) return;
    card._activeRound = 1;
    const effects = ENGINE.bootEnterActiveLineup(card, activeArr, [...activeArr,...benchArr]);
    effects.forEach(({ targetCard, action, td }) => {
      // Apply timed untargetable flags
      switch (action.type) {
        case 'UNTARGETABLE_BY':
          ENGINE._applyUntargetableFlags(targetCard, action.spec);
          // Store with turn count for expiry
          if (!targetCard._timedUntargetable) targetCard._timedUntargetable = [];
          targetCard._timedUntargetable.push({ spec: action.spec, expires: turnCount + (td.turns || 1) });
          break;
        default:
          ENGINE.applyPassiveFlag(targetCard, action);
      }
    });
  });
}

/** Evaluate all roster-join events for the entire starting lineup. */
function _evalFullRosterSynergies(activeArr, fullRoster, side) {
  activeArr.forEach(card => {
    if (!card) return;
    ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', side, card, activeArr, fullRoster);
    ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', side, card, activeArr, fullRoster);
  });
}

function buildEnemyRoster() {
  const dr = {PG:[],SG:[],SF:[],PF:[],C:[]};
  const p = [...CARDS].sort(()=>Math.random()-.5);
  for (const c of p) {
    for (const po of getCardPos(c)) {
      if (POSITIONS.includes(po) && dr[po].length < 2) {
        if (!POSITIONS.some(x => dr[x].some(y => getCardName(y)===getCardName(c)))) {
          dr[po].push(c); break;
        }
      }
    }
    if (POSITIONS.every(x=>dr[x].length>=2)) break;
  }
  const st=[], be=[];
  POSITIONS.forEach(po => {
    if (dr[po][0]) { const c=cloneCard(dr[po][0],'enemy'); c.battleRole=po; c._activeRound=1; st.push(c); }
    if (dr[po][1]) { const c=cloneCard(dr[po][1],'enemy'); c.battleRole=po; be.push(c); }
  });
  _fireEnterActiveLineupEffects(st, be, 'enemy');
  return {st, be};
}
