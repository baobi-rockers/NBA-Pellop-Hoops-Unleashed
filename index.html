<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NBA Pellop Hoops Unleashed · TCG Pocket Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--bg-dark:#FFFDF9;--surface:#FFFFFF;--surface-2:#F0EBE0;--border:#E0D8CC;--border-heavy:#C8B89A;--accent:#E8621A;--accent-dark:#C4501A;--accent-light:#FF8C42;--green:#2D6A4F;--green-light:#40916C;--green-pale:#D8F3DC;--text:#1A1A1A;--text-light:#4A4A4A;--text-muted:#8A8A8A;--gold:#C8960C;--gold-light:#FFD166;--red:#D62828;--blue:#1B4F72;--pos-pg:#E8621A;--pos-sg:#D62828;--pos-sf:#2D6A4F;--pos-pf:#1B4F72;--pos-c:#6B3FA0;--pos-6th:#C8960C;--battle-bg:#0A0F1A;--battle-surface:rgba(255,255,255,0.06);--battle-border:rgba(255,255,255,0.15);--log-width:360px;--btn-radius:8px}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow-y:scroll;height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;background:var(--bg)}.screen.active{display:block}
.game-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 22px;border-radius:var(--btn-radius);font-weight:700;font-size:.85rem;cursor:pointer;font-family:'Inter',sans-serif;border:none;position:relative;overflow:hidden;transition:transform .12s ease,filter .12s ease;text-shadow:0 1px 2px rgba(0,0,0,.4);letter-spacing:.5px}
.game-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(0,0,0,.08) 100%);border-radius:inherit;pointer-events:none}
.game-btn:hover:not(:disabled){transform:scale(.97);filter:brightness(1.08)}.game-btn:active:not(:disabled){transform:scale(.94);filter:brightness(.95)}.game-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.game-btn-orange{background:linear-gradient(180deg,#F07030,#C4501A);color:#fff;box-shadow:0 3px 0 #8B3010,0 4px 12px rgba(232,98,26,.4)}
.game-btn-green{background:linear-gradient(180deg,#3A8060,#1E5235);color:#fff;box-shadow:0 3px 0 #0F3020,0 4px 12px rgba(45,106,79,.4)}
.game-btn-red{background:linear-gradient(180deg,#D84040,#982020);color:#fff;box-shadow:0 3px 0 #601010,0 4px 12px rgba(180,40,40,.5)}
.game-btn-blue{background:linear-gradient(180deg,#2A6090,#0D3060);color:#fff;box-shadow:0 3px 0 #081840,0 4px 12px rgba(27,79,114,.4)}
.game-btn-gold{background:linear-gradient(180deg,#E0A820,#A07008);color:#fff;box-shadow:0 3px 0 #604000,0 4px 12px rgba(200,150,12,.4)}
.game-btn-purple{background:linear-gradient(180deg,#9060C0,#602090);color:#fff;box-shadow:0 3px 0 #300860,0 4px 12px rgba(107,63,160,.4)}
.game-btn-outline{background:linear-gradient(180deg,#f5f0e8,#e0d0bc);color:var(--text);box-shadow:0 3px 0 #b8a890,0 2px 6px rgba(0,0,0,.15)}
.game-btn-ghost{background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));color:rgba(255,255,255,.85);box-shadow:0 3px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2)}
.game-btn-teal{background:linear-gradient(180deg,#40E0A0,#1A9060);color:#0A1A10;box-shadow:0 3px 0 #0A5030,0 4px 12px rgba(64,224,160,.3)}
.game-btn-cyan{background:linear-gradient(180deg,#4FC3F7,#0288D1);color:#0A1929;box-shadow:0 3px 0 #014060,0 4px 12px rgba(79,195,247,.4)}
.app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;z-index:100;position:sticky;top:0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-logo-wrap{display:flex;align-items:center;gap:10px}
.header-logo-img{height:38px;width:auto;object-fit:contain}
.nav{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:40px;border:1px solid var(--border)}
.nav-btn{padding:5px 14px;border-radius:30px;font-weight:600;font-size:.8rem;background:transparent;border:none;cursor:pointer;color:var(--text-light);font-family:'Inter',sans-serif;transition:all .15s}
.nav-btn.active,.nav-btn:hover{background:var(--accent);color:#fff}
.tooltip-bubble{position:fixed;z-index:9999;background:rgba(10,15,26,.95);border:1px solid rgba(255,255,255,.2);padding:10px 12px;border-radius:10px;color:#E8E8E8;max-width:280px;font-size:.68rem;line-height:1.4;box-shadow:0 10px 28px rgba(0,0,0,.7);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .15s;font-weight:300}
.tooltip-bubble .tt-name{color:var(--gold-light);font-weight:700;font-size:.82rem;margin-bottom:3px}
.tooltip-bubble .tt-ability{color:#80CFFF;font-weight:600;font-size:.65rem;margin-bottom:2px}
.tooltip-bubble .tt-skill{margin-top:3px}
.tooltip-bubble .tt-skill-name{color:#fff;font-weight:600;font-size:.7rem}
.tooltip-bubble .tt-skill-dmg{color:#FF8C8C;font-size:.65rem}
.tooltip-bubble .tt-skill-desc{color:rgba(255,255,255,.4);font-size:.6rem}
.tooltip-bubble.visible{opacity:1}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);align-items:center}
.styled-search-wrap{position:relative;display:flex;align-items:center}
.styled-search-wrap .search-icon{position:absolute;left:10px;font-size:13px;color:var(--text-muted);pointer-events:none}
input[type="text"].pill-input{padding:6px 12px 6px 30px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:.82rem;height:32px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
input[type="text"].pill-input:focus{border-color:var(--accent)}
input[type="text"].pill-input::placeholder{color:var(--text-muted)}
select.pill-select{padding:5px 12px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:.82rem;height:32px;outline:none;font-family:'Inter',sans-serif;cursor:pointer;transition:border-color .2s}
select.pill-select:focus{border-color:var(--accent)}
.sticky-container{position:sticky;top:0;z-index:90;background:var(--bg)}
#cat-split-wrapper{display:flex;align-items:flex-start;gap:0;min-height:calc(100vh - 90px)}
#cat-left-panel{width:0;overflow:hidden;flex-shrink:0;position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto;background:var(--surface);border-right:2px solid var(--border-heavy);transition:width .35s cubic-bezier(.4,0,.2,1)}
#cat-left-panel.open{width:360px}
.cat-left-inner{width:360px;padding:18px 16px}
.cat-left-card-img{width:100%;aspect-ratio:5/7;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#1a1a2e;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.cat-left-card-img img{width:100%;height:100%;object-fit:cover}
@keyframes catCardIn{0%{transform:rotateY(720deg) scale(.4);opacity:0}15%{opacity:1}70%{transform:rotateY(0deg) scale(1.03)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.cat-left-card-img.animating{animation:catCardIn 1.4s cubic-bezier(.08,.95,.2,1) forwards;perspective:1200px;transform-style:preserve-3d}
#cat-right-panel{flex:1;min-width:0}
#cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:14px 18px;align-items:start}
#home-screen{background:radial-gradient(ellipse at 50% 40%,#1a2a1a,#0a0f0a);min-height:100vh;overflow:hidden}
.home-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:32px;padding:20px;position:relative}
.home-logo-wrap{position:relative;display:inline-block;cursor:default}
.home-logo-glow{position:absolute;inset:-40px;background:radial-gradient(ellipse at center,rgba(232,98,26,.7),rgba(45,106,79,.4) 40%,transparent 70%);border-radius:50%;filter:blur(20px);animation:pulseFlame 2.8s ease-in-out infinite;pointer-events:none;z-index:0}
.home-logo-glow-2{position:absolute;inset:-20px;background:radial-gradient(ellipse at center,rgba(255,180,50,.5),rgba(232,98,26,.3) 50%,transparent 70%);border-radius:50%;filter:blur(12px);animation:pulseFlame2 2.1s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes pulseFlame{0%{opacity:.6;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}100%{opacity:.6;transform:scale(.92)}}
@keyframes pulseFlame2{0%{opacity:.4;transform:scale(1) translateY(0)}50%{opacity:.9;transform:scale(1.05) translateY(-8px)}100%{opacity:.4;transform:scale(1) translateY(0)}}
.home-big-logo{width:min(500px,85vw);position:relative;z-index:1;filter:drop-shadow(0 4px 20px rgba(232,98,26,.5))}
.home-btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px 18px;align-items:start}
.compact-card{position:relative;width:100%;padding-bottom:140%;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .2s,box-shadow .2s;cursor:pointer;border:2px solid var(--border)}
.compact-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 10px 24px rgba(232,98,26,.25);border-color:var(--accent);z-index:5}
.compact-card.in-draft{opacity:.25;pointer-events:none;filter:grayscale(70%)}
.compact-card.selected-panel{border-color:var(--green);box-shadow:0 6px 20px rgba(45,106,79,.35)}
.card-img-sm{position:absolute;inset:0;background:#1a1a2e;pointer-events:none}
.card-img-sm img{width:100%;height:100%;object-fit:cover}
.ec-header{border-bottom:2px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.ec-title{font-size:1.15rem;font-weight:800;line-height:1.1}
.ec-team{color:var(--accent);font-weight:700;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ec-stats-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.ec-stat{background:var(--surface-2);padding:4px 10px;border-radius:6px;font-weight:800;border:1px solid var(--border);font-size:.82rem;display:flex;align-items:center;gap:3px}
.ec-stat span{font-size:.55rem;color:var(--text-muted)}
.ec-ability-block{background:rgba(45,106,79,.06);border-left:3px solid var(--green);padding:6px 8px;margin-bottom:8px;border-radius:0 6px 6px 0}
.ec-ability-name{font-weight:800;color:var(--green);font-size:.82rem}
.ec-ability-desc{font-size:.65rem;color:var(--text-light);line-height:1.35;margin-top:2px}
.ec-skill-wrap{background:var(--surface-2);border:1px solid var(--border);padding:7px 8px;border-radius:8px;margin-bottom:6px}
.ec-skill-header{display:flex;justify-content:space-between;align-items:flex-start;font-weight:800;font-size:.75rem;margin-bottom:3px;gap:4px}
.ec-skill-name{flex:1;color:var(--text)}
.ec-skill-dmg{color:var(--red);background:rgba(214,40,40,.08);padding:1px 5px;border-radius:4px;font-size:.68rem;white-space:nowrap}
.ec-skill-desc{font-size:.62rem;color:var(--text-light);line-height:1.3}
.draft-layout{display:flex;min-height:calc(100vh - 90px)}
.draft-main{flex:1;overflow-y:auto;min-width:0}
.draft-sidebar{width:200px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;padding:14px 10px;gap:8px;position:sticky;top:90px;height:calc(100vh - 90px);overflow-y:auto}
.draft-count-display{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;text-align:center;color:var(--accent);text-shadow:2px 2px 0 rgba(0,0,0,.08);letter-spacing:2px;margin-bottom:6px}
.slot-card{background:var(--surface-2);border-radius:8px;border:1.5px dashed var(--border-heavy);padding:5px 6px;min-height:48px;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.slot-card.filled{border-style:solid;background:#fff}
.slot-pos{font-weight:900;font-size:.9rem;letter-spacing:1px;pointer-events:none}
.slot-name{font-weight:600;font-size:.6rem;color:var(--text);white-space:normal;line-height:1.2;pointer-events:none;word-wrap:break-word;width:100%;margin-top:2px}
.slot-card.drag-over{background:rgba(232,98,26,.08);border-style:solid;border-color:var(--accent)}
.slot-PG.filled{border-color:var(--pos-pg)}.slot-PG .slot-pos{color:var(--pos-pg)}
.slot-SG.filled{border-color:var(--pos-sg)}.slot-SG .slot-pos{color:var(--pos-sg)}
.slot-SF.filled{border-color:var(--pos-sf)}.slot-SF .slot-pos{color:var(--pos-sf)}
.slot-PF.filled{border-color:var(--pos-pf)}.slot-PF .slot-pos{color:var(--pos-pf)}
.slot-C.filled{border-color:var(--pos-c)}.slot-C .slot-pos{color:var(--pos-c)}
.remove-slot,.setup-remove{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;z-index:100;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:bold;border:none;box-shadow:0 2px 0 #601010,0 2px 5px rgba(180,40,40,.5);transition:transform .12s}
.remove-slot:hover,.setup-remove:hover{transform:scale(.88)}
#draft-grid-wrapper{display:flex;align-items:flex-start;min-height:100%;flex-direction:row-reverse}
#draft-cards-col{flex:1;min-width:0}
#draft-side-panel{width:0;overflow:hidden;transition:width .35s cubic-bezier(.4,0,.2,1);flex-shrink:0;background:var(--surface);border-right:2px solid var(--border);position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto}
#draft-side-panel.open{width:380px}
.side-panel-inner{padding:18px 16px;width:380px}
.side-panel-card-img{width:100%;aspect-ratio:5/7;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#1a1a2e;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.side-panel-card-img img{width:100%;height:100%;object-fit:cover}
@keyframes panelCardIn{0%{transform:rotateY(720deg) scale(.4);opacity:0}15%{opacity:1}70%{transform:rotateY(0deg) scale(1.03)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.side-panel-card-img.animating{animation:panelCardIn 1.4s cubic-bezier(.08,.95,.2,1) forwards;perspective:1200px;transform-style:preserve-3d}
.side-panel-close{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:bold;z-index:10;box-shadow:0 3px 0 #601010;border:none;transition:transform .12s}
.side-panel-close:hover{transform:scale(.85)}
.side-panel-relative{position:relative}
#setup-screen{background:var(--bg)}
.setup-header-bar{background:var(--surface);padding:10px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.setup-slots-row{display:flex;justify-content:center;gap:10px;padding:14px 20px 6px;flex-wrap:nowrap;overflow-x:auto}
.setup-slot-card{width:240px;height:336px;flex-shrink:0;background:var(--surface);border-radius:10px;border:2px dashed var(--border-heavy);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:visible;transition:all .2s}
.setup-slot-card.filled{border-style:solid;border-width:2px}
.setup-slot-card.drag-over{box-shadow:0 0 18px rgba(232,98,26,.4);transform:scale(1.03);border-color:var(--accent)}
.setup-slot-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.setup-slot-pos{font-weight:900;font-size:1.4rem;letter-spacing:1px;z-index:2}
.setup-slot-drop-text{font-size:.62rem;opacity:.4;margin-top:5px;z-index:2}
.setup-slot-PG.filled{border-color:var(--pos-pg)}.setup-slot-PG .setup-slot-pos{color:var(--pos-pg)}
.setup-slot-SG.filled{border-color:var(--pos-sg)}.setup-slot-SG .setup-slot-pos{color:var(--pos-sg)}
.setup-slot-SF.filled{border-color:var(--pos-sf)}.setup-slot-SF .setup-slot-pos{color:var(--pos-sf)}
.setup-slot-PF.filled{border-color:var(--pos-pf)}.setup-slot-PF .setup-slot-pos{color:var(--pos-pf)}
.setup-slot-C.filled{border-color:var(--pos-c)}.setup-slot-C .setup-slot-pos{color:var(--pos-c)}
.setup-counter{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.2rem;color:var(--green);letter-spacing:2px}
.setup-action-bar{display:flex;align-items:center;justify-content:center;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px}
.bench-label{font-weight:800;color:var(--accent);padding:10px 20px 4px}
.bench-scroll-row{padding:10px 20px;display:flex;flex-direction:row;overflow-x:auto;gap:12px;flex-wrap:nowrap;scroll-snap-type:x mandatory}
.bench-scroll-row::-webkit-scrollbar{height:5px}
.bench-scroll-row::-webkit-scrollbar-track{background:var(--border);border-radius:3px}
.bench-scroll-row::-webkit-scrollbar-thumb{background:#7ab49a;border-radius:3px}
.bench-card-item{width:240px;height:336px;flex-shrink:0;scroll-snap-align:start;background:#1a1a2e;border-radius:10px;overflow:hidden;cursor:grab;border:2px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;transition:transform .2s,box-shadow .2s}
.bench-card-item:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(232,98,26,.25);border-color:var(--accent)}
.bench-card-item img{width:100%;height:100%;object-fit:cover}
/* ── BATTLE SCREEN ── */
#battle-screen{background:var(--battle-bg);color:#fff;overflow:hidden}
.battle-app-header{background:rgba(10,15,26,.97);border-bottom:1px solid rgba(255,255,255,.1);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;backdrop-filter:blur(10px)}
.battle-logo-img{height:34px;width:auto;object-fit:contain}
.arena-container{display:flex;height:100vh;width:100%;overflow:hidden;position:relative;padding-top:44px;transition:padding-right .4s cubic-bezier(.4,0,.2,1)}
.arena-container.log-open{padding-right:var(--log-width)}
.court-area{flex:1;display:flex;flex-direction:column;background:url('https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/BATTLE%20BACKDROPS/grassy_court.png') center/cover no-repeat,radial-gradient(ellipse at center,#0d1b2a,#050a12);padding:10px 20px 8px;justify-content:space-between;overflow:hidden;position:relative;transition:all .4s cubic-bezier(.4,0,.2,1)}
.floating-scoreboard{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(10,15,26,.88);border:1.5px solid rgba(255,255,255,.15);padding:5px 24px;border-radius:12px;display:flex;flex-direction:column;align-items:center;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.score-board{display:flex;gap:16px;font-family:'Orbitron',sans-serif;font-size:2.5rem;line-height:1;font-weight:900}
#turn-indicator{font-weight:700;color:rgba(255,255,255,.5);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
/* ── MOVE BUDGET BAR ── */
.move-budget-bar{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;z-index:51;background:rgba(10,15,26,.8);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.7);backdrop-filter:blur(8px)}
.move-pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);transition:background .2s}
.move-pip.used{background:#40E0A0;border-color:#40E0A0}
.move-pip.free{background:#FFD166;border-color:#FFD166}
/* ── FAN LAYOUT ── */
.active-fan-wrapper{display:flex;justify-content:center;align-items:flex-end;position:relative;width:100%;height:270px;margin-bottom:120px}
.enemy-fan-wrapper{display:flex;justify-content:center;align-items:flex-start;position:relative;width:100%;height:290px;margin-top:50px}
.active-card-wrap,.enemy-card-wrap{transition:all .3s cubic-bezier(.2,.8,.2,1);cursor:pointer;position:relative;display:inline-block;margin:0 -20px}
.active-card-wrap:hover,.enemy-card-wrap:hover{transform:rotate(var(--base-rot)) translateY(var(--base-y)) scale(1.4)!important;margin:0 35px!important;z-index:100!important}
.active-card-wrap:hover{filter:drop-shadow(0 20px 30px rgba(64,224,160,.5))}
.enemy-card-wrap:hover{filter:drop-shadow(0 -10px 30px rgba(255,107,107,.7))}
.battle-card{width:165px;height:231px;border-radius:10px;border:2px solid rgba(255,255,255,.2);overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.7);position:relative;background:#0f1320;transition:border .2s,box-shadow .2s}

.dead-card{filter:grayscale(100%) brightness(.3);pointer-events:none;opacity:.7}
.battle-card.staged{border-color:#40E0A0!important;box-shadow:0 0 18px 3px rgba(64,224,160,.5)}

.hp-bar-container{position:absolute;bottom:-11px;left:0;width:100%;height:7px;background:rgba(0,0,0,.6);border-radius:4px;overflow:hidden;z-index:5}

.hp-text{position:absolute;bottom:-24px;width:100%;text-align:center;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.85);z-index:5;white-space:nowrap;text-shadow:0 1px 3px #000}
/* ── STATUS TAGS BELOW CARD ── */
.card-status-tags{position:absolute;bottom:-42px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;z-index:10;pointer-events:none;white-space:nowrap}

.status-tag.invuln{color:#FFFFFF;border-color:rgba(255,255,255,.8);background:rgba(50,50,80,.95)}
/* ── BENCH STACKS ── */
.bench-stack-container{position:absolute;left:14px;width:120px;z-index:150;pointer-events:none}

.bench-stack-card img{width:100%;height:100%;object-fit:cover}
.bench-stack-card.face-down{background:url('https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/BACK%20OF%20CARDS/GOAT_TIER_(back).png') center/cover}
.bench-stack-card.face-down img{display:none}
.bench-stack-card:hover{border-color:rgba(255,255,255,.6);box-shadow:0 0 14px rgba(255,255,255,.3)}
/* ── BENCH FAN OVERLAY ── */
.bench-fan-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:140;display:none;flex-direction:column;align-items:center;justify-content:center}

.bench-fan-stage{position:relative;width:100%;height:340px;display:flex;align-items:flex-end;justify-content:center}

.bench-fan-card{width:150px;height:210px;border-radius:12px;border:2px solid rgba(255,255,255,.25);overflow:hidden;background:#0f1320;box-shadow:0 16px 36px rgba(0,0,0,.9)}

.bench-fan-card-wrap.ineligible{pointer-events:none!important;cursor:not-allowed}

.bench-fan-close{position:absolute;top:-50px;right:20px;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;border:none;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:bold;z-index:210;box-shadow:0 4px 0 #601010,0 4px 16px rgba(180,40,40,.6);transition:transform .12s}

.bench-fan-label{color:rgba(255,255,255,.7);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:16px;background:rgba(10,15,26,.7);padding:6px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
/* ── ACTION PANEL ── */
.action-panels-wrapper{position:fixed;bottom:0;left:0;right:0;display:none;z-index:200;flex-direction:column;align-items:center;padding-bottom:8px;pointer-events:none;transition:right .4s cubic-bezier(.4,0,.2,1);background:linear-gradient(0deg,rgba(8,12,22,.95),rgba(8,12,22,0))}
.action-panels-wrapper.visible{display:flex;pointer-events:all}
.action-card-name{font-family:'Orbitron',sans-serif;font-size:.82rem;letter-spacing:1px;color:var(--gold-light);margin-bottom:6px;font-weight:700;background:rgba(10,15,26,.85);padding:4px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1)}
.action-btns-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:8px 16px;background:rgba(10,15,26,.88);border:1px solid rgba(255,255,255,.12);border-radius:12px;backdrop-filter:blur(12px);max-width:90vw}
.action-btn{padding:9px 16px;font-size:.82rem;font-weight:700;font-family:'Inter',sans-serif;border-radius:var(--btn-radius);border:none;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s,filter .12s;text-shadow:0 1px 2px rgba(0,0,0,.4);letter-spacing:.5px;white-space:nowrap;text-transform:uppercase}
.action-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(0,0,0,.08));pointer-events:none}
.action-btn:hover:not(:disabled){transform:scale(.97);filter:brightness(1.1)}.action-btn:active:not(:disabled){transform:scale(.93)}
.action-btn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(60%);transform:none!important}
.action-btn-skill{background:linear-gradient(180deg,#7A9E7E,#3D6B54);color:#F5F0E8;box-shadow:0 3px 0 #1E3828}
.action-btn-basic{background:linear-gradient(180deg,#E8621A,#B04010);color:#FFF8F0;box-shadow:0 3px 0 #6A2808}
.action-btn-pass{background:linear-gradient(180deg,rgba(200,185,160,.25),rgba(160,145,120,.15));color:rgba(240,230,210,.9);box-shadow:0 2px 0 rgba(0,0,0,.5);border:1px solid rgba(200,180,150,.3)}
.action-btn-dmg{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.5px;color:rgba(255,255,255,.9);font-weight:400}
.action-btn-alt{background:linear-gradient(180deg,#9060C0,#602090);color:#fff;box-shadow:0 3px 0 #300860;border:1.5px dashed rgba(255,255,255,.3)}
.checkout-panel{position:absolute;bottom:310px;left:50%;transform:translateX(-50%);background:rgba(10,15,26,.9);border:2px solid rgba(64,224,160,.4);border-radius:12px;padding:10px 18px;width:290px;z-index:80;box-shadow:0 8px 24px rgba(64,224,160,.1);display:none;flex-direction:column;gap:7px;backdrop-filter:blur(8px)}
/* ── GLOBAL DEBUFF BAR ── */
.global-debuff-bar{position:absolute;top:96px;left:50%;transform:translateX(-50%);z-index:52;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;pointer-events:none}
.global-debuff-pill{background:rgba(180,100,220,.9);color:#fff;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid rgba(220,150,255,.5)}
/* ── BATTLE LOG ── */
.battle-log-panel{position:fixed;top:44px;right:0;bottom:0;width:var(--log-width);background:rgba(8,12,22,.97);border-left:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;z-index:180;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(12px)}
.battle-log-panel.open{transform:translateX(0)}
.battle-log-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(10,15,26,.9);flex-shrink:0}
.battle-log-title{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase}
.log-tabs{display:flex;gap:4px}
.log-tab-btn{padding:4px 10px;border-radius:4px;font-size:.6rem;font-weight:700;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.log-tab-btn.active{background:rgba(64,224,160,.15);color:#40E0A0;border-color:rgba(64,224,160,.3)}
.log-toggle-btn{background:linear-gradient(180deg,#3A3A5A,#1A1A3A);color:rgba(255,255,255,.8);border:none;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;box-shadow:0 2px 0 rgba(0,0,0,.5);transition:transform .12s}
.log-open-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);background:rgba(10,15,26,.92);border:1px solid rgba(255,255,255,.15);border-right:none;padding:12px 8px;border-radius:8px 0 0 8px;cursor:pointer;z-index:181;display:flex;flex-direction:column;align-items:center;gap:4px;transition:right .4s,background .15s;backdrop-filter:blur(8px)}
.log-open-tab.panel-open{right:var(--log-width)}
.log-open-tab:hover{background:rgba(30,40,60,.95)}
.log-tab-text{font-size:.55rem;letter-spacing:1px;color:rgba(255,255,255,.5);text-transform:uppercase;writing-mode:vertical-rl}
.retro-log-container{flex:1;overflow-y:auto;padding:10px 12px;font-family:'Inter',sans-serif;font-size:.78rem}
.retro-log-container::-webkit-scrollbar{width:3px}
.retro-log-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.log-entry{display:flex;flex-direction:column;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.04)}
.log-who{font-weight:700;font-size:.72rem;letter-spacing:.5px;margin-bottom:1px}
.log-detail{color:rgba(255,255,255,.65);line-height:1.45;font-size:.76rem}
.log-who-you{color:#40E0A0}.log-who-bot{color:#FF6B6B}.log-who-sys{color:var(--gold-light)}.log-who-coin{color:#80CFFF}.log-who-hp{color:rgba(255,255,255,.4)}.log-who-ko{color:#FF4444}.log-who-block{color:#A0D0FF}.log-who-eff{color:#C0C0FF}
.effect-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(255,255,255,.04);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--gold-light);font-size:.72rem}
.effect-row .eff-desc{flex:1;color:rgba(255,255,255,.75)}
.effect-row .eff-turns{color:var(--gold-light);font-weight:700;font-family:'Orbitron',sans-serif;font-size:.65rem}
.effect-row .eff-source{color:rgba(255,255,255,.4);font-size:.6rem}
.enemy-bench-tooltip{position:fixed;background:rgba(10,15,26,.95);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 12px;z-index:9999;font-size:.78rem;color:rgba(255,255,255,.7);pointer-events:none;white-space:nowrap;box-shadow:0 6px 16px rgba(0,0,0,.7);display:none}
/* ── COIN FLIP ── */
.coin-flip-overlay{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;pointer-events:none}
.coin-flip-container{display:flex;flex-direction:column;align-items:center;gap:10px}
.coin-flip-label{font-family:'Orbitron',sans-serif;font-size:.85rem;color:#80CFFF;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 10px rgba(128,207,255,.8)}
.coin-flip-main{display:flex;align-items:center;gap:24px}
.coin-wrap{perspective:600px}
.coin{width:90px;height:90px;border-radius:50%;position:relative;transform-style:preserve-3d;animation:coinSpin .6s linear infinite}
.coin.result-heads{animation:coinLandHeads .8s cubic-bezier(.25,.46,.45,.94) forwards}
.coin.result-tails{animation:coinLandTails .8s cubic-bezier(.25,.46,.45,.94) forwards}
.coin-face{position:absolute;inset:0;border-radius:50%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1rem}
.coin-heads{background:radial-gradient(circle at 35% 30%,#FFE066,#C89010);color:#5A3A00;border:3px solid #E0A020;box-shadow:inset 0 3px 8px rgba(255,255,255,.4),inset 0 -3px 8px rgba(0,0,0,.3)}
.coin-tails{background:radial-gradient(circle at 35% 30%,#C0C0C0,#707070);color:#303030;border:3px solid #A0A0A0;transform:rotateY(180deg)}
@keyframes coinSpin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
@keyframes coinLandHeads{0%{transform:rotateY(720deg)}100%{transform:rotateY(0)}}
@keyframes coinLandTails{0%{transform:rotateY(540deg)}100%{transform:rotateY(180deg)}}
.coin-info-bar{background:rgba(10,15,26,.92);border:1px solid rgba(255,255,255,.2);padding:10px 18px;border-radius:10px;text-align:left;min-width:220px;max-width:260px}
.coin-info-player{font-weight:700;color:var(--gold-light);font-size:.82rem}
.coin-result-text{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;text-align:center;margin-top:4px;text-shadow:0 0 16px currentColor}
.coin-result-text.hit{color:#40E0A0}.coin-result-text.miss{color:#FF6B6B}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:9000;display:flex;align-items:center;justify-content:center}
.modal-box{background:rgba(16,22,42,.98);border:1.5px solid rgba(255,255,255,.15);border-radius:16px;padding:24px;width:420px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.9);text-align:center;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Orbitron',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--gold-light);margin-bottom:14px;font-weight:900}
.modal-desc{color:rgba(255,255,255,.7);font-size:.88rem;margin-bottom:16px;line-height:1.5}
.modal-options{display:flex;flex-direction:column;gap:9px}
/* ── REACTIVE PROMPT ── */
.reactive-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:9000;display:flex;align-items:center;justify-content:center}
.reactive-popup{background:rgba(10,15,26,.96);border:1.5px solid rgba(255,255,255,.2);border-radius:14px;padding:22px 24px;min-width:320px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.8);display:flex;flex-direction:column;gap:12px}
.reactive-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;color:#FFD166;letter-spacing:1px}
.reactive-title span{color:#FF8C42}
.reactive-sub{font-size:.78rem;color:rgba(255,255,255,.6)}
.reactive-sub b{color:rgba(255,255,255,.9)}
.reactive-options{display:flex;flex-direction:column;gap:8px}
.reactive-choice-btn{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:8px;font-size:.8rem;text-align:left;width:100%}
.reactive-card-name{font-weight:700;color:#fff}
.reactive-sk-name{flex:1;padding:0 10px;color:#80CFFF}
.reactive-sk-dmg{color:#FF8C8C;font-size:.72rem}
.reactive-pass-btn{margin-top:4px;font-size:.78rem;width:100%}
/* ── ANIMATIONS ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px) rotate(-4deg)}40%,80%{transform:translateX(10px) rotate(4deg)}}
.anim-shake{animation:shake .4s;border-color:#FF5252!important;box-shadow:inset 0 0 28px rgba(255,82,82,.7)}
@keyframes waftUp{0%{transform:var(--base-t,translateY(0)) translateY(0) scale(1)}50%{transform:var(--base-t,translateY(0)) translateY(-55px) scale(1.1)}100%{transform:var(--base-t,translateY(0)) translateY(0) scale(1)}}
.doing-attack{animation:waftUp .65s ease-in-out forwards}
.dmg-popup{position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:2.5rem;color:var(--gold-light);text-shadow:0 3px 0 var(--red),0 0 16px rgba(255,82,82,.8);z-index:200;pointer-events:none;animation:popUp .9s forwards;opacity:0;white-space:nowrap}
@keyframes popUp{0%{opacity:0;transform:translate(-50%,15px) scale(.5)}15%{opacity:1;transform:translate(-50%,-18px) scale(1.3)}80%{opacity:1;transform:translate(-50%,-35px) scale(1)}100%{opacity:0;transform:translate(-50%,-55px) scale(.8)}}
.undo-btn{position:absolute;top:-10px;right:-10px;width:22px;height:22px;border-radius:50%;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;border:none;font-size:.7rem;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 2px 0 #601010;transition:transform .12s}
.undo-btn:hover{transform:scale(.88)}
.slot-card.morph-target{border-color:var(--accent)!important;border-style:solid!important;background:rgba(232,98,26,.12)!important;box-shadow:0 0 22px rgba(232,98,26,.5)!important}
.setup-slot-card.proximity-glow{border-color:var(--accent)!important;border-style:solid!important;box-shadow:0 0 30px rgba(232,98,26,.6)!important}
@keyframes snapElastic{0%{transform:scale(.94)}55%{transform:scale(1.05)}100%{transform:scale(1)}}
.snap-lock{animation:snapElastic .32s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes slotSnapSettle{0%{transform:scale(.88);opacity:.7}50%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.slot-snap-settle{animation:slotSnapSettle .35s ease-out forwards}
@keyframes rejectShakeH{0%,100%{transform:translateX(0)}14.3%{transform:translateX(-7px)}28.6%{transform:translateX(7px)}42.9%{transform:translateX(-7px)}57.1%{transform:translateX(7px)}}
.reject-shake-h{animation:rejectShakeH .3s ease}
@keyframes rejectShakeHaptic{0%,100%{transform:translateX(0) rotate(0)}12%{transform:translateX(-5px) rotate(-1.5deg)}24%{transform:translateX(5px) rotate(1.5deg)}36%{transform:translateX(-4px) rotate(-1deg)}}
.reject-shake{animation:rejectShakeHaptic .4s ease}
.buff-overlay{position:fixed;inset:0;z-index:8500;display:flex;align-items:center;justify-content:center;pointer-events:none}
.buff-popup{background:rgba(10,15,26,.95);border:2px solid var(--gold-light);border-radius:14px;padding:18px 28px;text-align:center;animation:buffPop 2.2s forwards}
@keyframes buffPop{0%{opacity:0;transform:scale(.7)}15%{opacity:1;transform:scale(1.08)}75%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.9) translateY(-20px)}}
.buff-popup-title{font-family:'Orbitron',sans-serif;color:var(--gold-light);font-size:1rem;font-weight:900;letter-spacing:2px}
.buff-popup-detail{color:rgba(255,255,255,.8);font-size:.85rem;margin-top:6px}
</style>
</head>

<script>
// ============================================================
// GLOBAL CONSTANTS & UTILITIES
// ============================================================
const $ = id => document.getElementById(id);
const GITHUB = 'https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/';
const POSITIONS = ['PG','SG','SF','PF','C'];
// Who can attack whom based on position
const TARGET_MATRIX = {PG:['PG','SG'],SG:['SG','SF'],SF:['SG','SF','PF'],PF:['PF','C'],C:['C','PF']};
let _ic = 0;
const mkId = (team, name) => `${team}_${(name||'card').replace(/\s+/g,'_')}_${++_ic}`;
const delay = ms => new Promise(r => setTimeout(r, ms));
const clamp = (v,min,max) => Math.max(min,Math.min(max,v));

// ── CARD ACCESSORS ────────────────────────────────────────────
function getCardName(c){ return c?.BasicInfo?.FormattedName||c?.BasicInfo?.PlayerName||c?.FormattedName||c?.PlayerName||c?.name||'Unknown'; }
function getCardRawName(c){ return c?.BasicInfo?.PlayerName||c?.PlayerName||c?.name||''; }
function getCardImg(c){ return c?.BasicInfo?.ImageFilePath||c?.ImageFilePath||c?.imagePath||''; }
function getCardHP(c){ return c?.BasicInfo?.HP||c?.HP||c?.hp||0; }
function getCardDMG(c){ return c?.BasicInfo?.Base_DMG||c?.BasicDMG||c?.basicDmg||0; }
function getCardSPD(c){ return c?.BasicInfo?.SPD||c?.SPD||c?.spd||0; }
function getCardHeight(c){ return c?.BasicInfo?.HeightInInches||c?.HeightInInches||c?.heightInInches||0; }
function getCardWeight(c){ return c?.BasicInfo?.Weight||c?.Weight||c?.weight||0; }
function getCardTeam(c){ return c?.BasicInfo?.Team||c?.Team||c?.teamId||''; }
function getCardTier(c){ return c?.BasicInfo?.Tier||c?.Tier||c?.tierId||''; }
function getCardPos(c){
  if(c?.BasicInfo?.PrimaryPos) return [c.BasicInfo.PrimaryPos,c.BasicInfo.SecondaryPos,c.BasicInfo.ThirdPos].filter(Boolean);
  if(c?.PrimaryPos) return [c.PrimaryPos,c.SecondaryPos,c.ThirdPos].filter(Boolean);
  return [];
}
function getCardPosStr(c){ const p=getCardPos(c); return p.length?p[0]+(p[1]?'/'+p[1]:''):'N/A'; }

// Normalise Skills — unwrap {Skill:{...}} wrapper
function getCardSkills(c){
  const raw = c?.Skills||[];
  return raw.map(s=>{ const sk=s?.Skill||s; if(!sk) return null; if(!sk.Name&&sk.SkillName) sk.Name=sk.SkillName; if(!sk.Display_DMG&&sk.DisplayDMG) sk.Display_DMG=sk.DisplayDMG; if(!sk.Description_UI&&sk.Description) sk.Description_UI=sk.Description; return sk; }).filter(Boolean);
}
function getAbility(c){ const ab=c?.Ability||null; if(!ab||typeof ab!=='object'||Object.keys(ab).length===0) return null; return ab; }

function shortName(n){ return n?n.replace(/ \(.+?\)$/,''):'Unknown'; }
function getTruncatedName(fn){ if(!fn) return ''; const clean=fn.replace(/ \(.+?\)$/,'').trim(); const parts=clean.split(' '); if(parts.length>1) return parts[0][0]+'. '+parts.slice(1).join(' '); return clean; }
function getImgUrl(f,n){ return(!f||f.length<3)?`https://placehold.co/400x560/1a1a2e/FFD166?text=${encodeURIComponent(shortName(n))}`:GITHUB+encodeURI(f); }
function handleImgError(el,n){ el.onerror=null; el.src=`https://placehold.co/400x560/1a1a2e/FFD166?text=${encodeURIComponent(shortName(n))}`; }
function escapeJS(s){ return s?s.toString().replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/`/g,'\\`'):''; }
function getDBShortName(f){ if(!f) return 'Unknown'; const clean=f.replace(/ \(.+?\)$/,'').trim(); const p=clean.split(' '); if(p.length>1){const fi=p.shift(); return fi[0]+'. '+p.join(' ');} return clean; }
function getSearchText(card){ if(!card) return ''; const parts=[getCardName(card).toLowerCase(),getCardTeam(card).toLowerCase(),getCardTier(card).toLowerCase()]; getCardSkills(card).forEach(s=>{parts.push((s.Name||'').toLowerCase());parts.push((s.Description_UI||'').toLowerCase());}); const ab=getAbility(card); if(ab){parts.push((ab.Name||'').toLowerCase());parts.push((ab.Description_UI||'').toLowerCase());} return parts.join(' '); }

// ============================================================
// UM / TD PARSER
// ============================================================
function parseUM(str){
  if(!str) return {usesPerTurn:Infinity,maxUses:Infinity,priority:1};
  const m1=str.match(/U\s*:\s*(\d+|∞)/i); const m2=str.match(/M\s*:\s*(\d+|∞)/i); const m3=str.match(/P\s*:\s*(-?\d+)/i);
  const u=m1?(m1[1]==='∞'?Infinity:parseInt(m1[1])):Infinity;
  const m=m2?(m2[1]==='∞'?Infinity:parseInt(m2[1])):Infinity;
  const p=m3?parseInt(m3[1]):1;
  return {usesPerTurn:u,maxUses:m,priority:p};
}
function parseTD(str){
  if(!str||str==='DEFAULT') return {turns:1,delay:0};
  const mt=str.match(/T\s*:\s*([\d∞]+|REST_OF_TURN|REST_OF_ROUND|THIS_ATTACK|Next_Turn)/i);
  const md=str.match(/D\s*:\s*([\d]+|Next_Turn)/i);
  let t=mt?mt[1]:'1'; let d=md?parseInt(md[1]):0;
  let turns=t==='∞'?Infinity:t==='REST_OF_TURN'?0.5:t==='THIS_ATTACK'?0.1:t==='Next_Turn'?1:t==='REST_OF_ROUND'?0.5:parseInt(t);
  return {turns,delay:d};
}

// ============================================================
// CLONE CARD — creates a live battle instance
// ============================================================
function cloneCard(c, team){
  if(!c) return null;
  const cc = JSON.parse(JSON.stringify(c));
  cc.currentHp = getCardHP(cc);
  cc._maxHp    = getCardHP(cc);
  cc.isDead    = false;
  cc._instanceId   = mkId(team, getCardName(cc));
  cc._priorityMult = 1;
  cc._activeRound  = 0;
  cc._teamRef      = team;
  cc._surviveUsed  = false;

  // Normalise skills
  cc.Skills = (cc.Skills||[]).map(s=>{
    const sk=s?.Skill||s; if(!sk) return null;
    if(!sk.Name&&sk.SkillName) sk.Name=sk.SkillName;
    if(!sk.Display_DMG&&sk.DisplayDMG) sk.Display_DMG=sk.DisplayDMG;
    if(!sk.Description_UI&&sk.Description) sk.Description_UI=sk.Description;
    return sk;
  }).filter(Boolean);

  // Guard empty Ability
  const ab = getAbility(cc);
  cc.Ability = ab||null;

  // Init per-skill counters
  cc.Skills.forEach(sk=>{
    const um = parseUM(sk.UM||'');
    sk._usesLeft     = isFinite(um.maxUses)? um.maxUses : Infinity;
    sk._usesThisTurn = 0;
    sk._usesPerTurn  = isFinite(um.usesPerTurn)? um.usesPerTurn : Infinity;
    sk._priority     = um.priority||1;
    sk._td           = parseTD(sk.TD||'DEFAULT');
    // Determine timing type
    const timing = sk.Timing||sk.Phases?.[0]?.Timing||'';
    sk._isReactive   = /Reactive/i.test(timing);
    sk._isFree       = /Free/i.test(timing);
    sk._isDualUse    = /DUAL_USE/i.test(timing)||/\[Offensive\].*\[Defensive\]/i.test(timing);
  });

  // Apply ability passive boosts (roster-agnostic on init)
  _applyPassiveAbilityOnClone(cc);

  return cc;
}

// ── ABILITY PASSIVE APPLY ON CLONE ───────────────────────────
// Applies simple stat-lock / property flags from abilities that are always-on
function _applyPassiveAbilityOnClone(card){
  const ab = getAbility(card); if(!ab||!ab.Rules) return;
  ab.Rules.forEach(rule=>{
    if(!rule||!rule.action_string) return;
    const as = rule.action_string;
    const trigger = (rule.trigger||'').toUpperCase();
    const atype = (rule.ability_type||'').toLowerCase();
    // Stat_Lock
    if(/Stat_Lock/i.test(as)){
      card._statLocked = true;
      const m=as.match(/Stat_Lock:(.+)/i);
      if(m) card._statLockFields=(m[1]||'').split('+').map(s=>s.trim().toUpperCase());
    }
    // Survive_At_1HP
    if(/Survive_At_1HP/i.test(as)) card._surviveAt1HP = true;
    // No_Miss
    if(/No_Miss/i.test(as)&&/ALWAYS/i.test(trigger)) card._noMissPassive=true;
  });
}

// ============================================================
// BATTLE STATE
// ============================================================
let playerActive=[], playerBench=[], enemyActive=[], enemyBench=[];
let playerScore=0, enemyScore=0, turnCount=1, isAnimating=false;
let uiState='IDLE'; // IDLE | AWAITING_TARGET
let pendingAction=null, stagedActions=[];
let playerBenchOpen=false;

// Per-card status flags — keyed by _instanceId
const FLAGS = {
  frozen:  {},   // frozen[id] = turnsLeft
  drained: {},   // drained[id] = {natures, turnsLeft}
  shutdown:{},   // shutdown[id] = {turnsLeft, delay}
  buffed:  {},   // buffed[id] = [{stat,amount,turnsLeft,delay,source}]
  screened:{},   // screened[id] = turnsLeft
  invuln:  {},   // invuln[id] = turnsLeft
  globalDebuffs: [], // [{type, targetTeam, nature, turnsLeft, delay, refund, source}]
  skillDisable:{}, // skillDisable[id] = [{skillName|all, turnsLeft}]
  stackBuff: {},   // stackBuff[id] = {dmg:N, baseDmg:N, skillDmg:N} permanent stacks
};

// ── SPD BUFFS (for actual card stat modification) ─────────────
function getEffectiveSPD(card){
  let spd = getCardSPD(card) * (card._priorityMult||1);
  // Stack buffs
  const sb = FLAGS.stackBuff[card._instanceId]||{};
  spd += sb.spd||0;
  // Regular buffs
  (FLAGS.buffed[card._instanceId]||[]).forEach(b=>{ if(b.stat==='SPD'&&b.delay<=0) spd+=b.amount; });
  return spd;
}
function getEffectiveDMG(card, isSkill=false, isBase=false){
  let base = getCardDMG(card);
  // Stat lock: DMG cannot change
  if(card._statLocked && card._statLockFields?.includes('DMG')) return base;
  // Stack buffs from abilities (permanent)
  const sb = FLAGS.stackBuff[card._instanceId]||{};
  base += sb.dmg||0;
  if(isSkill) base += sb.skillDmg||0;
  if(isBase)  base += sb.baseDmg||0;
  // Timed buffs
  (FLAGS.buffed[card._instanceId]||[]).forEach(b=>{
    if(b.delay>0) return;
    if(b.stat==='DMG') base+=b.amount;
    if(b.stat==='SKILL_DMG'&&isSkill) base+=b.amount;
    if(b.stat==='BASE_DMG'&&isBase) base+=b.amount;
  });
  return Math.max(0,base);
}
function getEffectiveHP_Max(card){
  let hp = card._maxHp||getCardHP(card);
  if(card._statLocked && card._statLockFields?.includes('HP')) return hp;
  const sb = FLAGS.stackBuff[card._instanceId]||{};
  hp += sb.maxHp||0;
  (FLAGS.buffed[card._instanceId]||[]).forEach(b=>{ if(b.delay<=0&&b.stat==='MAX_HP') hp+=b.amount; });
  return Math.max(1, hp);
}

// ── AURA SYSTEM (synergy buffs) ──────────────────────────────
// Store named auras: card._auras = {auraId: {dmg, baseDmg, maxHp, spd}}
function applyAura(card, auraId, bonusObj){
  if(!card._auras) card._auras={};
  card._auras[auraId]=Object.assign({},bonusObj);
  _recomputeStackBuff(card);
}
function removeAura(card, auraId){
  if(!card._auras) return;
  delete card._auras[auraId];
  _recomputeStackBuff(card);
}
function _recomputeStackBuff(card){
  const id=card._instanceId;
  if(!id) return;
  let dmg=0,baseDmg=0,skillDmg=0,maxHp=0,spd=0;
  if(card._auras) Object.values(card._auras).forEach(a=>{ dmg+=a.dmg||0; baseDmg+=a.baseDmg||0; skillDmg+=a.skillDmg||0; maxHp+=a.maxHp||0; spd+=a.spd||0; });
  FLAGS.stackBuff[id]={dmg,baseDmg,skillDmg,maxHp,spd};
}

// ── TICK ALL FLAGS AT END OF TURN ─────────────────────────────
function tickAllFlags(){
  // Frozen
  Object.keys(FLAGS.frozen).forEach(id=>{FLAGS.frozen[id]--;if(FLAGS.frozen[id]<=0)delete FLAGS.frozen[id];});
  // Drained
  Object.keys(FLAGS.drained).forEach(id=>{FLAGS.drained[id].turnsLeft--;if(FLAGS.drained[id].turnsLeft<=0)delete FLAGS.drained[id];});
  // Shutdown
  Object.keys(FLAGS.shutdown).forEach(id=>{
    const s=FLAGS.shutdown[id]; s.delay--; if(s.delay<=0){s.active=true; s.turnsLeft--; if(s.turnsLeft<=0)delete FLAGS.shutdown[id];}
  });
  // Screened
  Object.keys(FLAGS.screened).forEach(id=>{FLAGS.screened[id]--;if(FLAGS.screened[id]<=0)delete FLAGS.screened[id];});
  // Invuln
  Object.keys(FLAGS.invuln).forEach(id=>{FLAGS.invuln[id]--;if(FLAGS.invuln[id]<=0)delete FLAGS.invuln[id];});
  // Timed buffs
  Object.keys(FLAGS.buffed).forEach(id=>{
    FLAGS.buffed[id]=FLAGS.buffed[id].filter(b=>{ if(b.delay>0){b.delay--;return true;} b.turnsLeft--; return b.turnsLeft>0; });
    if(!FLAGS.buffed[id].length) delete FLAGS.buffed[id];
  });
  // Global debuffs
  FLAGS.globalDebuffs=FLAGS.globalDebuffs.filter(d=>{if(d.delay>0){d.delay--;return true;} d.turnsLeft--;return d.turnsLeft>0;});
  // Skill disables
  Object.keys(FLAGS.skillDisable).forEach(id=>{
    FLAGS.skillDisable[id]=FLAGS.skillDisable[id].filter(d=>{d.turnsLeft--;return d.turnsLeft>0;});
    if(!FLAGS.skillDisable[id].length) delete FLAGS.skillDisable[id];
  });
}
function resetTurnCounters(){
  [...playerActive,...enemyActive,...playerBench,...enemyBench].forEach(c=>{
    if(!c) return;
    c.Skills.forEach(sk=>{ sk._usesThisTurn=0; });

// ── UNTARGETABLE CHECK ────────────────────────────────────────
// Returns true if card cannot be targeted by given action
function isUntargetable(card, actionType, actionNature, castingCard){
  if(!card) return true;
  // Shutdown: cannot be targeted
  const sd=FLAGS.shutdown[card._instanceId];
  if(sd&&sd.active&&sd.turnsLeft>0) return true;
  // Invulnerable
  if(FLAGS.invuln[card._instanceId]>0) return true;
  // Parse ability rules for Untargetable_By
  const ab=getAbility(card); if(!ab||!ab.Rules) return false;
  for(const rule of ab.Rules){
    if(!rule||!rule.action_string) continue;
    const as=rule.action_string;
    if(!/Untargetable_By/i.test(as)) continue;
    // Check condition against casting card
    if(castingCard){
      const cond=rule.condition||'';
      if(/Casting_EnemyHeight\s*<=\s*([\d'".]+)/i.test(cond)){
        const m=cond.match(/Casting_EnemyHeight\s*<=\s*([\d.]+)/i)||cond.match(/Casting_EnemyHeight\s*<=\s*([\d'."]+)/i);
        if(m){ const threshold=parseHeightToInches(m[1]); if(getCardHeight(castingCard)>threshold) continue; }
      }
      if(/Casting_EnemyHeight\s*<\s*([\d.]+)/i.test(cond)){
        const m=cond.match(/Casting_EnemyHeight\s*<\s*([\d.]+)/i);
        if(m){ const threshold=parseHeightToInches(m[1]); if(getCardHeight(castingCard)>=threshold) continue; }
      }
      if(/Casting_EnemySPD\s*<=\s*(\d+)/i.test(cond)){
        const m=cond.match(/Casting_EnemySPD\s*<=\s*(\d+)/i);
        if(m){ if(getCardSPD(castingCard)>parseInt(m[1])) continue; }
      }
      if(/Casting_EnemyWeight\s*>\s*(\d+)/i.test(cond)){
        const m=cond.match(/Casting_EnemyWeight\s*>\s*(\d+)/i);
        if(m){ if(getCardWeight(castingCard)<=parseInt(m[1])) continue; }
      }
    }
    // Check what it blocks
    if(/Untargetable_By:Nature:Offensive/i.test(as)&&/Offensive/.test(actionNature||'')) return true;
    if(/Untargetable_By:Defensive:Steal/i.test(as)&&/Steal/.test(actionNature||'')) return true;
    if(/Untargetable_By:Defensive:Freeze/i.test(as)&&/Freeze/.test(actionNature||'')) return true;
    if(/Untargetable_By:Nature:Defensive/i.test(as)&&/Defensive/.test(actionNature||'')) return true;
    if(/Untargetable_By:Defensive:Block\/Contest/i.test(as)&&(/Block/.test(actionNature)||/Contest/.test(actionNature))) return true;
  }
  return false;
}
function parseHeightToInches(s){
  if(!s) return 0;
  const mf=s.match(/(\d+)'(\d+)?/); if(mf) return parseInt(mf[1])+(mf[2]?parseInt(mf[2])/12:0);
  return parseFloat(s)||0;
}

// ── CHECK UNBLOCKABLE / UNCONTESTABLE FOR SKILL ───────────────
function isSkillUnblockable(sk, castingCard){

  if(!castingCard) return false;

  for(const rule of ab.Rules){
    if(!rule||!rule.action_string) continue;
    if(/Untargetable_By:Defensive:Block/i.test(rule.action_string)) return true;
  }

}
function isSkillUncontestable(sk, castingCard){

  for(const rule of ab.Rules){
    if(!rule||!rule.action_string) continue;

  }

}
function isSkillImmuneToForcedCoinFlip(sk, castingCard){

// ── CHECK SKILL CONDITION (greys out if not met) ──────────────
function checkSkillCondition(sk, castingCard, allActiveCards){
  if(!sk) return {met:true};
  // Condition strings inside Modifiers
  const phases = sk.Phases||[{Modifiers:sk.Modifiers||[]}];
  for(const phase of phases){
    for(const mod of (phase.Modifiers||[])){
      const cond = mod.Condition||mod.condition||'';
      if(!cond) continue;
      if(/Own_TeamPlayer_ID\s*=\s*(\w+)/i.test(cond)){
        const m=cond.match(/Own_TeamPlayer_ID\s*=\s*(\w+)/i);
        if(m){
          const need=m[1];
          const team = castingCard._teamRef==='player'?[...playerActive,...playerBench]:[...enemyActive,...enemyBench];
          const has=team.some(c=>c&&!c.isDead&&(c?.BasicInfo?.CardID||'').includes(need));
          if(!has) return {met:false,reason:`Requires ${need} on team`};
        }
      }
      if(/Own_TeamTeam_ID\s*=\s*(\w+)/i.test(cond)){
        const m=cond.match(/Own_TeamTeam_ID\s*=\s*(\w+)/i);
        if(m){
          const need=m[1];
          const team=castingCard._teamRef==='player'?[...playerActive,...playerBench]:[...enemyActive,...enemyBench];
          const has=team.some(c=>c&&!c.isDead&&getCardTeam(c)===need&&c._instanceId!==castingCard._instanceId);
          if(!has) return {met:false,reason:`Requires ${need} teammate`};
        }
      }
      // Own_Team_Lead check (Kawhi homecoming)
      if(/Own_Team_Lead\s*=\s*(true|false)/i.test(cond)){
        const m=cond.match(/Own_Team_Lead\s*=\s*(true|false)/i);
        const needLeading=m[1].toLowerCase()==='true';
        const myKOs=castingCard._teamRef==='player'?enemyScore:playerScore;
        const theirKOs=castingCard._teamRef==='player'?playerScore:enemyScore;
        const leading=theirKOs>=myKOs; // their defeats = i'm behind
        if(needLeading&&!leading) return {met:false,reason:'Need to be behind'};
        if(!needLeading&&leading) return {met:false,reason:'Need to be leading'};
      }
      // SelfHP <= VALUE
      if(/SelfHP\s*<=\s*(\d+)/i.test(cond)){
        const m=cond.match(/SelfHP\s*<=\s*(\d+)/i);
        if(m&&castingCard.currentHp>(parseInt(m[1]))){
          return {met:false,reason:`Requires HP ≤ ${m[1]}`};
        }
      }
    }
  }
  return {met:true};
}

// ── ROSTER SYNERGY EVALUATION ─────────────────────────────────
// Called when a new card enters active/bench — evaluate ROSTER_JOIN triggers
function evalRosterSynergies(team, fullRoster){
  team.forEach(card=>{
    if(!card||card.isDead) return;
    const ab=getAbility(card); if(!ab||!ab.Rules) return;
    ab.Rules.forEach(rule=>{
      if(!rule) return;
      const trigger=(rule.trigger||'').toUpperCase();
      const as=rule.action_string||'';
      if(!trigger.includes('ROSTER_JOIN')&&!trigger.includes('ROSTER_LEAVE')) return;
      if(trigger.includes('ROSTER_JOIN')){
        const cond=rule.condition||'';
        // TEAM_MATCH
        if(/Own_TeamTeam_ID\s*=\s*(\w+)/i.test(cond)){
          const m=cond.match(/Own_TeamTeam_ID\s*=\s*(\w+)/);
          if(m){
            const need=m[1];
            let count=fullRoster.filter(c=>c&&!c.isDead&&getCardTeam(c)===need&&c._instanceId!==card._instanceId).length;
            // Check player count if specified
            const pc=cond.match(/Own_TeamPlayer_Count\s*>=\s*(\d+)/);
            if(pc&&count<parseInt(pc[1])-1) return;
            if(count>0) _applyRosterAura(card, rule, as);
          }
        }
        // CARD_MATCH
        if(/Own_TeamPlayer_ID\s*=\s*([\w|]+)/i.test(cond)){
          const m=cond.match(/Own_TeamPlayer_ID\s*=\s*([\w|]+)/i);
          if(m){
            const ids=m[1].split(/[|&]/);
            const allPresent=ids.every(id=>id.trim()&&fullRoster.some(c=>c&&!c.isDead&&(c.BasicInfo?.CardID||c.SkillID||'').includes(id.trim())||_cardMatchesID(c,id.trim())));
            if(allPresent) _applyRosterAura(card, rule, as);
          }
        }
        // ENEMY ROSTER (Westbrook)
        if(trigger.includes('ENEMY_ROSTER')){
          const cond2=rule.condition||'';
          if(/Enemy_TeamTeam_ID\s*=\s*(\w+)/i.test(cond2)){
            const m=cond2.match(/Enemy_TeamTeam_ID\s*=\s*(\w+)/);
            if(m){
              const need=m[1];
              const enemyTeam=card._teamRef==='player'?[...enemyActive,...enemyBench]:[...playerActive,...playerBench];
              const hasEnemy=enemyTeam.some(c=>c&&!c.isDead&&getCardTeam(c)===need);
              if(hasEnemy) _applyRosterAura(card, rule, as);
            }
          }
        }
      }
    });
  });
}
function _cardMatchesID(card, idStr){
  if(!card||!idStr) return false;
  const n=getCardRawName(card)||''; const t=getCardTeam(card)||'';
  const cid=(card.BasicInfo?.CardID||card.CardID||'');
  return cid.includes(idStr)||idStr.includes(cid.replace(/G\d+/,'').replace('_',''));
}
function _applyRosterAura(card, rule, actionStr){
  const auraId=rule.action_string?.match(/Apply_Aura:(\S+?):/)?.[1]||'aura_'+_effectId++;
  const bonusObj={};
  // Parse bonus from action_string
  const mHp=actionStr.match(/\+(\d+)_MAX_HP/i); if(mHp){bonusObj.maxHp=parseInt(mHp[1]); if(!card._statLocked){card._maxHp=(card._maxHp||getCardHP(card))+parseInt(mHp[1]); card.currentHp=Math.min(card.currentHp+parseInt(mHp[1]),card._maxHp);}}
  const mDmgOff=actionStr.match(/\+(\d+)_DMG:Nature:Offensive/i); if(mDmgOff) bonusObj.dmg=parseInt(mDmgOff[1]);
  const mDmgBase=actionStr.match(/\+(\d+)_DMG:Nature:Base/i); if(mDmgBase) bonusObj.baseDmg=parseInt(mDmgBase[1]);
  const mSpd=actionStr.match(/\+(\d+)_SPD/i); if(mSpd) bonusObj.spd=parseInt(mSpd[1]);
  if(Object.keys(bonusObj).length>0){
    applyAura(card, auraId, bonusObj);
    logMsg('eff','Synergy',`${shortName(getCardName(card))} +Aura: ${actionStr.replace(/Apply_Aura:\S+:/,'')}`);
  }
}

// ── ENTER ACTIVE LINEUP ───────────────────────────────────────
function fireEnterActiveEffects(card, ownTeam, fullRoster){
  if(!card) return;
  card._activeRound=1;
  const ab=getAbility(card); if(!ab||!ab.Rules) return;
  ab.Rules.forEach(rule=>{
    if(!rule) return;
    const trigger=(rule.trigger||'').toUpperCase();
    if(!trigger.includes('ENTER_ACTIVE')) return;
    const as=rule.action_string||'';
    const td=parseTD(rule.TD||'DEFAULT');
    // Untargetable block on teammates
    if(/Untargetable_By.*Close_Shot/i.test(as)){
      const posMatch=rule.condition?.match(/Own_TeamPos\s*=\s*([\w|]+)/);
      if(posMatch){
        const poses=posMatch[1].split('|');
        ownTeam.forEach(tm=>{
          if(tm&&!tm.isDead&&poses.includes(tm.battleRole)){
            // Grant close-shot immunity for td.turns rounds
            FLAGS.buffed[tm._instanceId]=FLAGS.buffed[tm._instanceId]||[];
            FLAGS.buffed[tm._instanceId].push({stat:'CLOSE_SHOT_IMMUNE',amount:1,turnsLeft:td.turns,delay:td.delay,source:getCardName(card)});
            addEffect(getCardName(card),tm._instanceId,shortName(getCardName(tm)),'close_shot_immune','Immune to Close Shot',td.turns);
          }
        });
      }
    }
    // Self untargetable for first N rounds
    if(/Untargetable_By:Nature:Offensive/i.test(as)&&rule.action_target==='Self'){
      FLAGS.buffed[card._instanceId]=FLAGS.buffed[card._instanceId]||[];
      FLAGS.buffed[card._instanceId].push({stat:'UNTARGETABLE_OFFENSIVE',amount:1,turnsLeft:td.turns,delay:0,source:'ability'});
      addEffect('Ability',card._instanceId,shortName(getCardName(card)),'untargetable','Untargetable by Offensive',td.turns);
    }
  });
}

// ── CHECK ENTER-ACTIVE UNTARGETABLE ──────────────────────────
function isUntargetableByOffensive(card){
  if(!card) return false;
  // Round-1 untargetable (Flash / Jerry West)
  if(card._activeRound===1){
    const ab=getAbility(card); if(ab&&ab.Rules){
      for(const rule of ab.Rules){
        if(!rule) continue;
        const trigger=(rule.trigger||'').toUpperCase();
        if(trigger.includes('ENTER_ACTIVE')&&/Untargetable_By:Nature:Offensive/i.test(rule.action_string||'')){
          const td=parseTD(rule.TD||'DEFAULT');
          if(td.turns>=1) return true;
        }
      }
    }
  }
  // Timed UNTARGETABLE_OFFENSIVE buff still active
  const buffs=FLAGS.buffed[card._instanceId]||[];
  if(buffs.some(b=>b.stat==='UNTARGETABLE_OFFENSIVE'&&b.delay<=0&&b.turnsLeft>0)) return true;
  return false;
}
function isImmuneToCloseShotSkill(card){
  const buffs=FLAGS.buffed[card._instanceId]||[];
  return buffs.some(b=>b.stat==='CLOSE_SHOT_IMMUNE'&&b.delay<=0&&b.turnsLeft>0);
}
function isDrainedForNature(card, nature){
  const d=FLAGS.drained[card._instanceId]; if(!d||d.turnsLeft<=0) return false;
  const nats=(d.natures||'').toLowerCase();
  if(nats.includes('offensive')&&/Offensive/.test(nature)) return true;
  if(nats.includes('base')&&nature==='Base') return true;
  return false;
}

// ── GLOBAL DEBUFF CHECK ───────────────────────────────────────
function getActiveGlobalDebuffsFor(team, nature){
  return FLAGS.globalDebuffs.filter(d=>{
    if(d.delay>0) return false;
    if(d.targetTeam!==team) return false;
    if(nature&&!natureMatches(d.nature, nature)) return false;
    return true;
  });
}
function natureMatches(pattern, nature){
  if(!pattern||!nature) return false;
  const p=pattern.toLowerCase(); const n=nature.toLowerCase();
  if(p.includes('offensive')&&n.includes('offensive')) return true;
  if(p.includes('close_shot')&&n.includes('close_shot')) return true;
  if(p.includes('jump_shot')&&n.includes('jump_shot')) return true;
  if(p.includes('base')&&n==='base') return true;
  return false;
}

// ============================================================
// VALID TARGETS — who can card attack?
// ============================================================
function getValidTargets(attacker, enemyTeam, actionNature){
  const role=attacker.battleRole||'PG';
  const allowed=TARGET_MATRIX[role]||POSITIONS;
  const nat=actionNature||'Offensive';
  return enemyTeam.map((c,i)=>({c,i})).filter(({c})=>{
    if(!c||c.isDead) return false;
    // Shutdown: cannot be targeted by offensive/base
    const sd=FLAGS.shutdown[c._instanceId];
    if(sd&&sd.active&&sd.turnsLeft>0) return false;
    // Untargetable by offensive from ability
    if(isUntargetable(c, 'offensive', nat, attacker)) return false;
    // Untargetable first round
    if(isUntargetableByOffensive(c)) return false;
    // Height restriction for Dwight / Yao
    // (handled via isUntargetable ability check)
    if(!allowed.includes(c.battleRole)) return false;
    return true;
  });
}

function hideTooltip(){const tt=$('tooltip');if(tt)tt.classList.remove('visible');}
function positionTooltip(e){
  const tt=$('tooltip');if(!tt||!tt.classList.contains('visible'))return;
  const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;
  const tw=tt.offsetWidth,th=tt.offsetHeight,pad=10;
  let px=x+15,py=y+15;
  if(px+tw>window.innerWidth-pad)px=x-tw-15;
  if(py+th>window.innerHeight-pad)py=y-th-15;
  tt.style.left=Math.max(pad,px)+'px';tt.style.top=Math.max(pad,py)+'px';
}
function isInnerRegion(e,el){
  if(!el)return true;const r=el.getBoundingClientRect();
  const mx=e.touches?e.touches[0].clientX:e.clientX,my=e.touches?e.touches[0].clientY:e.clientY;
  return mx>r.left+r.width*.15&&mx<r.right-r.width*.15&&my>r.top+r.height*.15&&my<r.bottom-r.height*.15;
}
function handleTooltipHover(e,name,el){if(isInnerRegion(e,el)){showTooltip(e,name);positionTooltip(e);}else hideTooltip();}

function _killGhost(){const g=document.getElementById('active-drag-ghost');if(g)g.remove();document.querySelectorAll('.morph-target,.proximity-glow').forEach(e=>e.classList.remove('morph-target','proximity-glow'));_drag.ghost=null;}
function _posGhost(cx,cy,forceSnap){

  const w=parseFloat(_drag.ghost.style.width),h=parseFloat(_drag.ghost.style.height);
  const tgt=forceSnap||(_drag.nearSlot&&_drag.slotDist<SNAP_RADIUS?_drag.nearSlot:null);

function _nearestSlot(cx,cy){

  document.querySelectorAll(sel).forEach(s=>{const r=s.getBoundingClientRect();const d=Math.hypot(cx-(r.left+r.width/2),cy-(r.top+r.height/2));if(d<bestD){bestD=d;best=s;}});

function buildEnemyRoster(){
  const dr={PG:[],SG:[],SF:[],PF:[],C:[]};
  const p=[...CARDS].sort(()=>Math.random()-.5);
  for(const c of p){for(const po of getCardPos(c)){if(POSITIONS.includes(po)&&dr[po].length<2){if(!POSITIONS.some(x=>dr[x].some(y=>getCardName(y)===getCardName(c)))){dr[po].push(c);break;}}}if(POSITIONS.every(x=>dr[x].length>=2))break;}
  const st=[],be=[];
  POSITIONS.forEach(po=>{if(dr[po][0]){const c=cloneCard(dr[po][0],'enemy');c.battleRole=po;st.push(c);}if(dr[po][1]){const c=cloneCard(dr[po][1],'enemy');c.battleRole=po;be.push(c);}});
  return{st,be};
}

function startBattle(){
  // Reset all flags
  Object.keys(FLAGS).forEach(k=>{ if(Array.isArray(FLAGS[k])) FLAGS[k]=[]; else FLAGS[k]={}; });
  _activeEffects=[];
  playerActive=POSITIONS.map(po=>{if(!activeLineup[po])return null;const c=cloneCard(activeLineup[po],'player');c.battleRole=po;return c;}).filter(Boolean);
  playerBench=benchRoster.filter(c=>!playerActive.some(ac=>getCardName(ac)===getCardName(c))).map(c=>cloneCard(c,'player'));
  const eR=buildEnemyRoster(); enemyActive=eR.st; enemyBench=eR.be;
  playerScore=0;enemyScore=0;turnCount=1;stagedActions=[];uiState='IDLE';
  // Fire enter active + synergies
  const pRoster=[...playerActive,...playerBench]; const eRoster=[...enemyActive,...enemyBench];
  playerActive.forEach(c=>{c._activeRound=1;fireEnterActiveEffects(c,playerActive,pRoster);});
  enemyActive.forEach(c=>{c._activeRound=1;fireEnterActiveEffects(c,enemyActive,eRoster);});
  evalRosterSynergies(playerActive,pRoster);
  evalRosterSynergies(playerBench,pRoster);
  evalRosterSynergies(enemyActive,eRoster);
  evalRosterSynergies(enemyBench,eRoster);
  $('battle-log').innerHTML='';
  logMsg('sys','System','Match initiated. First to 8 KOs wins. — Turn 1');
  $('score-player').textContent='0';$('score-enemy').textContent='0';
  showScreen('battle-screen');initBattleAudio();renderArena();renderMoveBudget();
}

// ============================================================
// MOVE BUDGET — 2 moves per turn per team + 1 per Standard_Free used
// ============================================================
// stagedActions tracks player actions already committed this staging phase
function getMoveBudget(){
  // Base = 2. Each Standard_Free skill USED adds +1
  let base=2;
  let freeBonus=0;
  stagedActions.forEach(act=>{
    if(act.actionType==='skill'&&act.skillIdx!=null){
      const card=playerActive[act.actorIdx];
      if(!card) return;
      const sk=getCardSkills(card)[act.skillIdx];
      if(sk&&sk._isFree) freeBonus++;
    }
  });
  return base+freeBonus;
}
function getStagedNonFreeCount(){
  return stagedActions.filter(act=>{
    if(act.actionType==='skill'&&act.skillIdx!=null){
      const card=playerActive[act.actorIdx]; if(!card) return true;
      const sk=getCardSkills(card)[act.skillIdx];
      return !sk||!sk._isFree;
    }
    return true; // basic, swap, pass all count
  }).length;
}
function getActionUsesThisTurn(actorIdx){
  // How many non-free actions has actorIdx used?
  return stagedActions.filter(a=>a.actorIdx===actorIdx&&!(a.actionType==='skill'&&_isFreeSkillAction(a))).length;
}
function _isFreeSkillAction(act){
  if(act.actionType!=='skill') return false;
  const card=playerActive[act.actorIdx]; if(!card) return false;
  const sk=getCardSkills(card)[act.skillIdx]; return !!(sk&&sk._isFree);
}
function renderMoveBudget(){
  const bar=$('move-budget-bar'); if(!bar) return;
  const budget=getMoveBudget();
  const used=getStagedNonFreeCount();
  const freeUsed=stagedActions.filter(a=>_isFreeSkillAction(a)).length;
  let html='<span style="opacity:.6;margin-right:4px;font-size:.6rem;">MOVES</span>';
  for(let i=0;i<budget;i++){
    let cls='move-pip';
    if(i<used) cls+=' used';
    else if(i>=2&&i<2+freeUsed) cls+=' free';
    html+=`<div class="${cls}"></div>`;
  }
  html+=`<span style="opacity:.5;margin-left:4px;font-size:.6rem;">${used}/${budget}</span>`;
  bar.innerHTML=html;
}
