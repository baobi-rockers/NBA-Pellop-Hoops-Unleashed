<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NBA Pellop Hoops Unleashed · TCG Pocket Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS — IDENTICAL IN BOTH FILES (NO CHANGES NEEDED)
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--bg-dark:#FFFDF9;--surface:#FFFFFF;--surface-2:#F0EBE0;--border:#E0D8CC;--border-heavy:#C8B89A;--accent:#E8621A;--accent-dark:#C4501A;--accent-light:#FF8C42;--green:#2D6A4F;--green-light:#40916C;--green-pale:#D8F3DC;--text:#1A1A1A;--text-light:#4A4A4A;--text-muted:#8A8A8A;--gold:#C8960C;--gold-light:#FFD166;--red:#D62828;--blue:#1B4F72;--pos-pg:#E8621A;--pos-sg:#D62828;--pos-sf:#2D6A4F;--pos-pf:#1B4F72;--pos-c:#6B3FA0;--pos-6th:#C8960C;--battle-bg:#0A0F1A;--battle-surface:rgba(255,255,255,0.06);--battle-border:rgba(255,255,255,0.15);--log-width:360px;--btn-radius:8px}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow-y:scroll;height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;background:var(--bg)}.screen.active{display:block}
.game-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 22px;border-radius:var(--btn-radius);font-weight:700;font-size:.85rem;cursor:pointer;font-family:'Inter',sans-serif;border:none;position:relative;overflow:hidden;transition:transform .12s ease,filter .12s ease;text-shadow:0 1px 2px rgba(0,0,0,.4);letter-spacing:.5px}
.game-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(0,0,0,.08) 100%);border-radius:inherit;pointer-events:none}
.game-btn:hover:not(:disabled){transform:scale(.97);filter:brightness(1.08)}.game-btn:active:not(:disabled){transform:scale(.94);filter:brightness(.95)}.game-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.game-btn-orange{background:linear-gradient(180deg,#F07030,#C4501A);color:#fff;box-shadow:0 3px 0 #8B3010,0 4px 12px rgba(232,98,26,.4)}
.game-btn-green{background:linear-gradient(180deg,#3A8060,#1E5235);color:#fff;box-shadow:0 3px 0 #0F3020,0 4px 12px rgba(45,106,79,.4)}
.game-btn-red{background:linear-gradient(180deg,#D84040,#982020);color:#fff;box-shadow:0 3px 0 #601010,0 4px 12px rgba(180,40,40,.5)}
.game-btn-blue{background:linear-gradient(180deg,#2A6090,#0D3060);color:#fff;box-shadow:0 3px 0 #081840,0 4px 12px rgba(27,79,114,.4)}
.game-btn-gold{background:linear-gradient(180deg,#E0A820,#A07008);color:#fff;box-shadow:0 3px 0 #604000,0 4px 12px rgba(200,150,12,.4)}
.game-btn-purple{background:linear-gradient(180deg,#9060C0,#602090);color:#fff;box-shadow:0 3px 0 #300860,0 4px 12px rgba(107,63,160,.4)}
.game-btn-outline{background:linear-gradient(180deg,#f5f0e8,#e0d0bc);color:var(--text);box-shadow:0 3px 0 #b8a890,0 2px 6px rgba(0,0,0,.15)}
.game-btn-ghost{background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));color:rgba(255,255,255,.85);box-shadow:0 3px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2)}
.game-btn-teal{background:linear-gradient(180deg,#40E0A0,#1A9060);color:#0A1A10;box-shadow:0 3px 0 #0A5030,0 4px 12px rgba(64,224,160,.3)}
.game-btn-cyan{background:linear-gradient(180deg,#4FC3F7,#0288D1);color:#0A1929;box-shadow:0 3px 0 #014060,0 4px 12px rgba(79,195,247,.4)}
.app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;z-index:100;position:sticky;top:0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-logo-wrap{display:flex;align-items:center;gap:10px}
.header-logo-img{height:38px;width:auto;object-fit:contain}
.nav{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:40px;border:1px solid var(--border)}
.nav-btn{padding:5px 14px;border-radius:30px;font-weight:600;font-size:.8rem;background:transparent;border:none;cursor:pointer;color:var(--text-light);font-family:'Inter',sans-serif;transition:all .15s}
.nav-btn.active,.nav-btn:hover{background:var(--accent);color:#fff}
.tooltip-bubble{position:fixed;z-index:9999;background:rgba(10,15,26,.95);border:1px solid rgba(255,255,255,.2);padding:10px 12px;border-radius:10px;color:#E8E8E8;max-width:280px;font-size:.68rem;line-height:1.4;box-shadow:0 10px 28px rgba(0,0,0,.7);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .15s;font-weight:300}
.tooltip-bubble .tt-name{color:var(--gold-light);font-weight:700;font-size:.82rem;margin-bottom:3px}
.tooltip-bubble .tt-ability{color:#80CFFF;font-weight:600;font-size:.65rem;margin-bottom:2px}
.tooltip-bubble .tt-skill{margin-top:3px}
.tooltip-bubble .tt-skill-name{color:#fff;font-weight:600;font-size:.7rem}
.tooltip-bubble .tt-skill-dmg{color:#FF8C8C;font-size:.65rem}
.tooltip-bubble .tt-skill-desc{color:rgba(255,255,255,.4);font-size:.6rem}
.tooltip-bubble.visible{opacity:1}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);align-items:center}
.styled-search-wrap{position:relative;display:flex;align-items:center}
.styled-search-wrap .search-icon{position:absolute;left:10px;font-size:13px;color:var(--text-muted);pointer-events:none}
input[type="text"].pill-input{padding:6px 12px 6px 30px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:.82rem;height:32px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
input[type="text"].pill-input:focus{border-color:var(--accent)}
input[type="text"].pill-input::placeholder{color:var(--text-muted)}
select.pill-select{padding:5px 12px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:.82rem;height:32px;outline:none;font-family:'Inter',sans-serif;cursor:pointer;transition:border-color .2s}
select.pill-select:focus{border-color:var(--accent)}
.sticky-container{position:sticky;top:0;z-index:90;background:var(--bg)}
#cat-split-wrapper{display:flex;align-items:flex-start;gap:0;min-height:calc(100vh - 90px)}
#cat-left-panel{width:0;overflow:hidden;flex-shrink:0;position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto;background:var(--surface);border-right:2px solid var(--border-heavy);transition:width .35s cubic-bezier(.4,0,.2,1)}
#cat-left-panel.open{width:360px}
.cat-left-inner{width:360px;padding:18px 16px}
.cat-left-card-img{width:100%;aspect-ratio:5/7;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#1a1a2e;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.cat-left-card-img img{width:100%;height:100%;object-fit:cover}
@keyframes catCardIn{0%{transform:rotateY(720deg) scale(.4);opacity:0}15%{opacity:1}70%{transform:rotateY(0deg) scale(1.03)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.cat-left-card-img.animating{animation:catCardIn 1.4s cubic-bezier(.08,.95,.2,1) forwards;perspective:1200px;transform-style:preserve-3d}
#cat-right-panel{flex:1;min-width:0}
#cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:14px 18px;align-items:start}
#home-screen{background:radial-gradient(ellipse at 50% 40%,#1a2a1a,#0a0f0a);min-height:100vh;overflow:hidden}
.home-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:32px;padding:20px;position:relative}
.home-logo-wrap{position:relative;display:inline-block;cursor:default}
.home-logo-glow{position:absolute;inset:-40px;background:radial-gradient(ellipse at center,rgba(232,98,26,.7),rgba(45,106,79,.4) 40%,transparent 70%);border-radius:50%;filter:blur(20px);animation:pulseFlame 2.8s ease-in-out infinite;pointer-events:none;z-index:0}
.home-logo-glow-2{position:absolute;inset:-20px;background:radial-gradient(ellipse at center,rgba(255,180,50,.5),rgba(232,98,26,.3) 50%,transparent 70%);border-radius:50%;filter:blur(12px);animation:pulseFlame2 2.1s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes pulseFlame{0%{opacity:.6;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}100%{opacity:.6;transform:scale(.92)}}
@keyframes pulseFlame2{0%{opacity:.4;transform:scale(1) translateY(0)}50%{opacity:.9;transform:scale(1.05) translateY(-8px)}100%{opacity:.4;transform:scale(1) translateY(0)}}
.home-big-logo{width:min(500px,85vw);position:relative;z-index:1;filter:drop-shadow(0 4px 20px rgba(232,98,26,.5))}
.home-btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px 18px;align-items:start}
.compact-card{position:relative;width:100%;padding-bottom:140%;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .2s,box-shadow .2s;cursor:pointer;border:2px solid var(--border)}
.compact-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 10px 24px rgba(232,98,26,.25);border-color:var(--accent);z-index:5}
.compact-card.in-draft{opacity:.25;pointer-events:none;filter:grayscale(70%)}
.compact-card.selected-panel{border-color:var(--green);box-shadow:0 6px 20px rgba(45,106,79,.35)}
.card-img-sm{position:absolute;inset:0;background:#1a1a2e;pointer-events:none}
.card-img-sm img{width:100%;height:100%;object-fit:cover}
.ec-header{border-bottom:2px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.ec-title{font-size:1.15rem;font-weight:800;line-height:1.1}
.ec-team{color:var(--accent);font-weight:700;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ec-stats-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.ec-stat{background:var(--surface-2);padding:4px 10px;border-radius:6px;font-weight:800;border:1px solid var(--border);font-size:.82rem;display:flex;align-items:center;gap:3px}
.ec-stat span{font-size:.55rem;color:var(--text-muted)}
.ec-ability-block{background:rgba(45,106,79,.06);border-left:3px solid var(--green);padding:6px 8px;margin-bottom:8px;border-radius:0 6px 6px 0}
.ec-ability-name{font-weight:800;color:var(--green);font-size:.82rem}
.ec-ability-desc{font-size:.65rem;color:var(--text-light);line-height:1.35;margin-top:2px}
.ec-skill-wrap{background:var(--surface-2);border:1px solid var(--border);padding:7px 8px;border-radius:8px;margin-bottom:6px}
.ec-skill-header{display:flex;justify-content:space-between;align-items:flex-start;font-weight:800;font-size:.75rem;margin-bottom:3px;gap:4px}
.ec-skill-name{flex:1;color:var(--text)}
.ec-skill-dmg{color:var(--red);background:rgba(214,40,40,.08);padding:1px 5px;border-radius:4px;font-size:.68rem;white-space:nowrap}
.ec-skill-desc{font-size:.62rem;color:var(--text-light);line-height:1.3}
.ec-effect-tag{display:inline-block;background:rgba(200,150,12,.12);color:var(--gold);font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px;border:1px solid rgba(200,150,12,.25)}
.draft-layout{display:flex;min-height:calc(100vh - 90px)}
.draft-main{flex:1;overflow-y:auto;min-width:0}
.draft-sidebar{width:200px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;padding:14px 10px;gap:8px;position:sticky;top:90px;height:calc(100vh - 90px);overflow-y:auto}
.draft-count-display{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;text-align:center;color:var(--accent);text-shadow:2px 2px 0 rgba(0,0,0,.08);letter-spacing:2px;margin-bottom:6px}
.slot-card{background:var(--surface-2);border-radius:8px;border:1.5px dashed var(--border-heavy);padding:5px 6px;min-height:48px;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.slot-card.filled{border-style:solid;background:#fff}
.slot-pos{font-weight:900;font-size:.9rem;letter-spacing:1px;pointer-events:none}
.slot-name{font-weight:600;font-size:.6rem;color:var(--text);white-space:normal;line-height:1.2;pointer-events:none;word-wrap:break-word;width:100%;margin-top:2px}
.slot-card.drag-over{background:rgba(232,98,26,.08);border-style:solid;border-color:var(--accent)}
.slot-PG.filled{border-color:var(--pos-pg)}.slot-PG .slot-pos{color:var(--pos-pg)}
.slot-SG.filled{border-color:var(--pos-sg)}.slot-SG .slot-pos{color:var(--pos-sg)}
.slot-SF.filled{border-color:var(--pos-sf)}.slot-SF .slot-pos{color:var(--pos-sf)}
.slot-PF.filled{border-color:var(--pos-pf)}.slot-PF .slot-pos{color:var(--pos-pf)}
.slot-C.filled{border-color:var(--pos-c)}.slot-C .slot-pos{color:var(--pos-c)}
.remove-slot,.setup-remove{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;z-index:100;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:bold;border:none;box-shadow:0 2px 0 #601010,0 2px 5px rgba(180,40,40,.5);transition:transform .12s}
.remove-slot:hover,.setup-remove:hover{transform:scale(.88)}
#draft-grid-wrapper{display:flex;align-items:flex-start;min-height:100%;flex-direction:row-reverse}
#draft-cards-col{flex:1;min-width:0}
#draft-side-panel{width:0;overflow:hidden;transition:width .35s cubic-bezier(.4,0,.2,1);flex-shrink:0;background:var(--surface);border-right:2px solid var(--border);position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto}
#draft-side-panel.open{width:380px}
.side-panel-inner{padding:18px 16px;width:380px}
.side-panel-card-img{width:100%;aspect-ratio:5/7;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#1a1a2e;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.side-panel-card-img img{width:100%;height:100%;object-fit:cover}
@keyframes panelCardIn{0%{transform:rotateY(720deg) scale(.4);opacity:0}15%{opacity:1}70%{transform:rotateY(0deg) scale(1.03)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.side-panel-card-img.animating{animation:panelCardIn 1.4s cubic-bezier(.08,.95,.2,1) forwards;perspective:1200px;transform-style:preserve-3d}
.side-panel-close{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:bold;z-index:10;box-shadow:0 3px 0 #601010;border:none;transition:transform .12s}
.side-panel-close:hover{transform:scale(.85)}
.side-panel-relative{position:relative}
#setup-screen{background:var(--bg)}
.setup-header-bar{background:var(--surface);padding:10px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.setup-slots-row{display:flex;justify-content:center;gap:10px;padding:14px 20px 6px;flex-wrap:nowrap;overflow-x:auto}
.setup-slot-card{width:240px;height:336px;flex-shrink:0;background:var(--surface);border-radius:10px;border:2px dashed var(--border-heavy);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:visible;transition:all .2s}
.setup-slot-card.filled{border-style:solid;border-width:2px}
.setup-slot-card.drag-over{box-shadow:0 0 18px rgba(232,98,26,.4);transform:scale(1.03);border-color:var(--accent)}
.setup-slot-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.setup-slot-pos{font-weight:900;font-size:1.4rem;letter-spacing:1px;z-index:2}
.setup-slot-drop-text{font-size:.62rem;opacity:.4;margin-top:5px;z-index:2}
.setup-slot-PG.filled{border-color:var(--pos-pg)}.setup-slot-PG .setup-slot-pos{color:var(--pos-pg)}
.setup-slot-SG.filled{border-color:var(--pos-sg)}.setup-slot-SG .setup-slot-pos{color:var(--pos-sg)}
.setup-slot-SF.filled{border-color:var(--pos-sf)}.setup-slot-SF .setup-slot-pos{color:var(--pos-sf)}
.setup-slot-PF.filled{border-color:var(--pos-pf)}.setup-slot-PF .setup-slot-pos{color:var(--pos-pf)}
.setup-slot-C.filled{border-color:var(--pos-c)}.setup-slot-C .setup-slot-pos{color:var(--pos-c)}
.setup-counter{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.2rem;color:var(--green);letter-spacing:2px}
.setup-action-bar{display:flex;align-items:center;justify-content:center;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px}
.bench-label{font-weight:800;color:var(--accent);padding:10px 20px 4px}
.bench-scroll-row{padding:10px 20px;display:flex;flex-direction:row;overflow-x:auto;gap:12px;flex-wrap:nowrap;scroll-snap-type:x mandatory}
.bench-scroll-row::-webkit-scrollbar{height:5px}
.bench-scroll-row::-webkit-scrollbar-track{background:var(--border);border-radius:3px}
.bench-scroll-row::-webkit-scrollbar-thumb{background:#7ab49a;border-radius:3px}
.bench-card-item{width:240px;height:336px;flex-shrink:0;scroll-snap-align:start;background:#1a1a2e;border-radius:10px;overflow:hidden;cursor:grab;border:2px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;transition:transform .2s,box-shadow .2s}
.bench-card-item:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(232,98,26,.25);border-color:var(--accent)}
.bench-card-item img{width:100%;height:100%;object-fit:cover}
#battle-screen{background:var(--battle-bg);color:#fff;overflow:hidden}
.battle-app-header{background:rgba(10,15,26,.97);border-bottom:1px solid rgba(255,255,255,.1);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;backdrop-filter:blur(10px)}
.battle-logo-img{height:34px;width:auto;object-fit:contain}
.arena-container{display:flex;height:100vh;width:100%;overflow:hidden;position:relative;padding-top:44px;transition:padding-right .4s cubic-bezier(.4,0,.2,1)}
.arena-container.log-open{padding-right:var(--log-width)}
.court-area{flex:1;display:flex;flex-direction:column;background:url('https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/BATTLE%20BACKDROPS/grassy_court.png') center/cover no-repeat,radial-gradient(ellipse at center,#0d1b2a,#050a12);padding:10px 20px 8px;justify-content:space-between;overflow:hidden;position:relative;transition:all .4s cubic-bezier(.4,0,.2,1)}
.floating-scoreboard{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(10,15,26,.88);border:1.5px solid rgba(255,255,255,.15);padding:5px 24px;border-radius:12px;display:flex;flex-direction:column;align-items:center;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.score-board{display:flex;gap:16px;font-family:'Orbitron',sans-serif;font-size:2.5rem;line-height:1;font-weight:900}
#turn-indicator{font-weight:700;color:rgba(255,255,255,.5);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
.active-fan-wrapper{display:flex;justify-content:center;align-items:flex-end;position:relative;width:100%;height:270px;margin-bottom:120px}
.enemy-fan-wrapper{display:flex;justify-content:center;align-items:flex-start;position:relative;width:100%;height:290px;margin-top:50px}
.active-card-wrap,.enemy-card-wrap{transition:all .3s cubic-bezier(.2,.8,.2,1);cursor:pointer;position:relative;display:inline-block;margin:0 -20px}
.active-card-wrap:hover,.enemy-card-wrap:hover{transform:rotate(var(--base-rot)) translateY(var(--base-y)) scale(1.4)!important;margin:0 35px!important;z-index:100!important}
.active-card-wrap:hover{filter:drop-shadow(0 20px 30px rgba(64,224,160,.5))}
.enemy-card-wrap:hover{filter:drop-shadow(0 -10px 30px rgba(255,107,107,.7))}
.battle-card{width:165px;height:231px;border-radius:10px;border:2px solid rgba(255,255,255,.2);overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.7);position:relative;background:#0f1320;transition:border .2s,box-shadow .2s}
.battle-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.dead-card{filter:grayscale(100%) brightness(.3);pointer-events:none;opacity:.7}
.battle-card.staged{border-color:#40E0A0!important;box-shadow:0 0 18px 3px rgba(64,224,160,.5)}

<script>
// ============================================================
// §1 — GLOBAL CONSTANTS & UTILITIES
// ============================================================

const $ = id => document.getElementById(id);
const GITHUB = 'https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/';
const POSITIONS = ['PG','SG','SF','PF','C'];
const TARGET_MATRIX = {PG:['PG','SG'],SG:['SG','SF'],SF:['SG','SF','PF'],PF:['PF','C'],C:['C','PF']};

let _ic = 0;
const mkId = (team, name) => `${team}_${(name||'card').replace(/\s+/g,'_')}_${++_ic}`;
const delay = ms => new Promise(r => setTimeout(r, ms));


// ============================================================
// ============================================================
// ★★★ PARSER ENGINE — INSERT HERE ★★★
// ============================================================
// ============================================================
// 
// The PARSER ENGINE provides standalone parsing utilities:
//   - parseHeight() — converts "6'6"" → 78 inches
//   - parseUM()     — parses "U:∞ | M:∞ | P:1" → {usesPerTurn, maxUses, priority}
//   - parseTD()     — parses "T:2 | D:0" → {turns, delay, special}
//   - parseCondition() — parses condition strings into structured objects
//   - parseActionString() — parses action strings into {type, ...params}
//   - parseTrigger() — parses trigger tags into structured trigger objects
//   - parseSkill()   — parses skill objects into runtime-ready format
//
// These parsers are ALSO embedded within ENGINE below, but if you have
// a separate PARSER.html file, load it here before ENGINE.
//
// ============================================================
// ============================================================
// NBA CARD GAME PARSER - COMPLETE FINAL VERSION
// Based strictly on Excel JSON columns
// ============================================================

const PARSER = (() => {
  // ============================================================
  // UTILITY HELPERS
  // ============================================================
  
  function parseHeight(heightStr) {
    if (!heightStr || typeof heightStr !== 'string') return 0;
    const match = heightStr.match(/(\d+)'(\d+)"/);
    if (!match) return 0;
    return parseInt(match[1], 10) * 12 + parseInt(match[2], 10);
  }

  function parseTD(tdStr) {
    if (!tdStr) return { turns: 0, delay: 0, special: null };
    const result = { turns: 0, delay: 0, special: null };
    if (tdStr.includes('THIS_ATTACK')) result.special = 'THIS_ATTACK';
    else if (tdStr.includes('REST_OF_TURN')) result.special = 'REST_OF_TURN';
    else if (tdStr.includes('Next_Turn')) result.special = 'NEXT_TURN';
    else {
      const tMatch = tdStr.match(/T:(\d+)/);
      const dMatch = tdStr.match(/D:(\d+)/);
      if (tMatch) result.turns = parseInt(tMatch[1], 10);
      if (dMatch) result.delay = parseInt(dMatch[1], 10);
    }
    return result;
  }

  function parseUM(umStr) {
    if (!umStr) return { usesPerTurn: 0, maxUses: 0, priority: 1 };
    const result = { usesPerTurn: 0, maxUses: 0, priority: 1 };
    const uMatch = umStr.match(/U:(\d+)/);
    const mMatch = umStr.match(/M:(\d+)/);
    const pMatch = umStr.match(/P:(-?\d+)/);
    if (uMatch) result.usesPerTurn = parseInt(uMatch[1], 10);
    if (mMatch) result.maxUses = parseInt(mMatch[1], 10);
    if (pMatch) result.priority = parseInt(pMatch[1], 10);
    return result;
  }

  function resolveValue(value, card, ctx = {}) {
    if (!value || typeof value !== 'string') return value;
    if (value === 'Self_Height' && card) return parseHeight(card.heightRaw);
    if (value === 'Self_Active_Round') return ctx.gameRound || 1;
    const num = parseFloat(value);
    if (!isNaN(num) && value.trim() === String(num)) return num;
    return value;
  }

  function compare(a, op, b) {
    const aNorm = typeof a === 'string' ? a.toLowerCase().trim() : a;
    const bNorm = typeof b === 'string' ? b.toLowerCase().trim() : b;
    switch (op) {
      case '=': return aNorm == bNorm;
      case '!=': return aNorm != bNorm;
      case '>': return parseFloat(a) > parseFloat(b);
      case '<': return parseFloat(a) < parseFloat(b);
      case '>=': return parseFloat(a) >= parseFloat(b);
      case '<=': return parseFloat(a) <= parseFloat(b);
      default: return false;
    }
  }

  function natureMatches(filter, attackNature, attackType) {
    if (!filter || !attackNature) return false;
    const filterParts = filter.split('/');
    for (const part of filterParts) {
      if (part === attackNature) return true;
      if (part === attackNature.split(':')[0]) return true;
      if (attackNature.startsWith(part + ':')) return true;
      if (attackType && attackNature.includes(':')) {
        const [natureCat, skillType] = attackNature.split(':');
        if (part === `${natureCat}:${skillType}`) return true;
      }
    }
    return false;
  }

  // ============================================================
  // TARGET RESOLUTION
  // ============================================================
  
  function resolveTarget(targetStr, context) {
    if (!targetStr) return null;
    
    const parts = targetStr.split(':');
    const targetType = parts[0];
    const qualifiers = parts.slice(1);
    
    switch (targetType) {
      case 'Self':
        return context.self;
        
      case 'All_Ally':
        return context.ownTeam || [];
        
      case 'All_Enemy':
        return context.enemyTeam || [];
        
      case 'Selected_Enemy':
        return { type: 'selected_enemy', slot: qualifiers[0] || 'Q1' };
        
      case 'Selected_Teammate': {
        const slot = qualifiers[0] || 'Q1';
        let positionFilter = null;
        for (const q of qualifiers) {
          if (q.startsWith('Active_Position:')) {
            positionFilter = q.split(':')[1];
            break;
          }
        }
        return (team) => {
          let candidates = team;
          if (positionFilter) {
            const positions = positionFilter.split('/');
            candidates = team.filter(card => 
              positions.includes(card.primaryPos) || positions.includes(card.secondaryPos)
            );
          }
          return candidates[0] || null;
        };
      }
      
      case 'Casting_Enemy': {
        let natureFilter = null;
        for (const q of qualifiers) {
          if (q.startsWith('Nature:')) {
            natureFilter = q.substring(7);
            break;
          }
        }
        const enemy = context.castingEnemy;
        if (!enemy) return null;
        if (natureFilter && !natureMatches(natureFilter, enemy.lastActionNature, enemy.lastActionType)) {
          return null;
        }
        return enemy;
      }
      
      case 'Casting_Teammate':
        return context.castingTeammate || null;
        
      case 'Original_Target':
        return context.originalTarget || null;
        
      case 'Targeted_Ally':
        return context.targetedAlly || null;
        
      default:
        return targetStr;
    }
  }

  // ============================================================
  // CONDITION EVALUATION (FULLY EXTENDED)
  // ============================================================
  
  function evalCondition(condition, context) {
    if (!condition || condition.trim() === '') return true;
    
    if (condition.includes(' AND ') || condition.includes(' OR ')) {
      return evalCompoundCondition(condition, context);
    }
    
    const match = condition.match(/(\w+(?:_\w+)*)\s*([=!<>]+)\s*(.+)/);
    if (!match) return false;
    
    const [, attribute, operator, rawValue] = match;
    const value = rawValue.trim().replace(/"/g, '');
    
    let target = context.target || context.self;
    let attrValue;
    
    switch (attribute) {
      case 'Height':
        attrValue = parseHeight(target.heightRaw);
        break;
      case 'Weight':
        attrValue = target.weight || 0;
        break;
      case 'SPD':
        attrValue = target.spd || 0;
        break;
      case 'HP':
        attrValue = target.hp || 0;
        break;
      case 'Team_ID':
        attrValue = target.teamId;
        break;
      case 'Player_ID':
        attrValue = target.playerId;
        break;
      case 'Pos':
        attrValue = target.pos;
        break;
      case 'State':
        attrValue = target.state || null;
        break;
      case 'Nature':
        attrValue = context.castNature || '';
        break;
      case 'Self_Active_Round':
        attrValue = context.gameRound || 1;
        break;
      case 'Player_Count':
        attrValue = (context.ownTeam || []).length;
        break;
      // NEW CONDITION ATTRIBUTES
      case 'Own_TeamPlayer_ID':
        attrValue = (context.ownTeam || []).some(card => card.playerId === value);
        attrValue = attrValue ? 'true' : 'false';
        break;
      case 'Self_HP':
        attrValue = context.self ? context.self.hp : 0;
        break;
      case 'Own_Team_Lead':
        attrValue = (context.ownTeamLead === true) ? 'true' : 'false';
        break;
      case 'Selected_Enemy_Team_ID':
        const enemyCard = context.selectedEnemy;
        attrValue = enemyCard ? enemyCard.teamId : '';
        break;
      case 'Own_Grave_Count':
        attrValue = (context.ownGrave || []).length;
        break;
      case 'Own_TeamTeam_ID':
        attrValue = (context.ownTeam && context.ownTeam[0]) ? context.ownTeam[0].teamId : '';
        break;
      case 'Own_TeamPlayer_Count':
        attrValue = (context.ownTeam || []).length;
        break;
      default:
        attrValue = target[attribute.toLowerCase()];
    }
    
    const resolvedValue = resolveValue(value, target, context);
    
    // Special handling for boolean attributes
    if (attribute === 'Own_TeamPlayer_ID' || attribute === 'Own_Team_Lead') {
      return compare(attrValue, operator, resolvedValue);
    }
    
    // Handle pipe-separated values (OR)
    const values = resolvedValue.toString().split('|').map(v => v.trim());
    if (values.length > 1) {
      for (const v of values) {
        if (compare(attrValue, operator, v)) return true;
      }
      return false;
    }
    
    return compare(attrValue, operator, resolvedValue);
  }
  
  function evalCompoundCondition(condition, context) {
    const andParts = condition.split(/\s+AND\s+/);
    if (andParts.length > 1) {
      return andParts.every(part => evalCondition(part, context));
    }
    const orParts = condition.split(/\s+OR\s+/);
    if (orParts.length > 1) {
      return orParts.some(part => evalCondition(part, context));
    }
    return evalCondition(condition, context);
  }

  function evalTeamCondition(condition, teamCards, context) {
    if (!condition || condition.trim() === '') return true;
    const match = condition.match(/(\w+)\s*([=!<>]+)\s*(.+)/);
    if (!match) return false;
    const [, attribute, operator, rawValue] = match;
    const value = rawValue.trim().replace(/"/g, '');
    const values = value.split('|').map(v => v.trim());
    
    for (const card of teamCards) {
      let attrValue;
      switch (attribute) {
        case 'Team_ID':
          attrValue = card.teamId;
          break;
        case 'Player_ID':
          attrValue = card.playerId;
          break;
        case 'Player_Count':
          attrValue = teamCards.length;
          break;
        default:
          attrValue = card[attribute.toLowerCase()];
      }
      const resolvedValue = resolveValue(value, card, context);
      const checkValues = resolvedValue.toString().split('|').map(v => v.trim());
      for (const v of checkValues) {
        if (compare(attrValue, operator, v)) return true;
      }
    }
    return false;
  }

  // ============================================================
  // TRIGGER PARSING (IGNORES AND_PAIR/DUAL_USE TAGS)
  // ============================================================
  
  function parseTrigger(triggerStr) {
    if (!triggerStr) return null;
    const result = { type: null, filters: [], natureFilter: null, actionResult: null, matchType: null };
    let remaining = triggerStr;
    if (remaining.startsWith('ON:')) remaining = remaining.substring(3);
    const parts = remaining.split(':');
    result.type = parts[0];
    for (let i = 1; i < parts.length; i++) {
      const part = parts[i];
      if (part.startsWith('[') && part.endsWith(']')) {
        const inner = part.slice(1, -1);
        if (inner.startsWith('Nature:')) result.natureFilter = inner.substring(7);
        else result.skillFilter = inner;
      } else if (part === 'CARD_MATCH') result.matchType = 'CARD_MATCH';
      else if (part === 'TEAM_MATCH') result.matchType = 'TEAM_MATCH';
      else if (['HIT', 'FAIL', 'MISS', 'BLOCK', 'CONTEST'].includes(part)) result.actionResult = part;
      else result.filters.push(part);
    }
    return result;
  }

  // ============================================================
  // ACTION PARSING (FULLY EXTENDED)
  // ============================================================
  
  function parseAction(actionStr) {
    if (!actionStr) return null;
    const result = { type: null, params: {} };
    
    if (actionStr.startsWith('Deal_Flat_DMG:')) {
      result.type = 'DEAL_FLAT_DMG';
      result.params.damage = parseInt(actionStr.substring(15), 10);
    }
    else if (actionStr.startsWith('Deal_Assist_Dmg:')) {
      result.type = 'DEAL_ASSIST_DMG';
      const rest = actionStr.substring(16);
      const multiplierMatch = rest.match(/([\d.]+)x_/);
      if (multiplierMatch) {
        result.params.multiplier = parseFloat(multiplierMatch[1]);
        result.params.mode = 'multiply';
      } else {
        const plusMatch = rest.match(/\+(\d+)_/);
        if (plusMatch) {
          result.params.bonus = parseInt(plusMatch[1], 10);
          result.params.mode = 'add';
        }
      }
      const natureMatch = rest.match(/Nature:(\w+)/);
      if (natureMatch) result.params.nature = natureMatch[1];
      const refMatch = rest.match(/Ref\(([^)]+)\)/);
      if (refMatch) result.params.referencePos = refMatch[1];
    }
    else if (actionStr.startsWith('Stat_Buff:')) {
      result.type = 'STAT_BUFF';
      const rest = actionStr.substring(10);
      const plusMatch = rest.match(/([+-])(\d+)_([^:]+)/);
      if (plusMatch) {
        result.params.operation = plusMatch[1];
        result.params.value = parseInt(plusMatch[2], 10);
        result.params.stat = plusMatch[3];
      }
      const natureMatch = rest.match(/Nature:(\w+)/);
      if (natureMatch) result.params.nature = natureMatch[1];
      const stackMatch = rest.match(/:Stack_Per_Hit:(\w+)/);
      if (stackMatch) {
        result.params.stackMode = stackMatch[1];
        const limitMatch = stackMatch[1].match(/(\d+)/);
        if (limitMatch) result.params.stackLimit = parseInt(limitMatch[1], 10);
      }
    }
    else if (actionStr.startsWith('Apply_Aura:')) {
      result.type = 'APPLY_AURA';
      const parts = actionStr.split(':');
      result.params.auraId = parts[1];
      result.params.effect = parts.slice(2).join(':');
    }
    else if (actionStr.startsWith('Remove_Aura:')) {
      result.type = 'REMOVE_AURA';
      result.params.auraId = actionStr.substring(12);
    }
    else if (actionStr.startsWith('Untargetable_By:')) {
      result.type = 'UNTARGETABLE_BY';
      const rest = actionStr.substring(16);
      const parts = rest.split(':');
      result.params.defensiveTypes = parts[0] ? parts[0].split('/') : [];
      if (parts[1]) result.params.nature = parts[1];
    }
    else if (actionStr.startsWith('Apply_Property:')) {
      result.type = 'APPLY_PROPERTY';
      result.params.property = actionStr.substring(16);
    }
    else if (actionStr.startsWith('Apply_State:')) {
      result.type = 'APPLY_STATE';
      const rest = actionStr.substring(12);
      if (rest.startsWith('Property:')) {
        const propStr = rest.substring(9);
        result.params.properties = propStr.split(';').map(p => p.trim());
      } else {
        result.params.state = rest;
      }
    }
    else if (actionStr.startsWith('Apply_Modifier:')) {
      result.type = 'APPLY_MODIFIER';
      const rest = actionStr.substring(16);
      if (rest.startsWith('Damage_Reduction:')) {
        result.params.modifier = 'DAMAGE_REDUCTION';
        let value = rest.substring(17);
        const natureMatch = value.match(/:Nature:([^:]+)(?::([^:]+))?/);
        if (natureMatch) {
          result.params.targetNature = natureMatch[1];
          if (natureMatch[2]) result.params.targetType = natureMatch[2];
          value = value.substring(0, natureMatch.index);
        }
        if (value.includes('x')) {
          result.params.multiplier = parseFloat(value);
          result.params.mode = 'multiply';
        } else {
          result.params.reduction = parseInt(value, 10);
          result.params.mode = 'flat';
        }
      } else if (rest.startsWith('Bonus_Damage:')) {
        result.params.modifier = 'BONUS_DAMAGE';
        result.params.bonus = parseInt(rest.substring(13), 10);
      } else if (rest.startsWith('Forced_Coin_Flip_On:')) {
        result.params.modifier = 'FORCED_COIN_FLIP_ON';
        result.params.targetNature = rest.substring(20);
      } else if (rest.startsWith('Rebound_And_Deal_Base_DMG')) {
        result.params.modifier = 'REBOUND_AND_DEAL_BASE_DMG';
      } else if (rest.startsWith('LBJ_Putback')) {
        result.params.modifier = 'LBJ_PUTBACK';
      } else if (rest.startsWith('DMG_Redirection:')) {
        result.params.modifier = 'DMG_REDIRECTION';
        result.params.target = rest.substring(16);
      } else {
        result.params.modifier = rest;
      }
    }
    else if (actionStr.startsWith('Global_Debuff:')) {
      result.type = 'GLOBAL_DEBUFF';
      const debuffMatch = actionStr.match(/\[([^\]]+)\]:\[([^\]]+)\]/);
      if (debuffMatch) {
        result.params.debuffType = debuffMatch[1];
        result.params.targetNature = debuffMatch[2];
      }
      const refundMatch = actionStr.match(/Refund:(\w+)/);
      if (refundMatch) result.params.refund = refundMatch[1] === 'True';
    }
    else if (actionStr.startsWith('Reactionary_DMG_Reduction:')) {
      result.type = 'REACTIONARY_DMG_REDUCTION';
      const value = actionStr.substring(25);
      if (value.includes('x')) {
        result.params.multiplier = parseFloat(value);
        result.params.mode = 'multiply';
      } else {
        result.params.reduction = parseInt(value, 10);
        result.params.mode = 'flat';
      }
    }
    else if (actionStr.startsWith('Grant_Extra_Move')) {
      result.type = 'GRANT_EXTRA_MOVE';
      const natureMatch = actionStr.match(/Nature:(\w+)/);
      if (natureMatch) result.params.nature = natureMatch[1];
    }
    else if (actionStr === 'Screen_Guarantee_Hit') {
      result.type = 'SCREEN_GUARANTEE_HIT';
    }
    else if (actionStr.startsWith('Hard_Disable_Shutdown:')) {
      result.type = 'HARD_DISABLE_SHUTDOWN';
      const rest = actionStr.substring(22);
      const refMatch = rest.match(/Ref_Skill:(\w+)/);
      if (refMatch) result.params.refSkill = refMatch[1];
      else result.params.nature = rest;
    }
    else if (actionStr.startsWith('Apply_Priority:')) {
      result.type = 'APPLY_PRIORITY';
      const parts = actionStr.split(':');
      result.params.nature = parts[1];
      result.params.priority = parseInt(parts[2].replace('x', ''), 10);
    }
    else if (actionStr === 'Block') result.type = 'BLOCK';
    else if (actionStr === 'Contest') result.type = 'CONTEST';
    else if (actionStr === 'Intercept') result.type = 'INTERCEPT';
    else if (actionStr === 'Freeze') result.type = 'FREEZE';
    else if (actionStr === 'Nullify') result.type = 'NULLIFY';
    else if (actionStr === 'Steal_Skill') result.type = 'STEAL_SKILL';
    else {
      result.type = 'UNKNOWN';
      result.params.raw = actionStr;
    }
    
    return result;
  }

  // ============================================================
  // SKILL & ABILITY PARSING (FROM JSON)
  // ============================================================
  
  function parseSkillPhases(phasesArray) {
    if (!phasesArray || !Array.isArray(phasesArray)) return [];
    return phasesArray.map(phase => ({
      timing: phase.Timing || null,
      nature: phase.Nature || [],
      properties: phase.Properties || [],
      modifiers: (phase.Modifiers || []).map(mod => ({
        condition: mod.Condition || null,
        coinFlip: mod.Coin_Flip ? parseFloat(mod.Coin_Flip) : 0,
        actionString: mod.action_string || null,
        actionTarget: mod.action_target || null,
        td: mod.TD || null
      }))
    }));
  }

  function parseSkill(rawSkill) {
    if (!rawSkill || !rawSkill.Name) return null;
    const skill = {
      id: rawSkill.SkillID || null,
      name: rawSkill.Name,
      description: rawSkill.Description_UI || rawSkill.Description || '',
      um: parseUM(rawSkill.UM),
      phases: []
    };

    // Handle Legacy Modifiers
    if (rawSkill.Modifiers) {
      skill.phases.push({
        timing: rawSkill.Timing || 'Standard:On_Cast',
        nature: rawSkill.Nature ? [rawSkill.Nature] : [],
        properties: rawSkill.Properties || [],
        modifiers: (rawSkill.Modifiers || []).map(m => ({
          condition: m.Condition || null,
          coinFlip: m.Coin_Flip ? parseFloat(m.Coin_Flip) : 0,
          actionString: m.action_string || null,
          actionTarget: m.action_target || 'Self',
          td: m.TD || null
        }))
      });
    }

    // Handle New Phases
    if (rawSkill.Phases && Array.isArray(rawSkill.Phases)) {
      skill.phases = rawSkill.Phases.map(p => ({
        timing: p.Timing || 'Standard:On_Cast',
        nature: p.Nature || [],
        properties: p.Properties || [],
        modifiers: (p.Modifiers || []).map(m => ({
          condition: m.Condition || null,
          coinFlip: m.Coin_Flip ? parseFloat(m.Coin_Flip) : 0,
          actionString: m.action_string || null,
          actionTarget: m.action_target || 'Self',
          td: m.TD || null
        }))
      }));
    }
    
    return skill;
  }

  function parseAbility(rawAbility) {
    if (!rawAbility || !rawAbility.Name) return null;
    const ability = {
      id: rawAbility.AbilityID || null,
      name: rawAbility.Name,
      description: rawAbility.Description_UI || '',
      rules: []
    };
    if (rawAbility.rulesJson && typeof rawAbility.rulesJson === 'object') {
      ability.rules = rawAbility.rulesJson.Rules || [];
    }
    return ability;
  }

  // ============================================================
  // CARD ID PARSING
  // ============================================================
  
  function parseCardId(cardId) {
    if (!cardId) return null;
    const parts = cardId.split('_');
    if (parts.length < 3) return null;
    const tierPart = parts[2];
    const tierMatch = tierPart.match(/([A-Z]+)(\d+)/);
    return {
      teamId: parts[0],
      playerId: parts[1],
      tierId: tierMatch ? tierMatch[1] : tierPart,
      sequence: tierMatch ? parseInt(tierMatch[2], 10) : 0,
      fullId: cardId
    };
  }

  function parseAbilitySkillId(id) {
    if (!id) return null;
    const lastUnderscore = id.lastIndexOf('_');
    if (lastUnderscore === -1) return null;
    const cardId = id.substring(0, lastUnderscore);
    const suffix = id.substring(lastUnderscore + 1);
    const match = suffix.match(/([AS])(\d+)/);
    return {
      cardId,
      type: match ? match[1] : null,
      sequence: match ? parseInt(match[2], 10) : 0,
      fullId: id
    };
  }

  // ============================================================
  // FULL CARD PARSING
  // ============================================================
  
  function parseCard(rawCard) {
    if (!rawCard || !rawCard.PlayerName) return null;
    const cardIdInfo = parseCardId(rawCard.CardID);
    const card = {
      id: rawCard.CardID,
      teamId: cardIdInfo?.teamId || rawCard.Team,
      playerId: cardIdInfo?.playerId || rawCard.PlayerID,
      tierId: cardIdInfo?.tierId || rawCard.Tier,
      name: rawCard.PlayerName,
      formattedName: rawCard.FormattedName,
      variant: rawCard.Variant,
      hp: rawCard.HP || 0,
      basicDmg: rawCard.BasicDMG || 0,
      spd: rawCard.SPD || 0,
      primaryPos: rawCard.PrimaryPos,
      secondaryPos: rawCard.SecondaryPos,
      pos: rawCard.PrimaryPos,
      heightRaw: rawCard.DisplayHeight,
      heightInches: parseHeight(rawCard.DisplayHeight),
      weight: rawCard.Weight || 0,
      imagePath: rawCard.ImageFilePath,
      abilities: [],
      skills: []
    };
    if (rawCard.Ability && typeof rawCard.Ability === 'object') {
      card.abilities.push(parseAbility(rawCard.Ability));
    }
    if (rawCard.Skills && Array.isArray(rawCard.Skills)) {
      for (const skill of rawCard.Skills) {
        const parsed = parseSkill(skill);
        if (parsed) card.skills.push(parsed);
      }
    }
    return card;
  }

  // ============================================================
  // EXPORTS
  // ============================================================
  
  return {
    parseHeight,
    parseTD,
    parseUM,
    resolveValue,
    compare,
    natureMatches,
    evalCondition,
    evalTeamCondition,
    evalCompoundCondition,
    resolveTarget,
    parseCardId,
    parseAbilitySkillId,
    parseTrigger,
    parseAction,
    parseSkill,
    parseAbility,
    parseSkillPhases,
    parseCard
  };
})();

if (typeof module !== 'undefined' && module.exports) {
  module.exports = PARSER;
}

// ============================================================

// ============================================================
const ABILITY_ENGINE = (() => {

  // ============================================================
  // SECTION 1 — INTERNAL UTILITY WRAPPERS
  // ============================================================

  function _getHP(c)     { return c?.currentHp ?? c?.UI_Frontend_Data?.Stats?.HP ?? 0; }
  function _getMaxHP(c)  { return c?.UI_Frontend_Data?.Stats?.HP ?? 0; }
  function _getDMG(c)    { return c?.UI_Frontend_Data?.Stats?.Base_DMG ?? 0; }
  function _getSPD(c)    { return c?.UI_Frontend_Data?.Stats?.Speed ?? 0; }
  function _getTeam(c)   { return c?.UI_Frontend_Data?.Team_ID ?? c?.UI_Frontend_Data?.Team ?? ''; }
  function _getPlayer(c) { return c?.UI_Frontend_Data?.Player_ID ?? ''; }
  function _getHeight(c) { return c?.UI_Frontend_Data?.Height ?? ''; }
  function _getWeight(c) { return c?.UI_Frontend_Data?.Weight ?? 0; }
  function _getPos(c)    {
    const p = c?.UI_Frontend_Data?.Positions;
    return p ? [p.Primary, p.Secondary, p.Third].filter(Boolean) : [];
  }
  function _getState(c)  { return c?._state ?? null; }
  function _getName(c)   { return c?.UI_Frontend_Data?.Formatted_Name ?? c?.UI_Frontend_Data?.Name ?? 'Unknown'; }

  // ============================================================
  // SECTION 2 — CONDITION CONTEXT BUILDER
  // ============================================================

  function buildCondCtx(self, ownTeam, enemyTeam, extras = {}) {
    return {
      self,
      ownTeam: ownTeam || [],
      enemyTeam: enemyTeam || [],
      castingEnemy: extras.castingEnemy ?? null,
      selectedEnemy: extras.selectedEnemy ?? null,
      castNature: extras.castNature ?? '',
      gameRound: extras.gameRound ?? 1,
      ownTeamLead: extras.ownTeamLead ?? false,
      ownGrave: extras.ownGrave ?? [],
      target: self,
    };
  }

  // ============================================================
  // SECTION 3 — RULE CONDITION EVALUATOR
  // ============================================================

  function evalRuleCondition(condition, ctx) {
    if (!condition) return true;
    const condStr = typeof condition === 'string' ? condition : JSON.stringify(condition);
    if (!condStr.trim()) return true;
    try {
      return PARSER.evalCondition(condStr, ctx);
    } catch (e) {
      console.warn('[ABILITY_ENGINE] evalRuleCondition error:', e, condition);
      return false;
    }
  }

  // ============================================================
  // SECTION 4 — ACTION EXECUTOR
  // ============================================================

  function _executeAction(action, targetCards, sourceCard, td, context) {
    if (!action || !targetCards) return [];
    const targets = Array.isArray(targetCards) ? targetCards : [targetCards];
    const results = [];

    for (const target of targets) {
      if (!target || target.isDead) continue;
      const r = _applyActionToCard(action, target, sourceCard, td, context);
      if (r) results.push(r);
    }
    return results;
  }

  function _applyActionToCard(action, card, sourceCard, td, context) {
    if (!action || !card) return null;
    const tdParsed = td ? PARSER.parseTD(td) : { turns: 1, delay: 0, special: null };

    switch (action.type) {

      case 'STAT_BUFF': {
        const { operation, value, stat, nature, stackMode, stackLimit } = action.params;
        const amt = operation === '-' ? -(value || 0) : (value || 0);

        if (stackMode) {
          if (!card._stackBuffs) card._stackBuffs = {};
          const key = `${sourceCard?._instanceId}_${stat}`;
          if (!card._stackBuffs[key]) card._stackBuffs[key] = { total: 0, count: 0, stat, stackMode, permanent: stackMode.includes('Permanent'), limit: stackLimit || Infinity };
          const sb = card._stackBuffs[key];
          if (sb.count < sb.limit) {
            sb.total += amt;
            sb.count++;
            _applyStatDelta(card, stat, amt);
          }
          return { card, type: 'STAT_BUFF_STACK', detail: `${_getName(card)} stacked +${amt} ${stat} (×${sb.count})` };
        }

        if (tdParsed.special === 'THIS_ATTACK') {
          if (!card._thisAttackBuffs) card._thisAttackBuffs = {};
          card._thisAttackBuffs[stat] = (card._thisAttackBuffs[stat] || 0) + amt;
          return { card, type: 'STAT_BUFF_THIS_ATTACK', detail: `${_getName(card)} +${amt} ${stat} this attack` };
        }

        if (!card._timedBuffs) card._timedBuffs = [];
        card._timedBuffs.push({
          stat, amount: amt, nature: nature || null,
          turnsLeft: tdParsed.special === 'REST_OF_TURN' ? 0.5 : (tdParsed.turns || 1),
          delay: tdParsed.delay || 0,
          started: (tdParsed.delay || 0) <= 0,
          sourceId: sourceCard?._instanceId || null,
        });
        if ((tdParsed.delay || 0) <= 0) _applyStatDelta(card, stat, amt);
        return { card, type: 'STAT_BUFF', detail: `${_getName(card)} ${operation}${value} ${stat} for ${tdParsed.turns}T` };
      }

      case 'DEAL_FLAT_DMG': {
        const dmg = action.params.damage || 0;
        card.currentHp = Math.max(0, (card.currentHp ?? _getMaxHP(card)) - dmg);
        return { card, type: 'DEAL_FLAT_DMG', detail: `${_getName(card)} takes ${dmg} flat DMG` };
      }

      case 'DEAL_ASSIST_DMG': {
        const refPos = action.params.referencePos;
        const refCard = context?.ownTeam?.find(c => _getPos(c).includes(refPos));
        let dmg = refCard ? _getDMG(refCard) : 0;
        if (action.params.mode === 'multiply') dmg = Math.floor(dmg * (action.params.multiplier || 1));
        else if (action.params.mode === 'add') dmg = dmg + (action.params.bonus || 0);
        card.currentHp = Math.max(0, (card.currentHp ?? _getMaxHP(card)) - dmg);
        return { card, type: 'DEAL_ASSIST_DMG', detail: `Assist DMG ${dmg} on ${_getName(card)} (ref: ${refPos})` };
      }

      case 'APPLY_AURA': {
        if (!card._auras) card._auras = new Map();
        // FIX: Access params correctly
        const auraId = action.params.auraId;
        const effect = action.params.effect;
        
        if (!card._auras.has(auraId)) {
          card._auras.set(auraId, {
            auraId,
            effect: effect,
            sourceCardId: sourceCard?._instanceId || null,
            sourceName: _getName(sourceCard),
            tdParsed,
          });
          const auraEffect = PARSER.parseAction(effect);
          if (auraEffect) _applyActionToCard(auraEffect, card, sourceCard, td, context);
        }
        return { card, type: 'APPLY_AURA', detail: `Aura ${auraId} applied to ${_getName(card)}` };
      }

      case 'REMOVE_AURA': {
        if (card._auras) {
          // FIX: Access params correctly
          const auraId = action.params.auraId;
          if (card._auras.has(auraId)) {
            const aura = card._auras.get(auraId);
            card._auras.delete(auraId);
            const auraEffect = PARSER.parseAction(aura.effect);
            if (auraEffect) _reverseActionOnCard(auraEffect, card, context);
            return { card, type: 'REMOVE_AURA', detail: `Aura ${auraId} removed from ${_getName(card)}` };
          }
        }
        return null;
      }

      case 'UNTARGETABLE_BY': {
        const { defensiveTypes, nature } = action.params;
        if (!card._untargetableBy) card._untargetableBy = [];
        const entry = { defensiveTypes: defensiveTypes || [], nature: nature || null, special: tdParsed.special, turnsLeft: tdParsed.turns || 999 };
        card._untargetableBy.push(entry);
        _recomputeUntargetableFlags(card);
        return { card, type: 'UNTARGETABLE_BY', detail: `${_getName(card)} untargetable by ${defensiveTypes?.join('/')}` };
      }

      case 'APPLY_PROPERTY': {
        const prop = action.params.property || '';
        if (prop.startsWith('Stat_Lock:')) {
          if (!card._statLock) card._statLock = new Set();
          prop.replace('Stat_Lock:', '').split('+').forEach(s => card._statLock.add(s.trim()));
          return { card, type: 'STAT_LOCK', detail: `${_getName(card)} stat-locked: ${prop}` };
        }
        if (prop === 'No_Miss' || prop.includes('No_Miss')) {
          card._noMiss = true;
          if (tdParsed.special === 'THIS_ATTACK') card._noMissThisAttack = true;
          return { card, type: 'NO_MISS', detail: `${_getName(card)} No_Miss active` };
        }
        if (prop === 'Untargetable') {
          card._fullyUntargetable = true;
          if (tdParsed.special === 'REST_OF_TURN') card._untargetableUntilTurnEnd = true;
          return { card, type: 'UNTARGETABLE', detail: `${_getName(card)} fully untargetable` };
        }
        if (prop === 'Survive_At_1HP') {
          card._surviveProp = true;
          return { card, type: 'SURVIVE_AT_1HP', detail: `${_getName(card)} will survive at 1 HP` };
        }
        if (!card._properties) card._properties = new Set();
        card._properties.add(prop);
        return { card, type: 'APPLY_PROPERTY', detail: `${_getName(card)} property: ${prop}` };
      }

      case 'APPLY_STATE': {
        const stateStr = action.params.state || '';
        if (stateStr.startsWith('Sixth_Man')) {
          const parts = stateStr.split(':');
          card._state = 'Sixth_Man';
          card._sixthManPriority = parseInt(parts[2] || '-10');
          card._targetableViaTeammate = parts.includes('Targetable_Via_Teammate');
          return { card, type: 'APPLY_STATE_SIXTH_MAN', detail: `${_getName(card)} set as Sixth Man` };
        }
        card._state = stateStr;
        return { card, type: 'APPLY_STATE', detail: `${_getName(card)} state: ${stateStr}` };
      }

      case 'APPLY_MODIFIER': {
        return _applyModifier(action.params, card, sourceCard, tdParsed, context);
      }

      case 'GLOBAL_DEBUFF': {
        const { debuffType, targetNature, refund } = action.params;
        if (!card._globalDebuffs) card._globalDebuffs = [];
        card._globalDebuffs.push({ debuffType, targetNature, refund: !!refund, turnsLeft: tdParsed.turns || 1, sourceCard });
        return { card, type: 'GLOBAL_DEBUFF', detail: `${_getName(card)} global debuff: ${debuffType} on ${targetNature}` };
      }

      case 'GRANT_EXTRA_MOVE': {
        card._grantedExtraMove = true;
        card._extraMoveNature = action.params.nature || null;
        return { card, type: 'GRANT_EXTRA_MOVE', detail: `${_getName(card)} granted extra move` };
      }

      case 'SCREEN_GUARANTEE_HIT': {
        card._screened = true;
        return { card, type: 'SCREEN_GUARANTEE_HIT', detail: `${_getName(card)} next shot cannot miss` };
      }

      case 'HARD_DISABLE_SHUTDOWN': {
        if (!card._skillDisables) card._skillDisables = [];
        card._skillDisables.push({
          refSkill: action.params.refSkill || null,
          nature: action.params.nature || null,
          turnsLeft: tdParsed.turns || 1,
          sourceId: sourceCard?._instanceId,
        });
        return { card, type: 'HARD_DISABLE_SHUTDOWN', detail: `${_getName(card)} skill shutdown: ${action.params.refSkill || 'ALL'}` };
      }

      case 'APPLY_PRIORITY': {
        const multiplier = action.params.priority || 1;
        if (!card._priorityModifiers) card._priorityModifiers = [];
        card._priorityModifiers.push({
          nature: action.params.nature || null,
          multiplier,
          turnsLeft: tdParsed.special === 'REST_OF_TURN' ? 0.5 : (tdParsed.turns || 1),
          sourceId: sourceCard?._instanceId,
        });
        return { card, type: 'APPLY_PRIORITY', detail: `${_getName(card)} ${multiplier}x priority` };
      }

      case 'REACTIONARY_DMG_REDUCTION': {
        if (!card._reactionaryReductions) card._reactionaryReductions = [];
        card._reactionaryReductions.push({
          mode: action.params.mode,
          multiplier: action.params.multiplier,
          reduction: action.params.reduction,
          turnsLeft: tdParsed.turns || 1,
          sourceId: sourceCard?._instanceId,
        });
        return { card, type: 'REACTIONARY_DMG_REDUCTION', detail: `${_getName(card)} reactionary DMG reduction` };
      }

      case 'BLOCK': card._blocking = true; return { card, type: 'BLOCK', detail: `${_getName(card)} blocking` };
      case 'CONTEST': card._contesting = true; return { card, type: 'CONTEST', detail: `${_getName(card)} contesting` };
      case 'INTERCEPT': card._intercepting = true; return { card, type: 'INTERCEPT', detail: `${_getName(card)} intercepting` };
      case 'FREEZE':
        card._frozen = true;
        card._frozenTurnsLeft = tdParsed.turns || 1;
        card._skillsFrozen = true;
        return { card, type: 'FREEZE', detail: `${_getName(card)} frozen for ${tdParsed.turns || 1}T` };
      case 'NULLIFY': card._nullified = true; return { card, type: 'NULLIFY', detail: `${_getName(card)} nullified` };
      case 'STEAL_SKILL': return { card, type: 'STEAL_SKILL', detail: `Steal skill from ${_getName(card)}` };

      case 'BEHAVIOR_MODIFIER':
      case 'UNKNOWN':
      default:
        return { card, type: action.type, detail: `Applied ${action.type} to ${_getName(card)}` };
    }
  }

  function _applyModifier(params, card, sourceCard, tdParsed, context) {
    switch (params.modifier) {
      case 'DAMAGE_REDUCTION': {
        if (!card._dmgReductions) card._dmgReductions = [];
        card._dmgReductions.push({
          mode: params.mode,
          multiplier: params.multiplier,
          reduction: params.reduction,
          targetNature: params.targetNature || null,
          targetType: params.targetType || null,
          turnsLeft: tdParsed.turns || 1,
          delay: tdParsed.delay || 0,
          started: (tdParsed.delay || 0) <= 0,
          sourceId: sourceCard?._instanceId || null,
        });
        return { card, type: 'DAMAGE_REDUCTION', detail: `${_getName(card)} DMG reduction active` };
      }
      case 'BONUS_DAMAGE': {
        if (!card._bonusDmg) card._bonusDmg = [];
        card._bonusDmg.push({ bonus: params.bonus || 0, turnsLeft: tdParsed.turns || 1 });
        return { card, type: 'BONUS_DAMAGE', detail: `+${params.bonus} bonus DMG on ${_getName(card)}` };
      }
      case 'RETALIATORY_DAMAGE': {
        if (!card._retaliations) card._retaliations = [];
        card._retaliations.push({ damage: params.bonus || params.damage || 0, turnsLeft: 1 });
        return { card, type: 'RETALIATORY_DAMAGE', detail: `${_getName(card)} retaliates ${params.bonus || 0}` };
      }
      case 'REBOUND_AND_DEAL_BASE_DMG': {
        card._reboundAndDeal = true;
        return { card, type: 'REBOUND_AND_DEAL_BASE_DMG', detail: `${_getName(card)} can rebound and deal base DMG` };
      }
      case 'LBJ_PUTBACK': {
        card._lbjPutback = true;
        return { card, type: 'LBJ_PUTBACK', detail: `${_getName(card)} LBJ Putback active` };
      }
      case 'DMG_REDIRECTION': {
        card._dmgRedirectionTarget = params.target || null;
        return { card, type: 'DMG_REDIRECTION', detail: `DMG redirection active on ${_getName(card)}` };
      }
      case 'FORCED_COIN_FLIP_ON': {
        if (!card._forcedCoinFlips) card._forcedCoinFlips = [];
        card._forcedCoinFlips.push({ targetNature: params.targetNature, turnsLeft: tdParsed.turns || 1, refund: params.refund ?? false });
        return { card, type: 'FORCED_COIN_FLIP_ON', detail: `Forced coin flip on ${params.targetNature}` };
      }
      default:
        return { card, type: `MODIFIER_${params.modifier}`, detail: `Modifier ${params.modifier} on ${_getName(card)}` };
    }
  }

  function _applyStatDelta(card, stat, amount) {
    if (card._statLock && card._statLock.has(stat)) return;
    switch (stat) {
      case 'DMG': case 'DMG:Nature:Base': case 'DMG:Nature:Offensive':
      case 'DMG:Nature:Offensive:Close_Shot': case 'DMG:Nature:Offensive:Jump_Shot':
        if (!card._dmgModifiers) card._dmgModifiers = 0;
        card._dmgModifiers += amount;
        break;
      case 'HP':
        card.currentHp = Math.min(_getMaxHP(card), Math.max(1, (card.currentHp ?? _getMaxHP(card)) + amount));
        break;
      case 'MAX_HP':
        if (card.UI_Frontend_Data?.Stats) {
          card.UI_Frontend_Data.Stats.HP = (card.UI_Frontend_Data.Stats.HP || 0) + amount;
        }
        break;
      case 'SPD':
        if (!card._spdModifier) card._spdModifier = 0;
        card._spdModifier += amount;
        break;
      default:
        break;
    }
  }

  function _reverseActionOnCard(action, card, context) {
    if (!action) return;
    switch (action.type) {
      case 'STAT_BUFF': {
        const { operation, value, stat } = action.params;
        const amt = operation === '-' ? (value || 0) : -(value || 0);
        _applyStatDelta(card, stat, amt);
        break;
      }
      case 'UNTARGETABLE_BY':
        _recomputeUntargetableFlags(card);
        break;
      case 'APPLY_PROPERTY':
        if (action.params.property === 'No_Miss') delete card._noMiss;
        if (action.params.property === 'Untargetable') delete card._fullyUntargetable;
        if (action.params.property === 'Survive_At_1HP') delete card._surviveProp;
        break;
      default:
        break;
    }
  }

  function _recomputeUntargetableFlags(card) {
    delete card._immuneAllOffensive;
    delete card._immuneCloseShot;
    delete card._immuneJumpShot;
    delete card._immuneSteal;
    delete card._immuneIntercept;
    delete card._immuneFreeze;
    delete card._skillsUnblockable;
    delete card._skillsUncontestable;
    delete card._baseUnblockable;
    delete card._baseUncontestable;
    delete card._immuneForcedCoin;

    if (!card._untargetableBy) return;
    for (const entry of card._untargetableBy) {
      if (entry.turnsLeft <= 0) continue;
      for (const dt of (entry.defensiveTypes || [])) {
        if (dt === 'Block')       card._skillsUnblockable = true;
        if (dt === 'Block:Base')  card._baseUnblockable   = true;
        if (dt === 'Contest')     card._skillsUncontestable = true;
        if (dt === 'Steal')       card._immuneSteal       = true;
        if (dt === 'Freeze')      card._immuneFreeze      = true;
        if (dt === 'Intercept')   card._immuneIntercept   = true;
        if (dt === 'Forced_Coin_Flip') card._immuneForcedCoin = true;
      }
      const n = (entry.nature || '').toLowerCase();
      if (n.includes('offensive') && !n.includes('close') && !n.includes('jump'))
        card._immuneAllOffensive = true;
      if (n.includes('close_shot')) card._immuneCloseShot = true;
      if (n.includes('jump_shot'))  card._immuneJumpShot  = true;
    }
  }

  // ============================================================
  // SECTION 5 — TRIGGER DISPATCHER
  // ============================================================

  function fireEvent(eventType, payload, allCards, gameState) {
    const effects = [];
    for (const card of allCards) {
      if (!card || card.isDead) continue;
      const rules = card.Ability?.Rules || card.Ability?.rules || [];
      if (!rules.length) continue;

      for (const rule of rules) {
        const trigger = PARSER.parseTrigger(rule.trigger || rule.Trigger || '');
        if (!_triggerMatches(trigger, eventType, payload, card)) continue;

        const ctx = buildCondCtx(
          card,
          gameState?.ownTeam ?? [],
          gameState?.enemyTeam ?? [],
          {
            castingEnemy:  payload.castingEnemy  ?? null,
            selectedEnemy: payload.selectedEnemy ?? null,
            castNature:    payload.castNature    ?? '',
            gameRound:     gameState?.gameRound  ?? 1,
            ownTeamLead:   gameState?.ownTeamLead ?? false,
            ownGrave:      gameState?.ownGrave   ?? [],
          }
        );

        if (!evalRuleCondition(rule.condition || rule.Condition || null, ctx)) continue;

        const actionTargetStr = rule.action_target || rule.Action_Target || 'Self';
        const resolvedTargets = _resolveActionTargets(actionTargetStr, card, gameState?.ownTeam ?? [], gameState?.enemyTeam ?? [], payload);

        const actionStr = rule.action_string || rule.Action_String || '';
        if (!actionStr) continue;
        const action = PARSER.parseAction(actionStr);
        if (!action) continue;

        const td = rule.td || rule.TD || null;
        const applied = _executeAction(action, resolvedTargets, card, td, ctx);
        effects.push(...applied);
      }
    }
    return effects;
  }

  function _triggerMatches(trigger, eventType, payload, ownerCard) {
    if (!trigger || trigger.type === 'UNKNOWN') return false;
    if (trigger.type === 'AND_PAIR') return false;

    if (trigger.type === 'ALWAYS') return true;

    if (trigger.type === 'DEPLOY_POS_MATCH' && eventType === 'DEPLOY') {
      return _getPos(ownerCard).some(p => p === payload.position);
    }
    if (trigger.type === 'DEPLOY_SIXTH_MAN' && eventType === 'DEPLOY') {
      return payload.isSixthMan === true;
    }

    if (trigger.type === 'ENTER_ACTIVE_LINEUP' && eventType === 'ENTER_ACTIVE_LINEUP') {
      return payload.cardId === ownerCard._instanceId;
    }

    if (trigger.type === 'HP_THRESHOLD_ONCE' && eventType === 'HP_CHANGE') {
      if (payload.cardId !== ownerCard._instanceId) return false;
      if (ownerCard._hpThresholdFired) return false;
      return true;
    }
    if (trigger.type === 'HP_STATE' && eventType === 'HP_CHANGE') {
      return payload.cardId === ownerCard._instanceId;
    }
    if (trigger.type === 'TURN_START_AFTER_SURVIVE' && eventType === 'TURN_START') {
      return ownerCard._survivedLastTurn === true;
    }

    if (trigger.type === 'ROSTER_JOIN' && eventType === 'ROSTER_JOIN') {
      if (trigger.side === 'enemy' && payload.side !== 'enemy') return false;
      if (trigger.side !== 'enemy' && payload.side === 'enemy') return false;
      return _rosterMatchCheck(trigger, payload, ownerCard);
    }
    if (trigger.type === 'ROSTER_LEAVE' && eventType === 'ROSTER_LEAVE') {
      if (trigger.side === 'enemy' && payload.side !== 'enemy') return false;
      return _rosterMatchCheck(trigger, payload, ownerCard);
    }
    if (trigger.type === 'ROSTER_LEAVE_LAST' && eventType === 'ROSTER_LEAVE_LAST') {
      if (trigger.side === 'enemy' && payload.side !== 'enemy') return false;
      return _rosterMatchCheck(trigger, payload, ownerCard);
    }

    if (trigger.type === 'CARD_EXIT' && eventType === 'CARD_EXIT') {
      return trigger.cardId === payload.exitingCardId;
    }

    if (trigger.type === 'SELF_CAST' && eventType === 'SELF_CAST') {
      if (payload.castingCardId !== ownerCard._instanceId) return false;
      if (trigger.nature && !PARSER.natureMatches(trigger.nature, payload.castNature, payload.castType)) return false;
      if (trigger.skillId && trigger.skillId !== payload.skillId) return false;
      if (trigger.subtype && trigger.subtype !== payload.subtype) return false;
      if (!trigger.subtype && payload.subtype) return false;
      return true;
    }

    if (trigger.type === 'ENEMY_CAST' && eventType === 'ENEMY_CAST') {
      if (trigger.nature && !PARSER.natureMatches(trigger.nature, payload.castNature, payload.castType)) return false;
      if (trigger.scope === 'self'     && payload.targetId !== ownerCard._instanceId) return false;
      if (trigger.scope === 'not_self' && payload.targetId === ownerCard._instanceId) return false;
      return true;
    }

    if (trigger.type === 'ENEMY_RESOLVE' && eventType === 'ENEMY_RESOLVE') {
      if (trigger.nature && !PARSER.natureMatches(trigger.nature, payload.castNature, payload.castType)) return false;
      if (trigger.scope === 'self'     && payload.targetId !== ownerCard._instanceId) return false;
      if (trigger.scope === 'teammate' && payload.targetId === ownerCard._instanceId) return false;
      return true;
    }

    if (trigger.type === 'ENEMY_RETALIATE' && eventType === 'ENEMY_RETALIATE') {
      if (payload.attackerCardId !== ownerCard._instanceId) return false;
      return true;
    }

    if (trigger.type === 'TEAMMATE_FAIL' && eventType === 'TEAMMATE_FAIL') {
      if (!trigger.actorSpec) return false;
      return _actorSpecMatches(trigger.actorSpec, payload.failedCard);
    }

    return false;
  }

  function _rosterMatchCheck(trigger, payload, ownerCard) {
    if (trigger.matchMode === 'TEAM_MATCH') {
      return payload.joiningTeamId && _getTeam(ownerCard) === payload.joiningTeamId;
    }
    if (trigger.matchMode === 'CARD_MATCH') {
      return payload.joiningPlayerId && (
        ownerCard._duoPartners?.includes(payload.joiningPlayerId) ?? false
      );
    }
    return false;
  }

  function _actorSpecMatches(actorSpec, failedCard) {
    if (!actorSpec || !failedCard) return false;
    const parts = actorSpec.split(':');
    if (parts[0] === 'Actor' && parts[1] === 'ID') {
      return _getPlayer(failedCard) === parts[2];
    }
    if (parts[0] === 'Position') {
      return _getPos(failedCard).includes(parts[1]);
    }
    return false;
  }

  function _resolveActionTargets(targetStr, self, ownTeam, enemyTeam, payload) {
    if (!targetStr) return [self];
    const t = String(targetStr).trim();

    if (t === 'Self') return [self];
    if (t === 'All_Ally:All') return (ownTeam || []).filter(c => c && !c.isDead);
    if (t === 'Casting_Enemy') return payload?.castingEnemy ? [payload.castingEnemy] : [];
    if (t === 'Original_Target') return payload?.originalTarget ? [payload.originalTarget] : [];
    if (t === 'Targeted_Ally') return payload?.targetedAlly ? [payload.targetedAlly] : [];

    const tPosM = t.match(/^Teammates:Pos:(.+)$/);
    if (tPosM) {
      const positions = tPosM[1].split('/');
      return (ownTeam || []).filter(c => c && !c.isDead && positions.some(p => _getPos(c).includes(p)));
    }

    const ePosM = t.match(/^Enemy:Pos:(.+)$/);
    if (ePosM) {
      const positions = ePosM[1].split('/');
      return (enemyTeam || []).filter(c => c && !c.isDead && positions.some(p => _getPos(c).includes(p)));
    }

    if (t === 'All_Enemy') return (enemyTeam || []).filter(c => c && !c.isDead);

    return [self];
  }

  // ============================================================
  // SECTION 6 — TRIGGER-SPECIFIC FIRE HELPERS
  // ============================================================

  function bootPassiveAbilities(card, ownTeam, deployPosition) {
    const rules = card.Ability?.Rules || card.Ability?.rules || [];
    for (const rule of rules) {
      const trigger = PARSER.parseTrigger(rule.trigger || '');
      if (trigger.type !== 'ALWAYS') continue;

      const ctx = buildCondCtx(card, ownTeam || [], [], {});
      if (!evalRuleCondition(rule.condition || null, ctx)) continue;

      const actionStr = rule.action_string || rule.Action_String || '';
      if (!actionStr) continue;
      const action = PARSER.parseAction(actionStr);
      if (!action) continue;

      const targets = _resolveActionTargets(rule.action_target || 'Self', card, ownTeam || [], [], {});
      _executeAction(action, targets, card, rule.td || null, ctx);
    }

    if (deployPosition) {
      for (const rule of rules) {
        const trigger = PARSER.parseTrigger(rule.trigger || '');
        if (trigger.type !== 'DEPLOY_POS_MATCH') continue;
        if (!_getPos(card).some(p => p === deployPosition)) continue;
        const ctx = buildCondCtx(card, ownTeam || [], [], {});
        if (!evalRuleCondition(rule.condition || null, ctx)) continue;
        const action = PARSER.parseAction(rule.action_string || '');
        if (action) {
          const targets = _resolveActionTargets(rule.action_target || 'Self', card, ownTeam || [], [], {});
          _executeAction(action, targets, card, rule.td || null, ctx);
        }
      }
    }
  }

  function evaluateAlwaysConditional(card, ownTeam) {
    const rules = card.Ability?.Rules || card.Ability?.rules || [];
    for (const rule of rules) {
      const trigger = PARSER.parseTrigger(rule.trigger || '');
      if (trigger.type !== 'ALWAYS') continue;
      if (!(rule.condition || rule.Condition)) continue;

      const ctx = buildCondCtx(card, ownTeam || [], [], {});
      const nowPasses = evalRuleCondition(rule.condition || rule.Condition, ctx);
      const actionStr = rule.action_string || '';
      if (!actionStr) continue;
      const action = PARSER.parseAction(actionStr);
      if (!action) continue;

      const ruleKey = `_alwaysActive_${actionStr}`;
      const wasActive = card[ruleKey] === true;

      if (nowPasses && !wasActive) {
        const targets = _resolveActionTargets(rule.action_target || 'Self', card, ownTeam || [], [], {});
        _executeAction(action, targets, card, rule.td || null, ctx);
        card[ruleKey] = true;
      } else if (!nowPasses && wasActive) {
        _reverseActionOnCard(action, card, ctx);
        card[ruleKey] = false;
      }
    }
  }

  function bootEnterActiveLineup(card, ownTeam, fullRoster) {
    const results = [];
    const rules = card.Ability?.Rules || card.Ability?.rules || [];
    for (const rule of rules) {
      const trigger = PARSER.parseTrigger(rule.trigger || '');
      if (trigger.type !== 'ENTER_ACTIVE_LINEUP') continue;

      const ctx = buildCondCtx(card, ownTeam || [], [], { gameRound: card._activeRound || 1 });
      if (!evalRuleCondition(rule.condition || null, ctx)) continue;

      const actionStr = rule.action_string || '';
      if (!actionStr) continue;
      const action = PARSER.parseAction(actionStr);
      if (!action) continue;

      const td = rule.td || null;
      const tdParsed = PARSER.parseTD(td || 'DEFAULT');
      const targets = _resolveActionTargets(rule.action_target || 'Self', card, ownTeam || [], [], {});
      results.push(...targets.map(t => ({ targetCard: t, action, td: tdParsed })));
    }
    return results;
  }

  function checkHPThreshold(card, ownTeam) {
    if (card._hpThresholdFired) return null;
    const rules = card.Ability?.Rules || card.Ability?.rules || [];
    for (const rule of rules) {
      const trigger = PARSER.parseTrigger(rule.trigger || '');
      if (trigger.type !== 'HP_THRESHOLD_ONCE') continue;

      const ctx = buildCondCtx(card, ownTeam || [], [], {});
      ctx.target = card;
      if (!evalRuleCondition(rule.condition || null, ctx)) continue;

      card._hpThresholdFired = true;
      const actionStr = rule.action_string || '';
      if (!actionStr) return null;
      return PARSER.parseAction(actionStr);
    }
    return null;
  }

  function checkHPState(card, ownTeam) {
    const results = [];
    const rules = card.Ability?.Rules || card.Ability?.rules || [];
    for (const rule of rules) {
      const trigger = PARSER.parseTrigger(rule.trigger || '');
      if (trigger.type !== 'HP_STATE') continue;

      const ctx = buildCondCtx(card, ownTeam || [], [], {});
      ctx.target = card;
      if (!evalRuleCondition(rule.condition || null, ctx)) continue;

      const actionStr = rule.action_string || '';
      if (!actionStr) continue;
      const action = PARSER.parseAction(actionStr);
      if (action) results.push(action);
    }
    return results;
  }

  function checkSurviveAbility(card) {
    return card._surviveProp === true && !card._surviveUsed;
  }

  function evalRosterEvent(eventSubtype, matchMode, side, joiningCard, ownTeam, fullRoster) {
    const results = [];
    const payload = {
      joiningTeamId: _getTeam(joiningCard),
      joiningPlayerId: _getPlayer(joiningCard),
      side,
      joiningCardId: joiningCard._instanceId,
    };

    const eventType = `ROSTER_${eventSubtype}`;

    if (eventSubtype === 'LEAVE_LAST') {
      const aliveMatches = (ownTeam || []).filter(c =>
        c && !c.isDead && c._instanceId !== joiningCard._instanceId &&
        (matchMode === 'TEAM_MATCH'
          ? _getTeam(c) === payload.joiningTeamId
          : c._duoPartners?.includes(payload.joiningPlayerId))
      );
      if (aliveMatches.length > 0) return results;
    }

    for (const card of (fullRoster || [])) {
      if (!card || card.isDead || card._instanceId === joiningCard._instanceId) continue;
      const rules = card.Ability?.Rules || card.Ability?.rules || [];
      for (const rule of rules) {
        const trigger = PARSER.parseTrigger(rule.trigger || '');
        if (trigger.type !== eventType) continue;
        if (trigger.matchMode !== matchMode) continue;
        if (trigger.side === 'enemy' && side !== 'enemy') continue;
        if (!_rosterMatchCheck(trigger, payload, card)) continue;

        const ctx = buildCondCtx(card, ownTeam || [], [], {});
        if (!evalRuleCondition(rule.condition || null, ctx)) continue;

        const actionStr = rule.action_string || '';
        if (!actionStr) continue;
        const action = PARSER.parseAction(actionStr);
        if (!action) continue;

        const targets = _resolveActionTargets(rule.action_target || 'Self', card, ownTeam || [], [], payload);
        const applied = _executeAction(action, targets, card, rule.td || null, ctx);
        results.push(...applied);
      }
    }
    return results;
  }

  function evalSelfCastAbilities(card, castNature, castType, subtype, skillId, ownTeam) {
    const flags = { noMiss: false, thisAttackBaseDmgBonus: 0, thisAttackSkillDmgBonus: 0, priorityBoost: 1 };
    const rules = card.Ability?.Rules || card.Ability?.rules || [];

    for (const rule of rules) {
      const trigger = PARSER.parseTrigger(rule.trigger || '');
      if (trigger.type !== 'SELF_CAST') continue;
      if (trigger.nature && !PARSER.natureMatches(trigger.nature, castNature, castType)) continue;
      if (trigger.skillId && trigger.skillId !== skillId) continue;
      if (trigger.subtype && trigger.subtype !== subtype) continue;
      if (!trigger.subtype && subtype) continue;

      const ctx = buildCondCtx(card, ownTeam || [], [], { castNature });
      if (!evalRuleCondition(rule.condition || null, ctx)) continue;

      const actionStr = rule.action_string || '';
      if (!actionStr) continue;
      const action = PARSER.parseAction(actionStr);
