      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    // ON:ENEMY_CAST mitigation
    let mitigationFlat = 0;
    let mitigationMult = 1.0;
    if (typeof ENGINE !== 'undefined' && ENGINE.evaluateEnemyCastTriggers) {
      const mit = ENGINE.evaluateEnemyCastTriggers(defs, atkC, defC, castNature, 'basic', defs, atks);
      mitigationFlat = mit.mitigationFlat || 0;
      mitigationMult = mit.mitigationMult != null ? mit.mitigationMult : 1.0;
    }

    // Reactive skills prompt
    const blocked = await promptReactiveSkills(act, null, atkC, defC, dIdx, isPlayer, defs, castNature);
    if (blocked) {
      processStackingTriggers(atkC, 'FAIL', castNature, 'basic', null, atks);
      await checkReboundTriggers(act, atkC, atks, isPlayer);
      await checkTeammateFail(act, atkC, defs, atks, isPlayer);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    // Compute basic DMG
    let dmgRaw = _getEffectiveDMG(atkC, false);
    if (selfCastFlags.thisAttackBaseDmgBonus) dmgRaw += selfCastFlags.thisAttackBaseDmgBonus;
    const stacks = _permanentStacks[ck];
    if (stacks?.baseDmg) dmgRaw += stacks.baseDmg;
    dmgRaw = Math.floor(dmgRaw * mitigationMult);
    dmgRaw = Math.max(0, dmgRaw - mitigationFlat);

    const { finalTarget: realTarget } = resolveRedirection(defC, dmgRaw, { card: atkC });

    if (typeof logMsg === 'function') {
      logMsg(isPlayer ? 'atk' : 'def', whoLabel,
        `[${atkC.battleRole}] ${shortName(getCardName(atkC))} → Basic Attack on [${realTarget.battleRole}] ${shortName(getCardName(realTarget))} — ${dmgRaw} DMG`);
    }

    const aSide = isPlayer ? 'player' : 'enemy';
    const dSide = isPlayer ? 'enemy' : 'player';
    if (typeof playCombatAnimation === 'function') {
      await playCombatAnimation(`${aSide}-${act.actorIdx}`, `${dSide}-${dIdx}`, dmgRaw, realTarget, dIdx, dSide);
    }

    if (realTarget.currentHp <= 0 && typeof handleKO === 'function') {
      handleKO(realTarget, dSide, dIdx);
    }

    // HP triggers on damaged card
    if (typeof ENGINE !== 'undefined') {
      if (ENGINE.checkHPThreshold) {
        const a = ENGINE.checkHPThreshold(realTarget, defs);
        if (a && ENGINE.applyPassiveFlag) ENGINE.applyPassiveFlag(realTarget, a);

      if (ENGINE.checkHPState) {

    if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);

  // ─────────────────────────────────────────────────────────────
  // SECTION 21 — AI SKILL CHOOSER
  // ─────────────────────────────────────────────────────────────

  /**
   * botChooseSkill(card, ownTeam, enemyTeam)
   * Returns { skillIdx, targetIdx } for the bot's action, or null for basic.
   * Prefers highest priority usable offensive skill.
   */
  function botChooseSkill(card, ownTeam, enemyTeam) {
    const vt = typeof getValidTargets === 'function' ? getValidTargets(card, enemyTeam) : [];
    if (!vt.length) return null;

    let bestSkill = null;
    let bestPriority = -Infinity;

    (card.Skills || []).forEach((sk, idx) => {
      if (!canUseSkill(card, idx)) return;
      const nature = getSkillNature(sk);
      // Bot only uses offensive / utility skills proactively
      if (nature.includes('Defensive')) return;
      const p = getEffectivePriority(card, sk);
      if (p > bestPriority) { bestPriority = p; bestSkill = { skillIdx: idx, targetIdx: vt[0].i }; }
    });

    return bestSkill;
  }

  // ─────────────────────────────────────────────────────────────
  // INTERNAL HELPERS
  // ─────────────────────────────────────────────────────────────

  /**
   * _resolveModifierTarget(targetStr, caster, selectedEnemy, ownTeam, enemyTeam, context)
   * Returns a card or array of cards.
   */
  function _resolveModifierTarget(targetStr, caster, selectedEnemy, ownTeam, enemyTeam, context) {
    if (!targetStr) return caster;
    const parts = targetStr.split(':');
    const subject = parts[0];

    switch (subject) {
      case 'Self':             return caster;
      case 'All_Ally':         return ownTeam.filter(c => c && !c.isDead);
      case 'All_Teammate':     return ownTeam.filter(c => c && !c.isDead && c !== caster);
      case 'All_Enemy':        return enemyTeam.filter(c => c && !c.isDead);
      case 'Selected_Enemy':   return selectedEnemy;
      case 'Casting_Teammate': return context?.castingTeammate || null;
      case 'Casting_Enemy':    return context?.castingEnemy    || null;
      case 'Targeted_Ally':    return context?.targetedAlly    || null;
      case 'Selected_Ally':    return caster; // fallback — requires UI selection
      case 'Selected_Teammate': {
        // Look for a position filter
        const posFilter = parts.find(p => p.startsWith('Active_Position:'));
        if (posFilter) {
          const pos = posFilter.split(':')[1];
          return ownTeam.find(c => c && !c.isDead && c !== caster && getCardPos(c).includes(pos)) || null;
        }
        return ownTeam.find(c => c && !c.isDead && c !== caster) || null;
      }
      default:
        return caster;
    }
  }

  /**
   * _evalSkillCondition(condStr, ctx)
   * Evaluates a skill-level condition string.
   */
  function _evalSkillCondition(condStr, ctx) {
    if (!condStr) return true;
    const lower = condStr.toLowerCase().trim();
    if (lower === 'always' || lower === '') return true;

    // Own_Team_Lead
    if (lower.includes('own_team_lead')) return ctx.ownTeamLead === true;
    // Coin_Flip handled at modifier level
    if (lower.includes('coin_flip')) return true;

    // Delegate to PARSER if available
    if (typeof PARSER !== 'undefined' && PARSER.evalCondition) {
      return PARSER.evalCondition(condStr, ctx);
    }
    return true;
  }

  /**
   * _parseAction(raw) — alias for PARSER.parseAction or inline fallback
   */
  function _parseAction(raw) {
    if (!raw || raw.trim() === '') return { type: 'NONE' };
    if (typeof PARSER !== 'undefined' && PARSER.parseAction) return PARSER.parseAction(raw);
    // Inline minimal fallback
    if (raw.startsWith('Deal_Flat_DMG:')) {
      return { type: 'DEAL_FLAT_DMG', value: parseInt(raw.split(':')[1]) || 0 };
    }
    if (raw === 'Block')    return { type: 'BLOCK' };
    if (raw === 'Contest')  return { type: 'CONTEST' };
    if (raw === 'Intercept') return { type: 'INTERCEPT' };
    if (raw === 'Freeze')   return { type: 'FREEZE' };
    if (raw === 'Nullify')  return { type: 'NULLIFY' };
    if (raw === 'Steal_Skill') return { type: 'STEAL_SKILL' };
    if (raw === 'Grant_Extra_Move') return { type: 'GRANT_EXTRA_MOVE', nature: null };
    if (raw.startsWith('Grant_Extra_Move:')) return { type: 'GRANT_EXTRA_MOVE', nature: raw.split(':')[1] };
    if (raw === 'Screen_Guarantee_Hit') return { type: 'SCREEN_GUARANTEE_HIT' };
    return { type: 'UNKNOWN', raw };
  }

  /**
   * _applyTimedStatBuff(card, stat, value, td)
   * Stores a timed buff. Respected by OTHER.html's endOfTurnCleanup().
   */
  function _applyTimedStatBuff(card, stat, value, td) {
    const ck = card._instanceId;
    if (typeof _statBuffs === 'undefined') return;
    if (!_statBuffs[ck]) _statBuffs[ck] = {};
    const existing = _statBuffs[ck][stat];
    if (existing) {
      existing.value += value;
      existing.turnsLeft = Math.max(existing.turnsLeft, td?.turns || 1);
    } else {
      _statBuffs[ck][stat] = {
        value,
        turnsLeft: td?.turns || 1,
        delay: td?.delay || 0,
        started: !td?.delay,
      };
    }
    if (typeof logMsg === 'function') {
      logMsg('sys', 'Stat Buff', `${shortName(getCardName(card))} +${value} ${stat} for ${td?.turns || 1} turns`);
    }
  }

  /**
   * _applyDrain(card, nature, td)
   * Stores a drain effect (disables specific natures for turns).
   */
  function _applyDrain(card, nature, td) {
    const ck = card._instanceId;
    if (!_skillDisables[ck]) _skillDisables[ck] = [];
    _skillDisables[ck].push({
      skillName: null,
      nature: nature,
      turnsLeft: td?.turns || 1,
    });
    if (typeof logMsg === 'function') logMsg('sys', 'Drain', `${shortName(getCardName(card))} ${nature} skills drained for ${td?.turns || 1} turns!`);
  }

  /**
   * _applyState(card, raw)
   * Handles Apply_State:Sixth_Man:Priority:-10:Targetable_Via_Teammate etc.
   */
  function _applyState(card, raw) {
    const parts = raw.split(':');
    const stateName = parts[0];
    switch (stateName) {
      case 'Sixth_Man':
        card._state = 'SIXTH_MAN';
        // Parse priority modifier
        const prIdx = parts.indexOf('Priority');
        if (prIdx >= 0) card._priorityBonus = (card._priorityBonus || 1) + (parseInt(parts[prIdx + 1]) || 0);
        // Targetable via teammate flag
        if (raw.includes('Targetable_Via_Teammate')) card._sixthManTargetViaTeammate = true;
        break;
      default:
        card._state = stateName;
    }
  }

  /**
   * _clearDebuffsOnCard(card) — nullify removes all global debuffs on target
   */
  function _clearDebuffsOnCard(card) {
    const ck = card._instanceId;
    delete _globalDebuffs[ck];
    delete _skillDisables[ck];
    if (typeof _frozen !== 'undefined') delete _frozen[ck];
    if (typeof _drained !== 'undefined') delete _drained[ck];
    if (typeof _shutdown !== 'undefined') delete _shutdown[ck];
  }

  /**
   * _processGrantedExtraMove(card, act, isPlayer)
   * Handles the extra move flag set by Grant_Extra_Move.
   */
  async function _processGrantedExtraMove(card, act, isPlayer) {
    const extraNature = card._grantedExtraMove;
    delete card._grantedExtraMove;
    const ck = card._instanceId;

    // Loop guard — already used
    if (_extraMoveUsedThisTurn.has(ck)) return;
    _extraMoveUsedThisTurn.add(ck);

    if (typeof logMsg === 'function') logMsg('sys', 'Extra Move', `${shortName(getCardName(card))} gets an extra move!`);

    // For bots, choose a skill or basic
    if (!isPlayer) {
      const atks = enemyActive;
      const defs = playerActive;
      const chosen = botChooseSkill(card, atks, defs);
      if (chosen) {
        await executeSkillAction({ ...act, skillIdx: chosen.skillIdx, targetIdx: chosen.targetIdx, actionType: 'skill' }, isPlayer);
      } else {
        const vt = typeof getValidTargets === 'function' ? getValidTargets(card, defs) : [];
        if (vt.length) await executeBasicAction({ ...act, targetIdx: vt[0].i, actionType: 'basic' }, isPlayer);
      }
    }
    // For player: the UI in OTHER.html will re-open the action panel flagged with extraNature filter
    // (flag is set via card._grantedExtraMove before deletion; UI checks it before deletion)
  }

  // ─────────────────────────────────────────────────────────────
  // PUBLIC API
  // ─────────────────────────────────────────────────────────────

  return {
    // Lifecycle
    initSkillCounters,
    resetSkillTurnCounters,
    resetExtraMoveGuards,

    // Use gate
    canUseSkill,
    consumeSkillUse,
    refundSkillUse,
    isSkillDisabled,

    // Core execution
    executeSkillAction,
    executeBasicAction,

    // Phase / nature helpers
    resolveSkillPhases,
    getSkillNature,
    skillHasProperty,
    getEffectivePriority,
    isDualUseSkill,
    resolveDualUseBranch,

    // Damage
    computeSkillDamage,

    // Reactions
    promptReactiveSkills,
    resolveDefensiveAction,
    resolveStealSkill,
    checkReboundTriggers,
    checkTeammateFail,

    // Stacking
    processStackingTriggers,

    // Modifiers
    executeModifier,
    consumeScreenGuarantee,
    resolveRedirection,
    clearRedirectionFlag,

    // Global debuffs
    applyGlobalDebuffEffects,
    tickGlobalDebuffs,
    gcGlobalDebuffsForCard,

    // Disables
    tickSkillDisables,

    // AI
    botChooseSkill,

    // End-of-turn cleanup delegates (called by OTHER.html's endOfTurnCleanup)
    tickAll() {
      tickGlobalDebuffs();
      tickSkillDisables();
      resetExtraMoveGuards();
    },

    // Expose internal state for OTHER.html's renderArena status badges
    get globalDebuffs() { return _globalDebuffs; },
    get skillDisables() { return _skillDisables; },
    get screenGuarantees() { return _screenGuarantee; },
    get permanentStacks() { return _permanentStacks; },
  };

})();

function getCardName(c) {

  return c?.UI_Frontend_Data?.Formatted_Name || c?.BasicInfo?.FormattedName || c?.UI_Frontend_Data?.Name || c?.BasicInfo?.PlayerName || 'Unknown';

function cloneCard(c, team) {
  const cc = JSON.parse(JSON.stringify(c));
  cc.currentHp      = getCardHP(cc);
  cc.isDead         = false;
  cc._instanceId    = mkId(team, getCardName(cc));
  cc._priorityMult  = 1;
  cc._activeRound   = 0;
  cc._teamRef       = team;

  // Boot passive ability flags (ON:ALWAYS + ON:DEPLOY rules)
  ENGINE.bootPassiveAbilities(cc, [], null);

  // Init skill use counters from UM string
  (cc.Skills || []).forEach(sk => {
    const um = PARSER.parseUM(sk.UM);
    sk._usesLeft      = isFinite(um.maxUses)    ? um.maxUses    : Infinity;
    sk._usesThisTurn  = 0;
    sk._priority      = um.priority;
    sk._usesPerTurn   = isFinite(um.usesPerTurn)? um.usesPerTurn: Infinity;
    // FIX: Use PARSER.parseTD instead of ENGINE.parseTD
    sk._td            = PARSER.parseTD(sk.TD || sk.td || 'DEFAULT');
    sk._isReactive    = (sk.Timing || '').startsWith('Reactive');
    sk._isFree        = (sk.Timing || '').includes('_Free');
  });
  return cc;
}
function buildEnemyRoster() {
  const dr = {PG:[],SG:[],SF:[],PF:[],C:[]};
  const p = [...CARDS].sort(() => Math.random() - .5);
  for (const c of p) {
    for (const po of getCardPos(c)) {
      if (POSITIONS.includes(po) && dr[po].length < 2) {
        if (!POSITIONS.some(x => dr[x].some(y => getCardName(y) === getCardName(c)))) {
          dr[po].push(c); break;
        }
      }
    }
    if (POSITIONS.every(x => dr[x].length >= 2)) break;
  }
  const st = [], be = [];
  POSITIONS.forEach(po => {
    if (dr[po][0]) { const c = cloneCard(dr[po][0],'enemy'); c.battleRole=po; c._activeRound=1; st.push(c); }
    if (dr[po][1]) { const c = cloneCard(dr[po][1],'enemy'); c.battleRole=po; be.push(c); }
  });
  _fireEnterActiveLineupEffects(st, be, 'enemy');
  _evalFullRosterSynergies(st, [...st,...be], 'own');
  return {st, be};
}

let playerActive=[], playerBench=[], enemyActive=[], enemyBench=[];

function startBattle() {
  playerActive = POSITIONS.map(po => {
    if (!activeLineup[po]) return null;
    const c = cloneCard(activeLineup[po], 'player');
    c.battleRole = po;
    c._activeRound = 1;
    return c;
  }).filter(Boolean);

  playerBench = benchRoster
    .filter(c => !playerActive.some(ac => getCardName(ac) === getCardName(c)))
    .map(c => cloneCard(c, 'player'));

  const eR = buildEnemyRoster();
  enemyActive = eR.st;
  enemyBench  = eR.be;

  playerScore=0; enemyScore=0; turnCount=1; stagedActions=[]; uiState='IDLE';
  _statBuffs={}; _activeEffects=[]; _synergyApplied=new Set();
  _frozen={}; _shutdown={}; _shutdownDelays={}; _drained={};
  _invulnerable={}; _screened={}; _surviveUsed={};

  _fireEnterActiveLineupEffects(playerActive, playerBench, 'player');
  _evalFullRosterSynergies(playerActive, [...playerActive,...playerBench], 'own');
  _evalFullRosterSynergies(enemyActive,  [...enemyActive,...enemyBench],   'own');

  $('battle-log').innerHTML = '';
  logMsg('sys','System','Match initiated. First to 8 KOs wins.');
  $('score-player').textContent='0'; $('score-enemy').textContent='0';
  $('checkout-panel').style.display='none';
  $('turn-indicator').textContent='TURN 1 — STAGING';
  showScreen('battle-screen'); initBattleAudio(); renderArena();
}

function _fireEnterActiveLineupEffects(activeArr, benchArr, side) {
  activeArr.forEach(card => {
    if (!card) return;
    card._activeRound = 1;
    const effects = ENGINE.bootEnterActiveLineup(card, activeArr, [...activeArr,...benchArr]);
    effects.forEach(({ targetCard, action, td }) => {
      if (action.type === 'UNTARGETABLE_BY') {
        ENGINE._applyUntargetableFlags(targetCard, action.spec);
        if (!targetCard._timedUntargetable) targetCard._timedUntargetable = [];
        targetCard._timedUntargetable.push({ spec: action.spec, expires: turnCount + (td.turns || 1) });
      } else {
        ENGINE.applyPassiveFlag(targetCard, action);
      }
    });
  });
}

function _evalFullRosterSynergies(activeArr, fullRoster, side) {
  activeArr.forEach(card => {
    if (!card) return;
    ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', side, card, activeArr, fullRoster);
    ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', side, card, activeArr, fullRoster);
  });
}

function _getSortedActions(actions) {
  return [...actions].sort((a, b) => {
    const aTeam  = a.execTeam === 'player' ? playerActive : enemyActive;
    const bTeam  = b.execTeam === 'player' ? playerActive : enemyActive;
    const aC = aTeam[a.actorIdx];
    const bC = bTeam[b.actorIdx];
    if (!aC || !bC) return 0;
    const aSk = a.actionType === 'skill' && a.skillIdx != null ? aC.Skills?.[a.skillIdx] : null;
    const bSk = b.actionType === 'skill' && b.skillIdx != null ? bC.Skills?.[b.skillIdx] : null;
    const aPri = (getCardSPD(aC) + (ENGINE.getPriorityBoost ? ENGINE.getPriorityBoost(aC, aSk?.Nature || 'Base') : 0)) * (aC._priorityMult || 1);
    const bPri = (getCardSPD(bC) + (ENGINE.getPriorityBoost ? ENGINE.getPriorityBoost(bC, bSk?.Nature || 'Base') : 0)) * (bC._priorityMult || 1);
    return bPri - aPri;
  });
}

async function confirmMovesPhase() {
  if (isAnimating) return;
  isAnimating = true;
  setTooltipEnabled(false);
  $('checkout-panel').style.display='none';
  $('action-panels-wrapper').classList.remove('visible');
  $('turn-indicator').textContent = `TURN ${turnCount} — EXECUTING`;

  const botActions = _botStageMoves();
  const allActions = _getSortedActions([...stagedActions, ...botActions]);

  for (const act of allActions) {
    const team = act.execTeam === 'player' ? playerActive : enemyActive;
    const actor = team[act.actorIdx];
    if (!actor || actor.isDead) continue;

    if (act.actionType === 'skill') {
      await SKILL_ENGINE.executeSkillAction(act, act.execTeam === 'player');
    } else if (act.actionType === 'basic') {
      await SKILL_ENGINE.executeBasicAction(act, act.execTeam === 'player');
    } else if (act.actionType === 'swap') {
      await _executeSwap(act);
    } else if (act.actionType === 'pass') {
      logMsg('sys', act.execTeam === 'player' ? 'You' : 'Bot',
        `${shortName(getCardName(actor))} passes.`);
    }

    if (_checkEndGame()) { isAnimating = false; return; }
    await delay(120);
  }

  _endOfTurnCleanup();
  turnCount++;
  $('turn-indicator').textContent = `TURN ${turnCount} — STAGING`;

  stagedActions = [];
  _resetTurnCounters();

  [...playerActive, ...enemyActive].forEach(c => { if (c && !c.isDead) c._activeRound = (c._activeRound || 0) + 1; });

  [...playerActive, ...enemyActive].forEach(c => {
    if (c && !c.isDead && c._survivedLastTurn) {
      const act = ENGINE.evalTurnStartAfterSurvive ? ENGINE.evalTurnStartAfterSurvive(c, c._teamRef === 'player' ? playerActive : enemyActive) : null;
      if (act) ENGINE.applyPassiveFlag(c, act);
      c._survivedLastTurn = false;
    }
  });

  isAnimating = false;
  setTooltipEnabled(true);
  renderArena();
}

function _endOfTurnCleanup() {
  tickBuffs();
  tickSkillDisables();
  tickContestTracking();
  tickEffects();
  
  const all = [...playerActive, ...playerBench, ...enemyActive, ...enemyBench];
  
  // Safe iteration
  all.forEach(c => { 
    if (c && !c.isDead) {
       try {
          if (ENGINE.tickCardEffects) ENGINE.tickCardEffects(c);
       } catch (e) {
          console.warn("Cleanup error on " + _getName(c), e);
       }
    } 
  });
  
  if (ENGINE.clearRestOfTurnFlags) ENGINE.clearRestOfTurnFlags(all);
  if (SKILL_ENGINE.resetExtraMoveGuards) SKILL_ENGINE.resetExtraMoveGuards();
  if (currentLogTab === 'effects') renderEffectsPanel();
}

function _resetTurnCounters() {
  [...playerActive, ...playerBench, ...enemyActive, ...enemyBench].forEach(c => {
    if (!c) return;
    (c.Skills || []).forEach(sk => { sk._usesThisTurn = 0; });
    c._priorityMult = 1;
  });
}

async function _executeSwap(act) {
  const isP  = act.execTeam === 'player';
  const atks = isP ? playerActive : enemyActive;
  const bArr = isP ? playerBench  : enemyBench;
  const leavingCard = atks[act.actorIdx];
  const incoming    = bArr[act.targetIdx];
  if (!incoming || !leavingCard) return;

  const whoLabel = isP ? 'You' : 'Bot';
  const fullAll = [...atks, ...bArr];

  ENGINE.gcAuras(leavingCard, fullAll);

  incoming.battleRole = leavingCard.battleRole;
  if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
  atks[act.actorIdx] = incoming;
  bArr[act.targetIdx] = leavingCard;

  logMsg('sys', whoLabel, `Swap: ${shortName(getCardName(leavingCard))} → ${shortName(getCardName(incoming))}`);

  incoming._activeRound = 1;
  incoming._teamRef = act.execTeam;
  ENGINE.bootPassiveAbilities(incoming, atks, incoming.battleRole);

  const effects = ENGINE.bootEnterActiveLineup(incoming, atks, [...atks,...bArr]);
  effects.forEach(({ targetCard, action }) => {
    if (action.type === 'UNTARGETABLE_BY') ENGINE._applyUntargetableFlags(targetCard, action.spec);
    else ENGINE.applyPassiveFlag(targetCard, action);
  });

  const fullRoster = [...atks, ...bArr];
  ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', 'own', incoming, atks, fullRoster);
  ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', 'own', incoming, atks, fullRoster);

  const exitId = leavingCard.UI_Frontend_Data?.Player_ID || leavingCard._instanceId;
  ENGINE.evalCardExitTriggers(exitId, atks, fullRoster);

  renderArena(); renderBenchStacks();
  await delay(700);
}

async function playCombatAnimation(atkId, defId, dmgIn, targetObj, defIdx, defTeamStr) {
  const aE = document.getElementById(`wrap-${atkId}`);
  const dE = document.getElementById(`wrap-${defId}`);
  if (aE) aE.classList.add('doing-attack');
  await delay(360);

  if (targetObj._dmgReductionFlat && !targetObj._passiveReductionApplied) {
    dmg = Math.max(0, dmg - targetObj._dmgReductionFlat);
    targetObj._dmgReductionFlat = 0;
    logMsg('block','Mitigation',`Damage reduced! → ${dmg}`);
  }
  playAttackSound();
  if (dE && dmg > 0) {
    dE.querySelector('.battle-card')?.classList.add('anim-shake');
    const p = document.createElement('div'); p.className='dmg-popup'; p.textContent=`-${dmg}`;
    (dE.querySelector('.battle-card')||dE).appendChild(p);
    setTimeout(() => { dE.querySelector('.battle-card')?.classList.remove('anim-shake'); p.remove(); }, 900);
  }
  targetObj.currentHp = Math.max(0, targetObj.currentHp - dmg);

  const hpt = document.getElementById(`hpt-${defId}`);
  if (hpt) hpt.textContent = `${targetObj.currentHp}/${hpMax}`;

function handleKO(defCard, teamStr, dIdx) {
  if (defCard.currentHp > 0) return;
  if (_tryActivateSurvive(defCard)) { renderArena(); return; }
  defCard.isDead = true;

  const allCards = [...playerActive,...playerBench,...enemyActive,...enemyBench];
  ENGINE.gcAuras(defCard, allCards);
  ENGINE.clearCardAuras(defCard);

  if (teamStr === 'enemy') playerScore++; else enemyScore++;
  $('score-player').textContent = playerScore;
  $('score-enemy').textContent  = enemyScore;

  const cardEl = document.getElementById(`card-${teamStr}-${dIdx}`);
  if (cardEl) cardEl.classList.add('dead-card');
  logMsg('ko','KO',`${shortName(getCardName(defCard))} knocked out!`);
  removeEffectsForTarget(defCard._instanceId);

  const isPlayer = teamStr === 'player';
  const ownTeam  = isPlayer ? playerActive : enemyActive;
  const ownBench = isPlayer ? playerBench  : enemyBench;
  const fullRoster = [...ownTeam, ...ownBench].filter(c => c && !c.isDead);
  const exitId = defCard.UI_Frontend_Data?.Player_ID || defCard._instanceId;
  ENGINE.evalCardExitTriggers(exitId, ownTeam, fullRoster);

  _autoSubFromBench(teamStr, dIdx);
}

function _autoSubFromBench(teamStr, dIdx) {
  const isP  = teamStr === 'player';
  const atks = isP ? playerActive : enemyActive;
  const bArr = isP ? playerBench  : enemyBench;
  const alive = bArr.filter(c => c && !c.isDead);
  if (!alive.length) return;
  const incoming = alive[0];
  incoming.battleRole = atks[dIdx].battleRole;
  if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
  atks[dIdx] = incoming;
  const bi = bArr.indexOf(incoming);
  if (bi !== -1) bArr.splice(bi, 1);
  incoming._activeRound = 1;
  incoming._teamRef = teamStr;
  ENGINE.bootPassiveAbilities(incoming, atks, incoming.battleRole);
  const fullRoster = [...atks, ...bArr];
  _fireEnterActiveLineupEffects([incoming], bArr, isP ? 'player' : 'enemy');
  ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', 'own', incoming, atks, fullRoster);
  ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', 'own', incoming, atks, fullRoster);
  logMsg('sys', isP?'You':'Bot', `${shortName(getCardName(incoming))} enters the game!`);
  renderArena(); renderBenchStacks();
}

function _tryActivateSurvive(card) {
  if (!card || card.currentHp > 0) return false;
  const id = card._instanceId;
  if (_surviveUsed[id]) return false;

  const threshold = ENGINE.checkHPThreshold(card, []);
  if (threshold && (threshold.type === 'STAT_BUFF_HP' || threshold.type === 'STAT_BUFF_MAX_HP')) {
    _surviveUsed[id] = true;
    ENGINE.applyPassiveFlag(card, threshold);
    card.currentHp = Math.max(1, card.currentHp);
    logMsg('sys','System',`${shortName(getCardName(card))} survives with ${card.currentHp} HP!`);
    addTrackedEffect('HP Threshold', id, shortName(getCardName(card)), 'survive', 'Survived — HP recovered', 1);
    return true;
  }

  if (!ENGINE.checkSurviveAbility(card)) return false;

  _surviveUsed[id] = true;
  card.currentHp = 1;
  _frozen[id] = true;
  card._survivedLastTurn = true;
  logMsg('sys','System',`${shortName(getCardName(card))} survives at 1 HP!`);
  addTrackedEffect('Survive', id, shortName(getCardName(card)), 'survive', 'Survived at 1 HP', 1);
  _checkHPTriggers(card, []);
  return true;
}

function _checkHPTriggers(card, ownTeam) {
  const threshold = ENGINE.checkHPThreshold(card, ownTeam);
  if (threshold) {
    logMsg('sys','System',`${shortName(getCardName(card))} HP Threshold triggered!`);
    ENGINE.applyPassiveFlag(card, threshold);
  }
  const states = ENGINE.checkHPState(card, ownTeam);
  states.forEach(action => {
    ENGINE.applyPassiveFlag(card, action);
    if (action.type === 'APPLY_PROP_UNTARGETABLE') {
      logMsg('sys','System',`${shortName(getCardName(card))} is untargetable this turn!`);
      addTrackedEffect('HP Event', card._instanceId, shortName(getCardName(card)), 'untargetable', 'Untargetable: REST_OF_TURN', 1);
    }
  });
}

function _checkEndGame() {
  if (playerScore >= 8 || !playerActive.some(c=>c&&!c.isDead) && !playerBench.some(c=>c&&!c.isDead)) {
    _showEndGame(playerScore >= 8 ? 'YOU WIN!' : 'YOU LOSE!', playerScore >= 8 ? '🏆 First to 8 KOs — Victory!' : '😤 All cards eliminated.');
    return true;
  }
  if (enemyScore >= 8 || !enemyActive.some(c=>c&&!c.isDead) && !enemyBench.some(c=>c&&!c.isDead)) {
    _showEndGame('YOU LOSE!', `Opponent reached ${enemyScore} KOs.`);
    return true;
  }
  return false;
}
function _showEndGame(title, desc) {
  $('endgame-title').textContent = title;
  $('endgame-desc').textContent  = desc;
  $('endgame-modal').style.display = 'flex';
}

function getValidTargets(attacker, enemyTeam) {
  const role = attacker.battleRole || 'PG';
  const allowed = TARGET_MATRIX[role] || POSITIONS;
  return enemyTeam
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => {
      if (!c || c.isDead) return false;
      if (c._fullyUntargetable) return false;
      const dck = c._instanceId;
      if (_shutdown[dck]) {
        const sdDelay = (_shutdownDelays && _shutdownDelays[dck]) || 0;
        if (_shutdown[dck] > sdDelay) return false;
      }
      if (c._state === 'Sixth_Man') {
        const hasTeammate = enemyTeam.some(t => t && !t.isDead && t !== c);
        if (!hasTeammate) return false;
      }
      return allowed.includes(c.battleRole);
    });
}


// ============================================================
// §7 — STATE & EFFECT MANAGEMENT
// ============================================================

let _statBuffs = {};

function ensureBuff(id) {
  if (!_statBuffs[id]) _statBuffs[id] = {dmgBonus:0,basicBonus:0,skillBonus:0,turnsLeft:999,started:true,delay:0};
}
function getBuff(id) {
  const b = _statBuffs[id];
  if (!b || !b.started || b.delay > 0) return null;
  return b;
}

function getEffectiveDMG(card, isSkill = false, castNature = '') {
  const base = getCardDMG(card);
  const b    = getBuff(card._instanceId);
  let total  = base + (b ? (b.dmgBonus || 0) + (isSkill ? (b.skillBonus||0) : (b.basicBonus||0)) : 0);
  if (card._stackBuffs) {
    total += card._stackBuffs.DMG || 0;
    if (isSkill) total += card._stackBuffs.Skill_DMG || 0;
    else         total += card._stackBuffs.Basic_DMG  || 0;
  }
  if (card._thisAttackBuffs) {
    total += card._thisAttackBuffs.DMG || 0;
    if (isSkill) total += card._thisAttackBuffs.Skill_DMG || 0;
    else         total += card._thisAttackBuffs.Basic_DMG  || 0;
  }
  return Math.max(0, total);
}

function tickBuffs() {
  Object.keys(_statBuffs).forEach(k => {
    const b = _statBuffs[k];
    if (!b.started) {
      b.delay--;
      if (b.delay <= 0) { b.started = true; logMsg('eff','Effect',`Delayed buff activates!`); }
      return;
    }
    if (b.turnsLeft !== 999) { b.turnsLeft--; if (b.turnsLeft <= 0) delete _statBuffs[k]; }
  });
}

function addTimedBuff(card, bonusObj, turns, delayTurns) {
  ensureBuff(card._instanceId);
  const b = _statBuffs[card._instanceId];
  Object.assign(b, bonusObj);
  b.turnsLeft = turns || 999;
  b.delay = delayTurns || 0;
  b.started = (b.delay <= 0);
}

let _skillDisables = {};

function tickSkillDisables() {
  Object.keys(_skillDisables).forEach(k => {
    _skillDisables[k] = _skillDisables[k].filter(d => { d.turnsLeft--; return d.turnsLeft > 0; });
    if (_skillDisables[k].length === 0) delete _skillDisables[k];
  });
}
function isSkillDisabled(targetId, skillName) {
  const dis = _skillDisables[targetId];
  if (!dis) return false;
  return dis.some(d => d.all || d.skillName === skillName);
}
function addSkillDisable(targetId, skillName, turnsLeft, sourceName, all) {
  if (!_skillDisables[targetId]) _skillDisables[targetId] = [];
  _skillDisables[targetId].push({ skillName, turnsLeft, sourceName, all: !!all });
}

let _contestTracking = {};

function tickContestTracking() {
  Object.keys(_contestTracking).forEach(k => {
    _contestTracking[k].turnsLeft--;
    if (_contestTracking[k].turnsLeft <= 0) delete _contestTracking[k];
  });
}
function isGloballyContested(natureFilter) {
  for (const k of Object.keys(_contestTracking)) {
    const ct = _contestTracking[k];
    const nLow = (ct.natureFilter || '').toLowerCase();
    const aLow = (natureFilter || '').toLowerCase();
    if (nLow && aLow.includes(nLow.replace('offensive:', ''))) return true;
  }
  return false;
}

let _activeEffects = [], _effectIdCounter = 0;

function addTrackedEffect(sourceName, targetId, targetName, type, description, turnsLeft) {
  _effectIdCounter++;
  _activeEffects.push({ id:_effectIdCounter, sourceName, targetId, targetName, type, description, turnsLeft, active:true });
}
function tickEffects() { _activeEffects = _activeEffects.filter(e => { e.turnsLeft--; return e.turnsLeft > 0; }); }
function removeEffectsForTarget(targetId) { _activeEffects = _activeEffects.filter(e => e.targetId !== targetId); }

let _frozen = {}, _shutdown = {}, _shutdownDelays = {}, _drained = {};
let _invulnerable = {}, _screened = {}, _surviveUsed = {}, _synergyApplied = new Set();

let _tooltipEnabled = true;
function setTooltipEnabled(v) { if(!v) hideTooltip(); _tooltipEnabled=v; }
function showTooltip(e, name) {
  if (!_tooltipEnabled) return;
  const tt=$('tooltip'); if(!tt) return;
  const c=CARDS.find(x=>getCardName(x)===name); if(!c) return;
  const ab=getAbility(c);
  const abHtml=ab?`<div class="tt-ability">${ab.Name}</div><div style="color:rgba(255,255,255,.4);font-size:.6rem;">${ab.Description_UI||''}</div>`:'';
  const sHtml=getCardSkills(c).map(s=>`<div class="tt-skill"><span class="tt-skill-name">${s.Name}</span> <span class="tt-skill-dmg">${s.Display_DMG}</span><div class="tt-skill-desc">${s.Description_UI}</div></div>`).join('');
  tt.innerHTML=`<div class="tt-name">${shortName(name)}</div>${abHtml}${sHtml}`;
  tt.classList.add('visible'); positionTooltip(e);
}
function hideTooltip() { const tt=$('tooltip'); if(tt) tt.classList.remove('visible'); }
function positionTooltip(e) {
  const tt=$('tooltip'); if(!tt||!tt.classList.contains('visible')) return;
  const x=e.touches?e.touches[0].clientX:e.clientX, y=e.touches?e.touches[0].clientY:e.clientY;
  const tw=tt.offsetWidth, th=tt.offsetHeight, pad=10;
  let px=x+15, py=y+15;
  if(px+tw>window.innerWidth-pad) px=x-tw-15;
  if(py+th>window.innerHeight-pad) py=y-th-15;
  tt.style.left=Math.max(pad,px)+'px'; tt.style.top=Math.max(pad,py)+'px';
}
function isInnerRegion(e, el) {
  if(!el) return true; const r=el.getBoundingClientRect();
  const mx=e.touches?e.touches[0].clientX:e.clientX, my=e.touches?e.touches[0].clientY:e.clientY;
  return mx>r.left+r.width*.15&&mx<r.right-r.width*.15&&my>r.top+r.height*.15&&my<r.bottom-r.height*.15;
}
function handleTooltipHover(e, name, el) { if(isInnerRegion(e,el)){showTooltip(e,name);positionTooltip(e);}else hideTooltip(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=$(id); if(el) el.classList.add('active');
  window.scrollTo(0,0);
  if(id!=='battle-screen') stopBgMusic();
}

let _drag={active:false,moved:false,startX:0,startY:0,name:'',imgSrc:'',context:'',el:null,ghost:null,origW:0,origH:0,imgLayer:null,textLayer:null,sourceEl:null,suppressClick:false,nearSlot:null,slotDist:Infinity};
const POS_CLR={PG:'var(--pos-pg)',SG:'var(--pos-sg)',SF:'var(--pos-sf)',PF:'var(--pos-pf)',C:'var(--pos-c)'};
const SNAP_RADIUS=60;

function _killGhost(){const g=document.getElementById('active-drag-ghost');if(g)g.remove();document.querySelectorAll('.morph-target,.proximity-glow').forEach(e=>e.classList.remove('morph-target','proximity-glow'));_drag.ghost=null;}
function _posGhost(cx,cy,forceSnap){
  if(!_drag.ghost)return;
  const w=parseFloat(_drag.ghost.style.width),h=parseFloat(_drag.ghost.style.height);
  const tgt=forceSnap||(_drag.nearSlot&&_drag.slotDist<SNAP_RADIUS?_drag.nearSlot:null);
  if(tgt){const sr=tgt.getBoundingClientRect();const sx=sr.left+sr.width/2,sy=sr.top+sr.height/2,d=forceSnap?0:_drag.slotDist,pull=Math.pow(Math.max(0,1-d/SNAP_RADIUS),2.2);_drag.ghost.style.left=(cx+(sx-cx)*pull-w/2)+'px';_drag.ghost.style.top=(cy+(sy-cy)*pull-h/2)+'px';}
  else{_drag.ghost.style.left=(cx-w/2)+'px';_drag.ghost.style.top=(cy-h/2)+'px';}
}
function _nearestSlot(cx,cy){
  const sel=_drag.context==='draft'?'#draft-slots-vertical [data-slot]':'#setup-slots [data-slot]';
  let best=null,bestD=Infinity;
  document.querySelectorAll(sel).forEach(s=>{const r=s.getBoundingClientRect();const d=Math.hypot(cx-(r.left+r.width/2),cy-(r.top+r.height/2));if(d<bestD){bestD=d;best=s;}});
  return{slot:best,dist:bestD};
}
function _createDraftGhost(name,imgSrc){
  const card=CARDS.find(x=>getCardName(x)===name)||null;const pos=card?getCardPos(card)[0]:'N/A';const sn=card?getDBShortName(getCardName(card)):name;const hp=card?getCardHP(card):0,dmg=card?getCardDMG(card):0;const pc=POS_CLR[pos]||'var(--text-muted)';
  const g=document.createElement('div');g.id='active-drag-ghost';g.style.cssText='position:fixed;pointer-events:none;z-index:99999;overflow:hidden;background:#1a1a2e;transition:width .08s,height .08s,border-radius .08s,box-shadow .08s,transform .08s;';
  const il=document.createElement('div');il.className='morph-img';il.style.cssText='position:absolute;inset:0;transition:opacity .1s;';il.innerHTML=`<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  const tl=document.createElement('div');tl.className='morph-text';tl.style.cssText=`position:absolute;inset:0;display:flex;align-items:center;gap:6px;padding:0 10px;opacity:0;transition:opacity .1s;background:var(--surface-2);border:1.5px solid var(--border-heavy);border-radius:inherit;`;
  tl.innerHTML=`<span style="font-weight:900;font-size:.85rem;color:${pc};">${pos}</span><span style="font-weight:700;font-size:.72rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${sn}</span><span style="font-size:.62rem;color:var(--text-muted);">${hp}HP ${dmg}DMG</span>`;
  g.appendChild(il);g.appendChild(tl);document.body.appendChild(g);return{ghost:g,imgLayer:il,textLayer:tl};
}
function _createSetupGhost(imgSrc){
  const g=document.createElement('div');g.id='active-drag-ghost';g.style.cssText='position:fixed;pointer-events:none;z-index:99999;overflow:hidden;border-radius:10px;border:2px solid rgba(232,98,26,.5);transition:transform .12s,box-shadow .12s;';
  g.innerHTML=`<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;display:block;">`;document.body.appendChild(g);return g;
}
function initDraftDrag(el,name,imgSrc){
  el.addEventListener('mousedown',e=>{if(e.button!==0)return;e.preventDefault();const{ghost,imgLayer,textLayer}=_createDraftGhost(name,imgSrc);Object.assign(_drag,{active:true,moved:false,startX:e.clientX,startY:e.clientY,name,imgSrc,context:'draft',el,ghost,imgLayer,textLayer,sourceEl:null,nearSlot:null,slotDist:Infinity});_drag.origW=el.offsetWidth;_drag.origH=el.offsetHeight;ghost.style.width=_drag.origW+'px';ghost.style.height=_drag.origH+'px';ghost.style.borderRadius='10px';ghost.style.transform='scale(1.05)';ghost.style.boxShadow='0 14px 32px rgba(0,0,0,.45)';_posGhost(e.clientX,e.clientY);el.classList.add('dragging');document.body.style.userSelect='none';});
}
function initSetupDrag(el,name,imgSrc){
  el.addEventListener('mousedown',e=>{if(e.button!==0)return;e.preventDefault();const ghost=_createSetupGhost(imgSrc);Object.assign(_drag,{active:true,moved:false,startX:e.clientX,startY:e.clientY,name,imgSrc,context:'setup',el,ghost,imgLayer:null,textLayer:null,sourceEl:el,nearSlot:null,slotDist:Infinity});_drag.origW=el.offsetWidth;_drag.origH=el.offsetHeight;ghost.style.width=_drag.origW+'px';ghost.style.height=_drag.origH+'px';ghost.style.transform='scale(1)';ghost.style.boxShadow='0 12px 28px rgba(0,0,0,.35)';_posGhost(e.clientX,e.clientY);el.style.opacity='0.15';el.style.transform='scale(.92)';document.body.style.userSelect='none';});
}
document.addEventListener('mousemove',e=>{
  if(!_drag.active)return;const dx=e.clientX-_drag.startX,dy=e.clientY-_drag.startY;if(Math.abs(dx)>4||Math.abs(dy)>4)_drag.moved=true;
  const{slot,dist}=_nearestSlot(e.clientX,e.clientY);const g=_drag.ghost;if(!g)return;
  document.querySelectorAll('.morph-target,.proximity-glow').forEach(x=>x.classList.remove('morph-target','proximity-glow'));
  if(_drag.context==='draft'&&_drag.imgLayer&&_drag.textLayer){
    const MR=120,SR=25;
    if(slot&&dist<MR){const t=Math.max(0,Math.min(1,1-(dist-SR)/(MR-SR)));const sr=slot.getBoundingClientRect();g.style.width=(_drag.origW+(sr.width-_drag.origW)*t)+'px';g.style.height=(_drag.origH+(sr.height-_drag.origH)*t)+'px';g.style.borderRadius=(10+(8-10)*t)+'px';g.style.transform=`scale(${1.05+(1-1.05)*t})`;_drag.imgLayer.style.opacity=(1-t).toFixed(3);_drag.textLayer.style.opacity=t.toFixed(3);if(dist<=SR)slot.classList.add('morph-target');}
    else{g.style.width=_drag.origW+'px';g.style.height=_drag.origH+'px';g.style.borderRadius='10px';g.style.transform='scale(1.05)';_drag.imgLayer.style.opacity='1';_drag.textLayer.style.opacity='0';}
  }else if(_drag.context==='setup'){if(slot&&dist<55){g.style.transform='scale(.95)';g.style.borderColor='rgba(232,98,26,.8)';slot.classList.add('proximity-glow');}else{g.style.transform='scale(1)';g.style.borderColor='rgba(232,98,26,.5)';}}
  _posGhost(e.clientX,e.clientY);_drag.nearSlot=slot;_drag.slotDist=dist;
});
document.addEventListener('mouseup',e=>{
  if(!_drag.active)return;const jd=_drag.moved;_drag.active=false;_drag.moved=false;document.body.style.userSelect='';document.querySelectorAll('.dragging').forEach(x=>x.classList.remove('dragging'));
  if(_drag.nearSlot&&_drag.slotDist<=SNAP_RADIUS){
    if(_drag.ghost){_drag.ghost.style.transition='left .07s,top .07s';_posGhost(e.clientX,e.clientY,_drag.nearSlot);}
    if(_drag.context==='draft'){const pos=_drag.nearSlot.dataset.slot.split('-')[0];const card=CARDS.find(x=>getCardName(x)===_drag.name);if(!card||isCardInDraft(card)||!getCardPos(card).includes(pos)){_killGhost();_rejectDraftSlot(_drag.nearSlot);if(jd)_drag.suppressClick=true;return;}}
    else if(_drag.context==='setup'){const pos=_drag.nearSlot.dataset.slot.replace('setup-','');const card=benchRoster.find(x=>getCardName(x)===_drag.name);if(!card||!getCardPos(card).includes(pos)){if(_drag.sourceEl){_drag.sourceEl.style.opacity='';_drag.sourceEl.style.transform='';}_rejectSetupSlot(_drag.nearSlot,_drag.sourceEl);if(jd)_drag.suppressClick=true;return;}}
    _drag.nearSlot.dispatchEvent(new CustomEvent('physdrop',{bubbles:true,detail:{name:_drag.name}}));const ns=_drag.nearSlot;ns.classList.remove('morph-target','proximity-glow');ns.classList.add(_drag.context==='setup'?'snap-lock':'slot-snap-settle');setTimeout(()=>ns.classList.remove('snap-lock','slot-snap-settle'),400);
    if(jd)_drag.suppressClick=true;setTimeout(()=>{if(_drag.context==='setup'&&_drag.sourceEl){_drag.sourceEl.style.opacity='';_drag.sourceEl.style.transform='';}_killGhost();},80);return;
  }
  if(_drag.context==='setup'&&_drag.sourceEl){_drag.sourceEl.style.opacity='';_drag.sourceEl.style.transform='';}
  _killGhost();if(jd)_drag.suppressClick=true;
});
function _rejectDraftSlot(s){s.classList.add('reject-shake');setTimeout(()=>s.classList.remove('reject-shake'),400);const p=s.querySelector('.slot-pos');if(p){const o=p.textContent;p.textContent='INVALID';p.style.color='#FF0000';setTimeout(()=>{p.textContent=o;p.style.color='';},800);}}
function _rejectSetupSlot(s,src){if(_drag.ghost&&src){const sr=src.getBoundingClientRect(),g=_drag.ghost;g.style.transition='left .2s,top .2s,opacity .2s,transform .2s';g.style.left=sr.left+'px';g.style.top=sr.top+'px';g.style.opacity='0';g.style.transform='scale(.9)';const ref=g;setTimeout(()=>ref.remove(),240);_drag.ghost=null;src.style.opacity='';src.style.transform='';}else _killGhost();s.classList.add('reject-shake-h');setTimeout(()=>s.classList.remove('reject-shake-h'),400);}

let expandedCardCat = null;

function goCat() { showScreen('catalogue-screen'); filterCat(); }
function filterCat() {
  const q=($('cs')?.value||'').toLowerCase(), posF=$('cp')?.value||'', sort=$('csort')?.value||'name';
  
  // FIX: Check for BasicInfo OR UI_Frontend_Data
  let list=CARDS.filter(c=>c?.BasicInfo || c?.UI_Frontend_Data);
  
  list=list.filter(c=>{
    const txt=getSearchText(c);
    const pos = getCardPos(c);
    return(!q||txt.includes(q))&&(!posF||pos.includes(posF));
  });
  
  if(sort==='hp')list.sort((a,b)=>getCardHP(b)-getCardHP(a));
  else if(sort==='dmg')list.sort((a,b)=>getCardDMG(b)-getCardDMG(a));
  else if(sort==='spd')list.sort((a,b)=>getCardSPD(b)-getCardSPD(a));
  else list.sort((a,b)=>getCardName(a).localeCompare(getCardName(b)));
  
  $('cgrid').innerHTML=list.map(c=>{
    const n=getCardName(c),safeN=escapeJS(n),isSel=(n===expandedCardCat);
    return`<div class="compact-card ${isSel?'selected-panel':''}" onclick="toggleCatExpand('${safeN}')" onmousemove="handleTooltipHover(event,'${safeN}',this)" onmouseleave="hideTooltip()"><div class="card-img-sm"><img src="${getImgUrl(getCardImg(c),n)}" onerror="handleImgError(this,'${safeN}')"></div></div>`;
  }).join('');
}
function closeCatLeftPanel(){expandedCardCat=null;$('cat-left-panel').classList.remove('open');filterCat();}
function toggleCatExpand(name){const card=CARDS.find(c=>getCardName(c)===name);if(!card)return;hideTooltip();expandedCardCat=(expandedCardCat===name)?null:name;if(expandedCardCat)openCatLeftPanel(card);else closeCatLeftPanel();filterCat();}
function openCatLeftPanel(card){const n=getCardName(card),imgEl=$('cat-left-img-el'),imgWrap=$('cat-left-img-wrap');imgEl.src=getImgUrl(getCardImg(card),n);imgEl.onerror=()=>handleImgError(imgEl,n);imgWrap.classList.remove('animating');void imgWrap.offsetWidth;imgWrap.classList.add('animating');$('cat-left-content').innerHTML=buildCardDetailHTML(card);$('cat-left-panel').classList.add('open');}
function buildCardDetailHTML(card) {
  try {
    const n = getCardName(card), hp = getCardHP(card), dmg = getCardDMG(card), spd = getCardSPD(card);
    const p = getCardPosStr(card), team = card.UI_Frontend_Data?.Team || card.BasicInfo?.Team || '';
    const ab = getAbility(card);
    
    const abHtml = ab ? `<div class="ec-ability-block"><div class="ec-ability-name">${ab.Name || ''}</div><div class="ec-ability-desc">${ab.Description_UI || ab.description || ''}</div></div>` : '';
    
    const sHtml = getCardSkills(card).map(s => {
      try {
        // 1. Get Description
        let desc = s.Description_UI || s.Description || '';
        
        // 2. Get Damage (Safely)
        let displayDmg = s.Display_DMG || '';
        
        // Helper to extract damage from a modifiers array
        const findDmg = (mods) => {
          if (!Array.isArray(mods)) return null;
          const mod = mods.find(m => typeof m.action_string === 'string' && m.action_string.includes('Deal_Flat_DMG'));
          if (!mod) return null;
          const match = mod.action_string.match(/Deal_Flat_DMG:(\d+)/);
          return match ? match[1] : null;
        };

        // Check Legacy Modifiers
        if (!displayDmg) displayDmg = findDmg(s.Modifiers);

        // Check New Phases
        if (!displayDmg && Array.isArray(s.Phases)) {
            for (const phase of s.Phases) {
              if (displayDmg) break;
              displayDmg = findDmg(phase.Modifiers);
            }
        }

        return `<div class="ec-skill-wrap"><div class="ec-skill-header"><span class="ec-skill-name">${s.Name || 'Skill'}</span><span class="ec-skill-dmg">${displayDmg}</span></div><div class="ec-skill-desc">${desc}</div></div>`;
      } catch (e) {
        console.error("Error rendering skill:", s.Name, e);
        return ''; // Skip this skill if it errors
      }
    }).join('');

    return `<div class="ec-header"><div class="ec-title">${n}</div><div class="ec-team">${team} · ${p}</div></div>
<div class="ec-stats-row"><div class="ec-stat">${hp} <span>HP</span></div><div class="ec-stat">${dmg} <span>DMG</span></div><div class="ec-stat">${spd} <span>SPD</span></div></div>
 ${abHtml}<div style="font-size:.68rem;color:var(--text-muted);font-weight:700;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Skills</div>${sHtml}`;
  } catch (e) {
    console.error("CRITICAL Error in buildCardDetailHTML:", e);
    return `<div style="padding:20px; color:red;">Error loading card details. Check console (F12).</div>`;
  }
}

let currentDraftPanelCard=null;
let draftSquad={PG:[null,null],SG:[null,null],SF:[null,null],PF:[null,null],C:[null,null]};

function goDraft(){draftSquad={PG:[null,null],SG:[null,null],SF:[null,null],PF:[null,null],C:[null,null]};expandedCardCat=null;currentDraftPanelCard=null;showScreen('draft-screen');$('draft-side-panel').classList.remove('open');populateDraftFilters();renderDraftSlots();filterDraftGrid();}
function populateDraftFilters(){
  // Use accessors instead of direct property access
  const teams=[...new Set(CARDS.map(c=>getCardTeam(c)).filter(Boolean))].sort();
  const tiers=[...new Set(CARDS.map(c=>getCardTier(c)).filter(Boolean))].sort();
  $('draft-team').innerHTML='<option value="">All Teams</option>'+teams.map(t=>`<option value="${t}">${t}</option>`).join('');
  $('draft-tier').innerHTML='<option value="">All Tiers</option>'+tiers.map(t=>`<option value="${t}">${t}</option>`).join('');
}
function filterDraftGrid(){
  const q=($('draft-search')?.value||'').toLowerCase(),posF=$('draft-pos')?.value||'',teamF=$('draft-team')?.value||'',tierF=$('draft-tier')?.value||'',sort=$('draft-sort')?.value||'name';
  
  // FIX: Check for BasicInfo OR UI_Frontend_Data
  let list=CARDS.filter(c=>c?.BasicInfo || c?.UI_Frontend_Data);
  
  // FIX: Use accessors for Team, Tier, and Pos
  list=list.filter(c=>{
    const txt=getSearchText(c);
    const team = getCardTeam(c);
    const tier = getCardTier(c);
    const pos  = getCardPos(c);
    return(!q||txt.includes(q))&&(!posF||pos.includes(posF))&&(!teamF||team===teamF)&&(!tierF||tier===tierF);
  });
  
  if(sort==='hp')list.sort((a,b)=>getCardHP(b)-getCardHP(a));
  else if(sort==='dmg')list.sort((a,b)=>getCardDMG(b)-getCardDMG(a));
  else if(sort==='spd')list.sort((a,b)=>getCardSPD(b)-getCardSPD(a));
  else list.sort((a,b)=>getCardName(a).localeCompare(getCardName(b)));
  
  const grid=$('draft-grid');grid.innerHTML='';
  list.forEach(c=>{
    const n=getCardName(c),inD=isCardInDraft(c),isSel=(n===currentDraftPanelCard),imgSrc=getImgUrl(getCardImg(c),n);
    const div=document.createElement('div');
    div.className=`compact-card ${inD?'in-draft':''} ${isSel?'selected-panel':''}`;
    if(!inD){
      div.onclick=(e)=>{
        if(_drag.suppressClick){_drag.suppressClick=false;return;}
        openDraftPanel(n);
      };
      initDraftDrag(div,n,imgSrc);
    }
    div.onmousemove=ev=>handleTooltipHover(ev,n,div);
    div.onmouseleave=hideTooltip;
    div.innerHTML=`<div class="card-img-sm"><img src="${imgSrc}" onerror="handleImgError(this,'${escapeJS(n)}')"></div>`;
    grid.appendChild(div);
  });
}
function isCardInDraft(c){const n=getCardName(c);return POSITIONS.some(p=>getCardName(draftSquad[p][0])===n||getCardName(draftSquad[p][1])===n);}
function renderDraftSlots(){
  let html='';[0,1].forEach(idx=>POSITIONS.forEach(pos=>{const c=draftSquad[pos][idx],cn=c?getCardName(c):null;html+=`<div id="dslot-${pos}-${idx}" class="slot-card slot-${pos} ${c?'filled':''}" data-slot="${pos}-${idx}">${c?`<div class="slot-pos">${pos}</div><div class="slot-name">${getDBShortName(cn)}</div><button class="remove-slot" onclick="removeDraft('${pos}',${idx})">✕</button>`:`<div class="slot-pos">${pos}</div>`}</div>`;}));
  $('draft-slots-vertical').innerHTML=html;
  document.querySelectorAll('#draft-slots-vertical [data-slot]').forEach(slot=>{slot.addEventListener('physdrop',e=>{const[pos,idx]=slot.dataset.slot.split('-');draftSquad[pos][parseInt(idx)]=CARDS.find(x=>getCardName(x)===e.detail.name);renderDraftSlots();filterDraftGrid();});});
  let cnt=0;POSITIONS.forEach(p=>[0,1].forEach(i=>{if(draftSquad[p][i])cnt++;}));$('draft-count-lbl').textContent=`${cnt}/10`;$('draft-confirm-btn').disabled=cnt<10;
}
function removeDraft(pos,idx){draftSquad[pos][idx]=null;renderDraftSlots();filterDraftGrid();}
function autoFillDraft(){draftSquad={PG:[null,null],SG:[null,null],SF:[null,null],PF:[null,null],C:[null,null]};const shuf=[...CARDS].sort(()=>Math.random()-.5);POSITIONS.forEach(pos=>{const m=shuf.filter(c=>getCardPos(c).includes(pos)&&!isCardInDraft(c));if(m[0])draftSquad[pos][0]=m[0];if(m[1])draftSquad[pos][1]=m[1];});renderDraftSlots();filterDraftGrid();}
function openDraftPanel(name){const card=CARDS.find(c=>getCardName(c)===name);if(!card)return;currentDraftPanelCard=name;const imgEl=$('draft-panel-img-el'),imgWrap=$('draft-panel-img');imgEl.src=getImgUrl(getCardImg(card),name);imgEl.onerror=()=>handleImgError(imgEl,name);imgWrap.classList.remove('animating');void imgWrap.offsetWidth;imgWrap.classList.add('animating');$('draft-panel-content').innerHTML=buildCardDetailHTML(card);$('draft-side-panel').classList.add('open');filterDraftGrid();}
function closeDraftPanel(){$('draft-side-panel').classList.remove('open');currentDraftPanelCard=null;filterDraftGrid();}

function renderArena(){ renderBenchStacks(); $('enemy-active-row').innerHTML=renderFanned(enemyActive,true); $('player-active-row').innerHTML=renderFanned(playerActive,false); }

function renderFanned(team, isEnemy){
  const n=team.length; if(!n) return '';
  return team.map((c,i)=>{
    const mid=(n-1)/2,offset=i-mid,arcY=isEnemy?-(offset*offset*12):(offset*offset*12),rot=isEnemy?(-offset*8):(offset*8);
    const hpMax=getCardHP(c),pct=Math.max(0,(c.currentHp/hpMax)*100),clr=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B';
    const isStaged=!isEnemy&&stagedActions.some(a=>a.actorIdx===i);
    let isValidTgt=false;
    if(isEnemy&&uiState==='AWAITING_TARGET'&&pendingAction){const actor=playerActive[pendingAction.actorIdx];if(actor)isValidTgt=getValidTargets(actor,enemyActive).some(v=>v.i===i);}
    const ck=c._instanceId;
    let badges='';
    if(_frozen[ck])   badges+=`<div class="card-status-badge badge-frozen">❄ FROZEN</div>`;
    if(_drained[ck])  badges+=`<div class="card-status-badge badge-drained">💤 DRAINED</div>`;
    if(_shutdown[ck]) badges+=`<div class="card-status-badge badge-shutdown">🚫 SHUTDOWN</div>`;
    if(_statBuffs[ck]&&_statBuffs[ck].started) badges+=`<div class="card-status-badge badge-buffed">⬆ BUFFED</div>`;
    if(_screened[ck]) badges+=`<div class="card-status-badge badge-screened">🛡 SCREENED</div>`;
    const wrapClass=isEnemy?'enemy-card-wrap':'active-card-wrap';
    const cardClass=`battle-card ${c.isDead?'dead-card':''} ${isStaged?'staged':''} ${isValidTgt?'valid-target':''}`;
    const tN=escapeJS(getCardName(c));
    return `<div class="${wrapClass}" id="wrap-${isEnemy?'enemy':'player'}-${i}"
      style="--base-rot:${rot}deg;--base-y:${arcY}px;transform:rotate(var(--base-rot)) translateY(var(--base-y));transform-origin:${isEnemy?'top center':'bottom center'};"
      onclick="onCardClick('${isEnemy?'enemy':'player'}',${i},event)"
      onmousemove="handleTooltipHover(event,'${tN}',this)" onmouseleave="hideTooltip()">
      ${isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-enemy-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}
      <div class="${cardClass}" id="card-${isEnemy?'enemy':'player'}-${i}">
        <img src="${getImgUrl(getCardImg(c),getCardName(c))}" onerror="handleImgError(this,'${tN}')">
        ${badges}
      </div>
      ${isStaged?`<button class="undo-btn" onclick="event.stopPropagation();undoAction(${i})">✕</button>`:''}
      ${!isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-player-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}
      <div class="hp-text" id="hpt-${isEnemy?'enemy':'player'}-${i}">${c.currentHp}/${hpMax}</div>
    </div>`;
  }).join('');
}

function onCardClick(side, idx, event) {
  event.stopPropagation();
  if (isAnimating) return;

  if (side === 'player') {
    const card = playerActive[idx];
    if (!card || card.isDead) return;
    if (stagedActions.some(a => a.actorIdx === idx)) return;
    showActionPanel(card, idx);
  } else {
    if (uiState === 'AWAITING_TARGET' && pendingAction) {
      const actor = playerActive[pendingAction.actorIdx];
      if (!actor) return;
      const vt = getValidTargets(actor, enemyActive);
      if (!vt.some(v => v.i === idx)) return;
      pendingAction.targetIdx = idx;
      stageAction(pendingAction);
      uiState = 'IDLE';
      pendingAction = null;
      $('action-panels-wrapper').classList.remove('visible');
      renderArena();
    }
  }
}

function handleCourtClick(event) {
  if (uiState === 'AWAITING_TARGET') {
    uiState = 'IDLE';
    pendingAction = null;
    $('action-panels-wrapper').classList.remove('visible');
    renderArena();
  }
}

function showActionPanel(card, actorIdx) {
  const ck = card._instanceId;
  const frozen = !!_frozen[ck];
  const wrapper = $('action-panels-wrapper');
  const nameEl  = $('action-card-name');
  const btnsEl  = $('action-btns-row');
  nameEl.textContent = `[${card.battleRole}] ${shortName(getCardName(card))}`;
  btnsEl.innerHTML = '';

  // --- Context for Condition Checks ---
  // We need to know if we are winning to check conditions
  const ownTeam = playerActive;
  const enemyTeam = enemyActive;
  const ownScore = window.playerScore || 0;
  const enemyScore = window.enemyScore || 0;
  const ownTeamLead = ownScore > enemyScore;
  // Build a basic context for PARSER
  const context = {
      self: card,
      ownTeam: ownTeam,
      enemyTeam: enemyTeam,
      ownTeamLead: ownTeamLead,
      gameRound: window.turnCount || 1,
      ownGrave: [], // Simplified
  };

  // ── BASIC ATTACK ──
  if (!frozen) {
    const basicBtn = document.createElement('button');
    basicBtn.className='action-btn action-btn-basic';
    basicBtn.innerHTML=`⚡ BASIC <span class="action-btn-dmg">${getEffectiveDMG(card,false)} DMG</span>`;
    basicBtn.onclick=()=>{
      pendingAction={actionType:'basic',actorIdx,targetIdx:null,execTeam:'player'};
      uiState='AWAITING_TARGET';
      $('action-panels-wrapper').classList.remove('visible');
      renderArena();
    };
    btnsEl.appendChild(basicBtn);
  }

  // ── SKILLS ──
  if (!frozen) {
    (card.Skills||[]).forEach((sk, si) => {
      const exhausted = sk._usesLeft <= 0;
      const turnCapped = isFinite(sk._usesPerTurn) && sk._usesThisTurn >= sk._usesPerTurn;
      
      // 1. Hide Reactionary Skills unless we want them shown (They are handled by prompts usually)
      //    If a skill is purely Reactive, we skip adding it to the main action bar.
      //    EXCEPTION: If it is also "Free" or has a "Standard" branch.
      const isReactive = (sk.Timing || '').startsWith('Reactive');
      // If it's ONLY reactive (no standard branch), hide it.
      if (isReactive && !(sk.Timing || '').includes('Standard')) {
          return; // Skip this button
      }

      // 2. Check Conditions (The logic you asked for)
      //    We look into the phases/modifiers for conditions.
      let conditionsMet = true;
      let conditionTooltip = "";
      
      // Check parsed phases for conditions
      if (sk._parsed && sk._parsed.phases) {
          for (const phase of sk._parsed.phases) {
              if (!phase.modifiers) continue;
              for (const mod of phase.modifiers) {
                  if (mod.condition) {
                      // Use PARSER to check the condition string
                      try {
                          if (!PARSER.evalCondition(mod.condition, context)) {
                              conditionsMet = false;
                              conditionTooltip = `Requires: ${mod.condition}`; // Simple tooltip
                          }
                      } catch(e) {
                          console.error("Condition Check Error", e);
                      }
                  }
              }
          }
      }
      // Also check root condition if exists (Legacy)
      if (sk.Conditions && sk.Conditions.includes('Own_Team_Lead') && !ownTeamLead) {
          conditionsMet = false;
          conditionTooltip = "Requires: Team Lead";
      }

      // Determine Disabled State
      const disabled = exhausted || turnCapped || !conditionsMet;

      const btn = document.createElement('button');
      btn.className='action-btn action-btn-skill';
      btn.disabled=disabled;
      
      // Display Logic
      // Try to find damage for the button label
      let dmgLabel = sk.Display_DMG || '';
      if (!dmgLabel && sk.Modifiers) {
          const m = sk.Modifiers[0]?.action_string?.match(/Deal_Flat_DMG:(\d+)/);
          if (m) dmgLabel = m[1];
      }
      
      btn.innerHTML=`${sk.Name} <span class="action-btn-dmg">${dmgLabel}</span>`;
      
      if (!disabled) {
          btn.onclick=()=>{
              pendingAction={actionType:'skill',actorIdx,skillIdx:si,targetIdx:null,execTeam:'player'};
              uiState='AWAITING_TARGET';
              $('action-panels-wrapper').classList.remove('visible');
              renderArena();
          };
      } else {
          btn.title = conditionTooltip || "Cannot use this skill right now.";
      }
      
      btnsEl.appendChild(btn);
    });
  }

  // ── SWAP / PASS (Same as before) ──
  // ... (Keep your existing Swap/Pass logic here) ...
  // (I am truncating this part for brevity, copy your Swap/Pass code from your file)
  
    // ── SWAP ──
  const aliveBench = playerBench.filter(c=>c&&!c.isDead);
  if (aliveBench.length) {
    const swapBtn = document.createElement('button');
    swapBtn.className='action-btn action-btn-alt';
    swapBtn.textContent='⇄ SWAP';
    swapBtn.onclick=()=>openBenchFan(actorIdx);
    btnsEl.appendChild(swapBtn);
  }

  // ── PASS ──
  const passBtn = document.createElement('button');
  passBtn.className='action-btn action-btn-pass';
  passBtn.textContent='PASS';
  passBtn.onclick=()=>{
    stageAction({actionType:'pass',actorIdx,targetIdx:null,execTeam:'player'});
    $('action-panels-wrapper').classList.remove('visible');
  };
  btnsEl.appendChild(passBtn);


  wrapper.classList.add('visible');
}

function stageAction(act) {
  stagedActions = stagedActions.filter(a => a.actorIdx !== act.actorIdx);
  stagedActions.push(act);
  _updateCheckoutPanel();
  renderArena();
}

function undoAction(actorIdx) {
  stagedActions = stagedActions.filter(a => a.actorIdx !== actorIdx);
  _updateCheckoutPanel();
  renderArena();
}

function _updateCheckoutPanel() {
  const panel = $('checkout-panel');
  const list  = $('staged-list');
  const cnt   = $('staged-count');
  if (!panel) return;
  cnt.textContent = stagedActions.length;
  list.innerHTML = stagedActions.map(a => {
    const c = playerActive[a.actorIdx];
    const sk = a.actionType==='skill' && a.skillIdx!=null ? c?.Skills?.[a.skillIdx] : null;
    const label = a.actionType==='skill' ? (sk?.Name||'Skill') : a.actionType==='basic' ? 'Basic Attack' : a.actionType==='swap' ? 'Swap' : 'Pass';
    return `<div>▸ [${c?.battleRole||'?'}] ${shortName(getCardName(c||{UI_Frontend_Data:{Name:'?'}}))} → ${label}</div>`;
  }).join('');
  panel.style.display = stagedActions.length > 0 ? 'flex' : 'none';
  $('confirm-moves-btn').disabled = stagedActions.length === 0;
}

//--- BOT AI ---
function _botStageMoves() {
  const actions = [];
  enemyActive.forEach((card, i) => {
    if (!card || card.isDead) return;
    const ck = card._instanceId;
    if (_frozen[ck]) { actions.push({actionType:'pass',actorIdx:i,targetIdx:null,execTeam:'enemy'}); return; }

    const usableSkills = (card.Skills||[])
      .map((sk,si)=>({sk,si}))
      .filter(({sk})=>!sk._isReactive&&sk._usesLeft>0&&!(sk._usesPerTurn&&sk._usesThisTurn>=sk._usesPerTurn)&&!(ENGINE.isSkillDisabled&&ENGINE.isSkillDisabled(ck,sk.Name)));

    const vt = getValidTargets(card, playerActive);
    if (!vt.length) { actions.push({actionType:'pass',actorIdx:i,targetIdx:null,execTeam:'enemy'}); return; }
    const tgt = vt[Math.floor(Math.random()*vt.length)];

    let chosen;
    if (usableSkills.length && Math.random() < 0.5) {
      const pick = SKILL_ENGINE.botChooseSkill
        ? SKILL_ENGINE.botChooseSkill(card, enemyActive, playerActive)
        : usableSkills[Math.floor(Math.random()*usableSkills.length)];
      if (pick) {
        chosen = {actionType:'skill',actorIdx:i,skillIdx:pick.si ?? pick,targetIdx:tgt.i,execTeam:'enemy'};
      }
    }
    if (!chosen) {
      chosen = {actionType:'basic',actorIdx:i,targetIdx:tgt.i,execTeam:'enemy'};
    }
    actions.push(chosen);
  });
  return actions;
}

//--- BENCH FAN OVERLAY ---
let _benchFanActorIdx = null;

function openBenchFan(actorIdx) {
  _benchFanActorIdx = actorIdx ?? null;
  playerBenchOpen = true;
  const stage = $('bench-fan-stage');
  const overlay = $('bench-fan-overlay');
  const label = $('bench-fan-label');
  label.textContent = _benchFanActorIdx != null ? 'SWAP IN' : 'YOUR BENCH';
  stage.innerHTML = '';
  const alive = playerBench.filter(c => c && !c.isDead);
  if (!alive.length) { closeBenchFan(); return; }
  const n = alive.length;
  alive.forEach((c, i) => {
    const mid=(n-1)/2, offset=i-mid, rot=offset*12, arcY=Math.abs(offset)*offset*8;
    const elig = _benchFanActorIdx != null ? getCardPos(c).includes(playerActive[_benchFanActorIdx]?.battleRole) : true;
    const wrap = document.createElement('div');
    wrap.className=`bench-fan-card-wrap ${elig?'':'ineligible'}`;
    wrap.style.cssText=`--base-rot:${rot}deg;--base-y:${arcY}px;transform:rotate(${rot}deg) translateY(${arcY}px);`;
    wrap.innerHTML=`<div class="bench-fan-card"><img src="${getImgUrl(getCardImg(c),getCardName(c))}" onerror="handleImgError(this,'${escapeJS(getCardName(c))}')"></div>`;
    if (elig) {
      wrap.onclick=e=>{ e.stopPropagation(); _doSwapFromBenchFan(i, c); };
    }
    stage.appendChild(wrap);
  });
  overlay.classList.add('open');
  setTooltipEnabled(false);
}

function closeBenchFan() {
  $('bench-fan-overlay').classList.remove('open');
  playerBenchOpen = false;
  _benchFanActorIdx = null;
  setTooltipEnabled(true);
  renderArena();
}

function handleBenchOverlayClick(e) { if(e.target===$('bench-fan-overlay'))closeBenchFan(); }

function _doSwapFromBenchFan(benchIdx, incomingCard) {
  const actorIdx = _benchFanActorIdx;
  closeBenchFan();
  if (actorIdx == null) return;
  const actingCard = playerActive[actorIdx];
  if (!actingCard) return;
  const realBenchIdx = playerBench.indexOf(incomingCard);
  if (realBenchIdx === -1) return;
  stageAction({ actionType:'swap', actorIdx, targetIdx:realBenchIdx, execTeam:'player' });
}

async function animateCoinFlip(cardName, skillName, result) {
  const overlay = $('coin-flip-overlay');

  overlay.innerHTML = `
    <div class="coin-flip-container">
      <div class="coin-flip-label">${skillName}</div>

        <div class="coin-info-bar">

          <div class="coin-result-text ${result?'hit':'miss'}">${result?'HIT!':'MISS!'}</div>
        </div>
      </div>
    </div>`;
  const coin = overlay.querySelector('.coin');
  overlay.style.display = 'flex';
  await delay(400);
  coin.className = `coin ${cls}`;
  await delay(1100);

  overlay.innerHTML = '';
}

function showModal(title, desc, options, skipLabel='SKIP') {
  return new Promise(resolve => {
    const modal  = $('uni-modal');
    const titleEl= $('uni-modal-title');
    const descEl = $('uni-modal-desc');
    const optsEl = $('uni-modal-options');
    const skipEl = $('uni-modal-skip');
    titleEl.textContent = title;
    descEl.textContent  = desc;
    skipEl.textContent  = skipLabel;
    optsEl.innerHTML = '';
    const colorMap={orange:'game-btn-orange',green:'game-btn-green',purple:'game-btn-purple',blue:'game-btn-blue',red:'game-btn-red',gold:'game-btn-gold',teal:'game-btn-teal'};
    options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className=`game-btn ${colorMap[opt.color||'orange']||'game-btn-orange'}`;
      btn.style.width='100%';
      btn.textContent=opt.label||`Option ${i+1}`;
      btn.onclick=()=>{ modal.style.display='none'; resolve(i); };
      optsEl.appendChild(btn);
    });
    skipEl.onclick=()=>{ modal.style.display='none'; resolve(null); };
    modal.style.display='flex';
  });
}
