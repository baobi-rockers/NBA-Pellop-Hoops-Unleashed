// ============================================================
// GATHER PLAYER REACTIVE SKILLS triggered by an event
// Returns array of {card, cardIdx, skills, skillIndices}
// ============================================================
function gatherPlayerReactives(triggerNature, triggerType){
  const result=[];
  playerActive.forEach((card,idx)=>{
    if(!card||card.isDead) return;
    if(FLAGS.frozen[card._instanceId]) return;
    const skills=getCardSkills(card);
    const validSks=[]; const validIdxs=[];
    skills.forEach((sk,si)=>{
      if(!sk._isReactive) return;
      const usable=isFinite(sk._usesLeft)?sk._usesLeft>0:true;
      const perTurnOk=isFinite(sk._usesPerTurn)?sk._usesThisTurn<sk._usesPerTurn:true;
      if(!usable||!perTurnOk) return;
      if(isSkillDisabled(card,sk)) return;
      // Check timing matches trigger
      const timing=(sk.Timing||sk.Phases?.[0]?.Timing||'').toLowerCase();
      if(triggerType==='offensive'&&!/offensive/i.test(timing)&&!/enemy/i.test(timing)) return;
      if(triggerType==='close_shot'&&/jump_shot/i.test(timing)&&!/close_shot/i.test(timing)) return;
      if(triggerType==='jump_shot'&&/close_shot/i.test(timing)&&!/jump_shot/i.test(timing)) return;
      if(triggerType==='assist'&&!/assist/i.test(timing)) return;
      validSks.push(sk); validIdxs.push(si);
    });
    if(validSks.length) result.push({card,cardIdx:idx,skills:validSks,skillIndices:validIdxs});
  });
  return result;
}

// ============================================================
// EXECUTE REACTIVE SKILL
// ============================================================
async function executeReactiveSkill(choice, attackerCard, defenderCard, defenderIdx, defTeamStr, originalDmg){
  if(!choice) return {blocked:false, dmgReduction:0};
  const card=playerActive[choice.cardIdx]; if(!card) return {blocked:false,dmgReduction:0};
  const sk=getCardSkills(card)[choice.skillIdx]; if(!sk) return {blocked:false,dmgReduction:0};
  sk._usesThisTurn++; if(isFinite(sk._usesLeft)) sk._usesLeft--;
  const as=(sk.Modifiers||sk.Phases?.[0]?.Modifiers||[])[0]?.action_string||'';
  const name=shortName(getCardName(card));
  if(/^Block$/i.test(as)){
    logMsg('block',name,`${sk.Name} — BLOCKED ${shortName(getCardName(attackerCard))}'s attack!`);
    // James Harden / Embiid foul draw: bonus dmg even on block
    _checkFoulDrawBonus(attackerCard, defenderCard, defTeamStr, defenderIdx, originalDmg);
    return {blocked:true,dmgReduction:originalDmg};
  }
  if(/Reactionary_DMG_Reduction:(\d+)/i.test(as)){
    const m=as.match(/Reactionary_DMG_Reduction:(\d+)/i);
    const reduc=parseInt(m[1]); const finalDmg=Math.max(0,originalDmg-reduc);
    logMsg('block',name,`${sk.Name} — reduced ${shortName(getCardName(attackerCard))}'s attack by ${reduc} (${finalDmg} dealt)`);
    return {blocked:false,dmgReduction:reduc};
  }
  if(/Reactionary_DMG_Reduction:([\d.]+)x/i.test(as)){
    const m=as.match(/Reactionary_DMG_Reduction:([\d.]+)x/i);
    const mult=parseFloat(m[1]);
    const reduc=Math.floor(originalDmg*(1-mult));
    logMsg('block',name,`${sk.Name} — reduced ${shortName(getCardName(attackerCard))}'s attack by ${mult*100}%`);
    return {blocked:false,dmgReduction:reduc};
  }
  if(/^Nullify$/i.test(as)){
    logMsg('block',name,`${sk.Name} — NULLIFIED ${shortName(getCardName(attackerCard))}'s defensive skill!`);
    return {nullified:true};
  }
  if(/^Intercept$/i.test(as)){
    logMsg('block',name,`${sk.Name} — INTERCEPTED the assist!`);
    return {intercepted:true};
  }
  if(/^Contest$/i.test(as)){
    logMsg('block',name,`${sk.Name} — CONTESTED ${shortName(getCardName(attackerCard))}'s shot! 0 damage.`);
    return {blocked:true,dmgReduction:originalDmg};
  }
  if(/Screen_Guarantee_Hit/i.test(as)){
    logMsg('eff',name,`${sk.Name} — Screen set, next attack guaranteed!`);
    card._screenedThisTurn=true;
    return {screened:true};
  }
  return {blocked:false,dmgReduction:0};
}

// ── FOUL DRAW CHECK (Harden / Embiid) ─────────────────────────
function _checkFoulDrawBonus(attackerCard, defenderCard, defTeamStr, defIdx, dmgDealt){
  const ab=getAbility(attackerCard); if(!ab||!ab.Rules) return;
  ab.Rules.forEach(rule=>{
    if(!rule) return;
    const as=rule.action_string||'';
    if(/Bonus_Damage:(\d+)/i.test(as)){
      const m=as.match(/Bonus_Damage:(\d+)/i); const bonus=parseInt(m[1]);
      // Still deal bonus to original target
      if(defenderCard&&!defenderCard.isDead){
        logMsg('atk',shortName(getCardName(attackerCard)),`Foul draw! +${bonus} bonus DMG`);
        applyDirectDamage(defenderCard,bonus,defTeamStr,defIdx);
      }
    }
  });
}

// ── APPLY DIRECT DAMAGE (no animation) ────────────────────────
function applyDirectDamage(card, dmg, teamStr, idx){
  if(!card||card.isDead) return;
  card.currentHp=Math.max(0,card.currentHp-dmg);
  const hpMax=getEffectiveHP_Max(card);
  const pct=Math.max(0,(card.currentHp/hpMax)*100);
  const fill=document.getElementById(`hpf-${teamStr}-${idx}`);
  if(fill){fill.style.width=pct+'%';fill.style.background=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B';}
  const hpt=document.getElementById(`hpt-${teamStr}-${idx}`);
  if(hpt) hpt.textContent=`${card.currentHp}/${hpMax}`;
  if(card.currentHp<=0) handleKO(card,teamStr,idx);
}

// ============================================================
// TURN SORT — higher effective SPD first
// ============================================================
function getSortedActions(actions){
  return [...actions].sort((a,b)=>{
    const aTeam=a.execTeam==='player'?playerActive:enemyActive;
    const bTeam=b.execTeam==='player'?playerActive:enemyActive;
    const aC=aTeam[a.actorIdx]; const bC=bTeam[b.actorIdx];
    if(!aC||!bC) return 0;
    const ask=a.actionType==='skill'&&a.skillIdx!=null?getCardSkills(aC)[a.skillIdx]:null;
    const bsk=b.actionType==='skill'&&b.skillIdx!=null?getCardSkills(bC)[b.skillIdx]:null;
    let aPri=getEffectiveSPD(aC)*(aC._priorityMult||1)*(ask?ask._priority:1);
    let bPri=getEffectiveSPD(bC)*(bC._priorityMult||1)*(bsk?bsk._priority:1);
    return bPri-aPri; // higher first
  });
}

// ============================================================
// CONFIRM MOVES — execute all staged + bot actions
// ============================================================
async function confirmMovesPhase(){
  if(isAnimating) return;
  isAnimating=true; setTooltipEnabled(false);
  $('checkout-panel').style.display='none';
  $('action-panels-wrapper').classList.remove('visible');
  $('turn-indicator').textContent=`TURN ${turnCount} — EXECUTING`;
  const botActions=botStageMoves();
  const allActions=getSortedActions([...stagedActions,...botActions]);
  for(const act of allActions){
    const team=act.execTeam==='player'?playerActive:enemyActive;
    const actor=team[act.actorIdx];
    if(!actor||actor.isDead) continue;
    try{
      if(act.actionType==='skill') await executeSkillAction(act,act.execTeam==='player');
      else if(act.actionType==='basic') await executeBasicAction(act,act.execTeam==='player');
      else if(act.actionType==='swap') await executeSwap(act);
      else if(act.actionType==='pass') logMsg('sys',act.execTeam==='player'?'You':'Bot',`${shortName(getCardName(actor))} passes.`);
    }catch(e){console.warn('[execute]',e);}
    if(_checkEndGame()){isAnimating=false;return;}
    await delay(150);
  }
  // End of turn cleanup
  tickAllFlags(); tickEffects(); turnCount++;
  $('turn-indicator').textContent=`TURN ${turnCount} — STAGING`;
  stagedActions=[];
  resetTurnCounters();
  // Increment active round
  [...playerActive,...enemyActive].forEach(c=>{if(c&&!c.isDead) c._activeRound=(c._activeRound||0)+1;});
  // Luka turn-after-survive priority
  [...playerActive,...enemyActive].forEach(c=>{
    if(c&&!c.isDead&&c._survivedLastTurn){
      c._priorityMult=2; c._survivedLastTurn=false;
      logMsg('eff',shortName(getCardName(c)),'Survive — x2 priority next turn!');
    }
  });
  isAnimating=false; setTooltipEnabled(true);
  renderArena(); renderMoveBudget(); renderGlobalDebuffs();
  if(currentLogTab==='effects') renderEffectsPanel();
}

// ============================================================
// EXECUTE BASIC ATTACK
// ============================================================
async function executeBasicAction(act, isPlayer){
  const atks=isPlayer?playerActive:enemyActive;
  const defs=isPlayer?enemyActive:playerActive;
  const actor=atks[act.actorIdx]; if(!actor||actor.isDead) return;
  const ck=actor._instanceId;
  // Frozen check
  if(FLAGS.frozen[ck]>0){logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} is frozen!`);return;}
  // Drained check
  if(isDrainedForNature(actor,'Base')){logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} is drained!`);return;}
  let defCard=defs[act.targetIdx]; let dIdx=act.targetIdx;
  if(!defCard||defCard.isDead){const vt=getValidTargets(actor,defs,'Base');if(!vt.length)return;defCard=vt[0].c;dIdx=vt[0].i;}
  const dmg=getEffectiveDMG(actor,false,true)+_getConditionalBaseDMGBonus(actor,defCard);
  const defStr=isPlayer?'enemy':'player';
  // Ability DMG reduction on target
  let finalDmg=dmg;
  finalDmg=_applyAbilityDMGReduction(defCard, actor, finalDmg, 'Base');
  // GlobalDebuff forced coin flip on basic attacks
  const gds=getActiveGlobalDebuffsFor(isPlayer?'player':'enemy','Base');
  let refund=false;
  for(const gd of gds){
    if(gd.type==='Force_Coin_Flip'){
      logMsg('coin',isPlayer?'You':'Bot',`Forced coin flip on Basic Attack!`);
      const hit=await doCoinFlip('Forced Flip — Basic Attack',shortName(getCardName(actor)));
      if(!hit){logMsg('coin','Result','Miss! Basic attack fails.');if(gd.refund){}return;}
    }
  }
  // Check if target is immune to basic (e.g. Shaq-Fu SPD check, Dwight height check) already handled by getValidTargets
  // Player reactive check
  if(!isPlayer){
    const nat='Base'; const reactives=gatherPlayerReactives(nat,'offensive');
    if(reactives.length){
      const choice=await promptReactiveSkill(reactives,`${shortName(getCardName(actor))} — Basic Attack (${finalDmg} DMG) → ${shortName(getCardName(defCard))}`);
      if(choice){
        const res=await executeReactiveSkill(choice,actor,defCard,dIdx,defStr,finalDmg);
        if(res.blocked){renderArena();return;}
        finalDmg=Math.max(0,finalDmg-(res.dmgReduction||0));
      }
    }
  }
  logMsg(isPlayer?'atk':'def',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} → Basic (${finalDmg} DMG) → ${shortName(getCardName(defCard))}`);
  await playCombatAnimation(`${isPlayer?'player':'enemy'}-${act.actorIdx}`,`${isPlayer?'enemy':'player'}-${dIdx}`,finalDmg,defCard,dIdx,defStr);
  if(defCard.currentHp<=0) handleKO(defCard,defStr,dIdx);
  // Rebound ability (e.g. Larry Bird, Moses Malone) — only for skills that missed, not basic
  renderArena();
}

// ── CONDITIONAL BASIC DMG BONUS (from ability) ──────────────
function _getConditionalBaseDMGBonus(actor, target){
  if(!actor||!target) return 0;
  let bonus=0;
  const ab=getAbility(actor); if(!ab||!ab.Rules) return 0;
  ab.Rules.forEach(rule=>{
    if(!rule) return;
    const trigger=(rule.trigger||'').toUpperCase(); if(!trigger.includes('SELF_CAST')) return;
    const cond=rule.condition||''; const as=rule.action_string||'';
    if(!/Stat_Buff.*DMG.*Base/i.test(as)&&!/Nature:Base/i.test(as)) return;
    const m=as.match(/\+(\d+)_DMG/i)||as.match(/\+(\d+)_Nature:Base/i);
    if(!m) return;
    // Check condition
    let condMet=true;
    if(/Targeted_EnemySPD\s*<=\s*(\d+)/i.test(cond)){const cm=cond.match(/Targeted_EnemySPD\s*<=\s*(\d+)/i);if(cm&&getCardSPD(target)>parseInt(cm[1]))condMet=false;}
    if(/Targeted_EnemySPD\s*<\s*Self_SPD/i.test(cond)){if(getCardSPD(target)>=getCardSPD(actor))condMet=false;}
    if(/Targeted_EnemyHeight\s*<\s*Self_Height/i.test(cond)){if(getCardHeight(target)>=getCardHeight(actor))condMet=false;}
    if(/Targeted_EnemyTeam_ID\s*!=\s*(\w+)/i.test(cond)){const cm=cond.match(/Targeted_EnemyTeam_ID\s*!=\s*(\w+)/i);if(cm&&getCardTeam(target)===cm[1])condMet=false;}
    if(/Targeted_EnemyTeam_ID\s*=\s*(\w+)/i.test(cond)&&!/!/.test(cond)){const cm=cond.match(/Targeted_EnemyTeam_ID\s*=\s*(\w+)/i);if(cm&&getCardTeam(target)!==cm[1])condMet=false;}
    if(condMet) bonus+=parseInt(m[1]);
  });
  // Reggie Miller vs NYK
  const ab2=getAbility(actor); if(ab2&&ab2.Rules){
    ab2.Rules.forEach(rule=>{
      if(!rule) return;
      const trigger=(rule.trigger||'').toUpperCase(); if(!trigger.includes('SELF_CAST')) return;
      const cond=rule.condition||''; const as=rule.action_string||'';
      if(/\+500_DMG:Nature:Base/i.test(as)&&/NYK/i.test(cond)){
        if(getCardTeam(target)==='NYK') bonus+=500;
      }
    });
  }
  return bonus;
}

// ── ABILITY DMG REDUCTION CHECK ──────────────────────────────
function _applyAbilityDMGReduction(targetCard, attackerCard, dmg, nature){
  let final=dmg;
  const ab=getAbility(targetCard); if(!ab||!ab.Rules) return final;
  ab.Rules.forEach(rule=>{
    if(!rule) return;
    const trigger=(rule.trigger||'').toUpperCase(); if(!trigger.includes('ENEMY_RESOLVE')&&!trigger.includes('ENEMY_CAST')) return;
    const cond=rule.condition||''; const as=rule.action_string||'';
    if(!as.includes('Apply_Modifier:Damage_Reduction')) return;
    // Check condition
    let condMet=true;
    if(/Casting_EnemyTeam_ID\s*!=\s*([\w|]+)/i.test(cond)){const m=cond.match(/Casting_EnemyTeam_ID\s*!=\s*([\w|]+)/i);if(m){const teams=m[1].split('|');if(teams.includes(getCardTeam(attackerCard)))condMet=false;}}
    if(/Casting_EnemyTeam_ID\s*=\s*([\w|]+)/i.test(cond)&&!/!/.test(cond)){const m=cond.match(/Casting_EnemyTeam_ID\s*=\s*([\w|]+)/);if(m&&getCardTeam(attackerCard)!==m[1])condMet=false;}
    if(/Casting_EnemyNature\s*=\s*Offensive:Close_Shot/i.test(cond)&&nature!=='Close_Shot') condMet=false;
    if(/Casting_EnemyPos\s*=\s*([\w|]+)/i.test(cond)){const m=cond.match(/Casting_EnemyPos\s*=\s*([\w|]+)/i);if(m){const pos=m[1].split('|');if(!pos.includes(attackerCard.battleRole))condMet=false;}}
    if(!condMet) return;
    // Apply reduction
    const mFlat=as.match(/Damage_Reduction:(\d+)_Flat/i); if(mFlat){final=Math.max(0,final-parseInt(mFlat[1]));return;}
    const mMult=as.match(/Damage_Reduction:x([\d.]+)/i); if(mMult){final=Math.floor(final*parseFloat(mMult[1]));return;}
    const mFlatNat=as.match(/Damage_Reduction:(\d+)_Flat:Nature/i); if(mFlatNat){final=Math.max(0,final-parseInt(mFlatNat[1]));return;}
  });
  // Dennis Rodman team reduction (-250 for teammates)
  [...playerActive,...enemyActive].forEach(ally=>{
    if(!ally||ally.isDead||ally._instanceId===targetCard._instanceId) return;
    if(ally._teamRef!==targetCard._teamRef) return;
    const abA=getAbility(ally); if(!abA||!abA.Rules) return;
    abA.Rules.forEach(rule=>{
      if(!rule) return;
      if(!/ENEMY_RESOLVE/i.test(rule.trigger||'')) return;
      if(!/Targeted_Teammate/i.test(rule.action_target||'')) return;
      const as=rule.action_string||'';
      const mFlat=as.match(/Damage_Reduction:(\d+)_Flat/i); if(mFlat) final=Math.max(0,final-parseInt(mFlat[1]));
    });
  });
  return Math.max(0,final);
}

// ============================================================
// EXECUTE SKILL ACTION
// ============================================================
async function executeSkillAction(act, isPlayer){
  const atks=isPlayer?playerActive:enemyActive;
  const defs=isPlayer?enemyActive:playerActive;
  const actor=atks[act.actorIdx]; if(!actor||actor.isDead) return;
  const sk=getCardSkills(actor)[act.skillIdx]; if(!sk) return;
  const ck=actor._instanceId;
  // Frozen
  if(FLAGS.frozen[ck]>0&&!sk._isFree){logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} is frozen!`);return;}
  // Drained
  const phaseNature=(sk.Phases||[{Timing:sk.Timing||''}])[0]?.Nature||sk.Nature||[];
  const natStr=Array.isArray(phaseNature)?phaseNature.join(' '):String(phaseNature);
  if(isDrainedForNature(actor,'Offensive')&&/Offensive/i.test(natStr)){logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} is drained!`);return;}
  // Skill disabled
  if(isSkillDisabled(actor,sk)){logMsg('sys',isPlayer?'You':'Bot',`${sk.Name} is disabled!`);return;}
  // Consume use
  if(isFinite(sk._usesLeft)) sk._usesLeft--;
  sk._usesThisTurn++;

  const phases=sk.Phases||[{Timing:sk.Timing||'',Nature:sk.Nature||[],Properties:sk.Properties||[],Modifiers:sk.Modifiers||[]}];
  for(const phase of phases){
    const pNat=Array.isArray(phase.Nature)?phase.Nature.join(' '):String(phase.Nature||'');
    const isOffensive=/Offensive/i.test(pNat);
    const isAssist=/Assist/i.test(pNat);
    const isFreezeSkill=/Freeze/i.test(pNat)||/Freeze/i.test(String(phase.Timing||''));
    const isStealSkill=/Steal/i.test(pNat);
    const isDefensive=/Defensive/i.test(pNat);
    const isUtility=/Utility/i.test(pNat);
    const isClose=/Close_Shot/i.test(pNat);
    const isJump=/Jump_Shot/i.test(pNat);
    const mods=phase.Modifiers||[];
    for(const mod of mods){
      if(!mod) continue;
      const as=mod.action_string||'';
      const target=mod.action_target||'Selected_Enemy:Q1';
      const coinFlips=parseInt(mod.Coin_Flip)||0;
      // ── DETERMINE TARGET CARD & IDX ──────────────────────
      let defCard=null; let dIdx=-1; let defStr=isPlayer?'enemy':'player';
      if(/Selected_Enemy/i.test(target)||/Casting_Enemy/i.test(target)){
        defCard=defs[act.targetIdx]; dIdx=act.targetIdx;
        if(!defCard||defCard.isDead){const vt=getValidTargets(actor,defs,pNat);if(!vt.length) continue; defCard=vt[0].c;dIdx=vt[0].i;}
      } else if(/All_Ally/i.test(target)){
        // Heal all allies
      } else if(/Self/i.test(target)){
        defCard=actor; dIdx=act.actorIdx; defStr=isPlayer?'player':'enemy';
      } else if(/Selected_Teammate|Casting_Teammate|All_Ally/i.test(target)){
        defCard=null; // handled per action
      }

      // ── CLOSE SHOT IMMUNE ─────────────────────────────────
      if(isClose&&defCard&&isImmuneToCloseShotSkill(defCard)){
        logMsg('block',shortName(getCardName(defCard)),'Immune to Close Shot this turn! (ability effect)');
        continue;
      }

      // ── COIN FLIP ─────────────────────────────────────────
      if(coinFlips>0&&!isSkillImmuneToForcedCoinFlip(sk,actor)){
        let allHit=true;
        for(let fc=0;fc<coinFlips;fc++){
          const hit=await doCoinFlip(sk.Name,shortName(getCardName(actor)));
          if(!hit){allHit=false; break;}
        }
        if(!allHit){
          logMsg('coin',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} — ${sk.Name} MISSED (coin flip)`);
          // Rebound ability
          _checkReboundAbility(actor,defCard,dIdx,defStr,atks);
          // T-Mac / Tracy: gain 100 DMG stack on miss
          _checkMissStackBuff(actor);
          continue;
        }
      }

      // ── GLOBAL DEBUFF FORCED FLIP ─────────────────────────
      if(isOffensive){
        const gds=getActiveGlobalDebuffsFor(isPlayer?'player':'enemy', pNat.includes('Close_Shot')?'Close_Shot':pNat.includes('Jump_Shot')?'Jump_Shot':'Offensive');
        for(const gd of gds){
          if(gd.type==='Force_Coin_Flip'){
            logMsg('coin',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} — ${sk.Name} forced coin flip!`);
            const hit=await doCoinFlip(`${sk.Name} — Forced Flip`,shortName(getCardName(actor)));
            if(!hit){
              logMsg('coin','Result','Miss!');
              if(!gd.refund&&isFinite(sk._usesLeft)) sk._usesLeft++; // refund use
              _checkMissStackBuff(actor);
              continue;
            }
          }
        }
      }

      // ── REACTIVE CHECK (for player cards reacting to bot) ─
      if(!isPlayer&&isOffensive&&defCard){
        // Check unblockable/uncontestable first
        const unblk=isSkillUnblockable(sk,actor);
        const uncon=isSkillUncontestable(sk,actor);
        if(!unblk||!uncon){
          const natKey=isClose?'close_shot':isJump?'jump_shot':'offensive';
          const reactives=gatherPlayerReactives(pNat,natKey);
          if(reactives.length){
            const choice=await promptReactiveSkill(reactives,`${shortName(getCardName(actor))} — ${sk.Name} → ${shortName(getCardName(defCard))}`);
            if(choice){
              // Check if the reactive is blocked by unblockable
              const resSk=getCardSkills(playerActive[choice.cardIdx])[choice.skillIdx];
              const resAs=(resSk?.Modifiers||resSk?.Phases?.[0]?.Modifiers||[])[0]?.action_string||'';
              if(unblk&&/Block/i.test(resAs)){
                logMsg('block',shortName(getCardName(actor)),'UNBLOCKABLE — Block negated!');
              } else if(uncon&&/Contest/i.test(resAs)){
                logMsg('block',shortName(getCardName(actor)),'UNCONTESTABLE — Contest negated!');
              } else {
                const dmgForReactive=_calcSkillDmg(as,actor,defCard,atks.filter(c=>c&&!c.isDead));
                const res=await executeReactiveSkill(choice,actor,defCard,dIdx,defStr,dmgForReactive);
                if(res.blocked){ renderArena(); continue; }
                if(res.intercepted){ renderArena(); continue; }
              }
            }
          }
        }
      }

      // ── EXECUTE ACTION STRING ────────────────────────────
      if(/Deal_Flat_DMG:(\d+)/i.test(as)){
        const m=as.match(/Deal_Flat_DMG:(\d+)/i);
        let dmg=parseInt(m[1])+_getSkillDMGBonus(actor,sk,pNat);
        dmg=_applyAbilityDMGReduction(defCard,actor,dmg,isClose?'Close_Shot':isJump?'Jump_Shot':'Special');
        // Reggie Miller NYK bonus
        dmg+=_getConditionalSkillDMGBonus(actor,defCard,sk);
        logMsg(isPlayer?'atk':'def',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} → ${sk.Name} (${dmg} DMG) → ${shortName(getCardName(defCard))}`);
        await playCombatAnimation(`${isPlayer?'player':'enemy'}-${act.actorIdx}`,`${defStr}-${dIdx}`,dmg,defCard,dIdx,defStr);
        if(defCard.currentHp<=0) handleKO(defCard,defStr,dIdx);
        // Klay Captain stacking
        _checkHitStackBuff(actor,sk);
      } else if(/Deal_Assist_Dmg/i.test(as)){
        // Assist damage
        const dmg=_calcAssistDmg(as,actor,atks.filter(c=>c&&!c.isDead));
        if(defCard){
          const finalDmg=_applyAbilityDMGReduction(defCard,actor,dmg,'Assist');
          logMsg(isPlayer?'atk':'def',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} → ${sk.Name} (Assist ${finalDmg} DMG) → ${shortName(getCardName(defCard))}`);
          await playCombatAnimation(`${isPlayer?'player':'enemy'}-${act.actorIdx}`,`${defStr}-${dIdx}`,finalDmg,defCard,dIdx,defStr);
          if(defCard.currentHp<=0) handleKO(defCard,defStr,dIdx);
        }
      } else if(/^Freeze$/i.test(as)){
        // Freeze target
        const tgt=isFreezeSkill?defs[act.targetIdx]:defCard;
        const tid=tgt?tgt._instanceId:null;
        if(tid&&!isUntargetable(tgt,null,'Freeze',actor)&&!_checkFreezeImmune(tgt)){
          FLAGS.frozen[tid]=1;
          logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} → ${sk.Name} — ${shortName(getCardName(tgt))} FROZEN this turn!`);
          addEffect(sk.Name,tid,shortName(getCardName(tgt)),'frozen','Frozen (cannot act)',1);
        } else {
          logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} → ${sk.Name} — Target immune to freeze!`);
        }
      } else if(/Stat_Buff:\+(\d+)_(HP|MAX_HP|SPD)/i.test(as)){
        // Heal / SPD buff
        const m=as.match(/Stat_Buff:\+(\d+)_(HP|MAX_HP|SPD)/i);
        const amount=parseInt(m[1]); const stat=m[2].toUpperCase();
        const tgts=/All_Ally/i.test(target)?[...atks]:[actor];
        tgts.forEach(tg=>{
          if(!tg||tg.isDead) return;
          const td2=parseTD(mod.TD||'DEFAULT');
          if(stat==='HP'){
            tg.currentHp=Math.min(getEffectiveHP_Max(tg),tg.currentHp+amount);
            logMsg('hp',isPlayer?'You':'Bot',`${shortName(getCardName(tg))} healed +${amount} HP → ${tg.currentHp}`);
          } else {
            FLAGS.buffed[tg._instanceId]=FLAGS.buffed[tg._instanceId]||[];
            FLAGS.buffed[tg._instanceId].push({stat,amount,turnsLeft:td2.turns,delay:td2.delay,source:sk.Name});
            logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(tg))} +${amount} ${stat} for ${td2.turns}T`);
          }
        });
      } else if(/Stat_Buff:\+(\d+)_Nature:(Base|Offensive|Skill)/i.test(as)){
        // DMG buff for X turns
        const m=as.match(/Stat_Buff:\+(\d+)_Nature:(Base|Offensive|Skill)/i);
        const amount=parseInt(m[1]); const nat2=m[2].toUpperCase();
        const td2=parseTD(mod.TD||'DEFAULT');
        FLAGS.buffed[actor._instanceId]=FLAGS.buffed[actor._instanceId]||[];
        const statKey=nat2==='BASE'?'BASE_DMG':nat2==='SKILL'?'SKILL_DMG':'DMG';
        FLAGS.buffed[actor._instanceId].push({stat:statKey,amount,turnsLeft:td2.turns,delay:td2.delay,source:sk.Name});
        logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} +${amount} ${statKey} for ${td2.turns}T (delay:${td2.delay})`);
        addEffect(sk.Name,actor._instanceId,shortName(getCardName(actor)),'dmg_buff',`+${amount} ${statKey}`,td2.turns);
      } else if(/Hard_Disable_Shutdown/i.test(as)){
        const td2=parseTD(mod.TD||'DEFAULT');
        // Self shutdown (Shaq Backboard Breaker drain)
        if(/Self/i.test(target)){
          FLAGS.shutdown[actor._instanceId]={turnsLeft:td2.turns,delay:td2.delay,active:td2.delay===0,self:true};
          logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} drains for ${td2.turns}T`);
        } else {
          const tgt=defCard||defs[act.targetIdx];
          if(tgt){
            if(/Ref_Skill/i.test(as)){
              // Shutdown specific skill — ask which
              const skNames=getCardSkills(tgt).map(s=>s.Name);
              const idx2=await showModal('DISABLE SKILL',`Choose which skill of ${shortName(getCardName(tgt))} to disable`,skNames.map(s=>({label:s,color:'red'})));
              if(idx2!==null){
                FLAGS.skillDisable[tgt._instanceId]=FLAGS.skillDisable[tgt._instanceId]||[];
                FLAGS.skillDisable[tgt._instanceId].push({skillName:skNames[idx2],turnsLeft:td2.turns});
                logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(tgt))}\'s ${skNames[idx2]} DISABLED for ${td2.turns}T`);
              }
            } else {
              // Full shutdown
              FLAGS.shutdown[tgt._instanceId]={turnsLeft:td2.turns,delay:td2.delay,active:td2.delay===0};
              logMsg('sys',isPlayer?'You':'Bot',`${shortName(getCardName(tgt))} SHUT DOWN for ${td2.turns}T (delay:${td2.delay})`);
              addEffect(sk.Name,tgt._instanceId,shortName(getCardName(tgt)),'shutdown',`Shutdown`,td2.turns);
            }
          }
        }
      } else if(/Global_Debuff.*Force_Coin_Flip/i.test(as)){
        // Force coin flip on all enemies
        const td2=parseTD(mod.TD||'DEFAULT');
        const natM=as.match(/\]\:\[(Nature:[^\]]+)\]/);
        const natStr2=natM?natM[1]:'Offensive';
        const refundM=as.match(/Refund:(True|False)/i);
        const refund=refundM?refundM[1].toLowerCase()==='true':false;
        FLAGS.globalDebuffs.push({type:'Force_Coin_Flip',targetTeam:isPlayer?'enemy':'player',nature:natStr2,turnsLeft:td2.turns,delay:td2.delay,refund,source:getCardName(actor)});
        logMsg('eff',isPlayer?'You':'Bot',`${sk.Name} — All ${isPlayer?'enemy':'player'} ${natStr2} forced coin flip for ${td2.turns}T`);
        addEffect(sk.Name,'global','All Enemies','global_flip',`Forced Coin Flip: ${natStr2}`,td2.turns);
        renderGlobalDebuffs();
      } else if(/Global_Debuff.*Contest.*Jump_Shot/i.test(as)||/Global_Debuff.*Contest/i.test(as)){
        const td2=parseTD(mod.TD||'DEFAULT');
        FLAGS.globalDebuffs.push({type:'Contest_JumpShot',targetTeam:isPlayer?'enemy':'player',nature:'Jump_Shot',turnsLeft:td2.turns,delay:td2.delay,source:getCardName(actor)});
        logMsg('eff',isPlayer?'You':'Bot',`${sk.Name} — All ${isPlayer?'enemy':'player'} Jump Shots contested for ${td2.turns}T`);
        addEffect(sk.Name,'global','All Enemies','contest_jump',`Jump Shots Contested`,td2.turns);
        renderGlobalDebuffs();
      } else if(/Global_Debuff.*Intercept.*Assist/i.test(as)){
        const td2=parseTD(mod.TD||'DEFAULT');
        FLAGS.globalDebuffs.push({type:'Intercept_Assist',targetTeam:isPlayer?'enemy':'player',nature:'Assist',turnsLeft:td2.turns,delay:td2.delay,source:getCardName(actor)});
        logMsg('eff',isPlayer?'You':'Bot',`${sk.Name} — All assists INTERCEPTED for ${td2.turns}T`);
        addEffect(sk.Name,'global','All Enemies','intercept_assist',`Assists Intercepted`,td2.turns);
        renderGlobalDebuffs();
      } else if(/Global_Debuff.*Hard_Disable_Shutdown.*Offensive/i.test(as)){
        // Yao Great Blockade
        const td2=parseTD(mod.TD||'DEFAULT');
        defs.forEach(tg=>{
          if(!tg||tg.isDead) return;
          FLAGS.shutdown[tg._instanceId]={turnsLeft:td2.turns,delay:td2.delay,active:td2.delay===0,offensiveOnly:true};
        });
        logMsg('eff',isPlayer?'You':'Bot',`${sk.Name} — ALL enemy offensive skills SHUT DOWN for ${td2.turns}T`);
        addEffect(sk.Name,'global','All Enemies','shutdown_offense','No Offensive Skills',td2.turns);
      } else if(/Drain/i.test(as)){
        // Drain self (Ohio Bulldozer, Lefadeaway)
        const td2=parseTD(mod.TD||'DEFAULT');
        const natDrain=as.match(/Drain:(.+)/i)?.[1]||'Offensive';
        FLAGS.drained[actor._instanceId]={natures:natDrain,turnsLeft:td2.turns,delay:td2.delay||1};
        logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} DRAINED — cannot use ${natDrain} for ${td2.turns}T`);
        addEffect(sk.Name,actor._instanceId,shortName(getCardName(actor)),'drained',`Drained: ${natDrain}`,td2.turns);
      } else if(/Apply_State.*Sixth_Man/i.test(as)){
        actor._state='Sixth_Man'; actor._priorityMult=0.01;
        logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} — Sixth Man mode, moves last`);
      } else if(/Apply_Property.*Untargetable/i.test(as)||/Invulnerable/i.test((sk.Properties||[]).join(' '))){
        // Invulnerability for rest of turn
        FLAGS.invuln[actor._instanceId]=1;
        logMsg('eff',isPlayer?'You':'Bot',`${shortName(getCardName(actor))} — INVULNERABLE this turn!`);
      } else if(/Screen_Guarantee_Hit/i.test(as)){
        // Screen applied globally to next teammate attack
        logMsg('eff',isPlayer?'You':'Bot',`${sk.Name} — Screen set! Next attack guaranteed.`);
        actor._screenedThisTurn=true;
      } else if(/Steal_Skill/i.test(as)){
        // Joel Embiid / T-Mac steal skill
        await _doStealSkill(actor, defs, act, isPlayer, sk);
      }
    }
  }
  renderArena();
}

// ── SKILL DMG BONUS (from stacks / buffs) ────────────────────
function _getSkillDMGBonus(actor, sk, natStr){
  let bonus=0;
  const sb=FLAGS.stackBuff[actor._instanceId]||{};
  bonus+=sb.dmg||0; bonus+=sb.skillDmg||0;
  if(/Base/i.test(natStr)) bonus+=sb.baseDmg||0;
  (FLAGS.buffed[actor._instanceId]||[]).forEach(b=>{
    if(b.delay>0) return;
    if(b.stat==='DMG') bonus+=b.amount;
    if(b.stat==='SKILL_DMG') bonus+=b.amount;
  });
  // Height bonus (KD vs shorter)
  return bonus;
}
function _getConditionalSkillDMGBonus(actor, target, sk){
  let bonus=0;
  const ab=getAbility(actor); if(!ab||!ab.Rules) return 0;
  ab.Rules.forEach(rule=>{
    if(!rule) return;
    const as=rule.action_string||'';
    if(!/Stat_Buff.*DMG.*Offensive/i.test(as)&&!/500_DMG.*Offensive/i.test(as)) return;
    const cond=rule.condition||'';
    if(/Targeted_EnemyTeam_ID\s*=\s*NYK/i.test(cond)&&getCardTeam(target)==='NYK'){
      const m=as.match(/\+(\d+)_DMG/i); if(m) bonus+=parseInt(m[1]);
    }
  });
  return bonus;
}
function _calcAssistDmg(as, actor, ownTeam){
  // Deal_Assist_Dmg:1.5x_Nature:Base:Ref(PF/C) etc
  const mMult=as.match(/Deal_Assist_Dmg:([\d.]+)x_Nature:Base:Ref\(([^)]+)\)/i);
  if(mMult){
    const mult=parseFloat(mMult[1]); const positions=mMult[2].split('/');
    const ref=ownTeam.find(c=>c&&!c.isDead&&positions.includes(c.battleRole));
    if(ref) return Math.floor(getEffectiveDMG(ref,false,true)*mult)+_getSkillDMGBonus(actor,null,'');
    return 0;
  }
  const mFlat=as.match(/Deal_Assist_Dmg:\+(\d+)_Nature:Base:Ref\(([^)]+)\)/i);
  if(mFlat){
    const add=parseInt(mFlat[1]); const positions=mFlat[2].split('/');
    const ref=ownTeam.find(c=>c&&!c.isDead&&positions.includes(c.battleRole));
    if(ref) return getEffectiveDMG(ref,false,true)+add+_getSkillDMGBonus(actor,null,'');
    return 0;
  }
  const mMult2=as.match(/Deal_Assist_Dmg:([\d.]+)x_Nature:Base:Ref\(([^)]+)\)/i);
  if(mMult2){const mult=parseFloat(mMult2[1]);const positions=mMult2[2].split('/');const ref=ownTeam.find(c=>c&&!c.isDead&&positions.includes(c.battleRole));if(ref) return Math.floor(getEffectiveDMG(ref,false,true)*mult);}
  return 0;
}
function _calcSkillDmg(as, actor, defCard, ownTeam){
  const m=as.match(/Deal_Flat_DMG:(\d+)/i); if(m) return parseInt(m[1])+_getSkillDMGBonus(actor,null,'Offensive');
  return getEffectiveDMG(actor,true,false);
}
function _checkFreezeImmune(card){
  const ab=getAbility(card); if(!ab||!ab.Rules) return false;
  return ab.Rules.some(r=>r&&/Untargetable_By:Defensive:Freeze/i.test(r.action_string||''));
}
function _checkReboundAbility(actor, defCard, dIdx, defStr, ownTeam){
  const ab=getAbility(actor); if(!ab||!ab.Rules) return;
  ab.Rules.forEach(rule=>{
    if(!rule||!/SELF_CAST.*FAIL/i.test(rule.trigger||'')) return;
    if(/Rebound_And_Deal_Base_DMG/i.test(rule.action_string||'')){
      const dmg=getEffectiveDMG(actor,false,true);
      if(defCard&&!defCard.isDead){
        logMsg('hp',shortName(getCardName(actor)),`Rebound! Basic attack (${dmg} DMG) → ${shortName(getCardName(defCard))}`);
        applyDirectDamage(defCard,dmg,defStr,dIdx);
      }
    }
  });
}
function _checkMissStackBuff(actor){
  const ab=getAbility(actor); if(!ab||!ab.Rules) return;
  ab.Rules.forEach(rule=>{
    if(!rule||!/SELF_CAST.*FAIL/i.test(rule.trigger||'')) return;
    const as=rule.action_string||'';
    const m=as.match(/Stat_Buff:\+(\d+)_DMG.*Stack_Per_Miss/i);
    if(m){
      const bonus=parseInt(m[1]);
      if(!FLAGS.stackBuff[actor._instanceId]) FLAGS.stackBuff[actor._instanceId]={};
      FLAGS.stackBuff[actor._instanceId].dmg=(FLAGS.stackBuff[actor._instanceId].dmg||0)+bonus;
      logMsg('eff',shortName(getCardName(actor)),`+${bonus} DMG stacked (miss)`);
    }
  });
}
function _checkHitStackBuff(actor, sk){
  const ab=getAbility(actor); if(!ab||!ab.Rules) return;
  ab.Rules.forEach(rule=>{
    if(!rule) return;
    const trigger=(rule.trigger||'').toUpperCase();
    if(!/SELF_CAST.*HIT/i.test(trigger)) return;
    const as=rule.action_string||'';
    const m=as.match(/Stat_Buff:\+(\d+)_DMG.*Stack_Per_Hit/i);
    if(m){
      const bonus=parseInt(m[1]);
      const isBase=/Nature:Base/i.test(as);
      const isSkill=/Nature:Offensive/i.test(as);
      if(!FLAGS.stackBuff[actor._instanceId]) FLAGS.stackBuff[actor._instanceId]={};
      if(isBase) FLAGS.stackBuff[actor._instanceId].baseDmg=(FLAGS.stackBuff[actor._instanceId].baseDmg||0)+bonus;
      else FLAGS.stackBuff[actor._instanceId].dmg=(FLAGS.stackBuff[actor._instanceId].dmg||0)+bonus;
      logMsg('eff',shortName(getCardName(actor)),`+${bonus} DMG stacked (hit)`);
    }
  });
}
async function _doStealSkill(actor, defs, act, isPlayer, sk){
  const alive=defs.filter(c=>c&&!c.isDead);
  if(!alive.length) return;
  const chosenCardIdx=await showModal('STEAL A SKILL',`${shortName(getCardName(actor))} — Choose opponent to steal from`,alive.map(c=>({label:shortName(getCardName(c)),color:'purple'})));
  if(chosenCardIdx===null) return;
  const target=alive[chosenCardIdx];
  const targetSkills=getCardSkills(target);
  const chosenSkIdx=await showModal('CHOOSE SKILL',`Which skill to steal from ${shortName(getCardName(target))}?`,targetSkills.map(s=>({label:`${s.Name} — ${s.Display_DMG||''}`,color:'blue'})));
  if(chosenSkIdx===null) return;
  const stolen=JSON.parse(JSON.stringify(targetSkills[chosenSkIdx]));
  stolen._stolenFrom=target._instanceId;
  stolen.Name=`[Stolen] ${stolen.Name}`;
  const um=parseUM(stolen.UM||'');
  stolen._usesLeft=isFinite(um.maxUses)?um.maxUses:Infinity;
  stolen._usesThisTurn=0;
  stolen._usesPerTurn=isFinite(um.usesPerTurn)?um.usesPerTurn:Infinity;
  stolen._priority=um.priority||1;
  // Replace the steal_skill slot
  const skIdx=getCardSkills(actor).indexOf(sk);
  if(skIdx>=0) actor.Skills[skIdx]=stolen;
  logMsg('eff',shortName(getCardName(actor)),`Stole ${stolen.Name} from ${shortName(getCardName(target))}!`);
}

// ── SURVIVE CHECK ─────────────────────────────────────────────
function checkSurvive(card){
  // LeBron The Block — survive until last card
  if(card._surviveAt1HP){
    const ownTeam=card._teamRef==='player'?playerActive:enemyActive;
    const ownBench=card._teamRef==='player'?playerBench:enemyBench;
    const others=[...ownTeam,...ownBench].filter(c=>c&&!c.isDead&&c._instanceId!==card._instanceId);
    if(others.length>0){ card.currentHp=1; logMsg('sys',shortName(getCardName(card)),'Survive at 1HP — The Block active!'); return true; }
    return false;
  }
  // Once-per-game survive (Julius Erving HP threshold, Luka, KG)
  if(!card._surviveUsed){
    const ab=getAbility(card); if(!ab||!ab.Rules) return false;
    for(const rule of ab.Rules){
      if(!rule) continue;
      const trigger=(rule.trigger||'').toUpperCase();
      if(trigger.includes('HP_THRESHOLD_ONCE')||trigger.includes('HP_STATE')){
        const as=rule.action_string||'';
        if(/Stat_Buff:\+(\d+)_HP/i.test(as)){
          const m=as.match(/Stat_Buff:\+(\d+)_HP/i);
          const heal=parseInt(m[1]);
          card._surviveUsed=true;
          card.currentHp=heal;
          // Luka untargetable rest of turn
          if(/Untargetable/i.test(as)) FLAGS.invuln[card._instanceId]=1;
          // Luka priority next turn
          if(/Apply_Priority/i.test(as)&&/Turn/i.test(rule.TD||'')) card._survivedLastTurn=true;
          logMsg('sys',shortName(getCardName(card)),`Survive! Recovered ${heal} HP (now ${card.currentHp})`);
          return true;
        }
        if(/Stat_Buff:\+1_HP/i.test(as)){
          card._surviveUsed=true; card.currentHp=1;
          FLAGS.invuln[card._instanceId]=1; card._survivedLastTurn=true;
          logMsg('sys',shortName(getCardName(card)),'Survive at 1 HP!');
          return true;
        }
      }
    }
  }
  return false;
}

// ============================================================
// COMBAT ANIMATION
// ============================================================
async function playCombatAnimation(atkId, defId, dmgIn, targetObj, defIdx, defTeamStr){
  const aE=document.getElementById(`wrap-${atkId}`); const dE=document.getElementById(`wrap-${defId}`);
  if(aE) aE.classList.add('doing-attack');
  await delay(360);
  let dmg=Math.max(0,dmgIn);
  playAttackSound();
  if(dE&&dmg>0){
    dE.querySelector('.battle-card')?.classList.add('anim-shake');
    const p=document.createElement('div');p.className='dmg-popup';p.textContent=`-${dmg}`;
    (dE.querySelector('.battle-card')||dE).appendChild(p);
    setTimeout(()=>{dE.querySelector('.battle-card')?.classList.remove('anim-shake');p.remove();},900);
  }
  targetObj.currentHp=Math.max(0,targetObj.currentHp-dmg);
  const hpMax=getEffectiveHP_Max(targetObj);
  const pct=Math.max(0,(targetObj.currentHp/hpMax)*100);
  const fill=document.getElementById(`hpf-${defId}`);
  if(fill){fill.style.width=pct+'%';fill.style.background=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B';}
  const hpt=document.getElementById(`hpt-${defId}`);
  if(hpt) hpt.textContent=`${targetObj.currentHp}/${hpMax}`;
  await delay(660);
  if(aE) aE.classList.remove('doing-attack');
}

// ============================================================
// KO HANDLING
// ============================================================
function handleKO(defCard, teamStr, dIdx){
  if(!defCard||defCard.currentHp>0) return;
  // Survive check
  if(checkSurvive(defCard)){ renderArena(); return; }
  defCard.isDead=true;
  removeEffectsForCard(defCard._instanceId);
  if(teamStr==='enemy') playerScore++; else enemyScore++;
  $('score-player').textContent=playerScore; $('score-enemy').textContent=enemyScore;
  const cardEl=document.getElementById(`card-${teamStr}-${dIdx}`);
  if(cardEl) cardEl.classList.add('dead-card');
  logMsg('ko','KO',`${shortName(getCardName(defCard))} knocked out!`);
  _autoSubFromBench(teamStr,dIdx);
}
function _autoSubFromBench(teamStr, dIdx){
  const isP=teamStr==='player';
  const atks=isP?playerActive:enemyActive;
  const bArr=isP?playerBench:enemyBench;
  const alive=bArr.filter(c=>c&&!c.isDead);
  if(!alive.length) return;
  const incoming=alive[0];
  incoming.battleRole=atks[dIdx]?.battleRole||POSITIONS[dIdx]||'PG';
  if(!incoming.currentHp) incoming.currentHp=getCardHP(incoming);
  atks[dIdx]=incoming;
  const bi=bArr.indexOf(incoming); if(bi!==-1) bArr.splice(bi,1);
  incoming._activeRound=1; incoming._teamRef=teamStr;
  fireEnterActiveEffects(incoming,atks,[...atks,...bArr]);
  const fullRoster=[...atks,...bArr];
  evalRosterSynergies([incoming],fullRoster);
  logMsg('sys',isP?'You':'Bot',`${shortName(getCardName(incoming))} enters the game!`);
  renderArena(); renderBenchStacks();
}

function _checkEndGame(){
  const pDead=!playerActive.some(c=>c&&!c.isDead)&&!playerBench.some(c=>c&&!c.isDead);
  const eDead=!enemyActive.some(c=>c&&!c.isDead)&&!enemyBench.some(c=>c&&!c.isDead);
  if(playerScore>=8||eDead){_showEndGame('YOU WIN! 🏆','First to 8 KOs — Victory!');return true;}
  if(enemyScore>=8||pDead){_showEndGame('YOU LOSE 😤',`Opponent reached ${enemyScore} KOs.`);return true;}

}

// BOT AI
// ============================================================
function botStageMoves(){
  const actions=[];
  const botBudget=2; // bot also gets 2 moves
  let movesUsed=0;
  enemyActive.forEach((card,i)=>{
    if(!card||card.isDead) return;
    if(movesUsed>=botBudget) return;
    const ck=card._instanceId;
    if(FLAGS.frozen[ck]>0){actions.push({actionType:'pass',actorIdx:i,targetIdx:null,execTeam:'enemy'});return;}
    if(isDrainedForNature(card,'Offensive')&&isDrainedForNature(card,'Base')){actions.push({actionType:'pass',actorIdx:i,targetIdx:null,execTeam:'enemy'});return;}
    const skills=getCardSkills(card).filter(sk=>{
      if(sk._isReactive) return false;
      if(isSkillDisabled(card,sk)) return false;
      if(isFinite(sk._usesLeft)&&sk._usesLeft<=0) return false;
      if(isFinite(sk._usesPerTurn)&&sk._usesThisTurn>=sk._usesPerTurn) return false;
      return true;
    });
    const vt=getValidTargets(card,playerActive,'Offensive');
    if(!vt.length){actions.push({actionType:'pass',actorIdx:i,targetIdx:null,execTeam:'enemy'});return;}
    const tgt=vt[Math.floor(Math.random()*vt.length)];
    let chosen;
    if(skills.length&&Math.random()<0.55){
      const pick=skills[Math.floor(Math.random()*skills.length)];
      const si=getCardSkills(card).indexOf(pick);
      chosen={actionType:'skill',actorIdx:i,skillIdx:si,targetIdx:tgt.i,execTeam:'enemy'};
      if(pick._isFree){ actions.push(chosen); return; } // free = doesn't cost move budget
    }
    if(!chosen) chosen={actionType:'basic',actorIdx:i,targetIdx:tgt.i,execTeam:'enemy'};
    actions.push(chosen);
    movesUsed++;
  });
  return actions;
}

async function executeSwap(act){
  const isP=act.execTeam==='player';
  const atks=isP?playerActive:enemyActive;
  const bArr=isP?playerBench:enemyBench;
  const leavingCard=atks[act.actorIdx];
  const incoming=bArr[act.targetIdx];
  if(!incoming||!leavingCard) return;
  incoming.battleRole=leavingCard.battleRole;
  if(!incoming.currentHp) incoming.currentHp=getCardHP(incoming);
  atks[act.actorIdx]=incoming;
  bArr[act.targetIdx]=leavingCard;
  logMsg('sys',isP?'You':'Bot',`Swap: ${shortName(getCardName(leavingCard))} → ${shortName(getCardName(incoming))}`);
  incoming._activeRound=1; incoming._teamRef=act.execTeam;
  const fullRoster=[...atks,...bArr];
  fireEnterActiveEffects(incoming,atks,fullRoster);
  evalRosterSynergies([incoming],fullRoster);
  renderArena(); renderBenchStacks(); await delay(700);
}

function getCardStatusTags(card, isEnemy){
  const id=card._instanceId; const tags=[];
  if(FLAGS.frozen[id]>0) tags.push(`<div class="status-tag frozen">❄ FROZEN (${FLAGS.frozen[id]}T)</div>`);
  const drain=FLAGS.drained[id]; if(drain&&drain.turnsLeft>0) tags.push(`<div class="status-tag drained">💤 DRAINED (${drain.turnsLeft}T)</div>`);
  const sd=FLAGS.shutdown[id]; if(sd&&sd.active&&sd.turnsLeft>0) tags.push(`<div class="status-tag shutdown">🚫 SHUTDOWN (${sd.turnsLeft}T)</div>`);
  const buffs=FLAGS.buffed[id]||[]; buffs.filter(b=>b.delay<=0&&b.turnsLeft>0).forEach(b=>tags.push(`<div class="status-tag buffed">⬆ ${b.stat} +${b.amount} (${b.turnsLeft}T)</div>`));
  if(FLAGS.invuln[id]>0) tags.push(`<div class="status-tag invuln">🛡 INVULN</div>`);
  const sd2=FLAGS.skillDisable[id]||[]; if(sd2.length) tags.push(`<div class="status-tag shutdown">⚡ SKILL DISABLED</div>`);
  if(card._statLocked) tags.push(`<div class="status-tag screened">🔒 STAT LOCK</div>`);
  return tags.join('');
}

function onCardClick(side, idx, event){
  event.stopPropagation();
  if(isAnimating) return;
  if(side==='player'){
    const card=playerActive[idx];
    if(!card||card.isDead) return;
    if(stagedActions.some(a=>a.actorIdx===idx)){
      // Click staged card — allow undo via dedicated button
      return;
    }
    // Check if this card already used its non-free move quota (1 non-free per card)
    const nonFreeUsed=stagedActions.filter(a=>a.actorIdx===idx&&!_isFreeSkillAction(a)).length;
    if(nonFreeUsed>=1){
      logMsg('sys','You',`${shortName(getCardName(card))} already used their move this turn!`);
      return;
    }
    // Check budget
    const budget=getMoveBudget(); const nonFreeTotal=getStagedNonFreeCount();
    // If card has a free skill already staged, they can still add a non-free
    showActionPanel(card,idx);
  } else {
    if(uiState==='AWAITING_TARGET'&&pendingAction){
      const actor=playerActive[pendingAction.actorIdx];
      if(!actor) return;
      const vt=getValidTargets(actor,enemyActive,'Offensive');
      if(!vt.some(v=>v.i===idx)){logMsg('sys','You','Not a valid target!');return;}
      pendingAction.targetIdx=idx;
      stageAction(pendingAction);
      uiState='IDLE'; pendingAction=null;
      $('action-panels-wrapper').classList.remove('visible');
      renderArena(); renderMoveBudget();
    }
  }
}
function handleCourtClick(event){
  if(uiState==='AWAITING_TARGET'){uiState='IDLE';pendingAction=null;$('action-panels-wrapper').classList.remove('visible');renderArena();}
}

function showActionPanel(card, actorIdx){
  const ck=card._instanceId;
  const frozen=FLAGS.frozen[ck]>0;
  const wrapper=$('action-panels-wrapper'),nameEl=$('action-card-name'),btnsEl=$('action-btns-row');
  nameEl.textContent=`[${card.battleRole}] ${shortName(getCardName(card))}`;
  btnsEl.innerHTML='';
  // Check overall budget first
  const budget=getMoveBudget(); const nonFreeTotal=getStagedNonFreeCount();
  const budgetFull=nonFreeTotal>=budget;
  // Basic
  const basicDrained=isDrainedForNature(card,'Base');
  const basicBtn=document.createElement('button');
  basicBtn.className='action-btn action-btn-basic';
  basicBtn.innerHTML=`⚡ BASIC <span class="action-btn-dmg">${getEffectiveDMG(card,false,true)+_getConditionalBaseDMGBonus(card,{battleRole:'PG',BasicInfo:{Team:'',HeightInInches:6,Weight:180,SPD:8}})} DMG</span>`;
  basicBtn.disabled=frozen||basicDrained||budgetFull;
  if(frozen) basicBtn.title='Frozen!'; else if(basicDrained) basicBtn.title='Drained!'; else if(budgetFull) basicBtn.title='Move budget full';
  basicBtn.onclick=()=>{pendingAction={actionType:'basic',actorIdx,targetIdx:null,execTeam:'player'};uiState='AWAITING_TARGET';$('action-panels-wrapper').classList.remove('visible');renderArena();};
  btnsEl.appendChild(basicBtn);
  // Skills
  getCardSkills(card).forEach((sk,si)=>{
    if(!sk) return;
    if(sk._isReactive&&!sk._isFree) return; // Reactive skills NOT shown — triggered automatically
    const exhaustedMax=isFinite(sk._usesLeft)&&sk._usesLeft<=0;
    const exhaustedTurn=isFinite(sk._usesPerTurn)&&sk._usesThisTurn>=sk._usesPerTurn;
    const disabled=isSkillDisabled(card,sk);
    const condResult=checkSkillCondition(sk,card,[...playerActive,...playerBench,...enemyActive,...enemyBench]);
    const drained=isDrainedForNature(card,'Offensive')&&!sk._isFree;
    const overBudget=!sk._isFree&&budgetFull;
    const isDisabled=frozen||exhaustedMax||exhaustedTurn||disabled||!condResult.met||drained||overBudget;
    const btn=document.createElement('button');
    btn.className='action-btn action-btn-skill';
    btn.disabled=isDisabled;
    const usesInfo=isFinite(sk._usesLeft)?` [${sk._usesLeft}/${sk._usesLeft+(sk._usesThisTurn||0)} left]`:'';
    btn.innerHTML=`${sk._isFree?'🆓 ':''}${sk.Name||'Skill'} <span class="action-btn-dmg">${sk.Display_DMG||''}${usesInfo}</span>`;
    if(exhaustedMax) btn.title='No uses remaining';
    else if(exhaustedTurn) btn.title='Used this turn';
    else if(disabled) btn.title='Skill disabled';
    else if(!condResult.met) btn.title=condResult.reason||'Condition not met';
    else if(drained) btn.title='Drained!';
    else if(overBudget) btn.title='Move budget full';
    btn.onclick=()=>{pendingAction={actionType:'skill',actorIdx,skillIdx:si,targetIdx:null,execTeam:'player'};uiState='AWAITING_TARGET';$('action-panels-wrapper').classList.remove('visible');renderArena();};
    btnsEl.appendChild(btn);
  });
  // Swap
  const aliveBench=playerBench.filter(c=>c&&!c.isDead);
  if(aliveBench.length&&!budgetFull){
    const swapBtn=document.createElement('button');swapBtn.className='action-btn action-btn-alt';swapBtn.textContent='⇄ SWAP';swapBtn.onclick=()=>openBenchFan(actorIdx);btnsEl.appendChild(swapBtn);
  }
  // Pass (always available — no cost)
  const passBtn=document.createElement('button');passBtn.className='action-btn action-btn-pass';passBtn.textContent='PASS';passBtn.onclick=()=>{stageAction({actionType:'pass',actorIdx,targetIdx:null,execTeam:'player'});$('action-panels-wrapper').classList.remove('visible');};btnsEl.appendChild(passBtn);
  wrapper.classList.add('visible');
}
function stageAction(act){
  stagedActions=stagedActions.filter(a=>a.actorIdx!==act.actorIdx||(act.actionType==='skill'&&_isFreeSkillAction(act)));
  // For free actions, allow multiple per card (append)
  if(act.actionType==='skill'&&_isFreeSkillAction({...act,execTeam:'player'})){
    stagedActions.push(act);
  } else {
    // Remove any existing non-free action for this actor
    stagedActions=stagedActions.filter(a=>!(a.actorIdx===act.actorIdx&&!_isFreeSkillAction(a)));
    stagedActions.push(act);
  }
  _updateCheckoutPanel(); renderArena(); renderMoveBudget();
}
function undoAction(actorIdx){
  // Remove last staged action for this actor
  const idx=stagedActions.map((a,i)=>a.actorIdx===actorIdx?i:-1).filter(x=>x>=0).pop();
  if(idx!==undefined) stagedActions.splice(idx,1);
  _updateCheckoutPanel(); renderArena(); renderMoveBudget();
}
function _updateCheckoutPanel(){
  const panel=$('checkout-panel'),list=$('staged-list'),cnt=$('staged-count');
  if(!panel) return;
  cnt.textContent=stagedActions.length;
  list.innerHTML=stagedActions.map(a=>{
    const c=playerActive[a.actorIdx];
    const sk=a.actionType==='skill'&&a.skillIdx!=null?getCardSkills(c||{})[a.skillIdx]:null;
    const label=a.actionType==='skill'?(sk?.Name||'Skill'):a.actionType==='basic'?'Basic Attack':a.actionType==='swap'?'Swap':'Pass';
    return`<div>▸ [${c?.battleRole||'?'}] ${shortName(getCardName(c||{}))} → ${label}</div>`;
  }).join('');
  panel.style.display=stagedActions.length>0?'flex':'none';
  $('confirm-moves-btn').disabled=stagedActions.length===0;
}
