<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NBA Pellop Hoops Unleashed · TCG Pocket Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--bg-dark:#FFFDF9;--surface:#FFFFFF;--surface-2:#F0EBE0;--border:#E0D8CC;--border-heavy:#C8B89A;--accent:#E8621A;--accent-dark:#C4501A;--accent-light:#FF8C42;--green:#2D6A4F;--green-light:#40916C;--green-pale:#D8F3DC;--text:#1A1A1A;--text-light:#4A4A4A;--text-muted:#8A8A8A;--gold:#C8960C;--gold-light:#FFD166;--red:#D62828;--blue:#1B4F72;--pos-pg:#E8621A;--pos-sg:#D62828;--pos-sf:#2D6A4F;--pos-pf:#1B4F72;--pos-c:#6B3FA0;--pos-6th:#C8960C;--battle-bg:#0A0F1A;--battle-surface:rgba(255,255,255,0.06);--battle-border:rgba(255,255,255,0.15);--log-width:360px;--btn-radius:8px}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow-y:scroll;height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;background:var(--bg)}.screen.active{display:block}
.game-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 22px;border-radius:var(--btn-radius);font-weight:700;font-size:.85rem;cursor:pointer;font-family:'Inter',sans-serif;border:none;position:relative;overflow:hidden;transition:transform .12s ease,filter .12s ease;text-shadow:0 1px 2px rgba(0,0,0,.4);letter-spacing:.5px}
.game-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(0,0,0,.08) 100%);border-radius:inherit;pointer-events:none}
.game-btn:hover:not(:disabled){transform:scale(.97);filter:brightness(1.08)}.game-btn:active:not(:disabled){transform:scale(.94);filter:brightness(.95)}.game-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.game-btn-orange{background:linear-gradient(180deg,#F07030,#C4501A);color:#fff;box-shadow:0 3px 0 #8B3010,0 4px 12px rgba(232,98,26,.4)}
.game-btn-green{background:linear-gradient(180deg,#3A8060,#1E5235);color:#fff;box-shadow:0 3px 0 #0F3020,0 4px 12px rgba(45,106,79,.4)}
.game-btn-red{background:linear-gradient(180deg,#D84040,#982020);color:#fff;box-shadow:0 3px 0 #601010,0 4px 12px rgba(180,40,40,.5)}
.game-btn-blue{background:linear-gradient(180deg,#2A6090,#0D3060);color:#fff;box-shadow:0 3px 0 #081840,0 4px 12px rgba(27,79,114,.4)}
.game-btn-gold{background:linear-gradient(180deg,#E0A820,#A07008);color:#fff;box-shadow:0 3px 0 #604000,0 4px 12px rgba(200,150,12,.4)}
.game-btn-purple{background:linear-gradient(180deg,#9060C0,#602090);color:#fff;box-shadow:0 3px 0 #300860,0 4px 12px rgba(107,63,160,.4)}
.game-btn-outline{background:linear-gradient(180deg,#f5f0e8,#e0d0bc);color:var(--text);box-shadow:0 3px 0 #b8a890,0 2px 6px rgba(0,0,0,.15)}
.game-btn-ghost{background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));color:rgba(255,255,255,.85);box-shadow:0 3px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2)}
.game-btn-teal{background:linear-gradient(180deg,#40E0A0,#1A9060);color:#0A1A10;box-shadow:0 3px 0 #0A5030,0 4px 12px rgba(64,224,160,.3)}
.game-btn-cyan{background:linear-gradient(180deg,#4FC3F7,#0288D1);color:#0A1929;box-shadow:0 3px 0 #014060,0 4px 12px rgba(79,195,247,.4)}
.app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;z-index:100;position:sticky;top:0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-logo-wrap{display:flex;align-items:center;gap:10px}
.header-logo-img{height:38px;width:auto;object-fit:contain}
.nav{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:40px;border:1px solid var(--border)}
.nav-btn{padding:5px 14px;border-radius:30px;font-weight:600;font-size:.8rem;background:transparent;border:none;cursor:pointer;color:var(--text-light);font-family:'Inter',sans-serif;transition:all .15s}
.nav-btn.active,.nav-btn:hover{background:var(--accent);color:#fff}
.tooltip-bubble{position:fixed;z-index:9999;background:rgba(10,15,26,.95);border:1px solid rgba(255,255,255,.2);padding:10px 12px;border-radius:10px;color:#E8E8E8;max-width:280px;font-size:.68rem;line-height:1.4;box-shadow:0 10px 28px rgba(0,0,0,.7);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .15s;font-weight:300}
.tooltip-bubble .tt-name{color:var(--gold-light);font-weight:700;font-size:.82rem;margin-bottom:3px}
.tooltip-bubble .tt-ability{color:#80CFFF;font-weight:600;font-size:.65rem;margin-bottom:2px}
.tooltip-bubble .tt-skill{margin-top:3px}
.tooltip-bubble .tt-skill-name{color:#fff;font-weight:600;font-size:.7rem}
.tooltip-bubble .tt-skill-dmg{color:#FF8C8C;font-size:.65rem}
.tooltip-bubble .tt-skill-desc{color:rgba(255,255,255,.4);font-size:.6rem}
.tooltip-bubble.visible{opacity:1}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);align-items:center}
.styled-search-wrap{position:relative;display:flex;align-items:center}
.styled-search-wrap .search-icon{position:absolute;left:10px;font-size:13px;color:var(--text-muted);pointer-events:none}
input[type="text"].pill-input{padding:6px 12px 6px 30px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:.82rem;height:32px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
input[type="text"].pill-input:focus{border-color:var(--accent)}
input[type="text"].pill-input::placeholder{color:var(--text-muted)}
select.pill-select{padding:5px 12px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:.82rem;height:32px;outline:none;font-family:'Inter',sans-serif;cursor:pointer;transition:border-color .2s}
select.pill-select:focus{border-color:var(--accent)}
.sticky-container{position:sticky;top:0;z-index:90;background:var(--bg)}
#cat-split-wrapper{display:flex;align-items:flex-start;gap:0;min-height:calc(100vh - 90px)}
#cat-left-panel{width:0;overflow:hidden;flex-shrink:0;position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto;background:var(--surface);border-right:2px solid var(--border-heavy);transition:width .35s cubic-bezier(.4,0,.2,1)}
#cat-left-panel.open{width:360px}
.cat-left-inner{width:360px;padding:18px 16px}
.cat-left-card-img{width:100%;aspect-ratio:5/7;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#1a1a2e;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.cat-left-card-img img{width:100%;height:100%;object-fit:cover}
@keyframes catCardIn{0%{transform:rotateY(720deg) scale(.4);opacity:0}15%{opacity:1}70%{transform:rotateY(0deg) scale(1.03)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.cat-left-card-img.animating{animation:catCardIn 1.4s cubic-bezier(.08,.95,.2,1) forwards;perspective:1200px;transform-style:preserve-3d}
#cat-right-panel{flex:1;min-width:0}
#cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:14px 18px;align-items:start}
#home-screen{background:radial-gradient(ellipse at 50% 40%,#1a2a1a,#0a0f0a);min-height:100vh;overflow:hidden}
.home-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:32px;padding:20px;position:relative}
.home-logo-wrap{position:relative;display:inline-block;cursor:default}
.home-logo-glow{position:absolute;inset:-40px;background:radial-gradient(ellipse at center,rgba(232,98,26,.7),rgba(45,106,79,.4) 40%,transparent 70%);border-radius:50%;filter:blur(20px);animation:pulseFlame 2.8s ease-in-out infinite;pointer-events:none;z-index:0}
.home-logo-glow-2{position:absolute;inset:-20px;background:radial-gradient(ellipse at center,rgba(255,180,50,.5),rgba(232,98,26,.3) 50%,transparent 70%);border-radius:50%;filter:blur(12px);animation:pulseFlame2 2.1s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes pulseFlame{0%{opacity:.6;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}100%{opacity:.6;transform:scale(.92)}}
@keyframes pulseFlame2{0%{opacity:.4;transform:scale(1) translateY(0)}50%{opacity:.9;transform:scale(1.05) translateY(-8px)}100%{opacity:.4;transform:scale(1) translateY(0)}}
.home-big-logo{width:min(500px,85vw);position:relative;z-index:1;filter:drop-shadow(0 4px 20px rgba(232,98,26,.5))}
.home-btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px 18px;align-items:start}
.compact-card{position:relative;width:100%;padding-bottom:140%;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .2s,box-shadow .2s;cursor:pointer;border:2px solid var(--border)}
.compact-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 10px 24px rgba(232,98,26,.25);border-color:var(--accent);z-index:5}
.compact-card.in-draft{opacity:.25;pointer-events:none;filter:grayscale(70%)}
.compact-card.selected-panel{border-color:var(--green);box-shadow:0 6px 20px rgba(45,106,79,.35)}
.card-img-sm{position:absolute;inset:0;background:#1a1a2e;pointer-events:none}
.card-img-sm img{width:100%;height:100%;object-fit:cover}
.ec-header{border-bottom:2px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.ec-title{font-size:1.15rem;font-weight:800;line-height:1.1}
.ec-team{color:var(--accent);font-weight:700;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ec-stats-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.ec-stat{background:var(--surface-2);padding:4px 10px;border-radius:6px;font-weight:800;border:1px solid var(--border);font-size:.82rem;display:flex;align-items:center;gap:3px}
.ec-stat span{font-size:.55rem;color:var(--text-muted)}
.ec-ability-block{background:rgba(45,106,79,.06);border-left:3px solid var(--green);padding:6px 8px;margin-bottom:8px;border-radius:0 6px 6px 0}
.ec-ability-name{font-weight:800;color:var(--green);font-size:.82rem}
.ec-ability-desc{font-size:.65rem;color:var(--text-light);line-height:1.35;margin-top:2px}
.ec-skill-wrap{background:var(--surface-2);border:1px solid var(--border);padding:7px 8px;border-radius:8px;margin-bottom:6px}
.ec-skill-header{display:flex;justify-content:space-between;align-items:flex-start;font-weight:800;font-size:.75rem;margin-bottom:3px;gap:4px}
.ec-skill-name{flex:1;color:var(--text)}
.ec-skill-dmg{color:var(--red);background:rgba(214,40,40,.08);padding:1px 5px;border-radius:4px;font-size:.68rem;white-space:nowrap}
.ec-skill-desc{font-size:.62rem;color:var(--text-light);line-height:1.3}
.ec-effect-tag{display:inline-block;background:rgba(200,150,12,.12);color:var(--gold);font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px;border:1px solid rgba(200,150,12,.25)}
.draft-layout{display:flex;min-height:calc(100vh - 90px)}
.draft-main{flex:1;overflow-y:auto;min-width:0}
.draft-sidebar{width:200px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;padding:14px 10px;gap:8px;position:sticky;top:90px;height:calc(100vh - 90px);overflow-y:auto}
.draft-count-display{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;text-align:center;color:var(--accent);text-shadow:2px 2px 0 rgba(0,0,0,.08);letter-spacing:2px;margin-bottom:6px}
.slot-card{background:var(--surface-2);border-radius:8px;border:1.5px dashed var(--border-heavy);padding:5px 6px;min-height:48px;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.slot-card.filled{border-style:solid;background:#fff}
.slot-pos{font-weight:900;font-size:.9rem;letter-spacing:1px;pointer-events:none}
.slot-name{font-weight:600;font-size:.6rem;color:var(--text);white-space:normal;line-height:1.2;pointer-events:none;word-wrap:break-word;width:100%;margin-top:2px}
.slot-card.drag-over{background:rgba(232,98,26,.08);border-style:solid;border-color:var(--accent)}
.slot-PG.filled{border-color:var(--pos-pg)}.slot-PG .slot-pos{color:var(--pos-pg)}
.slot-SG.filled{border-color:var(--pos-sg)}.slot-SG .slot-pos{color:var(--pos-sg)}
.slot-SF.filled{border-color:var(--pos-sf)}.slot-SF .slot-pos{color:var(--pos-sf)}
.slot-PF.filled{border-color:var(--pos-pf)}.slot-PF .slot-pos{color:var(--pos-pf)}
.slot-C.filled{border-color:var(--pos-c)}.slot-C .slot-pos{color:var(--pos-c)}
.remove-slot,.setup-remove{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;z-index:100;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:bold;border:none;box-shadow:0 2px 0 #601010,0 2px 5px rgba(180,40,40,.5);transition:transform .12s}
.remove-slot:hover,.setup-remove:hover{transform:scale(.88)}
#draft-grid-wrapper{display:flex;align-items:flex-start;min-height:100%;flex-direction:row-reverse}
#draft-cards-col{flex:1;min-width:0}
#draft-side-panel{width:0;overflow:hidden;transition:width .35s cubic-bezier(.4,0,.2,1);flex-shrink:0;background:var(--surface);border-right:2px solid var(--border);position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto}
#draft-side-panel.open{width:380px}
.side-panel-inner{padding:18px 16px;width:380px}
.side-panel-card-img{width:100%;aspect-ratio:5/7;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#1a1a2e;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.side-panel-card-img img{width:100%;height:100%;object-fit:cover}
@keyframes panelCardIn{0%{transform:rotateY(720deg) scale(.4);opacity:0}15%{opacity:1}70%{transform:rotateY(0deg) scale(1.03)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.side-panel-card-img.animating{animation:panelCardIn 1.4s cubic-bezier(.08,.95,.2,1) forwards;perspective:1200px;transform-style:preserve-3d}
.side-panel-close{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;background:linear-gradient(180deg,#D84040,#982020);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:bold;z-index:10;box-shadow:0 3px 0 #601010;border:none;transition:transform .12s}
.side-panel-close:hover{transform:scale(.85)}
.side-panel-relative{position:relative}
#setup-screen{background:var(--bg)}
.setup-header-bar{background:var(--surface);padding:10px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.setup-slots-row{display:flex;justify-content:center;gap:10px;padding:14px 20px 6px;flex-wrap:nowrap;overflow-x:auto}
.setup-slot-card{width:240px;height:336px;flex-shrink:0;background:var(--surface);border-radius:10px;border:2px dashed var(--border-heavy);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:visible;transition:all .2s}
.setup-slot-card.filled{border-style:solid;border-width:2px}
.setup-slot-card.drag-over{box-shadow:0 0 18px rgba(232,98,26,.4);transform:scale(1.03);border-color:var(--accent)}
.setup-slot-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.setup-slot-pos{font-weight:900;font-size:1.4rem;letter-spacing:1px;z-index:2}
.setup-slot-drop-text{font-size:.62rem;opacity:.4;margin-top:5px;z-index:2}
.setup-slot-PG.filled{border-color:var(--pos-pg)}.setup-slot-PG .setup-slot-pos{color:var(--pos-pg)}
.setup-slot-SG.filled{border-color:var(--pos-sg)}.setup-slot-SG .setup-slot-pos{color:var(--pos-sg)}
.setup-slot-SF.filled{border-color:var(--pos-sf)}.setup-slot-SF .setup-slot-pos{color:var(--pos-sf)}
.setup-slot-PF.filled{border-color:var(--pos-pf)}.setup-slot-PF .setup-slot-pos{color:var(--pos-pf)}
.setup-slot-C.filled{border-color:var(--pos-c)}.setup-slot-C .setup-slot-pos{color:var(--pos-c)}
.setup-counter{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.2rem;color:var(--green);letter-spacing:2px}
.setup-action-bar{display:flex;align-items:center;justify-content:center;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px}
.bench-label{font-weight:800;color:var(--accent);padding:10px 20px 4px}
.bench-scroll-row{padding:10px 20px;display:flex;flex-direction:row;overflow-x:auto;gap:12px;flex-wrap:nowrap;scroll-snap-type:x mandatory}
.bench-scroll-row::-webkit-scrollbar{height:5px}
.bench-scroll-row::-webkit-scrollbar-track{background:var(--border);border-radius:3px}
.bench-scroll-row::-webkit-scrollbar-thumb{background:#7ab49a;border-radius:3px}
.bench-card-item{width:240px;height:336px;flex-shrink:0;scroll-snap-align:start;background:#1a1a2e;border-radius:10px;overflow:hidden;cursor:grab;border:2px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;transition:transform .2s,box-shadow .2s}
.bench-card-item:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(232,98,26,.25);border-color:var(--accent)}
.bench-card-item img{width:100%;height:100%;object-fit:cover}
#battle-screen{background:var(--battle-bg);color:#fff;overflow:hidden}
.battle-app-header{background:rgba(10,15,26,.97);border-bottom:1px solid rgba(255,255,255,.1);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;backdrop-filter:blur(10px)}
.battle-logo-img{height:34px;width:auto;object-fit:contain}
.arena-container{display:flex;height:100vh;width:100%;overflow:hidden;position:relative;padding-top:44px;transition:padding-right .4s cubic-bezier(.4,0,.2,1)}
.arena-container.log-open{padding-right:var(--log-width)}
.court-area{flex:1;display:flex;flex-direction:column;background:url('https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/BATTLE%20BACKDROPS/grassy_court.png') center/cover no-repeat,radial-gradient(ellipse at center,#0d1b2a,#050a12);padding:10px 20px 8px;justify-content:space-between;overflow:hidden;position:relative;transition:all .4s cubic-bezier(.4,0,.2,1)}
.floating-scoreboard{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(10,15,26,.88);border:1.5px solid rgba(255,255,255,.15);padding:5px 24px;border-radius:12px;display:flex;flex-direction:column;align-items:center;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.score-board{display:flex;gap:16px;font-family:'Orbitron',sans-serif;font-size:2.5rem;line-height:1;font-weight:900}
#turn-indicator{font-weight:700;color:rgba(255,255,255,.5);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
.active-fan-wrapper{display:flex;justify-content:center;align-items:flex-end;position:relative;width:100%;height:270px;margin-bottom:120px}
.enemy-fan-wrapper{display:flex;justify-content:center;align-items:flex-start;position:relative;width:100%;height:290px;margin-top:50px}
.active-card-wrap,.enemy-card-wrap{transition:all .3s cubic-bezier(.2,.8,.2,1);cursor:pointer;position:relative;display:inline-block;margin:0 -20px}
.active-card-wrap:hover,.enemy-card-wrap:hover{transform:rotate(var(--base-rot)) translateY(var(--base-y)) scale(1.4)!important;margin:0 35px!important;z-index:100!important}
.active-card-wrap:hover{filter:drop-shadow(0 20px 30px rgba(64,224,160,.5))}
.enemy-card-wrap:hover{filter:drop-shadow(0 -10px 30px rgba(255,107,107,.7))}
.battle-card{width:165px;height:231px;border-radius:10px;border:2px solid rgba(255,255,255,.2);overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.7);position:relative;background:#0f1320;transition:border .2s,box-shadow .2s}
.battle-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.dead-card{filter:grayscale(100%) brightness(.3);pointer-events:none;opacity:.7}
.battle-card.staged{border-color:#40E0A0!important;box-shadow:0 0 18px 3px rgba(64,224,160,.5)}
.battle-card.valid-target{border-color:#FFA500!important;animation:pulseTarget 1.3s infinite ease-in-out}

// ============================================================
// COMBAT ENGINE — ACTION STRING PARSER + STATE MANAGER
// ============================================================

const ENGINE = (() => {

  // ── Helpers ──────────────────────────────────────────────
  function parseHeight(h) {
    if (!h) return 0;
    const m = String(h).match(/(\d+)'(\d+|[\d]+)/);
    return m ? parseInt(m[1]) * 12 + parseInt(m[2]) : 0;
  }

  function parseUM(umStr) {
    const out = { usesPerTurn: 99, maxUses: 99, priority: 1 };
    if (!umStr) return out;
    const parts = String(umStr).split('|').map(s => s.trim());
    parts.forEach(p => {
      const m = p.match(/^([UMP]):(-?\d+)/);
      if (!m) return;
      const [, k, v] = m;
      if (k === 'U') out.usesPerTurn = parseInt(v);
      else if (k === 'M') out.maxUses = parseInt(v);
      else if (k === 'P') out.priority = parseInt(v);
    });
    return out;
  }

  function parseTD(tdStr) {
    const out = { turns: 0, delay: 0 };
    if (!tdStr || tdStr === 'DEFAULT') return out;
    const parts = String(tdStr).split('|').map(s => s.trim());
    parts.forEach(p => {
      const m = p.match(/^([TD]):(\d+)/);
      if (m) { if (m[1] === 'T') out.turns = parseInt(m[2]); else out.delay = parseInt(m[2]); }
    });
    return out;
  }

  // Parse "Deal_Flat_DMG:1150" → { type, value }
  function parseActionString(actionStr) {
    if (!actionStr) return { type: 'NONE' };
    const s = String(actionStr).trim();

    // Deal_Flat_DMG:N
    let m = s.match(/^Deal_Flat_DMG:(\d+)$/i);
    if (m) return { type: 'DEAL_FLAT_DMG', value: parseInt(m[1]) };

    // Deal_Assist_Dmg:Nx_Base:Ref(POS) or Deal_Assist_Dmg:+N_Base:Ref(POS)
    m = s.match(/^Deal_Assist_Dmg:([\d.]+)x_Base:Ref\(([^)]+)\)$/i);
    if (m) return { type: 'DEAL_ASSIST_DMG_MULT', mult: parseFloat(m[1]), ref: m[2].split('/') };
    m = s.match(/^Deal_Assist_Dmg:\+(\d+)_Base:Ref\(([^)]+)\)$/i);
    if (m) return { type: 'DEAL_ASSIST_DMG_ADD', add: parseInt(m[1]), ref: m[2].split('/') };

    // Stat_Buff:+/-N_TYPE
    m = s.match(/^Stat_Buff:([+-]\d+)_(MAX_HP|HP|Base|SPD|Nature:Offensive(?::\w+)?)$/i);
    if (m) {
      const val = parseInt(m[1]), typ = m[2].toLowerCase();
      if (typ === 'max_hp') return { type: 'STAT_BUFF_MAX_HP', value: val };
      if (typ === 'hp') return { type: 'STAT_BUFF_HP', value: val };
      if (typ === 'base') return { type: 'STAT_BUFF_BASE_DMG', value: val };
      if (typ === 'spd') return { type: 'STAT_BUFF_SPD', value: val };
      if (typ.startsWith('nature:offensive')) return { type: 'STAT_BUFF_SKILL_DMG', value: val };
    }

    // Untargetable_By:...
    if (s.startsWith('Untargetable_By:')) {
      const rest = s.slice('Untargetable_By:'.length);
      return { type: 'UNTARGETABLE_BY', spec: rest };
    }

    // Apply_Modifier:Damage_Reduction:x0.5:...
    m = s.match(/^Apply_Modifier:Damage_Reduction:x([\d.]+)/i);
    if (m) return { type: 'DAMAGE_REDUCTION_MULT', mult: parseFloat(m[1]) };
    m = s.match(/^Apply_Modifier:Damage_Reduction:(\d+)_Flat/i);
    if (m) return { type: 'DAMAGE_REDUCTION_FLAT', value: parseInt(m[1]) };

    // Apply_Priority:...
    m = s.match(/^Apply_Priority:.*?(\d+)x$/i);
    if (m) return { type: 'APPLY_PRIORITY', multiplier: parseInt(m[1]) };

    // Behavior_Modifier:Force_Enemy_Lock_Attack_On_Self
    if (s.includes('Force_Enemy_Lock_Attack_On_Self')) return { type: 'FORCE_LOCK_ON_SELF' };

    // Reactionary_DMG_Reduction:N
    m = s.match(/^Reactionary_DMG_Reduction:(\d+)$/i);
    if (m) return { type: 'REACTIONARY_DMG_REDUCTION', value: parseInt(m[1]) };

    // Block / Freeze / Grant_Extra_Move — simple keywords
    const kw = s.toUpperCase();
    if (kw === 'BLOCK') return { type: 'BLOCK' };
    if (kw === 'FREEZE') return { type: 'FREEZE' };
    if (kw === 'GRANT_EXTRA_MOVE') return { type: 'GRANT_EXTRA_MOVE' };
    if (kw === 'CONTEST') return { type: 'CONTEST' };
    if (kw === 'INTERCEPT') return { type: 'INTERCEPT' };

    // Stat_Buff:+300_HP (alias)
    m = s.match(/^Stat_Buff:\+(\d+)_HP$/i);
    if (m) return { type: 'STAT_BUFF_HP', value: parseInt(m[1]) };

    return { type: 'UNKNOWN', raw: s };
  }

  // ── Condition Evaluator ───────────────────────────────────
  function evalCondition(cond, ctx) {
    // ctx = { self, ownTeam, enemyTeam, castingEnemy, castingTeammate, targetEnemy }
    if (!cond) return true;
    const { target, attribute, operator, value } = cond;
    let subject = null;

    if (target === 'Self') subject = ctx.self;
    else if (target === 'Own_Team') subject = ctx.ownTeam;
    else if (target === 'Enemy_Team') subject = ctx.enemyTeam;
    else if (target === 'Casting_Enemy') subject = ctx.castingEnemy;
    else if (target === 'Casting_Teammate') subject = ctx.castingTeammate;
    else if (target === 'Targeted_Enemy') subject = ctx.targetEnemy;

    if (!subject) return false;

    // Team-level checks (array subjects)
    if (Array.isArray(subject)) {
      if (attribute === 'Team_ID') {
        const matchingAlive = subject.filter(c => c && !c.isDead && getCardTeam(c) === value && c !== ctx.self);
        if (operator === '=') return matchingAlive.length > 0;
        if (operator === '!=') return matchingAlive.length === 0;
      }
      if (attribute === 'Player_Count') {
        const alive = subject.filter(c => c && !c.isDead && c !== ctx.self);
        return compare(alive.length, operator, parseInt(value));
      }
      if (attribute === 'Pos') {
        const matching = subject.filter(c => c && !c.isDead && getCardPos(c).includes(value));
        return operator === '=' ? matching.length > 0 : matching.length === 0;
      }
      return false;
    }

    // Single card checks
    let lhs;
    if (attribute === 'Height') lhs = parseHeight(getCardHeight(subject));
    else if (attribute === 'SPD') lhs = getCardSPD(subject);
    else if (attribute === 'HP') lhs = subject.currentHp ?? getCardHP(subject);
    else if (attribute === 'Weight') lhs = subject.UI_Frontend_Data?.Weight ?? 0;
    else if (attribute === 'Team_ID') {
      lhs = getCardTeam(subject);
      const rhs = String(value);
      if (operator === '=') return lhs === rhs;
      if (operator === '!=') return lhs !== rhs;
      return false;
    }
    else if (attribute === 'Pos') {
      const positions = getCardPos(subject);
      if (operator === '=') return positions.includes(String(value));
      if (operator === '!=') return !positions.includes(String(value));
      return false;
    }
    else return true;

    const rhsNum = attribute === 'Height' ? parseHeight(String(value)) : parseFloat(value);
    return compare(lhs, operator, rhsNum);
  }

  function compare(a, op, b) {
    if (op === '<=' || op === '=<') return a <= b;
    if (op === '>=' || op === '=>') return a >= b;
    if (op === '<') return a < b;
    if (op === '>') return a > b;
    if (op === '!=' || op === '!') return a !== b;
    return a == b;
  }

  // ── Ability Passive Boot ─────────────────────────────────
  function bootPassiveAbilities(card, ownTeam) {
    const ability = card.Ability;
    if (!ability || !ability.Rules) return;
    ability.Rules.forEach(rule => {
      const trigger = String(rule.trigger || '');
      if (!trigger.startsWith('ON:ALWAYS')) return;
      const parsed = parseActionString(rule.action);
      applyPassiveFlag(card, parsed, rule);
    });
    // Priority from Apply_Priority
    ability.Rules.forEach(rule => {
      const parsed = parseActionString(rule.action);
      if (parsed.type === 'APPLY_PRIORITY') {
        card._priorityBonus = Math.max(card._priorityBonus || 1, parsed.multiplier);
      }
    });
  }

  function applyPassiveFlag(card, parsed, rule) {
    switch (parsed.type) {
      case 'UNTARGETABLE_BY':
        _applyUntargetableFlag(card, parsed.spec);
        break;
      case 'FORCE_LOCK_ON_SELF':
        card._forcedTarget = true;
        break;
      case 'DAMAGE_REDUCTION_MULT':
        card._passiveDmgReductionMult = parsed.mult;
        break;
      case 'DAMAGE_REDUCTION_FLAT':
        card._passiveDmgReductionFlat = (card._passiveDmgReductionFlat || 0) + parsed.value;
        break;
    }
  }

  function _applyUntargetableFlag(card, spec) {
    const s = spec.toUpperCase();
    if (s.includes('DEFENSIVE:STEAL')) card._immuneSteal = true;
    if (s.includes('DEFENSIVE:FREEZE')) card._immuneFreeze = true;
    if (s.includes('DEFENSIVE:BLOCK+CONTEST') || s.includes('DEFENSIVE:BLOCK')) {
      if (s.includes('NATURE:OFFENSIVE_SKILLS') || s.includes(':NATURE:')) {
        card._skillsUnblockable = true;
        if (s.includes('BLOCK+CONTEST') || s.includes('CONTEST')) card._skillsUncontestable = true;
      } else {
        card._skillsUnblockable = true;
      }
    }
    if (s.includes('DEFENSIVE:CONTEST') && s.includes('NATURE:OFFENSIVE_SKILLS')) card._skillsUncontestable = true;
    if (s.includes('UTILITY:NULLIFY')) card._defensiveSkillsUnnullifiable = true;
    if (s.includes('DEFENSIVE:BLOCK+CONTEST:NATURE:OFFENSIVE_SKILLS')) {
      card._skillsUnblockable = true; card._skillsUncontestable = true;
    }
    // Height-gated block immunity
    if (s.includes('DEFENSIVE:BLOCK+CONTEST:NATURE:OFFENSIVE_SKILLS') && card.Ability) {
      const rule = card.Ability.Rules?.find(r => r.action?.includes('Block+Contest'));
      if (rule?.condition?.attribute === 'Height') {
        card._heightBlockImmune = true;
        card._heightBlockThreshold = parseHeight(String(rule.condition.value));
      }
    }
  }

  // ── Roster-Change Ability Checks ─────────────────────────
  function evalRosterAbilities(card, ownTeam, prevTeam) {
    const ability = card.Ability;
    if (!ability || !ability.Rules) return;
    ability.Rules.forEach(rule => {
      const trigger = String(rule.trigger || '');
      if (!trigger.startsWith('ON:ROSTER')) return;

      const ctx = { self: card, ownTeam, enemyTeam: [] };
      const condA = evalCondition(rule.condition, ctx);
      const condB = rule.condition_b ? evalCondition(rule.condition_b, ctx) : true;

      const allMet = rule.logic === 'AND' ? (condA && condB) : condA;
      if (!allMet) return;

      const parsed = parseActionString(rule.action);
      _applyStatBuff(card, parsed);
      logMsg('sys', 'System', `ABILITY: ${shortName(getCardName(card))} — ${rule.action}`);
    });
  }

  function _applyStatBuff(card, parsed) {
    switch (parsed.type) {
      case 'STAT_BUFF_MAX_HP':
        card.UI_Frontend_Data.Stats.HP = Math.max(0, card.UI_Frontend_Data.Stats.HP + parsed.value);
        card.currentHp = Math.max(0, Math.min(card.currentHp + parsed.value, card.UI_Frontend_Data.Stats.HP));
        break;
      case 'STAT_BUFF_HP':
        card.currentHp = Math.max(0, Math.min(card.currentHp + parsed.value, card.UI_Frontend_Data.Stats.HP));
        break;
      case 'STAT_BUFF_BASE_DMG':
        card.UI_Frontend_Data.Stats.Base_DMG = Math.max(0, card.UI_Frontend_Data.Stats.Base_DMG + parsed.value);
        break;
      case 'STAT_BUFF_SPD':
        card.UI_Frontend_Data.Stats.Speed = Math.max(1, card.UI_Frontend_Data.Stats.Speed + parsed.value);
        break;
      case 'STAT_BUFF_SKILL_DMG':
        card._skillDmgBonus = (card._skillDmgBonus || 0) + parsed.value;
        break;
    }
  }

  // ── Skill Engine ─────────────────────────────────────────
  function parseSkill(skill) {
    const umParsed = parseUM(skill.UM);
    const tdParsed = parseTD(skill.TD);
    const actionParsed = parseActionString(skill.Modifiers);
    const timing = String(skill.Timing || '');

    return {
      ...umParsed,
      ...tdParsed,
      actionParsed,
      isReactive: timing.startsWith('Reactive'),
      isFreeAction: timing.includes('_Free'),
      isStandard: timing.startsWith('Standard'),
      timingStr: timing,
      hasCoinFlip: String(skill.Conditions || '').includes('Coin_Flip'),
      coinFlipCount: (() => {
        const m = String(skill.Conditions || '').match(/Coin_Flip:(\d+)/);
        return m ? parseInt(m[1]) : 0;
      })()
    };
  }

  // ── Damage Calculator ─────────────────────────────────────
  function calculateDamage(action, actingCard, targetCard, ownTeamArr) {
    const { actionParsed, skillObj } = action;
    let dmg = 0;

    switch (actionParsed.type) {
      case 'DEAL_FLAT_DMG':
        dmg = actionParsed.value + (actingCard._skillDmgBonus || 0);
        break;

      case 'DEAL_ASSIST_DMG_MULT': {
        const refCard = ownTeamArr.find(c => c && !c.isDead && actionParsed.ref.includes(c.battleRole));
        if (refCard) dmg = Math.floor(actionParsed.mult * getCardDMG(refCard));
        break;
      }

      case 'DEAL_ASSIST_DMG_ADD': {
        const refCard = ownTeamArr.find(c => c && !c.isDead && actionParsed.ref.includes(c.battleRole));
        if (refCard) dmg = getCardDMG(refCard) + actionParsed.add;
        break;
      }

      default:
        dmg = 0;
    }

    // Apply target's passive damage reductions
    if (targetCard._passiveDmgReductionMult) dmg = Math.floor(dmg * targetCard._passiveDmgReductionMult);
    if (targetCard._passiveDmgReductionFlat) dmg = Math.max(0, dmg - targetCard._passiveDmgReductionFlat);

    return Math.max(0, dmg);
  }

  // ── Ability Check: can this action be blocked/contested/stolen? ─
  function checkAbilityReaction(attacker, defender, actionType, skillNature) {
    // actionType: 'basic' | 'skill'
    // skillNature: e.g. 'Offensive:Close_Shot'
    const isSkill = actionType === 'skill';
    const isBasic = actionType === 'basic';

    // Steal immunity
    if (isBasic && defender && attacker._immuneSteal) return { blocked: false, reason: 'immune_steal' };

    // Block immunity
    if (isSkill && attacker._skillsUnblockable) return { canBlock: false };

    // Contest immunity
    if (isSkill && attacker._skillsUncontestable) return { canContest: false };

    // Height-based block immunity
    if (isSkill && attacker._heightBlockImmune && defender) {
      const defH = parseHeight(getCardHeight(defender));
      if (defH <= attacker._heightBlockThreshold) return { canBlock: false, canContest: false };
    }

    return {};
  }

  // ── Reactive Skill Trigger Check ─────────────────────────
  function canReactiveSkillTrigger(reactiveCard, reactSkill, attackNature, attackType) {
    const timing = String(reactSkill.Timing || '');
    const nat = String(attackNature || '').toLowerCase();

    if (timing.includes('On_Enemy_Nature:Offensive:Close_Shot') && nat.includes('close_shot')) return true;
    if (timing.includes('On_Enemy_Nature:Offensive:Jump_Shot') && nat.includes('jump_shot')) return true;
    if (timing.includes('On_Enemy_Nature:Offensive+Base')) return true;
    if (timing.includes('On_Teammate_Action:Miss|Block|Contest')) return true;
    if (timing.includes('On_Teammate_Nature:Offensive')) return true;
    if (timing.includes('On_Enemy_Nature:Offensive') && (nat.includes('offensive') || attackType === 'basic')) return true;
    return false;
  }

  // ── Public API ────────────────────────────────────────────
  return {
    parseHeight,
    parseUM,
    parseTD,
    parseActionString,
    parseSkill,
    evalCondition,
    bootPassiveAbilities,
    evalRosterAbilities,
    calculateDamage,
    checkAbilityReaction,
    canReactiveSkillTrigger,
    applyPassiveFlag,
    _applyStatBuff,
    _applyUntargetableFlag
  };
})();

function autoFillDraft(){draftSquad={PG:[null,null],SG:[null,null],SF:[null,null],PF:[null,null],C:[null,null]};const shuf=[...CARDS].sort(()=>Math.random()-.5);POSITIONS.forEach(pos=>{const m=shuf.filter(c=>getCardPos(c).includes(pos)&&!isCardInDraft(c));if(m[0])draftSquad[pos][0]=m[0];if(m[1])draftSquad[pos][1]=m[1];});renderDraftSlots();filterDraftGrid();}

let playerActive=[],playerBench=[],enemyActive=[],enemyBench=[];
let playerScore=0,enemyScore=0,turnCount=1,isAnimating=false;
let uiState='IDLE',pendingAction=null,stagedActions=[];
let playerBenchOpen=false;

function cloneCard(c, team) {
  const cc = JSON.parse(JSON.stringify(c));
  cc.currentHp = getCardHP(cc);
  cc.isDead = false;
  cc._instanceId = mkId(team, getCardName(cc));
  cc._priorityBonus = 1;
  cc._skillDmgBonus = 0;
  // Boot passive ability flags from ENGINE
  ENGINE.bootPassiveAbilities(cc, []);
  // Init skill use counters from UM string
  (cc.Skills || []).forEach(sk => {
    const um = ENGINE.parseUM(sk.UM);
    sk._usesLeft = um.maxUses;
    sk._usesThisTurn = 0;
    sk._priority = um.priority;
    sk._usesPerTurn = um.usesPerTurn;
    // Parse skill metadata once
    sk._parsed = ENGINE.parseSkill(sk);
  });
  return cc;
}

function buildEnemyRoster() {
  const dr={PG:[],SG:[],SF:[],PF:[],C:[]};
  const p=[...CARDS].sort(()=>Math.random()-.5);
  for(const c of p){for(const po of getCardPos(c)){if(POSITIONS.includes(po)&&dr[po].length<2){if(!POSITIONS.some(x=>dr[x].some(y=>getCardName(y)===getCardName(c)))){dr[po].push(c);break;}}}if(POSITIONS.every(x=>dr[x].length>=2))break;}
  const st=[],be=[];POSITIONS.forEach(po=>{if(dr[po][0]){const c=cloneCard(dr[po][0],'enemy');c.battleRole=po;st.push(c);}if(dr[po][1]){const c=cloneCard(dr[po][1],'enemy');c.battleRole=po;be.push(c);}});
  return {st,be};
}

function startBattle() {
  playerActive=POSITIONS.map(po=>{if(!activeLineup[po])return null;const c=cloneCard(activeLineup[po],'player');c.battleRole=po;return c;}).filter(Boolean);
  playerBench=benchRoster.filter(c=>!playerActive.some(ac=>getCardName(ac)===getCardName(c))).map(c=>cloneCard(c,'player'));
  const eR=buildEnemyRoster();enemyActive=eR.st;enemyBench=eR.be;
  playerScore=0;enemyScore=0;turnCount=1;stagedActions=[];uiState='IDLE';
  _statBuffs={};_activeEffects=[];_synergyApplied=new Set();
  _frozen={};_shutdown={};_drained={};_invulnerable={};_screened={};_surviveUsed={};

  // Boot synergy abilities for everyone on their teams
  [...playerActive,...playerBench].forEach(c=>{if(c) ENGINE.evalRosterAbilities(c, [...playerActive,...playerBench]);});
  [...enemyActive,...enemyBench].forEach(c=>{if(c) ENGINE.evalRosterAbilities(c, [...enemyActive,...enemyBench]);});

  $('battle-log').innerHTML='';
  logMsg('sys','System','Match initiated. First to 8 KOs wins.');
  $('score-player').textContent='0';$('score-enemy').textContent='0';$('checkout-panel').style.display='none';
  $('turn-indicator').textContent='TURN 1 — STAGING';showScreen('battle-screen');initBattleAudio();renderArena();
}

function renderArena(){renderBenchStacks();$('enemy-active-row').innerHTML=renderFanned(enemyActive,true);$('player-active-row').innerHTML=renderFanned(playerActive,false);}
function renderFanned(team,isEnemy){
  const n=team.length;if(!n)return '';
  return team.map((c,i)=>{
    const mid=(n-1)/2,offset=i-mid,arcY=isEnemy?-(offset*offset*12):(offset*offset*12),rot=isEnemy?(-offset*8):(offset*8);
    const hpMax=getCardHP(c),pct=Math.max(0,(c.currentHp/hpMax)*100),clr=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B';
    const isStaged=!isEnemy&&stagedActions.some(a=>a.actorIdx===i);
    let isValidTgt=false;
    if(isEnemy&&uiState==='AWAITING_TARGET'&&pendingAction){const actor=playerActive[pendingAction.actorIdx];if(actor)isValidTgt=getValidTargets(actor,enemyActive).some(v=>v.i===i);}
    const ck=c._instanceId;
    let badges='';
    if(_frozen[ck]) badges+=`<div class="card-status-badge badge-frozen">❄ FROZEN</div>`;
    if(_drained[ck]) badges+=`<div class="card-status-badge badge-drained">💤 DRAINED</div>`;
    if(_shutdown[ck]) badges+=`<div class="card-status-badge badge-shutdown">🚫 SHUTDOWN</div>`;
    if(_statBuffs[ck]&&_statBuffs[ck].started) badges+=`<div class="card-status-badge badge-buffed">⬆ BUFFED</div>`;
    if(_screened[ck]) badges+=`<div class="card-status-badge badge-screened">🛡 SCREENED</div>`;
    const wrapClass=isEnemy?'enemy-card-wrap':'active-card-wrap';
    const cardClass=`battle-card ${c.isDead?'dead-card':''} ${isStaged?'staged':''} ${isValidTgt?'valid-target':''}`;
    const tN=escapeJS(getCardName(c));
    return `<div class="${wrapClass}" id="wrap-${isEnemy?'enemy':'player'}-${i}" style="--base-rot:${rot}deg;--base-y:${arcY}px;transform:rotate(var(--base-rot)) translateY(var(--base-y));transform-origin:${isEnemy?'top center':'bottom center'};" onclick="onCardClick('${isEnemy?'enemy':'player'}',${i},event)" onmousemove="handleTooltipHover(event,'${tN}',this)" onmouseleave="hideTooltip()">${isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-enemy-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}<div class="${cardClass}" id="card-${isEnemy?'enemy':'player'}-${i}"><img src="${getImgUrl(getCardImg(c),getCardName(c))}" onerror="handleImgError(this,'${tN}')">${badges}</div>${isStaged?`<button class="undo-btn" onclick="event.stopPropagation();undoAction(${i})">✕</button>`:''}${!isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-player-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}<div class="hp-text" id="hpt-${isEnemy?'enemy':'player'}-${i}">${c.currentHp}/${hpMax}</div></div>`;
  }).join('');
}

// ── TARGETING ─────────────────────────────────────────────────
function getValidTargets(atkC, tgtTeam) {
  const role = atkC.battleRole || 'PG';
  const validRoles = TARGET_MATRIX[role] || [];
  return tgtTeam.map((c,i) => ({c,i})).filter(d => {
    if (!d.c || d.c.isDead) return false;
    // Forced-lock check: if this enemy has _forcedTarget, all attacks must go to it
    return validRoles.includes(d.c.battleRole);
  });
}

function showModal(title, desc, options, skipLabel = 'SKIP / CANCEL') {

    $('uni-modal-desc').textContent = desc;
    $('uni-modal-options').innerHTML = options.map((opt, i) => `<button class="game-btn game-btn-${opt.color||'purple'}" style="width:100%;text-align:left;" onclick="window._modalResolve(${i})">${opt.label}</button>`).join('');
    $('uni-modal-skip').textContent = skipLabel;
    $('uni-modal-skip').onclick = () => { $('uni-modal').style.display='none'; resolve(null); };
    window._modalResolve = (i) => { $('uni-modal').style.display='none'; resolve(i); };
    $('uni-modal').style.display = 'flex';
  });
}

// ── BENCH FAN ─────────────────────────────────────────────────
function openBenchFan() {
  playerBenchOpen=true;
  $('bench-fan-overlay').classList.add('open');$('bench-fan-stage').innerHTML='';
  $('checkout-panel').classList.add('panel-blur');
  const aliveBench=playerBench.filter(c=>!c.isDead),n=aliveBench.length;
  aliveBench.forEach((c,i)=>{
    const mid=(n-1)/2,offset=i-mid,angle=offset*10,arcY=offset*offset*12;
    const wrap=document.createElement('div');wrap.className='bench-fan-card-wrap';
    wrap.style.cssText=`z-index:${n+i};--base-rot:${angle}deg;--base-y:${arcY}px;transform:rotate(var(--base-rot)) translateY(var(--base-y));`;
    const card=document.createElement('div');card.className='bench-fan-card';
    const img=document.createElement('img');img.src=getImgUrl(getCardImg(c),getCardName(c));img.onerror=()=>handleImgError(img,getCardName(c));
    card.appendChild(img);wrap.appendChild(card);
    wrap.onmousemove=ev=>handleTooltipHover(ev,getCardName(c),wrap);wrap.onmouseleave=hideTooltip;
    if(uiState==='AWAITING_BENCH'&&pendingAction?.pos){if(!getCardPos(c).includes(pendingAction.pos))wrap.classList.add('ineligible');}
    wrap.onclick=ev=>{ev.stopPropagation();onBenchFanCardClick(i);};
    $('bench-fan-stage').appendChild(wrap);
  });
}
function closeBenchFan(){playerBenchOpen=false;$('bench-fan-overlay').classList.remove('open');$('checkout-panel').classList.remove('panel-blur');if(uiState==='AWAITING_BENCH'){uiState='IDLE';pendingAction=null;logMsg('sys','System','Swap cancelled.');}}
function handleBenchOverlayClick(e){if(e.target===e.currentTarget||e.target.id==='bench-fan-stage'||e.target.id==='bench-fan-label')closeBenchFan();}
function onBenchFanCardClick(idx){
  const aliveBench=playerBench.filter(c=>!c.isDead);
  const incomingCard=aliveBench[idx];
  if(!incomingCard){closeBenchFan();return;}
  if(uiState==='AWAITING_BENCH'){
    const swapPos=pendingAction?.pos;
    if(swapPos&&!getCardPos(incomingCard).includes(swapPos)){logMsg('sys','System',`${shortName(getCardName(incomingCard))} cannot play ${swapPos}!`);return;}
    const realBenchIdx=playerBench.findIndex(c=>getCardName(c)===getCardName(incomingCard));
    stagedActions.push({...pendingAction,targetIdx:realBenchIdx,targetTeam:'bench'});
    uiState='IDLE';closeBenchFan();renderArena();renderCheckout();hideActionPanels();
  }
}
function showEnemyBenchTooltip(e,cnt){const tt=$('enemy-bench-tooltip');tt.innerHTML=`<b style="color:#FF6B6B;">Opponent's Bench</b><br>${cnt} card(s) remaining`;tt.style.display='block';tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY-10)+'px';}
function hideEnemyBenchTooltip(){$('enemy-bench-tooltip').style.display='none';}

// ── COURT & CARD CLICKS ───────────────────────────────────────
function handleCourtClick(e){if(e.target.closest('.action-panels-wrapper,.active-card-wrap,.enemy-card-wrap,.bench-stack-container'))return;if(uiState==='AWAITING_TARGET'){uiState='IDLE';pendingAction=null;logMsg('sys','System','Targeting cancelled.');setTooltipEnabled(true);renderArena();}hideActionPanels();}
function hideActionPanels(){const w=$('action-panels-wrapper');if(w)w.classList.remove('visible');}

function onCardClick(team, idx, e) {
  e.stopPropagation();if(isAnimating)return;hideTooltip();
  if(playerBenchOpen){closeBenchFan();return;}
  if(uiState==='AWAITING_TARGET'){
    if(team==='enemy'&&!enemyActive[idx].isDead){const actor=playerActive[pendingAction.actorIdx];if(getValidTargets(actor,enemyActive).some(v=>v.i===idx)){stagedActions.push({...pendingAction,targetIdx:idx,targetTeam:'enemy'});uiState='IDLE';setTooltipEnabled(true);renderArena();renderCheckout();hideActionPanels();}else logMsg('sys','System','Invalid target.');}
    return;
  }
  if(team==='player'&&uiState==='IDLE'){
    const c=playerActive[idx];if(c.isDead)return;const ck=c._instanceId;
    if(_shutdown[ck]){logMsg('sys','System',`${shortName(getCardName(c))} is shutdown.`);return;}
    if(_frozen[ck]){logMsg('sys','System',`${shortName(getCardName(c))} is frozen this turn.`);return;}
    if(stagedActions.some(a=>a.actorIdx===idx&&!a.isFreeAction)){logMsg('sys','System','Already staged.');return;}
    const nonFreeCount=stagedActions.filter(a=>!a.isFreeAction).length;
    if(nonFreeCount>=Math.min(2,playerActive.filter(x=>!x.isDead).length))return;
    showActionPanel(c,idx);
  }
}

// ── ACTION PANEL ──────────────────────────────────────────────
function showActionPanel(c, idx) {
  const btns=[];
  if(playerBench.filter(x=>!x.isDead).length>0) btns.push(`<button class="game-btn game-btn-outline" style="padding:8px 12px;font-size:.7rem;" onclick="selectAction(${idx},'swap',null)">SWAP</button>`);
  btns.push(`<button class="game-btn game-btn-ghost" style="padding:8px 12px;font-size:.7rem;" onclick="selectAction(${idx},'pass',null)">PASS</button>`);
  btns.push(`<div style="width:1px;height:25px;background:rgba(255,255,255,.1);margin:0 4px;"></div>`);
  btns.push(`<button class="action-btn action-btn-basic" onclick="selectAction(${idx},'basic',null)">BASIC<br><span class="action-btn-dmg">(${getEffectiveDMG(c)})</span></button>`);
  (c.Skills||[]).forEach((sk,sIdx)=>{
    if(sk._parsed?.isReactive) return;
    if(sk._usesLeft<=0) return;
    btns.push(`<button class="action-btn action-btn-skill" onclick="selectAction(${idx},'skill',${sIdx})">${sk.Name.toUpperCase()}<br><span class="action-btn-dmg">(${sk.Display_DMG})</span></button>`);
  });
  $('action-card-name').textContent = getCardName(c);
  $('action-btns-row').innerHTML=btns.join('');
  $('action-panels-wrapper').classList.add('visible');
}

// ── ACTION SELECTION ──────────────────────────────────────────
async function selectAction(actorIdx, type, skillIdx) {
  hideActionPanels();
  const c = playerActive[actorIdx];
  let sk=null, priority=1, isFreeAction=false;

  if (type==='skill') {
    sk = c.Skills[skillIdx];
    priority = (sk._priority||1) * (c._priorityBonus||1);
    isFreeAction = sk._parsed?.isFreeAction || false;
    // Check uses per turn
    if (sk._usesPerTurn && sk._usesThisTurn >= sk._usesPerTurn) { logMsg('sys','System',`${sk.Name} already used this turn.`); return; }
  } else if (type==='basic') {
    priority = c._priorityBonus || 1;
  }

  pendingAction = {actorIdx, actionType:type, skillIdx, priority, speed:getCardSPD(c), pos:c.battleRole, isFreeAction, execTeam:'player'};

  if (type==='pass') { stagedActions.push({...pendingAction, targetIdx:null, targetTeam:null}); pendingAction=null; renderArena(); renderCheckout(); }
  else if (type==='swap') { uiState='AWAITING_BENCH'; openBenchFan(); }
  else {
    // Check if skill needs targeting vs is self-targeting
    const needsTarget = !sk || (!sk._parsed?.isReactive && sk.Modifier_Target !== 'Self' && !String(sk.Timing||'').includes('On_Cast') || String(sk.Modifier_Target||'').includes('Selected_Enemy') || type==='basic');
    if (sk && (String(sk.Timing||'').includes('Standard_Free') || String(sk.Nature||'').includes('Utility:Dribble') || String(sk.Nature||'').includes('Utility:Buff') || String(sk.Modifiers||'').startsWith('Stat_Buff'))) {
      // Freeze/Dribble: pick target via modal
      if (String(sk.Nature||'').includes('Freeze') || String(sk.Nature||'').includes('Dribble')) {
        const enemies = enemyActive.map((ec,ei)=>({c:ec,i:ei})).filter(x=>!x.c.isDead);
        if (!enemies.length) { logMsg('sys','System','No enemy to freeze.'); return; }
        const choice = await showModal(sk.Name,'Select target to freeze:',enemies.map(x=>({label:`[${x.c.battleRole}] ${shortName(getCardName(x.c))} — HP:${x.c.currentHp}`,color:'cyan'})));
        if (choice===null) return;
        stagedActions.push({...pendingAction, targetIdx:enemies[choice].i, targetTeam:'enemy'}); pendingAction=null; renderArena(); renderCheckout();
      } else if (String(sk.Modifiers||'').startsWith('Stat_Buff')) {
        // Self buff — no targeting needed
        stagedActions.push({...pendingAction, targetIdx:null, targetTeam:null}); pendingAction=null; renderArena(); renderCheckout();
      } else {
        stagedActions.push({...pendingAction, targetIdx:null, targetTeam:null}); pendingAction=null; renderArena(); renderCheckout();
      }
      return;
    }
    if (getValidTargets(c, enemyActive).length===0) { logMsg('sys','System',`No valid targets!`); return; }
    uiState='AWAITING_TARGET'; setTooltipEnabled(false); renderArena();
  }
}

function undoAction(idx){stagedActions=stagedActions.filter(a=>a.actorIdx!==idx);uiState='IDLE';renderArena();renderCheckout();}
function renderCheckout(){
  const max=Math.min(2,playerActive.filter(x=>!x.isDead).length),nonFreeCount=stagedActions.filter(a=>!a.isFreeAction).length;
  const p=$('checkout-panel');$('staged-count').textContent=`${nonFreeCount}/${max}`;
  if(stagedActions.length>0){
    p.style.display='flex';
    $('staged-list').innerHTML=stagedActions.map(a=>{const ac=playerActive[a.actorIdx];const skName=a.actionType==='pass'?'Pass':a.actionType==='swap'?'Swap':(a.actionType==='skill')?(ac.Skills[a.skillIdx]?.Name||'Skill'):'Basic Attack';const tgt=a.targetTeam==='enemy'?` → ${shortName(getCardName(enemyActive[a.targetIdx]))}`:'' ;return `<div>▶ [${ac.battleRole}] ${shortName(getCardName(ac))}: ${skName}${tgt}</div>`;}).join('');
    $('confirm-moves-btn').disabled=false;
  } else p.style.display='none';
}

// ── ENEMY AI ──────────────────────────────────────────────────
async function generateEnemyAI() {
  const acts=[], alive=enemyActive.map((c,i)=>({c,i})).filter(x=>!x.c.isDead);
  for(let i=0;i<Math.min(2,alive.length);i++){
    const{c,i:ai}=alive[i]; const ck=c._instanceId;
    if(_frozen[ck]||_shutdown[ck])continue;
    const vT=getValidTargets(c,playerActive);
    if(!vT.length){acts.push({actorIdx:ai,actionType:'pass',skillIdx:null,targetIdx:null,targetTeam:null,priority:1,speed:getCardSPD(c),pos:c.battleRole,isFreeAction:false,execTeam:'enemy'});continue;}
    const t=vT[Math.floor(Math.random()*vT.length)];
    const usableSk=(c.Skills||[]).map((sk,si)=>({sk,si})).filter(({sk})=>{if(sk._parsed?.isReactive)return false;if(sk._usesLeft<=0)return false;if(sk._usesPerTurn&&sk._usesThisTurn>=sk._usesPerTurn)return false;if(String(sk.Nature||'').includes('Utility:Buff'))return false;return true;});
    const useSk=Math.random()>0.4&&usableSk.length>0;let sIdx=null,prio=1,isFree=false;
    if(useSk){const pick=usableSk[Math.floor(Math.random()*usableSk.length)];sIdx=pick.si;prio=(pick.sk._priority||1)*(c._priorityBonus||1);isFree=pick.sk._parsed?.isFreeAction||false;}
    else{prio=c._priorityBonus||1;}
    acts.push({actorIdx:ai,actionType:useSk?'skill':'basic',skillIdx:sIdx,targetIdx:t.i,targetTeam:'player',priority:prio,speed:getCardSPD(c),pos:c.battleRole,isFreeAction:isFree,execTeam:'enemy'});
  }
  return acts;
}

// ── CONFIRM PHASE ─────────────────────────────────────────────
async function confirmMovesPhase() {
  if(isAnimating) return;
  $('checkout-panel').style.display='none';
  document.querySelectorAll('.undo-btn').forEach(b=>b.style.display='none');
  isAnimating=true;
  $('turn-indicator').textContent=`TURN ${turnCount} — EXECUTING`;
  logMsg('sys','System',`--- Turn ${turnCount} ---`);

  const eStaged=await generateEnemyAI();
  const pStaged=stagedActions.map(a=>({...a,execTeam:'player',c:playerActive[a.actorIdx]}));
  const master=[...pStaged,...eStaged];
  const PH={PG:5,SG:4,SF:3,PF:2,C:1};
  master.sort((a,b)=>{
    if(a.priority!==b.priority) return b.priority-a.priority;
    if(a.speed!==b.speed) return b.speed-a.speed;
    const ap=PH[(a.pos||'').split('/')[0]]||0, bp=PH[(b.pos||'').split('/')[0]]||0;
    if(ap!==bp) return bp-ap;
    return Math.random()>.5?1:-1;
  });

  for(const act of master){
    if(playerScore>=8||enemyScore>=8) break;
    const atks=act.execTeam==='player'?playerActive:enemyActive;
    const actC=atks[act.actorIdx];
    if(!actC||actC.isDead) continue;
    const ack=actC._instanceId;
    if(_frozen[ack]&&act.actionType!=='pass'){logMsg('sys','System',`${shortName(getCardName(actC))} is frozen.`);continue;}
    if(_shutdown[ack]){logMsg('sys','System',`${shortName(getCardName(actC))} is shutdown.`);continue;}
    await executeAction(act);
  }

  await handleDeadReplacements('player',playerActive,playerBench);
  await handleDeadReplacements('enemy',enemyActive,enemyBench);

  tickEffects();tickBuffs();

  // Clear turn-based status
  Object.keys(_frozen).forEach(k=>delete _frozen[k]);
  Object.keys(_invulnerable).forEach(k=>delete _invulnerable[k]);
  Object.keys(_screened).forEach(k=>delete _screened[k]);
  Object.keys(_shutdown).forEach(k=>{_shutdown[k]--;if(_shutdown[k]<=0)delete _shutdown[k];});

  [...playerActive,...enemyActive,...playerBench,...enemyBench].forEach(c=>{if(c)(c.Skills||[]).forEach(sk=>{if(sk)sk._usesThisTurn=0;});});

  stagedActions=[];pendingAction=null;uiState='IDLE';setTooltipEnabled(true);turnCount++;

  if(playerScore>=8||enemyScore>=8){
    const won=playerScore>=8;
    $('endgame-title').textContent=won?'YOU WIN! 🏆':'YOU LOSE 😢';
    $('endgame-title').style.color=won?'#40E0A0':'#FF6B6B';
    $('endgame-desc').textContent=won?'You knocked out 8 opponents first!':'Opponent knocked out 8 of your players.';
    $('endgame-modal').style.display='flex';
    isAnimating=false;return;
  }

  isAnimating=false;
  $('turn-indicator').textContent=`TURN ${turnCount} — STAGING`;
  renderArena();renderBenchStacks();renderCheckout();hideActionPanels();renderEffectsPanel();
  logMsg('sys','System',`Turn ${turnCount} begins. Select your moves!`);
}

// ── EXECUTE ACTION ────────────────────────────────────────────
async function executeAction(act) {
  const isP = act.execTeam === 'player';
  const atks = isP ? playerActive : enemyActive;
  const defs = isP ? enemyActive : playerActive;
  const atkC = atks[act.actorIdx];
  if (!atkC || atkC.isDead) return;
  const whoLabel = isP ? 'You' : 'Bot';
  const ack = atkC._instanceId;

  if (act.actionType === 'pass') { logMsg('sys', whoLabel, `${shortName(getCardName(atkC))} passes.`); return; }

  if (act.actionType === 'swap') {
    const bArr = isP ? playerBench : enemyBench;
    const incoming = bArr[act.targetIdx];
    if (!incoming) return;
    incoming.battleRole = atkC.battleRole;
    if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
    atks[act.actorIdx] = incoming; bArr[act.targetIdx] = atkC;
    logMsg('sys', whoLabel, `Swap: ${shortName(getCardName(atkC))} → ${shortName(getCardName(incoming))}`);
    ENGINE.bootPassiveAbilities(incoming, atks);
    ENGINE.evalRosterAbilities(incoming, atks);
    renderArena(); renderBenchStacks(); await delay(700); return;
  }

  let sk = null;
  if (act.actionType === 'skill' && act.skillIdx != null) { sk = atkC.Skills[act.skillIdx]; }

  // ── FREEZE SKILL ──
  if (sk && (String(sk.Nature||'').includes('Freeze') || String(sk.Nature||'').includes('Dribble'))) {
    const tIdx = act.targetIdx;
    const frozenC = defs[tIdx];
    if (frozenC && !frozenC.isDead && !frozenC._immuneFreeze) {
      _frozen[frozenC._instanceId] = true;
      logMsg(isP?'atk':'def', whoLabel, `${shortName(getCardName(atkC))} freezes ${shortName(getCardName(frozenC))}!`);
      addTrackedEffect(shortName(getCardName(atkC)), frozenC._instanceId, shortName(getCardName(frozenC)), 'freeze', 'Frozen — cannot act this turn', 1);
    }
    if(sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++;
    renderArena(); return;
  }

  // ── STAT BUFF SKILL ──
  if (sk && String(sk.Modifiers||'').startsWith('Stat_Buff')) {
    const parsed = ENGINE.parseActionString(sk.Modifiers);
    const tIdx = act.targetIdx;
    const targetC = tIdx != null ? (isP ? playerActive : enemyActive)[tIdx] : atkC;
    if (targetC) {
      ENGINE._applyStatBuff(targetC, parsed);
      await showBuffAnimation(shortName(getCardName(atkC)), `${sk.Modifiers}`);
      addTrackedEffect(shortName(getCardName(atkC)), targetC._instanceId, shortName(getCardName(targetC)), 'buff', sk.Modifiers, 3);
    }
    if(sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++;
    return;
  }

  // ── DAMAGING SKILLS & BASIC ATTACKS ──
  let defC = defs[act.targetIdx], dIdx = act.targetIdx;
  if (!defC || defC.isDead) {
    const vt = getValidTargets(atkC, defs);
    if (!vt.length) return;
    defC = vt[0].c; dIdx = vt[0].i;
  }
  if (_invulnerable[defC._instanceId]) { logMsg('sys','System',`${shortName(getCardName(defC))} is invulnerable!`); return; }

  // Compute raw damage
  let dmgRaw;
  if (act.actionType === 'basic') {
    dmgRaw = getEffectiveDMG(atkC, false);
  } else if (sk) {
    const parsedMod = ENGINE.parseActionString(sk.Modifiers);
    // Assist DMG uses own team ref
    const ownTeamArr = isP ? playerActive : enemyActive;
    dmgRaw = ENGINE.calculateDamage({ actionParsed: parsedMod }, atkC, defC, ownTeamArr) + (atkC._skillDmgBonus || 0);
    // Coin flip check
    if (sk._parsed?.hasCoinFlip && !atkC._immuneCoinflip) {
      const flip = Math.random() < 0.5;
      logMsg('coin','Coin',`Flip for ${sk.Name}: ${flip?'HEADS':'TAILS'}`);
      await animateCoinFlip(shortName(getCardName(atkC)), sk.Name, flip);
      if (!flip) {
        logMsg('sys','System',`${sk.Name} missed!`);
        if(sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++;
        await checkReboundTriggers(act, atkC, isP ? playerActive : enemyActive, isP);
        return;
      }
    }
  } else return;

  // Ability reactions check (block/contest immunity)
  const skillNature = sk ? sk.Nature : 'Offensive:Base';
  const abilityCheck = ENGINE.checkAbilityReaction(atkC, defC, act.actionType, skillNature);

  // Prompt defensive reactive skills (for player side)
  let blocked = false;
  if (!_screened[atkC._instanceId]) {
    blocked = await promptReactiveSkills(act, sk, atkC, defC, dIdx, isP, defs, abilityCheck);
  }
  if (blocked) { if(sk){if(sk._usesLeft!==undefined)sk._usesLeft--;sk._usesThisTurn++;} await checkReboundTriggers(act, atkC, isP?playerActive:enemyActive, isP); return; }

  // Apply damage reduction from target passive ability
  if (defC._passiveDmgReductionMult && !sk) dmgRaw = Math.floor(dmgRaw * defC._passiveDmgReductionMult);
  if (defC._passiveDmgReductionFlat) dmgRaw = Math.max(0, dmgRaw - defC._passiveDmgReductionFlat);

  logMsg(isP?'atk':'def', whoLabel, `[${atkC.battleRole}] ${shortName(getCardName(atkC))} → ${sk?.Name||'Basic'} on [${defC.battleRole}] ${shortName(getCardName(defC))} — ${dmgRaw} DMG`);
  await playCombatAnimation(`${isP?'player':'enemy'}-${act.actorIdx}`, `${isP?'enemy':'player'}-${dIdx}`, dmgRaw, defC, dIdx, isP?'enemy':'player');

  if(sk){if(sk._usesLeft!==undefined)sk._usesLeft--;sk._usesThisTurn++;}
  logMsg('hp','HP',`${shortName(getCardName(defC))}: ${defC.currentHp}/${getCardHP(defC)}`);
  if(defC.currentHp<=0) handleKO(defC, isP?'enemy':'player', dIdx);
  renderArena();
}

// ── REACTIVE SKILLS ───────────────────────────────────────────
async function promptReactiveSkills(act, sk, atkC, defC, dIdx, isP, defs, abilityCheck) {
  const defTeam = isP ? enemyActive : playerActive;
  const nat = sk ? String(sk.Nature||'').toLowerCase() : 'basic';
  let valids = [];

  for (let [i, c] of defTeam.entries()) {
    if (c.isDead) continue;
    for (let [si, rsk] of (c.Skills||[]).entries()) {
      if (!rsk._parsed?.isReactive) continue;
      if (rsk._usesLeft <= 0) continue;
      if (rsk._usesPerTurn && rsk._usesThisTurn >= rsk._usesPerTurn) continue;
      // Check if ability makes attacker immune to this reaction
      if (abilityCheck?.canBlock === false && String(rsk.Modifiers||'').toUpperCase()==='BLOCK') continue;
      if (abilityCheck?.canContest === false && String(rsk.Modifiers||'').toUpperCase()==='CONTEST') continue;
      if (!ENGINE.canReactiveSkillTrigger(c, rsk, sk?.Nature || 'Offensive:Base', act.actionType)) continue;
      valids.push({cIdx:i, sIdx:si, rsk, c});
    }
  }
  if (!valids.length) return false;

  let chosen = null;
  if (isP) {
    // Enemy auto-reacts
    if (Math.random() < 0.45) chosen = valids[Math.floor(Math.random()*valids.length)];
  } else {
    // Player chooses reaction
    const choice = await showModal('INCOMING ATTACK', `${shortName(getCardName(atkC))} uses ${sk?.Name||'Basic Attack'} on ${shortName(getCardName(defC))}. React?`, valids.map(v=>({label:`[${v.c.battleRole}] ${shortName(getCardName(v.c))}: ${v.rsk.Name}`, color:'purple'})), 'SKIP (No Defense)');
    if (choice !== null) chosen = valids[choice];
  }

  if (!chosen) return false;
  const { rsk, c: reactCard } = chosen;
  rsk._usesLeft--; rsk._usesThisTurn++;
  const reactWho = isP ? 'Bot' : 'You';
  logMsg('block', reactWho, `${shortName(getCardName(reactCard))} reacts: ${rsk.Name}!`);

  const modKey = String(rsk.Modifiers||'').toUpperCase();
  if (modKey === 'BLOCK') {
    logMsg('block', reactWho, 'Complete block!');
    return true;
  }
  if (modKey.startsWith('REACTIONARY_DMG_REDUCTION')) {
    const parsed = ENGINE.parseActionString(rsk.Modifiers);
    if (parsed.type === 'REACTIONARY_DMG_REDUCTION') {
      // Apply mitigation — we'll subtract from defC's incoming dmg by storing it
      defC._mitigate = (defC._mitigate || 0) + parsed.value;
    }
  }
  if (modKey === 'GRANT_EXTRA_MOVE') {
    // Rebound: teammate gets another attack
    const failedAtk = defs[act.actorIdx];
    if (failedAtk) {
      const vt2 = getValidTargets(failedAtk, isP ? playerActive : enemyActive);
      if (vt2.length) {
        const tgt2 = vt2[Math.floor(Math.random()*vt2.length)];
        logMsg('sys', reactWho, `${shortName(getCardName(failedAtk))} gets another shot via ${rsk.Name}!`);
        await playCombatAnimation(`${isP?'enemy':'player'}-${act.actorIdx}`, `${isP?'player':'enemy'}-${tgt2.i}`, getEffectiveDMG(failedAtk, false), tgt2.c, tgt2.i, isP?'player':'enemy');
        if (tgt2.c.currentHp <= 0) handleKO(tgt2.c, isP?'player':'enemy', tgt2.i);
      }
    }
  }
  return false;
}

// ── COMBAT ANIMATION ──────────────────────────────────────────
async function playCombatAnimation(atkId, defId, dmgIn, targetObj, defIdx, defTeamStr) {
  const aE = document.getElementById(`wrap-${atkId}`), dE = document.getElementById(`wrap-${defId}`);
  if (aE) aE.classList.add('doing-attack');
  await delay(360);
  let dmg = dmgIn;
  if (targetObj._mitigate) { dmg = Math.max(0, dmg - targetObj._mitigate); targetObj._mitigate = 0; logMsg('block','Mitigation',`Damage reduced! → ${dmg}`); }
  playAttackSound();
  if (dE && dmg > 0) {
    dE.querySelector('.battle-card')?.classList.add('anim-shake');
    const p = document.createElement('div'); p.className='dmg-popup'; p.textContent=`-${dmg}`;
    (dE.querySelector('.battle-card')||dE).appendChild(p);
    setTimeout(()=>{dE.querySelector('.battle-card')?.classList.remove('anim-shake');p.remove();},900);
  }
  targetObj.currentHp = Math.max(0, targetObj.currentHp - dmg);
  const hpMax = getCardHP(targetObj), pct = Math.max(0,(targetObj.currentHp/hpMax)*100);
  const fill = document.getElementById(`hpf-${defId}`);
  if (fill) { fill.style.width=pct+'%'; fill.style.background=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B'; }
  const hpt = document.getElementById(`hpt-${defId}`);
  if (hpt) hpt.textContent=`${targetObj.currentHp}/${hpMax}`;
  await delay(660);
  if (aE) aE.classList.remove('doing-attack');
}

// ── KO & SURVIVAL ─────────────────────────────────────────────
function handleKO(defCard, teamStr, dIdx) {
  if (defCard.currentHp > 0) return;
  if (checkSurvive(defCard)) { renderArena(); return; }
  defCard.isDead = true;
  if (teamStr==='enemy') playerScore++; else enemyScore++;
  $('score-player').textContent=playerScore;$('score-enemy').textContent=enemyScore;
  const cardEl = document.getElementById(`card-${teamStr}-${dIdx}`);
  if (cardEl) cardEl.classList.add('dead-card');
  logMsg('ko','KO',`${shortName(getCardName(defCard))} knocked out!`);
  removeEffectsForTarget(defCard._instanceId);
}

function checkSurvive(card) {
  if (!card || card.currentHp > 0) return false;
  const id = card._instanceId;
  if (_surviveUsed[id]) return false;
  const ability = card.Ability;
  if (!ability || !ability.Rules) return false;
  const hasSurvive = ability.Rules.some(r => String(r.action||'').includes('Survive_At_1HP'));
  if (hasSurvive) { _surviveUsed[id]=true; card.currentHp=1; _frozen[id]=true; logMsg('sys','System',`${shortName(getCardName(card))} survives at 1 HP!`); addTrackedEffect(shortName(getCardName(card)),id,shortName(getCardName(card)),'survive','Survive at 1 HP',1); return true; }
  const hasHealOnDeath = ability.Rules.some(r => String(r.action||'').includes('Stat_Buff')&&String(r.trigger||'').includes('HP<=0'));
  if (hasHealOnDeath) { _surviveUsed[id]=true; card.currentHp=parseInt(ability.Rules.find(r=>String(r.action||'').includes('Stat_Buff'))?.action?.match(/:(\d+)_HP/)?.[1]||500); logMsg('sys','System',`${shortName(getCardName(card))} heals on death!`); return true; }
  return false;
}

// ── REBOUND TRIGGERS ──────────────────────────────────────────
async function checkReboundTriggers(failedAct, failedCard, ownTeamArr, isP) {
  for (let [i, c] of ownTeamArr.entries()) {
    if (c.isDead) continue;
    for (let [si, rsk] of (c.Skills||[]).entries()) {
      const timing = String(rsk.Timing||'');
      if (!timing.includes('On_Teammate_Action:Miss|Block|Contest')) continue;
      if (rsk._usesLeft <= 0) continue;
      if (rsk._usesPerTurn && rsk._usesThisTurn >= rsk._usesPerTurn) continue;
      rsk._usesLeft--; rsk._usesThisTurn++;
      logMsg('sys', isP?'You':'Bot', `${shortName(getCardName(c))} triggers ${rsk.Name}!`);
      // Grant extra move to failed attacker
      const defs = isP ? enemyActive : playerActive;
      const vt = getValidTargets(failedCard, defs);
      if (vt.length) {
        const tIdx = vt[Math.floor(Math.random()*vt.length)].i;
        await playCombatAnimation(`${isP?'player':'enemy'}-${ownTeamArr.indexOf(failedCard)}`, `${isP?'enemy':'player'}-${tIdx}`, getEffectiveDMG(failedCard, false), defs[tIdx], tIdx, isP?'enemy':'player');
        if (defs[tIdx].currentHp <= 0) handleKO(defs[tIdx], isP?'enemy':'player', tIdx);
        renderArena();
      }
      return;
    }
  }
}

// ==================== DEAD REPLACEMENTS ====================
async function handleDeadReplacements(teamStr, activeArr, benchArr) {
  for (let i = 0; i < activeArr.length; i++) {
    if (activeArr[i] && activeArr[i].isDead) {
      const dR = activeArr[i].battleRole || 'PG';
      const vB = benchArr.map((c, idx) => ({ c, idx })).filter(b => b.c && !b.c.isDead && getCardPos(b.c).includes(dR));
      if (!vB.length) continue;
      let r = vB[0];
      if (teamStr === 'player' && vB.length > 1) {
        const choice = await showModal(`REPLACE ${dR}`, `Choose a sub for ${dR}:`, vB.map(b => ({ label: `${shortName(getCardName(b.c))} — HP:${getCardHP(b.c)}`, color: 'teal' })), 'Auto-pick');
        if (choice !== null) r = vB[choice];
      }
      logMsg('sys', 'System', `${shortName(getCardName(r.c))} enters at ${dR}!`);
      const outgoing = activeArr[i];
      activeArr[i] = benchArr[r.idx];
      benchArr[r.idx] = outgoing;
      activeArr[i].battleRole = dR;
      if (!activeArr[i].currentHp) activeArr[i].currentHp = getCardHP(activeArr[i]);
      applyPassiveAbility(activeArr[i]);
      applySynergyAbilities(activeArr[i], activeArr);
      renderArena(); renderBenchStacks(); await delay(600);
    }
