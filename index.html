// ==================== ACTION SELECTION (BUGS #3, #4, #5, #9 FIXES) ====================
async function selectAction(actorIdx, type, skillIdx) {
  hideActionPanels();
  const c = playerActive[actorIdx];
  const ck = c._instanceId;
  let sk = null, logic = {}, priority = 1, isFreeAction = false;
  if (type === 'skill' && skillIdx !== null) {
    sk = c.Skills[skillIdx]; logic = sk.Logic_Engine || {};
    // *** BUG #5 FIX: apply priority bonus from passive ***
    priority = (logic.priority || 1) * (c._priorityBonus || 1);
    // *** BUG #9 FIX: consumes_move:false does not count as a move ***
    isFreeAction = logic.free_action || !logic.consumes_move || String(logic.timing||'').toUpperCase() === 'FREE_ACTION';
  } else if (type === 'stolen-skill' && skillIdx !== null) {
    sk = (_stolenSkills[ck] || [])[skillIdx]; logic = sk?.Logic_Engine || {};
    priority = (logic.priority || 1) * (c._priorityBonus || 1);
    isFreeAction = logic.free_action || !logic.consumes_move || false;
  } else if (type === 'basic') {
    // *** BUG #5 FIX: priority bonus on basics ***
    priority = c._priorityBonus || 1;
  }

  // Validate conditions
  if (sk) {
    const boardState = {sourceTeam:playerActive, myKOs:playerScore, oppKOs:enemyScore};
    if (logic.hp_condition) {
      const pct = (c.currentHp / getCardHP(c)) * 100;
      const m = String(logic.hp_condition).match(/([<>]=?)(\d+)/);
      if (m && !_compare(pct, m[1], parseFloat(m[2]))) { logMsg('sys','System',`${sk.Name} HP condition not met.`); return; }
    }
    if (logic.team_condition) {
      const met = evaluateCondition(logic.team_condition, c, null, boardState);
      if (!met) { logMsg('sys','System',`${sk.Name} team condition not met.`); return; }
    }
    const usesPerTurn = logic.uses_per_turn;
    if (usesPerTurn && sk._usesThisTurn >= usesPerTurn) { logMsg('sys','System',`${sk.Name} already used this turn.`); return; }
  }

  pendingAction = {actorIdx, actionType:type, skillIdx, priority, speed:getCardSPD(c), pos:c.battleRole, isFreeAction, execTeam:'player'};

  // Handle requires_input during staging
  if (sk && logic.requires_input && logic.input_type) {
    const resolved = await _resolveInput(logic.input_type, c, actorIdx, sk, logic);
    if (resolved === null) return;
    pendingAction.inputResolved = resolved;
  }
  // *** BUG #3 FIX: derive input from target_scope when requires_input is false ***
  else if (sk && !logic.requires_input && !logic.is_reactive) {
    const scope = String(logic.target_scope || '').toUpperCase();
    if (scope === 'ANY_TEAMMATE') {
      const resolved = await _resolveInput('select_teammate_or_self', c, actorIdx, sk, logic);
      if (resolved === null) return;
      pendingAction.inputResolved = resolved;
    }
    // *** BUG #4 FIX: handle ADJACENT_ENEMY ***
    else if (scope === 'ADJACENT_ENEMY') {
      const resolved = await _resolveInput('adjacent_enemy', c, actorIdx, sk, logic);
      if (resolved === null) return;
      pendingAction.inputResolved = resolved;
    }
  }

  if (type === 'pass') {
    stagedActions.push({...pendingAction, targetIdx:null, targetTeam:null});
    pendingAction = null; renderArena(); renderCheckout();
  } else if (type === 'swap') {
    uiState = 'AWAITING_BENCH'; openBenchFan();
  } else {
    // Free-action skills that don't need targeting
    if (sk) {
      const exec = String(logic.execution||'').toUpperCase();
      if (['FREEZE','STEAL_SKILL','GRANT_EXTRA_MOVE','AURA_JUMP_MISS','AURA_CLOSE_MISS','AURA_ANY_MISS',
           'AURA_INTERCEPT_ALL_ASSISTS','STAT_BUFF','INVULNERABLE_THIS_TURN','DISABLE_ALL_SKILLS',
           'DISABLE_SPECIFIC_SKILL','GLOBAL_HARD_DISABLE_ALL','HEAL'].includes(exec)) {
        stagedActions.push({...pendingAction, targetIdx:null, targetTeam:null});
        pendingAction = null; renderArena(); renderCheckout(); return;
      }
    }
    if (getValidTargets(c, enemyActive).length === 0) { logMsg('sys','System',`${shortName(getCardName(c))} has no valid targets!`); return; }
    uiState = 'AWAITING_TARGET'; setTooltipEnabled(false); renderArena();
  }
}

// *** BUG #4 FIX: added adjacent_enemy input type ***
async function _resolveInput(inputType, actorCard, actorIdx, sk, logic) {
  const iType = String(inputType||'').toLowerCase();
  if (iType === 'select_enemy' || iType === 'freeze_target') {
    const enemies = enemyActive.map((c,i)=>({c,i})).filter(x=>!x.c.isDead);
    if (!enemies.length) return null;
    const choice = await showModal(sk.Name, 'Select a target:', enemies.map(x=>({label:`[${x.c.battleRole}] ${shortName(getCardName(x.c))} — HP:${x.c.currentHp}`, color:'cyan'})));
    if (choice === null) return null;
    return {targetIdx: enemies[choice].i};
  }
  if (iType === 'adjacent_enemy') {
    const actorRole = actorCard.battleRole || 'PG';
    const adjacentRoles = [];
    const posOrder = ['PG','SG','SF','PF','C'];
    const myIdx = posOrder.indexOf(actorRole);
    if (myIdx > 0) adjacentRoles.push(posOrder[myIdx - 1]);
    if (myIdx < posOrder.length - 1) adjacentRoles.push(posOrder[myIdx + 1]);
    const enemies = enemyActive.map((c, i) => ({ c, i })).filter(x => !x.c.isDead && adjacentRoles.includes(x.c.battleRole));
    if (!enemies.length) { logMsg('sys', 'System', 'No adjacent enemies to target.'); return null; }
    const choice = await showModal(sk.Name, 'Select an adjacent enemy:', enemies.map(x => ({ label: `[${x.c.battleRole}] ${shortName(getCardName(x.c))} — HP:${x.c.currentHp}`, color: 'cyan' })));
    if (choice === null) return null;
    return { targetIdx: enemies[choice].i };
  }
  if (iType === 'select_skill' || iType === 'steal_skill') {
    const opts = [];
    enemyActive.forEach((ec,ei)=>{ if(ec.isDead) return; (ec.Skills||[]).forEach((esk,esi)=>{ if(esk._usesLeft>0) opts.push({cardIdx:ei,skillIdx:esi,sk:esk,card:ec}); }); });
    if (!opts.length) return null;
    const choice = await showModal('STEAL A SKILL','Select enemy skill to steal:', opts.map(o=>({label:`${shortName(getCardName(o.card))}: ${o.sk.Name} (${o.sk.Display_DMG})`, color:'purple'})));
    if (choice === null) return null;
    return opts[choice];
  }
  if (iType === 'select_teammate') {
    const teammates = playerActive.map((c,i)=>({c,i})).filter(x=>!x.c.isDead && x.c !== actorCard);
    if (!teammates.length) return null;
    const choice = await showModal('SELECT TEAMMATE','Choose a teammate:', teammates.map(x=>({label:`[${x.c.battleRole}] ${shortName(getCardName(x.c))} — DMG:${getCardDMG(x.c)}`, color:'teal'})));
    if (choice === null) return null;
    return {targetIdx: teammates[choice].i};
  }
  if (iType === 'select_teammate_or_self') {
    const targets = playerActive.map((c,i)=>({c,i})).filter(x=>!x.c.isDead);
    const choice = await showModal('SELECT TARGET','Choose a target:', targets.map(x=>({label:`[${x.c.battleRole}] ${shortName(getCardName(x.c))} — HP:${x.c.currentHp}/${getCardHP(x.c)}`, color:'green'})));
    if (choice === null) return null;
    return {targetIdx: targets[choice].i};
  }
  if (iType === 'select_disable_skill') {
    const opts = [];
    enemyActive.forEach((ec,ei)=>{ if(ec.isDead) return; (ec.Skills||[]).forEach((esk,esi)=>{ const ds=_disabledSkills[ec._instanceId]; if(!ds||ds.skillIdx!==esi) opts.push({cardIdx:ei,skillIdx:esi,sk:esk,card:ec}); }); });
    if (!opts.length) return null;
    const choice = await showModal('DISABLE A SKILL','Select enemy skill to disable (50% flip):',opts.map(o=>({label:`${shortName(getCardName(o.card))}: ${o.sk.Name}`,color:'red'})));
    if (choice === null) return null;
    return opts[choice];
  }
  return {};
}

function undoAction(idx) { stagedActions = stagedActions.filter(a => a.actorIdx !== idx); uiState='IDLE'; renderArena(); renderCheckout(); }
function renderCheckout() {
  const max = Math.min(2, playerActive.filter(x=>!x.isDead).length);
  const nonFreeCount = stagedActions.filter(a => !a.isFreeAction).length;
  const p = $('checkout-panel');
  $('staged-count').textContent = `${nonFreeCount}/${max}`;
  if (stagedActions.length > 0) {
    p.style.display = 'flex';
    $('staged-list').innerHTML = stagedActions.map(a => {
      const ac = playerActive[a.actorIdx];
      const skName = a.actionType==='pass'?'Pass':a.actionType==='swap'?'Swap':a.actionType==='skill'?(ac.Skills[a.skillIdx]?.Name||'Skill'):'Basic Attack';
      const tgt = a.targetTeam==='enemy' ? ` → ${shortName(getCardName(enemyActive[a.targetIdx]))}` : '';
      return `<div>▶ [${ac.battleRole}] ${shortName(getCardName(ac))}: ${skName}${tgt}</div>`;
    }).join('');
    $('confirm-moves-btn').disabled = false;
  } else p.style.display = 'none';
}

// ==================== ENEMY AI (BUGS #5, #9 FIXES) ====================
async function generateEnemyAI() {
  const acts = [];
  const alive = enemyActive.map((c,i)=>({c,i})).filter(x=>!x.c.isDead);
  for (let i = 0; i < Math.min(2, alive.length); i++) {
    const {c, i: ai} = alive[i];
    const ck = c._instanceId;
    if (_frozen[ck] || _drained[ck] || _shutdown[ck]) continue;
    const vT = getValidTargets(c, playerActive);
    if (!vT.length) { acts.push({actorIdx:ai,actionType:'pass',skillIdx:null,targetIdx:null,targetTeam:null,priority:1,speed:getCardSPD(c),pos:c.battleRole,isFreeAction:false,execTeam:'enemy',c}); continue; }
    const t = vT[Math.floor(Math.random()*vT.length)];
    const usableSk = (c.Skills||[]).map((sk,si)=>({sk,si})).filter(({sk}) => {
      const logic = sk.Logic_Engine || {};
      return !logic.is_reactive && String(logic.timing||'').toUpperCase() !== 'REACTIVE' && sk._usesLeft > 0 && (!logic.uses_per_turn || sk._usesThisTurn < logic.uses_per_turn);
    });
    const useSk = Math.random() > 0.4 && usableSk.length > 0;
    let sIdx = null, prio = 1, isFree = false;
    if (useSk) {
      const pick = usableSk[Math.floor(Math.random()*usableSk.length)];
      sIdx = pick.si;
      // *** BUG #5 FIX: priority bonus ***
      prio = (pick.sk.Logic_Engine?.priority || 1) * (c._priorityBonus || 1);
      // *** BUG #9 FIX: consumes_move:false ***
      isFree = pick.sk.Logic_Engine?.free_action || !pick.sk.Logic_Engine?.consumes_move || String(pick.sk.Logic_Engine?.timing||'').toUpperCase() === 'FREE_ACTION';
    } else {
      // *** BUG #5 FIX: priority bonus on basic ***
      prio = c._priorityBonus || 1;
    }
    acts.push({actorIdx:ai,actionType:useSk?'skill':'basic',skillIdx:sIdx,targetIdx:t.i,targetTeam:'player',priority:prio,speed:getCardSPD(c),pos:c.battleRole,isFreeAction:isFree,execTeam:'enemy',c});
  }
  return acts;
}

// ==================== CONFIRM PHASE ====================
async function confirmMovesPhase() {
  if (isAnimating) return;
  $('checkout-panel').style.display = 'none';
  document.querySelectorAll('.undo-btn').forEach(b => b.style.display='none');
  isAnimating = true;
  $('turn-indicator').textContent = `TURN ${turnCount} — EXECUTING`;
  logMsg('sys','System',`--- Turn ${turnCount} ---`);

  const eStaged = await generateEnemyAI();
  const pStaged = stagedActions.map(a => ({...a, execTeam:'player', c:playerActive[a.actorIdx]}));
  const master = [...pStaged, ...eStaged];
  const PH = {PG:5,SG:4,SF:3,PF:2,C:1};
  master.sort((a,b) => {
    if (a.priority !== b.priority) return b.priority - a.priority;
    if (a.speed !== b.speed) return b.speed - a.speed;
    const ap = PH[(a.pos||'').split('/')[0]]||0, bp = PH[(b.pos||'').split('/')[0]]||0;
    if (ap !== bp) return bp - ap;
    return Math.random() > 0.5 ? 1 : -1;
  });

  for (const act of master) {
    if (playerScore >= 8 || enemyScore >= 8) break;
    const actC = act.execTeam === 'player' ? playerActive[act.actorIdx] : enemyActive[act.actorIdx];
    if (!actC || actC.isDead) continue;
    const ack = actC._instanceId;
    if (_drained[ack]) { logMsg('sys','System',`${shortName(getCardName(actC))} is drained, skipping.`); continue; }
    if (_shutdown[ack]) { logMsg('sys','System',`${shortName(getCardName(actC))} is shutdown, skipping.`); continue; }
    if (_frozen[ack] && act.actionType !== 'pass') { logMsg('sys','System',`${shortName(getCardName(actC))} is frozen, skipping.`); continue; }
    await executeAction(act);
  }

  await handleDeadReplacements('player', playerActive, playerBench);
  await handleDeadReplacements('enemy', enemyActive, enemyBench);
  tickBoardStates();
  Object.keys(_frozen).forEach(k => delete _frozen[k]);
  Object.keys(_shutdown).forEach(k => { _shutdown[k]--; if(_shutdown[k]<=0) delete _shutdown[k]; });
  Object.keys(_drained).forEach(k => delete _drained[k]);
  Object.keys(_disabledSkills).forEach(k => { _disabledSkills[k].turnsLeft--; if(_disabledSkills[k].turnsLeft<=0) delete _disabledSkills[k]; });
  Object.keys(_invulnerable).forEach(k => delete _invulnerable[k]);
  [...playerActive,...enemyActive,...playerBench,...enemyBench].forEach(c => { if(c) (c.Skills||[]).forEach(sk => { if(sk) sk._usesThisTurn=0; }); });

  stagedActions = []; pendingAction = null; uiState = 'IDLE'; setTooltipEnabled(true); turnCount++;

  if (playerScore >= 8 || enemyScore >= 8) {
    const won = playerScore >= 8;
    $('endgame-title').textContent = won ? 'YOU WIN! 🏆' : 'YOU LOSE 😢';
    $('endgame-title').style.color = won ? '#40E0A0' : '#FF6B6B';
    $('endgame-desc').textContent = won ? 'You knocked out 8 opponents first!' : 'Opponent knocked out 8 of your players.';
    $('endgame-modal').style.display = 'flex';
    isAnimating = false; return;
  }

  isAnimating = false;
  $('turn-indicator').textContent = `TURN ${turnCount} — STAGING`;
  renderArena(); renderBenchStacks(); renderCheckout(); hideActionPanels();
  logMsg('sys','System',`Turn ${turnCount} begins. Select your moves!`);
}

// ==================== EXECUTE ACTION (BUGS #6, #7, #10 FIXES) ====================
async function executeAction(act) {
  const isP = act.execTeam === 'player';
  const atks = isP ? playerActive : enemyActive;
  const defs = isP ? enemyActive : playerActive;
  const atkC = atks[act.actorIdx]; if (!atkC || atkC.isDead) return;
  const whoLabel = isP ? 'You' : 'Bot';
  const ack = atkC._instanceId;

  if (act.actionType === 'pass') { logMsg('sys',whoLabel,`${shortName(getCardName(atkC))} passes.`); return; }
  if (act.actionType === 'swap') {
    const bArr = isP ? playerBench : enemyBench;
    const incoming = bArr[act.targetIdx]; if (!incoming) return;
    const outgoing = atkC; incoming.battleRole = outgoing.battleRole;
    if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
    atks[act.actorIdx] = incoming; bArr[act.targetIdx] = outgoing;
    logMsg('sys',whoLabel,`Swap: ${shortName(getCardName(outgoing))} → ${shortName(getCardName(incoming))}`);
    renderArena(); renderBenchStacks(); await delay(700); return;
  }

  const sk = act.actionType === 'skill' ? atkC.Skills[act.skillIdx] :
             act.actionType === 'stolen-skill' ? (_stolenSkills[ack]||[])[act.skillIdx] : null;
  const logic = sk?.Logic_Engine || {};
  const exec = String(logic.execution || '').toUpperCase();
  const mods = Array.isArray(logic.modifiers) ? logic.modifiers : (logic.modifiers ? [logic.modifiers] : []);
  const isUnblockable = mods.some(m=>String(m).toUpperCase().includes('UNBLOCKABLE')) || atkC._skillsUnblockable;
  const isUncontestable = mods.some(m=>String(m).toUpperCase().includes('UNCONTESTABLE')) || atkC._skillsUncontestable;
  const boardState = {sourceTeam:atks, defTeam:defs, myKOs:isP?playerScore:enemyScore, oppKOs:isP?enemyScore:playerScore};

  // --- FREE ACTION / STATUS EFFECTS ---
  if (sk) {
    if (exec === 'FREEZE') {
      const tIdx = act.inputResolved?.targetIdx ?? act.targetIdx;
      const tTeam = isP ? enemyActive : playerActive;
      const frozenC = tTeam[tIdx];
      if (frozenC && frozenC._immuneFreeze) { logMsg('sys','System',`${shortName(getCardName(frozenC))} is immune to freeze!`); }
      else if (frozenC) { _frozen[frozenC._instanceId] = true; logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} freezes ${shortName(getCardName(frozenC))}!`); }
      if (sk._usesLeft !== undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
    if (exec.includes('STEAL_SKILL')) {
      const resolved = act.inputResolved;
      if (resolved) {
        const ec = defs[resolved.cardIdx]; const esk = ec?.Skills[resolved.skillIdx];
        if (esk) {
          const cloned = JSON.parse(JSON.stringify(esk)); cloned._usesLeft = cloned.Logic_Engine?.max_uses ?? 1; cloned._usesThisTurn = 0;
          if (!_stolenSkills[ack]) _stolenSkills[ack] = [];
          _stolenSkills[ack].push(cloned);
          logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} steals ${esk.Name} from ${shortName(getCardName(ec))}!`);
        }
      }
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
    if (exec.includes('HEAL')) {
      const tIdx = act.inputResolved?.targetIdx ?? act.targetIdx;
      const team2 = isP ? playerActive : enemyActive;
      const tc = tIdx!=null ? team2[tIdx] : atks[act.actorIdx];
      if (tc) {
        const healAmt = parseInt(logic.dmg_raw || 300) || 300;
        tc.currentHp = Math.min(getCardHP(tc), tc.currentHp + healAmt);
        logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} heals ${shortName(getCardName(tc))} for ${healAmt}! (${tc.currentHp}/${getCardHP(tc)})`);
      }
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
    if (exec.includes('STAT_BUFF') || exec === 'INVULNERABLE_THIS_TURN') {
      const dmgBonus = parseInt(logic.dmg_raw || 0) || 450;
      const dur = logic.turns_active || 3;
      ensureBuff(ack); _statBuffs[ack].dmgBonus += dmgBonus; _statBuffs[ack].turnsLeft = dur;
      if (exec === 'INVULNERABLE_THIS_TURN') _invulnerable[ack] = true;
      await showBuffAnimation(shortName(getCardName(atkC)), `+${dmgBonus} DMG for ${dur} turns`);
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; return;
    }
    if (exec.includes('AURA') || exec.includes('GLOBAL')) {
      const dur = logic.turns_active || logic.max_uses || 2;
      const aType = exec.includes('JUMP')?'jumpshot-miss-chance':exec.includes('CLOSE')?'closeshot-miss-chance':exec.includes('INTERCEPT')?'intercept-all-assists':exec.includes('DISABLE')?'all-skills-disabled':'any-miss';
      addBoardState({type:aType, sourceTeam:act.execTeam, duration:dur});
      logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} activates ${sk.Name}!`);
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; return;
    }
    if (exec.includes('SHUTDOWN')) {
      const tIdx = act.targetIdx ?? (getValidTargets(atkC,defs)[0]?.i);
      if (tIdx != null) { const tC = defs[tIdx]; _shutdown[tC._instanceId] = 2; const raw=parseInt(logic.dmg_raw||0); logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} shuts down ${shortName(getCardName(tC))}!`); if(raw>0){await playCombatAnimation(`${isP?'player':'enemy'}-${act.actorIdx}`,`${isP?'enemy':'player'}-${tIdx}`,raw,tC,act.execTeam,tIdx,true);if(tC.currentHp<=0)handleKO(tC,isP?'enemy':'player',tIdx);} }
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
    if (exec.includes('DISABLE_SPECIFIC_SKILL')) {
      const resolved = act.inputResolved;
      if (resolved) {
        const flip = Math.random() < 0.5;
        await animateCoinFlip(shortName(getCardName(atkC)), `${sk.Name}`, flip);
        if (flip) {
          _disabledSkills[defs[resolved.cardIdx]._instanceId] = {skillIdx:resolved.skillIdx, turnsLeft:3};
          logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} disables ${resolved.sk.Name}!`);
        } else logMsg(isP?'def':'atk',isP?'You':'Bot',`Disable failed!`);
      }
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
    if (exec.includes('STEAL_CANCEL')) {
      const tIdx = act.targetIdx ?? 0; const stealTarget = defs[tIdx];
      if (stealTarget && !stealTarget._immuneSteal) {
        logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} steals — ${shortName(getCardName(stealTarget))}'s action cancelled!`);
        const raw = parseInt(logic.dmg_raw||0);
        if (raw>0) { await playCombatAnimation(`${isP?'player':'enemy'}-${act.actorIdx}`,`${isP?'enemy':'player'}-${tIdx}`,raw,stealTarget,act.execTeam,tIdx,true); if(stealTarget.currentHp<=0) handleKO(stealTarget,isP?'enemy':'player',tIdx); }
      } else if (stealTarget?._immuneSteal) logMsg('sys','System',`${shortName(getCardName(stealTarget))} is immune to steal!`);
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
    if (exec.includes('GRANT_EXTRA_MOVE')) {
      const tmIdx = act.inputResolved?.targetIdx ?? act.targetIdx;
      const team2 = isP ? playerActive : enemyActive;
      const chosen = tmIdx!=null ? team2[tmIdx] : team2.find((c,ci) => !c.isDead && c!==atkC);
      if (chosen) {
        const validTgts = getValidTargets(chosen, defs);
        if (validTgts.length) {
          const tgt = validTgts[Math.floor(Math.random()*validTgts.length)];
          const extraDmg = getEffectiveDMG(chosen);
          logMsg(isP?'atk':'def',whoLabel,`${shortName(getCardName(atkC))} grants ${shortName(getCardName(chosen))} an extra move!`);
          await playCombatAnimation(`${isP?'player':'enemy'}-${team2.indexOf(chosen)}`,`${isP?'enemy':'player'}-${tgt.i}`,extraDmg,tgt.c,act.execTeam,tgt.i,false);
          if (tgt.c.currentHp<=0) handleKO(tgt.c,isP?'enemy':'player',tgt.i);
        }
      }
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; renderArena(); return;
    }
  }

  // --- STANDARD DAMAGE ---
  let defC = defs[act.targetIdx]; let dIdx = act.targetIdx;
  if (!defC || defC.isDead) {
    const vt = getValidTargets(atkC, defs); if (!vt.length) return;
    defC = vt[0].c; dIdx = vt[0].i;
  }
  if (_invulnerable[defC._instanceId]) { logMsg('sys','System',`${shortName(getCardName(defC))} is invulnerable!`); return; }
  // *** BUG #2 FIX: evaluate forced target condition against actual attacker ***
  const forced = getForcedTarget(atkC, defs);
  if (forced && forced.idx !== dIdx) { defC = forced.card; dIdx = forced.idx; logMsg('sys','System',`ABILITY: ${shortName(getCardName(forced.card))} attracts all attacks!`); }

  let dmgRaw = 0;
  if (sk) {
    const boardSt = {sourceTeam:atks, myKOs:isP?playerScore:enemyScore, oppKOs:isP?enemyScore:playerScore};
    dmgRaw = parseDmgFormula(logic.dmg_formula || sk.Display_DMG, atkC, defC, boardSt, {logic});
  } else {
    dmgRaw = getEffectiveDMG(atkC, false);
    if (act.actionType === 'basic' && defC._halveBasic) dmgRaw = Math.floor(dmgRaw/2);
  }
  if (sk && getBuff(ack)?.skillBonus) dmgRaw += getBuff(ack).skillBonus;

  // Coin flip
  if (sk && logic.coin_flip) {
    const autoHit = atkC._immuneCoinflip;
    const flip = autoHit ? true : (Math.random() < 0.5);
    if (!autoHit) { logMsg('coin','Coin',`Flip for ${sk.Name}: ${flip?'HEADS':'TAILS'}`); await animateCoinFlip(shortName(getCardName(atkC)), sk.Name, flip); }
    if (!flip) {
      logMsg('sys','System',`${sk.Name} missed!`);
      if (sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++;
      // *** BUG #10 FIX: trigger rebound on miss ***
      await checkReboundTriggers(act, atkC, act.execTeam);
      return;
    }
  }

  // Check active board states (auras) against this action
  const blocked = checkAuraBlock(act, sk, atkC, act.execTeam);
  if (blocked) {
    logMsg(isP?'def':'atk',isP?'You':'Bot',blocked);
    if(sk){if(sk._usesLeft!==undefined)sk._usesLeft--;sk._usesThisTurn++;}
    // *** BUG #10 FIX: trigger rebound on aura block ***
    await checkReboundTriggers(act, atkC, act.execTeam);
    return;
  }

  // SPD-based defense immunity
  if (!isUnblockable) {
    const spdImmune = defC._spdBasedDefImmunity && evaluateCondition(defC.Ability?.Logic_Engine?.condition, defC, atkC, {});
    if (spdImmune && sk) { logMsg('block','Block',`${shortName(getCardName(defC))} ABILITY — defensive skill immunity applies!`); if(sk._usesLeft!==undefined)sk._usesLeft--;sk._usesThisTurn++;return; }
  }

  // *** BUG #6 FIX: halve incoming close shot on defender ***
  if (sk && defC._halveCloseShot) {
    const nat = (sk.Nature || '').toLowerCase();
    if (nat.includes('close shot')) {
      dmgRaw = Math.floor(dmgRaw / 2);
      logMsg('block', 'Ability', `${shortName(getCardName(defC))} halves close shot damage! → ${dmgRaw}`);
    }
  }

  // *** BUG #7 FIX: conditional bonus dmg from passive (e.g. McAdoo vs slow enemies) ***
  if (!sk && atkC._conditionalDmgBonus) {
    const cLogic = atkC.Ability?.Logic_Engine || {};
    if (cLogic.condition && evaluateCondition(cLogic.condition, atkC, defC, {})) {
      const bonus = parseInt(String(cLogic.modifier_value || '0').match(/([+-]?\d+)/)?.[1] || '0');
      if (bonus) { dmgRaw += bonus; logMsg('sys', 'Ability', `${shortName(getCardName(atkC))} conditional bonus: +${bonus} DMG!`); }
    }
  }

  // Prompt reactions from defending team
  if (!isUnblockable) {
    await promptAndApplyReaction(act, sk, atkC, defC, dIdx, isP, defs);
  }
  if (act._blocked) {
    if(sk){if(sk._usesLeft!==undefined)sk._usesLeft--;sk._usesThisTurn++;}
    // *** BUG #10 FIX: trigger rebound on block ***
    await checkReboundTriggers(act, atkC, act.execTeam);
    return;
  }

  logMsg(isP?'atk':'def',whoLabel,`[${atkC.battleRole}] ${shortName(getCardName(atkC))} → ${sk?.Name||'Basic'} on [${defC.battleRole}] ${shortName(getCardName(defC))} — ${dmgRaw} DMG`);

  // AoE
  if (logic.target_scope === 'ALL_ENEMIES') {
    for (let i=0;i<defs.length;i++) {
      const tC = defs[i]; if (!tC||tC.isDead) continue;
      await playCombatAnimation(`${isP?'player':'enemy'}-${act.actorIdx}`,`${isP?'enemy':'player'}-${i}`,dmgRaw,tC,act.execTeam,i,true);
      checkHPRecover(tC); if(tC.currentHp<=0) handleKO(tC,isP?'enemy':'player',i);
    }
    if(sk){if(sk._usesLeft!==undefined)sk._usesLeft--;sk._usesThisTurn++;} renderArena(); return;
  }

  await playCombatAnimation(`${isP?'player':'enemy'}-${act.actorIdx}`,`${isP?'enemy':'player'}-${dIdx}`,dmgRaw,defC,act.execTeam,dIdx,isUnblockable||isUncontestable);
  if (sk) { onSkillHit(atkC, sk); if(sk._usesLeft!==undefined) sk._usesLeft--; sk._usesThisTurn++; }
  logMsg('hp','HP',`${shortName(getCardName(defC))}: ${defC.currentHp}/${getCardHP(defC)}`);
  checkHPRecover(defC); if (defC.currentHp<=0) handleKO(defC,isP?'enemy':'player',dIdx);
  if (sk && mods.some(m=>String(m).toUpperCase().includes('SELF_DRAIN'))) { _drained[ack]=true; logMsg('sys','System',`${shortName(getCardName(atkC))} is drained next turn!`); }
  renderArena();
}

// ==================== AURA BLOCK CHECK ====================
function checkAuraBlock(act, sk, atkC, execTeam) {
  if (!sk) return null;
  const nat = (sk.Nature||'').toLowerCase();
  const oppTeam = execTeam === 'player' ? 'enemy' : 'player';
  if (hasBoardState('all-skills-disabled', oppTeam)) return `${sk.Name} was globally disabled!`;
  if (hasBoardState('jumpshot-miss-chance', oppTeam) && nat.includes('jump shot') && !atkC._immuneCoinflip && Math.random()<0.5) return `${sk.Name} MISSED (jump shot aura)!`;
  if (hasBoardState('closeshot-miss-chance', oppTeam) && nat.includes('close shot') && !atkC._immuneCoinflip && Math.random()<0.5) return `${sk.Name} MISSED (close shot aura)!`;
  if (hasBoardState('any-miss', oppTeam) && !atkC._immuneCoinflip && Math.random()<0.5) return `${sk.Name} MISSED (50% aura)!`;
  if (hasBoardState('intercept-all-assists', oppTeam) && !atkC._assistUninterceptable) {
    const cls = String(sk.Logic_Engine?.skill_class||'').toUpperCase();
    if (nat.includes('assist') || cls === 'ASSIST') return `${sk.Name} intercepted!`;
  }
  return null;
}

// ==================== REACTION ENGINE ====================
async function promptAndApplyReaction(act, sk, atkC, defC, dIdx, isP, defs) {
  const nat = sk ? (sk.Nature||'').toLowerCase() : 'basic';
  const isJump = nat.includes('jump shot'), isClose = nat.includes('close shot');
  const isAssist = nat.includes('assist') || String(sk?.Logic_Engine?.skill_class||'').toUpperCase()==='ASSIST';
  const isDmg = act.actionType==='basic' || (sk && !String(sk.Display_DMG||'').toUpperCase().includes('N/A'));
  const defTeam = isP ? 'player' : 'enemy';
  const defRoster = isP ? enemyActive : playerActive;

  let valids = [];
  for (let [i, c] of defRoster.entries()) {
    if (c.isDead) continue;
    if (c._spdBasedDefImmunity && evaluateCondition(c.Ability?.Logic_Engine?.condition, c, atkC, {})) continue;
    for (let [si, rsk] of (c.Skills||[]).entries()) {
      const rl = rsk.Logic_Engine || {};
      if (!rl.is_reactive && String(rl.timing||'').toUpperCase() !== 'REACTIVE') continue;
      if (rsk._usesLeft <= 0) continue;
      const usesPerTurn = rl.uses_per_turn;
      if (usesPerTurn && rsk._usesThisTurn >= usesPerTurn) continue;
      if (atkC._immuneDefSkills) continue;
      const triggers = Array.isArray(rl.valid_triggers) ? rl.valid_triggers : [];
      let triggered = false;
      if (triggers.includes('any_move')) triggered = true;
      if (triggers.includes('any_attack') && isDmg) triggered = true;
      if (triggers.includes('any_skill') && sk) triggered = true;
      if (triggers.includes('jump_shot') && isJump && !atkC._skillsUncontestable) triggered = true;
      if (triggers.includes('close_shot') && isClose && !atkC._skillsUnblockable && !atkC._skillsUncontestable) triggered = true;
      if (triggers.includes('assist') && isAssist && !atkC._assistUninterceptable) triggered = true;
      if (triggers.includes('any_damaging_move') && isDmg) triggered = true;
      if (triggers.includes('damaging_skill') && sk && isDmg) triggered = true;
      if (atkC._heightBlockImmune && parseHeight(c.UI_Frontend_Data?.Height||'0') < parseHeight("7'1")) triggered = false;
      if (triggered) valids.push({cIdx:i, sIdx:si, rsk, c});
    }
  }
  if (!valids.length) return;

  let chosen = null;
  if (!isP) { if (Math.random()<0.4) chosen = valids[Math.floor(Math.random()*valids.length)]; }
  else {
    const choice = await showModal('INCOMING ATTACK',
      `${shortName(getCardName(atkC))} (Opp.) uses ${sk?.Name||'Basic Attack'} on ${shortName(getCardName(defC))}. React?`,
      valids.map(v=>({label:`[${v.c.battleRole}] ${shortName(getCardName(v.c))}: ${v.rsk.Name}`, color:'purple'})),
      'SKIP (No Defense)');
    if (choice !== null) chosen = valids[choice];
  }
  if (!chosen) return;

  const {cIdx, sIdx, rsk, c: reactCard} = chosen;
  const rl = rsk.Logic_Engine || {};
  rsk._usesLeft--; rsk._usesThisTurn++;
  const reactWho = isP ? 'Bot' : 'You';
  logMsg('block', reactWho, `${shortName(getCardName(reactCard))} reacts: ${rsk.Name}!`);

  const re = String(rl.execution||'').toUpperCase();
  const applies = String(rl.applies_status||'').toUpperCase();

  if (!rl.cannot_be_nullified && !reactCard._defSkillsUnnullifiable) {
    await checkNullify(act, rsk, reactCard, isP, atkC, defs);
    if (act._nullified) {
      // *** BUG #10 FIX: trigger rebound on nullify ***
      await checkReboundTriggers(act, atkC, act.execTeam);
      return;
    }
  }

  if (re.includes('BLOCK_FULL') || applies.includes('BLOCK_FULL')) { act._blocked = true; logMsg('block',reactWho,`Complete block!`); return; }
  if (re.includes('CONTEST_FAIL') || applies.includes('CONTEST_FAIL')) { act._blocked = true; logMsg('block',reactWho,`Shot contested!`); return; }
  if (re.includes('BLOCK_PARTIAL') || applies.includes('MITIGATE')) {
    const amt = parseInt(applies.replace('MITIGATE_',''))||parseInt(rl.block_amount||500);
    act._mitigate = (act._mitigate||0) + amt; logMsg('block',reactWho,`Mitigates ${amt} DMG!`); return;
  }
  if (re.includes('REDIRECT_HALF') || applies.includes('REDIRECT_HALF')) { act._redirect = {cIdx, defTeam}; logMsg('block',reactWho,`Redirect to ${shortName(getCardName(reactCard))}!`); return; }
  if (re.includes('PUTBACK_DMG')) {
    const putAmt = parseInt(rl.dmg_raw||800);
    const actorsTeam = isP ? playerActive : enemyActive;
    const tIdx2 = actorsTeam.indexOf(atkC);
    await playCombatAnimation(`${isP?'enemy':'player'}-${cIdx}`,`${isP?'player':'enemy'}-${tIdx2}`,putAmt,atkC,isP?'enemy':'player',tIdx2,true);
    if (atkC.currentHp<=0) handleKO(atkC,isP?'player':'enemy',tIdx2);
    act._blocked = true; return;
  }
  if (re.includes('GRANT_EXTRA_MOVE') || applies.includes('REACTIONARY_GRANT_EXTRA_MOVE')) {
    const extraDmg = getEffectiveDMG(reactCard);
    const myTeam = isP ? enemyActive : playerActive;
    const myDefs = isP ? playerActive : enemyActive;
    const validTgts = getValidTargets(reactCard, myDefs);
    if (validTgts.length) {
      const tgt2 = validTgts[Math.floor(Math.random()*validTgts.length)];
      await playCombatAnimation(`${isP?'enemy':'player'}-${cIdx}`,`${isP?'player':'enemy'}-${tgt2.i}`,extraDmg,tgt2.c,isP?'enemy':'player',tgt2.i,false);
      if (tgt2.c.currentHp<=0) handleKO(tgt2.c,isP?'player':'enemy',tgt2.i);
    }
    return;
  }
  if (re.includes('AURA') || applies.includes('AURA')) {
    const dur = rl.turns_active || 2;
    const aType = re.includes('JUMP')?'jumpshot-miss-chance':re.includes('CLOSE')?'closeshot-miss-chance':'any-miss';
    addBoardState({type:aType, sourceTeam:defTeam, duration:dur});
    logMsg('block',reactWho,`${shortName(getCardName(reactCard))} activates defensive aura!`);
  }
}

async function checkNullify(act, rsk, reactCard, isP, atkC, defs) {
  const nullifiers = [];
  const atkRoster = isP ? playerActive : enemyActive;
  for (let [i,c] of atkRoster.entries()) {
    if (c.isDead) continue;
    for (let [si,nsk] of (c.Skills||[]).entries()) {
      const nl = nsk.Logic_Engine||{};
      if (nsk._usesLeft<=0) continue;
      if (String(nl.execution||'').toUpperCase().includes('NULLIFY_DEFENSE') || String(nl.applies_status||'').toUpperCase().includes('NULLIFY_DEFENSE')) {
        nullifiers.push({cIdx:i,sIdx:si,sk:nsk,c});
      }
    }
  }
  if (!nullifiers.length) return;
  if (isP) {
    const choice = await showModal('NULLIFY DEFENSE?',`Opponent used ${rsk.Name} defensively. Nullify it?`,nullifiers.map(v=>({label:`[${v.c.battleRole}] ${shortName(getCardName(v.c))}: ${v.sk.Name}`,color:'gold'})),'SKIP');
    if (choice !== null) {
      const n = nullifiers[choice]; n.sk._usesLeft--; act._nullified = true;
      logMsg(isP?'atk':'def',isP?'You':'Bot',`${shortName(getCardName(n.c))} nullifies the block!`);
    }
  } else {
    if (Math.random()<0.35) { const n=nullifiers[0]; n.sk._usesLeft--; act._nullified=true; logMsg(isP?'def':'atk','Bot',`${shortName(getCardName(n.c))} nullifies the block!`); }
  }
}

// ==================== COMBAT ANIMATION ====================
async function playCombatAnimation(atkId, defId, dmgIn, targetObj, execTeam, defIdx, isUnblockable) {
  const aE = document.getElementById(`wrap-${atkId}`), dE = document.getElementById(`wrap-${defId}`);
  if (aE) aE.classList.add('doing-attack');
  await delay(360);
  let dmg = dmgIn;
  if (dmgIn && targetObj._mitigate) { dmg = Math.max(0, dmgIn - targetObj._mitigate); targetObj._mitigate = 0; }
  playAttackSound();
  if (dE && dmg > 0) {
    dE.querySelector('.battle-card')?.classList.add('anim-shake');
    const p = document.createElement('div'); p.className='dmg-popup'; p.textContent=`-${dmg}`;
    (dE.querySelector('.battle-card')||dE).appendChild(p);
    setTimeout(()=>{dE.querySelector('.battle-card')?.classList.remove('anim-shake');p.remove();},900);
  }
  targetObj.currentHp = Math.max(0, targetObj.currentHp - dmg);
  const hpMax = getCardHP(targetObj), pct = Math.max(0,(targetObj.currentHp/hpMax)*100);
  const fill = document.getElementById(`hpf-${defId}`);
  if (fill) { fill.style.width=pct+'%'; fill.style.background=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B'; }
  const hpt = document.getElementById(`hpt-${defId}`);
  if (hpt) hpt.textContent=`${targetObj.currentHp}/${hpMax}`;
  await delay(660); if(aE) aE.classList.remove('doing-attack');
  return dmg;
}

// ==================== KO & SURVIVAL ====================
function handleKO(defCard, teamStr, dIdx) {
  if (checkSurvive(defCard)) return;
  if (checkPreventKO(defCard, teamStr==='enemy'?enemyActive:playerActive)) return;
  defCard.isDead = true;
  if (teamStr==='enemy') playerScore++; else enemyScore++;
  $('score-player').textContent=playerScore; $('score-enemy').textContent=enemyScore;
  const cardEl = document.getElementById(`card-${teamStr}-${dIdx}`); if(cardEl) cardEl.classList.add('dead-card');
  logMsg('ko','KO',`${shortName(getCardName(defCard))} knocked out!`);
}
function checkSurvive(card) {
  if (!card || card.currentHp > 0) return false;
  const id = card._instanceId;
  if (_surviveUsed[id]) return false;
  const logic = card.Ability?.Logic_Engine||{};
  const effects = Array.isArray(logic.effects)?logic.effects:[logic.effects||''];
  if (effects.some(e=>e.includes('SURVIVE_AT_1HP'))) { _surviveUsed[id]=true; card.currentHp=1; _frozen[id]=true; logMsg('sys','System',`${shortName(getCardName(card))} survives at 1 HP!`); return true; }
  if (effects.some(e=>e.includes('HEAL_ON_DEATH'))) { _surviveUsed[id]=true; card.currentHp=parseInt(logic.heal||500); logMsg('sys','System',`${shortName(getCardName(card))} heals on death!`); return true; }
  return false;
}
function checkPreventKO(card, team) {
  if (!card) return false;
  if (!card._preventKOUntilLast) return false;
  if (team.filter(c=>c&&!c.isDead&&c!==card).length > 0) { card.currentHp=1; logMsg('sys','System',`${shortName(getCardName(card))} cannot fall while teammates stand!`); return true; }
  return false;
}
function checkHPRecover(card) {
  if (!card || !card._oneTimeRecover) return;
  const id = card._instanceId; if (_healUsed[id]) return;
  const maxHp = getCardHP(card);
  if (card.currentHp <= maxHp*0.3 && card.currentHp > 0) {
    _healUsed[id] = true;
    const heal = Math.floor(maxHp*0.35); card.currentHp = Math.min(maxHp, card.currentHp+heal);
    logMsg('sys','System',`${shortName(getCardName(card))} ABILITY — recovers ${heal} HP!`); renderArena();
  }
}
function onSkillHit(card, sk) {
  if (!card._stackingDmgBuff) return;
  const id = card._instanceId; _stackHits[id] = (_stackHits[id]||0)+1;
  const bonus = 400*_stackHits[id]; ensureBuff(id); _statBuffs[id].dmgBonus = bonus;
  logMsg('sys','System',`🔥 ${shortName(getCardName(card))} stacks! +${bonus} DMG`);
}

// *** BUG #2 FIX: evaluate forced target condition against actual attacker ***
function getForcedTarget(atkC, defs) {
  for (let [i, c] of defs.entries()) {
    if (!c || c.isDead || !c._forcedTarget) continue;
    const logic = c.Ability?.Logic_Engine || {};
    if (logic.condition) {
      const boardState = { sourceTeam: defs };
      if (!evaluateCondition(logic.condition, c, atkC, boardState)) continue;
    }
    return { card: c, idx: i };
  }
  return null;
}

// ==================== REBOUND TRIGGER (BUG #10 FIX) ====================
async function checkReboundTriggers(failedAct, failedCard, failedCardTeam) {
  const roster = failedCardTeam === 'player' ? playerActive : enemyActive;
  const triggers = [];
  for (let [i, c] of roster.entries()) {
    if (c.isDead) continue;
    for (let [si, rsk] of (c.Skills || []).entries()) {
      const rl = rsk.Logic_Engine || {};
      if (rsk._usesLeft <= 0) continue;
      if (rl.uses_per_turn && rsk._usesThisTurn >= rl.uses_per_turn) continue;
      const vt = Array.isArray(rl.valid_triggers) ? rl.valid_triggers : [];
      if (vt.includes('teammate_skill_fail')) triggers.push({ cIdx: i, sIdx: si, rsk, c });
    }
  }
  if (!triggers.length) return;
  const isP = failedCardTeam === 'player';
  let chosen = null;
  if (!isP) {
    if (Math.random() < 0.4) chosen = triggers[0];
  } else {
    const choice = await showModal('REBOUND OPPORTUNITY',
      `${shortName(getCardName(failedCard))}'s move was blocked! Use a rebound skill?`,
      triggers.map(v => ({ label: `[${v.c.battleRole}] ${shortName(getCardName(v.c))}: ${v.rsk.Name}`, color: 'teal' })),
      'SKIP');
    if (choice !== null) chosen = triggers[choice];
  }
  if (!chosen) return;
  const { rsk } = chosen;
  rsk._usesLeft--; rsk._usesThisTurn++;
  const rl = rsk.Logic_Engine || {};
  const who = isP ? 'You' : 'Bot';
  logMsg('sys', who, `${shortName(getCardName(chosen.c))} triggers ${rsk.Name} (rebound)!`);
  if (String(rl.execution || '').toUpperCase().includes('GRANT_EXTRA_MOVE')) {
    const atkTeam = isP ? playerActive : enemyActive;
    const defTeam = isP ? enemyActive : playerActive;
    const fIdx = atkTeam.indexOf(failedCard);
    const validTgts = getValidTargets(failedCard, defTeam);
    if (validTgts.length) {
      let tIdx;
      if (isP) {
        const tChoice = await showModal('REBOUND ATTACK',
          `${shortName(getCardName(failedCard))} gets another shot! Pick target:`,
          validTgts.map(v => ({ label: `[${v.c.battleRole}] ${shortName(getCardName(v.c))}`, color: 'orange' })),
          'SKIP');
        if (tChoice === null) return;
        tIdx = validTgts[tChoice].i;
      } else {
        tIdx = validTgts[Math.floor(Math.random() * validTgts.length)].i;
      }
      const extraDmg = getEffectiveDMG(failedCard, false);
      await playCombatAnimation(`${isP ? 'player' : 'enemy'}-${fIdx}`, `${isP ? 'enemy' : 'player'}-${tIdx}`, extraDmg, defTeam[tIdx], failedCardTeam, tIdx, false);
      if (defTeam[tIdx].currentHp <= 0) handleKO(defTeam[tIdx], isP ? 'enemy' : 'player', tIdx);
      renderArena();
    }
  }
}

// ==================== DEAD REPLACEMENTS ====================
async function handleDeadReplacements(teamStr, activeArr, benchArr) {
  for (let i=0;i<activeArr.length;i++) {
    if (activeArr[i] && activeArr[i].isDead) {
      const dR = activeArr[i].battleRole||'PG';
      const vB = benchArr.map((c,idx)=>({c,idx})).filter(b=>b.c&&!b.c.isDead&&getCardPos(b.c).includes(dR));
      if (!vB.length) continue;
      let r = vB[0];
      if (teamStr==='player' && vB.length>1) {
        const choice = await showModal(`REPLACE ${dR}`,`Choose a sub for the ${dR} slot:`,vB.map(b=>({label:`${shortName(getCardName(b.c))} — HP:${getCardHP(b.c)}`,color:'teal'})),'Auto-pick first');
        if (choice !== null) r = vB[choice];
      }
      logMsg('sys','System',`${shortName(getCardName(r.c))} enters at ${dR}!`);
      const outgoing = activeArr[i];
      activeArr[i] = benchArr[r.idx]; benchArr[r.idx] = outgoing;
      activeArr[i].battleRole = dR;
      if (!activeArr[i].currentHp) activeArr[i].currentHp = getCardHP(activeArr[i]);
      applyPassiveAbility(activeArr[i]);
      applySynergyAbilities(activeArr[i], activeArr);
      renderArena(); renderBenchStacks(); await delay(600);
    }
  }
}
