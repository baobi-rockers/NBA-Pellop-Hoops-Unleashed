      if (!defCard || defCard.isDead) continue;
      const ck = defCard._instanceId;
      if (_frozen && _frozen[ck]) continue;

      (defCard.Skills || []).forEach((rSk, rIdx) => {
        if (!_isReactiveTiming(rSk)) return;
        if (!canUseSkill(defCard, rIdx)) return;
        if (!_reactiveSkillCanFire(rSk, castNature, sk)) return;
        reactors.push({ card: defCard, cardIdx: i, sk: rSk, skIdx: rIdx });
      });
    }

    if (!reactors.length) return false;

    let chosen = null;

    if (!isPlayer) {
      // Enemy side (human) gets to react
      chosen = await _showReactivePrompt(reactors, atkC, defC, castNature, act);
    } else {
      // Bot reacts automatically — pick first available
      chosen = _botChooseReactive(reactors, castNature);
    }

    if (!chosen) return false;

    // Execute the reactive skill
    consumeSkillUse(chosen.card, chosen.skIdx);
    const defNature = getSkillNature(chosen.sk);
    const defResult = resolveDefensiveAction(
      _parseAction(chosen.sk.Modifiers || ''),
      atkC, chosen.card, castNature, sk
    );

    if (typeof logMsg === 'function') {
      logMsg('def', ownSide === 'player' ? 'You' : 'Bot', `${shortName(getCardName(chosen.card))} uses ${chosen.sk.Name}!`);
    }

    // Retaliatory damage after block
    if (defResult.blocked) {
      const retDmg = typeof ENGINE !== 'undefined' && ENGINE.evaluateRetaliateAbilities
        ? ENGINE.evaluateRetaliateAbilities(atkC, 'Block', castNature)
        : (atkC._retaliatory || 0);
      if (retDmg > 0 && defC && !defC.isDead) {
        if (typeof logMsg === 'function') logMsg('atk', 'Retaliate', `${shortName(getCardName(atkC))} retaliates for ${retDmg}!`);
        if (typeof playCombatAnimation === 'function') {
          const aSide = isPlayer ? 'player' : 'enemy';
          const dSide = isPlayer ? 'enemy' : 'player';
          await playCombatAnimation(`${aSide}-${act.actorIdx}`, `${dSide}-${dIdx}`, retDmg, defC, dIdx, dSide);
          if (defC.currentHp <= 0 && typeof handleKO === 'function') handleKO(defC, dSide, dIdx);
        }
      }
    }

    return defResult.blocked || defResult.intercepted;
  }

  /**
   * _isReactiveTiming(sk) — true if skill has Reactive or Reactive_Free timing.
   */
  function _isReactiveTiming(sk) {
    if (!sk) return false;
    const timing = String(sk.Timing || sk.timing || '');
    return timing.includes('Reactive');
  }

  /**
   * _reactiveSkillCanFire(rSk, castNature, attackSk)
   * Returns true if the reactive skill's timing matches the incoming attack nature.
   */
  function _reactiveSkillCanFire(rSk, castNature, attackSk) {
    const timing = String(rSk.Timing || rSk.timing || '');
    if (!timing) return true; // no filter = always fires

    // Extract nature from timing string e.g. "Reactive_Free:On_Enemy:Nature:Offensive:Close_Shot"
    const natMatch = timing.match(/Nature:([^\s:]+(?::[^\s:]+)*)/);
    if (natMatch) {
      const filter = natMatch[1].replace(/_/g, ':');
      if (!natureMatchesFilter(castNature, filter)) return false;
    }
    // Property-level immunity on incoming attack
    if (timing.includes('Unblockable') && attackSk && skillHasProperty(attackSk, 'Unblockable')) return false;
    if (timing.includes('Uncontestable') && attackSk && skillHasProperty(attackSk, 'Uncontestable')) return false;
    return true;
  }

  /**
   * _showReactivePrompt(reactors, atkC, defC, castNature, act)
   * Shows the in-game reactive skill prompt. Returns chosen { card, sk, skIdx } or null.
   */
  async function _showReactivePrompt(reactors, atkC, defC, castNature, act) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'reactive-overlay';
      overlay.innerHTML = `
        <div class="reactive-popup">
          <div class="reactive-title">⚡ Incoming: <span>${atkC ? shortName(getCardName(atkC)) : 'Enemy'}</span></div>
          <div class="reactive-sub">Nature: <b>${castNature}</b> — Use a reactive skill?</div>
          <div class="reactive-options">
            ${reactors.map((r, i) => `
              <button class="game-btn game-btn-blue reactive-choice-btn" data-idx="${i}">
                <span class="reactive-card-name">${shortName(getCardName(r.card))}</span>
                <span class="reactive-sk-name">${r.sk.Name}</span>
                <span class="reactive-sk-dmg">${r.sk.Display_DMG || ''}</span>
              </button>
            `).join('')}
          </div>
          <button class="game-btn game-btn-ghost reactive-pass-btn">Pass (Don't React)</button>
        </div>
      `;

      overlay.querySelectorAll('.reactive-choice-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          document.body.removeChild(overlay);
          resolve(reactors[idx]);
        });
      });
      overlay.querySelector('.reactive-pass-btn').addEventListener('click', () => {
        document.body.removeChild(overlay);
        resolve(null);
      });

      document.body.appendChild(overlay);
    });
  }

  /**
   * _botChooseReactive(reactors, castNature)
   * Simple bot heuristic: prefer Block > Contest > Freeze > others.
   */
  function _botChooseReactive(reactors, castNature) {
    const priority = ['BLOCK', 'CONTEST', 'FREEZE', 'INTERCEPT', 'DMG_REDUCTION_MULT', 'DMG_REDUCTION_FLAT'];
    for (const pType of priority) {
      const found = reactors.find(r => {
        const a = _parseAction(r.sk.Modifiers || '');
        return a.type === pType;
      });
      if (found) return found;
    }
    return reactors[0] || null;
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 10 — STACK-PER-HIT / STACK-PER-MISS (Permanent stacking)
  // ─────────────────────────────────────────────────────────────

  /**
   * processStackingTriggers(card, subtype, castNature, castType, skillId, ownTeam)
   * subtype: 'HIT' or 'FAIL'
   * Called after attack resolves. Delegates to ENGINE for ON:SELF_CAST rules,
   * then checks parsed skill modifiers for Stack_Per_Hit / Stack_Per_Miss.
   */
  function processStackingTriggers(card, subtype, castNature, castType, skillId, ownTeam) {
    // Ability-level stacking (T-Mac, Larry Bird) — via ENGINE
    if (typeof ENGINE !== 'undefined' && ENGINE.evalSelfCastStackingAbilities) {
      ENGINE.evalSelfCastStackingAbilities(card, castNature, castType, subtype, skillId, ownTeam);
    }

    // Skill-level stacking modifiers
    (card.Skills || []).forEach(sk => {
      if (sk.Name !== skillId && (sk._parsed?.id || sk.SkillID) !== skillId) return;
      const phases = sk._parsed?.phases || [];
      for (const phase of phases) {
        for (const mod of (phase.modifiers || [])) {
          const action = _parseAction(mod.actionString || '');
          if (action.stacking === 'HIT' && subtype === 'HIT') {
            _applyPermanentStack(card, 'dmg', action.value || 0);
          }
          if (action.stacking === 'MISS' && subtype === 'FAIL') {
            _applyPermanentStack(card, 'dmg', action.value || 0);
          }
        }
      }
    });
  }

  function _applyPermanentStack(card, stat, value) {
    const ck = card._instanceId;
    if (!_permanentStacks[ck]) _permanentStacks[ck] = { dmg: 0, baseDmg: 0 };
    _permanentStacks[ck][stat] = (_permanentStacks[ck][stat] || 0) + value;
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 11 — DUAL-USE SKILL BRANCHING
  // ─────────────────────────────────────────────────────────────

  /**
   * resolveDualUseBranch(sk, context)
   * Returns the resolved modifiers for the chosen branch.
   * For player-controlled: prompts with a choice popup.
   * For bot: picks offensive branch.
   */
  async function resolveDualUseBranch(sk, context) {
    const isPlayerControlled = context.isPlayer;
    let branch = 'GROUP_A'; // default = offensive

    if (isPlayerControlled) {
      branch = await _promptDualUseChoice(sk, context);
    } else {
      // Bot: prefer offensive branch
      branch = 'GROUP_A';
    }

    _activeBranch[`${context.card._instanceId}_${context.skillIdx}`] = branch;
    return branch;
  }

  async function _promptDualUseChoice(sk, context) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'reactive-overlay';
      overlay.innerHTML = `
        <div class="reactive-popup">
          <div class="reactive-title">⚡ ${sk.Name} — Choose Mode</div>
          <div class="reactive-options">
            <button class="game-btn game-btn-orange dual-choice" data-branch="GROUP_A">⚔ Offensive</button>
            <button class="game-btn game-btn-blue dual-choice" data-branch="GROUP_B">🛡 Defensive</button>
          </div>
        </div>
      `;
      overlay.querySelectorAll('.dual-choice').forEach(btn => {
        btn.addEventListener('click', () => {
          document.body.removeChild(overlay);
          resolve(btn.dataset.branch);
        });
      });
      document.body.appendChild(overlay);
    });
  }

  /**
   * isDualUseSkill(sk) — checks parsed phases for DUAL_USE tag.
   */
  function isDualUseSkill(sk) {
    if (!sk) return false;
    const parsed = sk._parsed || PARSER.parseSkill(sk);
    if (!parsed?.phases) return false;
    return parsed.phases.some(p => p.timing && p.timing.includes('DUAL_USE'));
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 12 — GRANT_EXTRA_MOVE (loop-safe)
  // ─────────────────────────────────────────────────────────────

  async function _handleGrantExtraMove(casterCard, targetCard, nature, context) {
    const ck = (targetCard || casterCard)._instanceId;
    if (_extraMoveUsedThisTurn.has(ck)) {
      if (typeof logMsg === 'function') logMsg('sys', 'Extra Move', `${shortName(getCardName(targetCard || casterCard))} already used extra move this turn.`);
      return;
    }
    _extraMoveUsedThisTurn.add(ck);
    if (typeof logMsg === 'function') {
      logMsg('sys', 'Extra Move', `${shortName(getCardName(targetCard || casterCard))} gets an extra ${nature || 'any'} action!`);
    }
    // The actual extra action is handled in the turn flow (OTHER.html → executeAction)
    // We signal it by setting a flag on the card
    (targetCard || casterCard)._grantedExtraMove = nature || 'ANY';
  }

  /**
   * resetExtraMoveGuards() — called at end of each turn
   */
  function resetExtraMoveGuards() {
    _extraMoveUsedThisTurn.clear();
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 13 — SCREEN_GUARANTEE_HIT
  // ─────────────────────────────────────────────────────────────

  /**
   * consumeScreenGuarantee(card) → boolean
   * Returns true and clears the flag if the card has a screen guarantee.
   */
  function consumeScreenGuarantee(card) {
    const ck = card._instanceId;
    if (_screenGuarantee[ck]) {
      delete _screenGuarantee[ck];
      return true;
    }
    return false;
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 14 — DMG_REDIRECTION
  // ─────────────────────────────────────────────────────────────

  /**
   * resolveRedirection(originalTarget, incomingDmg, context)
   * If the target has a _dmgRedirectTo flag, redirect damage.
   * Returns { finalTarget, finalDmg }.
   */
  function resolveRedirection(originalTarget, incomingDmg, context) {
    if (originalTarget._dmgRedirectTo && !originalTarget._dmgRedirectTo.isDead) {
      const redirect = originalTarget._dmgRedirectTo;
      if (typeof logMsg === 'function') {
        logMsg('sys', 'Redirect', `${shortName(getCardName(redirect))} absorbs ${incomingDmg} DMG intended for ${shortName(getCardName(originalTarget))}`);
      }
      return { finalTarget: redirect, finalDmg: incomingDmg };
    }
    return { finalTarget: originalTarget, finalDmg: incomingDmg };
  }

  /**
   * clearRedirectionFlag(card) — clear after use
   */
  function clearRedirectionFlag(card) {
    delete card._dmgRedirectTo;
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 15 — LBJ_PUTBACK & REBOUND_AND_DEAL_BASE_DMG
  // ─────────────────────────────────────────────────────────────

  /**
   * checkReboundTriggers(act, failedCard, ownTeam, isPlayer)
   * After a miss/block — check if any teammate has the rebound modifier.
   */
  async function checkReboundTriggers(act, failedCard, ownTeam, isPlayer) {
    const atks = ownTeam || [];
    for (const teammate of atks) {
      if (!teammate || teammate.isDead || teammate === failedCard) continue;
      if (!teammate._hasRebound) continue;
      // Teammate rebounds and shoots with base DMG
      delete teammate._hasRebound;
      const reboundDmg = _getEffectiveDMG(teammate, false);
      const defs = isPlayer ? (typeof enemyActive !== 'undefined' ? enemyActive : []) : (typeof playerActive !== 'undefined' ? playerActive : []);
      const vt = typeof getValidTargets === 'function' ? getValidTargets(teammate, defs) : [];
      if (!vt.length) continue;
      const tgt = vt[0].c;
      const tIdx = vt[0].i;
      if (typeof logMsg === 'function') logMsg('sys', 'Rebound', `${shortName(getCardName(teammate))} rebounds and shoots for ${reboundDmg}!`);
      if (typeof playCombatAnimation === 'function') {
        const aSide = isPlayer ? 'player' : 'enemy';
        const dSide = isPlayer ? 'enemy' : 'player';
        const tIdx2 = atks.indexOf(teammate);
        await playCombatAnimation(`${aSide}-${tIdx2}`, `${dSide}-${tIdx}`, reboundDmg, tgt, tIdx, dSide);
        if (tgt.currentHp <= 0 && typeof handleKO === 'function') handleKO(tgt, dSide, tIdx);
      }
    }
  }

  /**
   * checkTeammateFail(act, failedCard, enemyTeam, ownTeam, isPlayer)
   * LeBron-style putback: after teammate fails, fire ON:TEAMMATE_FAIL.
   */
  async function checkTeammateFail(act, failedCard, enemyTeam, ownTeam, isPlayer) {
    const atks = ownTeam || [];
    const failNature = failedCard?._lastCastNature || 'Offensive';

    for (const teammate of atks) {
      if (!teammate || teammate.isDead || teammate === failedCard) continue;
      const action = typeof ENGINE !== 'undefined' && ENGINE.evalTeammateFail
        ? ENGINE.evalTeammateFail(teammate, failedCard, failNature, ownTeam)
        : null;
      if (!action) continue;

      if (action.type === 'LBJ_PUTBACK') {
        const defs = isPlayer ? (typeof enemyActive !== 'undefined' ? enemyActive : []) : (typeof playerActive !== 'undefined' ? playerActive : []);
        const vt = typeof getValidTargets === 'function' ? getValidTargets(teammate, defs) : [];
        if (!vt.length) continue;
        const tgt = vt[0].c;
        const tIdx = vt[0].i;
        const putbackDmg = _getEffectiveDMG(teammate, false);
        if (typeof logMsg === 'function') logMsg('atk', 'LBJ Putback', `${shortName(getCardName(teammate))} throws down a putback for ${putbackDmg}!`);
        if (typeof playCombatAnimation === 'function') {
          const aSide = isPlayer ? 'player' : 'enemy';
          const dSide = isPlayer ? 'enemy' : 'player';
          const tmIdx = atks.indexOf(teammate);
          await playCombatAnimation(`${aSide}-${tmIdx}`, `${dSide}-${tIdx}`, putbackDmg, tgt, tIdx, dSide);
          if (tgt.currentHp <= 0 && typeof handleKO === 'function') handleKO(tgt, dSide, tIdx);
        }
      }
    }
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 16 — HARD_DISABLE_SHUTDOWN (by skill name or nature)
  // ─────────────────────────────────────────────────────────────

  /**
   * _applySkillDisable(card, skillName, nature, td)
   * skillName: specific skill name (e.g. "Logo Three") — null if by nature
   * nature: nature string — null if by specific name
   */
  function _applySkillDisable(card, skillName, nature, td) {
    const ck = card._instanceId;
    if (!_skillDisables[ck]) _skillDisables[ck] = [];
    _skillDisables[ck].push({
      skillName: skillName || null,
      nature: nature || null,
      turnsLeft: td?.turns || 1,
    });
    if (typeof _shutdown !== 'undefined' && !skillName && !nature) {
      _shutdown[ck] = (_shutdown[ck] || 0) + (td?.turns || 1);
    }
  }

  /**
   * isSkillDisabled(instanceId, skillName, skillNature) → boolean
   * Called by canUseSkill to gate activation.
   */
  function isSkillDisabled(instanceId, skillName, skillNature) {
    const disables = _skillDisables[instanceId] || [];
    return disables.some(d => {
      if (d.turnsLeft <= 0) return false;
      if (d.skillName && skillName && d.skillName.toLowerCase() === skillName.toLowerCase()) return true;
      if (d.nature && skillNature && natureMatchesFilter(skillNature, d.nature)) return true;
      return false;
    });
  }

  /**
   * tickSkillDisables() — called at end of each turn.
   */
  function tickSkillDisables() {
    for (const ck of Object.keys(_skillDisables)) {
      _skillDisables[ck] = _skillDisables[ck].filter(d => {
        d.turnsLeft--;
        return d.turnsLeft > 0;
      });
      if (!_skillDisables[ck].length) delete _skillDisables[ck];
    }
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 17 — APPLY_PRIORITY
  // ─────────────────────────────────────────────────────────────

  /**
   * applyPriorityMultiplier(card, nature, multiplier)
   * Applies a turn-scoped priority boost. Cleared at end of turn.
   */
  function applyPriorityMultiplier(card, nature, multiplier) {
    card._priorityBonus = (card._priorityBonus || 1) * (multiplier || 1);
  }

  /**
   * getEffectivePriority(card, sk)
   * Returns SPD + (skill base priority) * _priorityBonus.
   */
  function getEffectivePriority(card, sk) {
    const spd  = getCardSPD(card);
    const skP  = sk?._priority || 1;
    const mult = card._priorityBonus || 1;
    return spd + (skP * mult);
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 18 — STEAL_SKILL (already in Section 6 — see resolveStealSkill)
  // ─────────────────────────────────────────────────────────────

  // ─────────────────────────────────────────────────────────────
  // SECTION 19 — executeSkillAction (MAIN ENTRY POINT)
  // ─────────────────────────────────────────────────────────────

  /**
   * executeSkillAction(act, isPlayer)
   * Main skill execution pipeline. Called by OTHER.html's executeAction().
   *
   * act: { actorIdx, skillIdx, targetIdx, execTeam, actionType: 'skill' }
   */
  async function executeSkillAction(act, isPlayer) {
    const atks = isPlayer ? playerActive : enemyActive;
    const defs = isPlayer ? enemyActive  : playerActive;
    const atkC = atks[act.actorIdx];

    if (!atkC || atkC.isDead) return;
    if (!canUseSkill(atkC, act.skillIdx)) {
      if (typeof logMsg === 'function') logMsg('sys', 'Skill', `${shortName(getCardName(atkC))}'s skill is unavailable!`);
      return;
    }

    const sk = atkC.Skills[act.skillIdx];
    if (!sk) return;

    const whoLabel = isPlayer ? 'You' : 'Bot';
    const ownTeam  = atks;
    const enemyTeam = defs;

    // ── Dual-use branch selection ──
    let branch = null;
    if (isDualUseSkill(sk)) {
      branch = await resolveDualUseBranch(sk, {
        card: atkC, isPlayer, skillIdx: act.skillIdx,
        ownTeam, enemyTeam,
      });
    }

    // ── Resolve skill phases ──
    const context = {
      card: atkC,
      ownTeam,
      enemyTeam,
      selectedTarget: defs[act.targetIdx] || null,
      selectedTeammate: atks.find((c, i) => i !== act.actorIdx && !c?.isDead),
      gameRound: typeof turnCount !== 'undefined' ? turnCount : 1,
      ownGrave: typeof playerScore !== 'undefined' ? [] : [],
      ownTeamLead: typeof playerScore !== 'undefined' && typeof enemyScore !== 'undefined'
        ? (isPlayer ? playerScore > enemyScore : enemyScore > playerScore) : false,
      isReactive: false,
      isPlayer,
      branch,
      skillIdx: act.skillIdx,
    };

    const resolved = resolveSkillPhases(sk, context);
    const castNature = resolved.nature?.[0] || getSkillNature(sk);
    atkC._lastCastNature = castNature;

    // ── Store Display_DMG for damage computation ──
    atkC._currentSkillDisplayDMG = sk.Display_DMG || '0';

    // ── ON:SELF_CAST pre-attack ability flags ──
    const selfCastFlags = typeof ENGINE !== 'undefined' && ENGINE.evalSelfCastAbilities
      ? ENGINE.evalSelfCastAbilities(atkC, castNature, 'skill', null, sk.Name, ownTeam)
      : {};

    // ── Consume use (for DUAL_USE: once, before branching) ──
    consumeSkillUse(atkC, act.skillIdx);

    // ── Standard coin flip (on skill itself) ──
    const needsCoin  = String(sk.Conditions || sk.Coin_Flip || '').includes('Coin_Flip') || String(sk.Coin_Flip || '') === '1';
    const screenGuarantee = consumeScreenGuarantee(atkC);
    const noMiss = atkC._noMiss || selfCastFlags.noMiss || screenGuarantee;

    if (needsCoin && !noMiss) {
      const win = await runCoinFlip(shortName(getCardName(atkC)), sk.Name);
      if (typeof logMsg === 'function') logMsg('coin', 'Coin', `${win ? 'HEADS — Hit!' : 'TAILS — Miss!'}`);
      if (!win) {
        processStackingTriggers(atkC, 'FAIL', castNature, 'skill', sk.Name, ownTeam);
        await checkReboundTriggers(act, atkC, ownTeam, isPlayer);
        await checkTeammateFail(act, atkC, enemyTeam, ownTeam, isPlayer);
        if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
        return;
      }
    }

    // ── Forced coin flip from global debuffs ──
    if (!noMiss) {
      const forcedResult = await applyGlobalDebuffEffects(atkC, sk, castNature, enemyTeam, act.skillIdx);
      if (forcedResult.forcedCoinFlipMiss) {
        if (!forcedResult.refundSkill) {
          // Use was already consumed — leave it
        } else {
          refundSkillUse(atkC, act.skillIdx);
        }
        processStackingTriggers(atkC, 'FAIL', castNature, 'skill', sk.Name, ownTeam);
        await checkReboundTriggers(act, atkC, ownTeam, isPlayer);
        await checkTeammateFail(act, atkC, enemyTeam, ownTeam, isPlayer);
        if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
        return;
      }
    }

    // ── Target resolution ──
    let defC = defs[act.targetIdx];
    let dIdx  = act.targetIdx;
    if (!defC || defC.isDead) {
      const vt = typeof getValidTargets === 'function' ? getValidTargets(atkC, defs) : [];
      if (!vt.length) {
        if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
        return;
      }
      defC = vt[0].c; dIdx = vt[0].i;
    }

    // ── DMG Redirection check ──
    const { finalTarget, finalDmg: _ } = resolveRedirection(defC, 0, context);
    if (finalTarget !== defC) {
      defC = finalTarget;
    }

    // ── Immunity checks ──
    if (defC._fullyUntargetable) {
      if (typeof logMsg === 'function') logMsg('sys', 'System', `${shortName(getCardName(defC))} is completely untargetable!`);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    const natL = castNature.toLowerCase();
    if (defC._immuneAllOffensive && natL.includes('offensive')) {
      if (typeof logMsg === 'function') logMsg('sys', 'System', `${shortName(getCardName(defC))} is immune to offensive skills!`);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }
    if (defC._immuneCloseShot && natL.includes('close_shot')) {
      if (typeof logMsg === 'function') logMsg('sys', 'System', `${shortName(getCardName(defC))} is immune to close shots!`);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }
    if (defC._immuneJumpShot && natL.includes('jump_shot')) {
      if (typeof logMsg === 'function') logMsg('sys', 'System', `${shortName(getCardName(defC))} is immune to jump shots!`);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    // ── ON:ENEMY_CAST triggers (mitigation from defending team) ──
    let mitigationFlat = 0;
    let mitigationMult = 1.0;
    if (typeof ENGINE !== 'undefined' && ENGINE.evaluateEnemyCastTriggers) {
      const mit = ENGINE.evaluateEnemyCastTriggers(defs, atkC, defC, castNature, 'skill', defs, atks);
      mitigationFlat = mit.mitigationFlat || 0;
      mitigationMult = mit.mitigationMult != null ? mit.mitigationMult : 1.0;
    }

    // ── Prompt reactive (defensive) skills ──
    const blocked = await promptReactiveSkills(act, sk, atkC, defC, dIdx, isPlayer, defs, castNature);
    if (blocked) {
      processStackingTriggers(atkC, 'FAIL', castNature, 'skill', sk.Name, ownTeam);
      await checkReboundTriggers(act, atkC, ownTeam, isPlayer);
      await checkTeammateFail(act, atkC, enemyTeam, ownTeam, isPlayer);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    // ── Compute damage ──
    // Find assister card if needed (Deal_Assist_Dmg)
    const firstMod = resolved.modifiers?.[0];
    let assisterCard = null;
    if (firstMod?.action?.type === 'DEAL_ASSIST_DMG' && firstMod.action.refPosition) {
      assisterCard = ownTeam.find(c => c && !c.isDead && c.battleRole === firstMod.action.refPosition);
    }

    const primaryAction = firstMod?.action || { type: 'NONE' };
    const primaryTD = firstMod?.td || { turns: 0, delay: 0, special: null };
    const rawDmg = computeSkillDamage(primaryAction, atkC, assisterCard, mitigationFlat, mitigationMult, selfCastFlags);

    // Apply DMG redirection
    const { finalTarget: realTarget } = resolveRedirection(defC, rawDmg, context);

    // ── Log & animate ──
    if (typeof logMsg === 'function') {
      logMsg(isPlayer ? 'atk' : 'def', whoLabel,
        `[${atkC.battleRole}] ${shortName(getCardName(atkC))} → ${sk.Name} on [${realTarget.battleRole}] ${shortName(getCardName(realTarget))} — ${rawDmg} DMG`);
    }

    const aSide = isPlayer ? 'player' : 'enemy';
    const dSide = isPlayer ? 'enemy' : 'player';
    if (typeof playCombatAnimation === 'function') {
      await playCombatAnimation(`${aSide}-${act.actorIdx}`, `${dSide}-${dIdx}`, rawDmg, realTarget, dIdx, dSide);
    }

    // ── Apply all other modifiers (non-damage) ──
    for (let mi = 1; mi < resolved.modifiers.length; mi++) {
      const modEntry = resolved.modifiers[mi];
      const modTargetStr = modEntry.target || 'Self';
      const modTargetCard = _resolveModifierTarget(modTargetStr, atkC, defC, ownTeam, enemyTeam, context);
      await executeModifier(modEntry, atkC, modTargetCard, castNature, {
        ...context,
        attackerSlotId: `${aSide}-${act.actorIdx}`,
        defenderSlotId: `${dSide}-${dIdx}`,
        defIdx: dIdx,
        defSide: dSide,
        assister: assisterCard,
      });
    }

    // ── KO check ──
    if (realTarget.currentHp <= 0 && typeof handleKO === 'function') {
      handleKO(realTarget, dSide, dIdx);
    }

    // ── HP threshold / state triggers on damaged card ──
    if (typeof ENGINE !== 'undefined') {
      if (ENGINE.checkHPThreshold) {
        const threshAction = ENGINE.checkHPThreshold(realTarget, defs);
        if (threshAction && typeof ENGINE.applyPassiveFlag === 'function') ENGINE.applyPassiveFlag(realTarget, threshAction);
      }
      if (ENGINE.checkHPState) {
        const stateActions = ENGINE.checkHPState(realTarget, defs);
        stateActions.forEach(a => ENGINE.applyPassiveFlag && ENGINE.applyPassiveFlag(realTarget, a));
      }
    }

    // ── ON:SELF_CAST HIT stacking ──
    processStackingTriggers(atkC, 'HIT', castNature, 'skill', sk.Name, ownTeam);

    // ── Clear THIS_ATTACK flags ──
    if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
    clearRedirectionFlag(defC);

    // ── Extra Move grant ──
    if (atkC._grantedExtraMove) {
      await _processGrantedExtraMove(atkC, act, isPlayer);
    }

    if (typeof renderArena === 'function') renderArena();
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 20 — executeBasicAction (BASIC ATTACK ENTRY POINT)
  // ─────────────────────────────────────────────────────────────

  /**
   * executeBasicAction(act, isPlayer)
   * Runs a basic (Nature:Base) attack through the full pipeline.
   */
  async function executeBasicAction(act, isPlayer) {
    const atks = isPlayer ? playerActive : enemyActive;
    const defs = isPlayer ? enemyActive  : playerActive;
    const atkC = atks[act.actorIdx];

    if (!atkC || atkC.isDead) return;
    const ck = atkC._instanceId;
    if (_frozen && _frozen[ck]) {
      if (typeof logMsg === 'function') logMsg('sys', isPlayer ? 'You' : 'Bot', `${shortName(getCardName(atkC))} is frozen and cannot act!`);
      return;
    }

    const castNature = 'Base';
    const whoLabel   = isPlayer ? 'You' : 'Bot';
    atkC._lastCastNature = castNature;

    // ON:SELF_CAST flags
    const selfCastFlags = typeof ENGINE !== 'undefined' && ENGINE.evalSelfCastAbilities
      ? ENGINE.evalSelfCastAbilities(atkC, castNature, 'basic', null, null, atks)
      : {};

    // No coin flip for basic attacks unless a forced flip debuff applies
    const screenGuarantee = consumeScreenGuarantee(atkC);
    const noMiss = atkC._noMiss || selfCastFlags.noMiss || screenGuarantee;

    if (!noMiss) {
      const forcedResult = await applyGlobalDebuffEffects(atkC, null, castNature, defs, -1);
      if (forcedResult.forcedCoinFlipMiss) {
        processStackingTriggers(atkC, 'FAIL', castNature, 'basic', null, atks);
        await checkReboundTriggers(act, atkC, atks, isPlayer);
        await checkTeammateFail(act, atkC, defs, atks, isPlayer);
        if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
        return;
      }
    }

    // Target resolution
    let defC = defs[act.targetIdx];
    let dIdx = act.targetIdx;
    if (!defC || defC.isDead) {
      const vt = typeof getValidTargets === 'function' ? getValidTargets(atkC, defs) : [];
      if (!vt.length) { if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC); return; }
      defC = vt[0].c; dIdx = vt[0].i;
    }

    // DMG Redirection
    const { finalTarget } = resolveRedirection(defC, 0, { card: atkC });
    if (finalTarget !== defC) defC = finalTarget;

    // Immunity checks
    if (defC._fullyUntargetable) {
      if (typeof logMsg === 'function') logMsg('sys', 'System', `${shortName(getCardName(defC))} is untargetable!`);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    // ON:ENEMY_CAST mitigation
    let mitigationFlat = 0;
    let mitigationMult = 1.0;
    if (typeof ENGINE !== 'undefined' && ENGINE.evaluateEnemyCastTriggers) {
      const mit = ENGINE.evaluateEnemyCastTriggers(defs, atkC, defC, castNature, 'basic', defs, atks);
      mitigationFlat = mit.mitigationFlat || 0;
      mitigationMult = mit.mitigationMult != null ? mit.mitigationMult : 1.0;
    }

    // Reactive skills prompt
    const blocked = await promptReactiveSkills(act, null, atkC, defC, dIdx, isPlayer, defs, castNature);
    if (blocked) {
      processStackingTriggers(atkC, 'FAIL', castNature, 'basic', null, atks);
      await checkReboundTriggers(act, atkC, atks, isPlayer);
      await checkTeammateFail(act, atkC, defs, atks, isPlayer);
      if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
      return;
    }

    // Compute basic DMG
    let dmgRaw = _getEffectiveDMG(atkC, false);
    if (selfCastFlags.thisAttackBaseDmgBonus) dmgRaw += selfCastFlags.thisAttackBaseDmgBonus;
    const stacks = _permanentStacks[ck];
    if (stacks?.baseDmg) dmgRaw += stacks.baseDmg;
    dmgRaw = Math.floor(dmgRaw * mitigationMult);
    dmgRaw = Math.max(0, dmgRaw - mitigationFlat);

    const { finalTarget: realTarget } = resolveRedirection(defC, dmgRaw, { card: atkC });

    if (typeof logMsg === 'function') {
      logMsg(isPlayer ? 'atk' : 'def', whoLabel,
        `[${atkC.battleRole}] ${shortName(getCardName(atkC))} → Basic Attack on [${realTarget.battleRole}] ${shortName(getCardName(realTarget))} — ${dmgRaw} DMG`);
    }

    const aSide = isPlayer ? 'player' : 'enemy';
    const dSide = isPlayer ? 'enemy' : 'player';
    if (typeof playCombatAnimation === 'function') {
      await playCombatAnimation(`${aSide}-${act.actorIdx}`, `${dSide}-${dIdx}`, dmgRaw, realTarget, dIdx, dSide);
    }

    if (realTarget.currentHp <= 0 && typeof handleKO === 'function') {
      handleKO(realTarget, dSide, dIdx);
    }

    // HP triggers on damaged card
    if (typeof ENGINE !== 'undefined') {
      if (ENGINE.checkHPThreshold) {
        const a = ENGINE.checkHPThreshold(realTarget, defs);
        if (a && ENGINE.applyPassiveFlag) ENGINE.applyPassiveFlag(realTarget, a);
      }
      if (ENGINE.checkHPState) {
        ENGINE.checkHPState(realTarget, defs).forEach(a => ENGINE.applyPassiveFlag && ENGINE.applyPassiveFlag(realTarget, a));
      }
    }

    processStackingTriggers(atkC, 'HIT', castNature, 'basic', null, atks);
    if (typeof ENGINE !== 'undefined' && ENGINE.clearTempAttackFlags) ENGINE.clearTempAttackFlags(atkC);
    clearRedirectionFlag(defC);

    if (atkC._grantedExtraMove) await _processGrantedExtraMove(atkC, act, isPlayer);
    if (typeof renderArena === 'function') renderArena();
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION 21 — AI SKILL CHOOSER
  // ─────────────────────────────────────────────────────────────

  /**
   * botChooseSkill(card, ownTeam, enemyTeam)
   * Returns { skillIdx, targetIdx } for the bot's action, or null for basic.
   * Prefers highest priority usable offensive skill.
   */
  function botChooseSkill(card, ownTeam, enemyTeam) {
    const vt = typeof getValidTargets === 'function' ? getValidTargets(card, enemyTeam) : [];
    if (!vt.length) return null;

    let bestSkill = null;
    let bestPriority = -Infinity;

    (card.Skills || []).forEach((sk, idx) => {
      if (!canUseSkill(card, idx)) return;
      const nature = getSkillNature(sk);
      // Bot only uses offensive / utility skills proactively
      if (nature.includes('Defensive')) return;
      const p = getEffectivePriority(card, sk);
      if (p > bestPriority) { bestPriority = p; bestSkill = { skillIdx: idx, targetIdx: vt[0].i }; }
    });

    return bestSkill;
  }

  // ─────────────────────────────────────────────────────────────
  // INTERNAL HELPERS
  // ─────────────────────────────────────────────────────────────

  /**
   * _resolveModifierTarget(targetStr, caster, selectedEnemy, ownTeam, enemyTeam, context)
   * Returns a card or array of cards.
   */
  function _resolveModifierTarget(targetStr, caster, selectedEnemy, ownTeam, enemyTeam, context) {
    if (!targetStr) return caster;
    const parts = targetStr.split(':');
    const subject = parts[0];

    switch (subject) {
      case 'Self':             return caster;
      case 'All_Ally':         return ownTeam.filter(c => c && !c.isDead);
      case 'All_Teammate':     return ownTeam.filter(c => c && !c.isDead && c !== caster);
      case 'All_Enemy':        return enemyTeam.filter(c => c && !c.isDead);
      case 'Selected_Enemy':   return selectedEnemy;
      case 'Casting_Teammate': return context?.castingTeammate || null;
      case 'Casting_Enemy':    return context?.castingEnemy    || null;
      case 'Targeted_Ally':    return context?.targetedAlly    || null;
      case 'Selected_Ally':    return caster; // fallback — requires UI selection
      case 'Selected_Teammate': {
        // Look for a position filter
        const posFilter = parts.find(p => p.startsWith('Active_Position:'));
        if (posFilter) {
          const pos = posFilter.split(':')[1];
          return ownTeam.find(c => c && !c.isDead && c !== caster && getCardPos(c).includes(pos)) || null;
        }
        return ownTeam.find(c => c && !c.isDead && c !== caster) || null;
      }
      default:
        return caster;
    }
  }

  /**
   * _evalSkillCondition(condStr, ctx)
   * Evaluates a skill-level condition string.
   */
  function _evalSkillCondition(condStr, ctx) {
    if (!condStr) return true;
    const lower = condStr.toLowerCase().trim();
    if (lower === 'always' || lower === '') return true;

    // Own_Team_Lead
    if (lower.includes('own_team_lead')) return ctx.ownTeamLead === true;
    // Coin_Flip handled at modifier level
    if (lower.includes('coin_flip')) return true;

    // Delegate to PARSER if available
    if (typeof PARSER !== 'undefined' && PARSER.evalCondition) {
      return PARSER.evalCondition(condStr, ctx);
    }
    return true;
  }

  /**
   * _parseAction(raw) — alias for PARSER.parseAction or inline fallback
   */
  function _parseAction(raw) {
    if (!raw || raw.trim() === '') return { type: 'NONE' };
    if (typeof PARSER !== 'undefined' && PARSER.parseAction) return PARSER.parseAction(raw);
    // Inline minimal fallback
    if (raw.startsWith('Deal_Flat_DMG:')) {
      return { type: 'DEAL_FLAT_DMG', value: parseInt(raw.split(':')[1]) || 0 };
    }
    if (raw === 'Block')    return { type: 'BLOCK' };
    if (raw === 'Contest')  return { type: 'CONTEST' };
    if (raw === 'Intercept') return { type: 'INTERCEPT' };
    if (raw === 'Freeze')   return { type: 'FREEZE' };
    if (raw === 'Nullify')  return { type: 'NULLIFY' };
    if (raw === 'Steal_Skill') return { type: 'STEAL_SKILL' };
    if (raw === 'Grant_Extra_Move') return { type: 'GRANT_EXTRA_MOVE', nature: null };
    if (raw.startsWith('Grant_Extra_Move:')) return { type: 'GRANT_EXTRA_MOVE', nature: raw.split(':')[1] };
    if (raw === 'Screen_Guarantee_Hit') return { type: 'SCREEN_GUARANTEE_HIT' };
    return { type: 'UNKNOWN', raw };
  }

  /**
   * _applyTimedStatBuff(card, stat, value, td)
   * Stores a timed buff. Respected by OTHER.html's endOfTurnCleanup().
   */
  function _applyTimedStatBuff(card, stat, value, td) {
    const ck = card._instanceId;
    if (typeof _statBuffs === 'undefined') return;
    if (!_statBuffs[ck]) _statBuffs[ck] = {};
    const existing = _statBuffs[ck][stat];
    if (existing) {
      existing.value += value;
      existing.turnsLeft = Math.max(existing.turnsLeft, td?.turns || 1);
    } else {
      _statBuffs[ck][stat] = {
        value,
        turnsLeft: td?.turns || 1,
        delay: td?.delay || 0,
        started: !td?.delay,
      };
    }
    if (typeof logMsg === 'function') {
      logMsg('sys', 'Stat Buff', `${shortName(getCardName(card))} +${value} ${stat} for ${td?.turns || 1} turns`);
    }
  }

  /**
   * _applyDrain(card, nature, td)
   * Stores a drain effect (disables specific natures for turns).
   */
  function _applyDrain(card, nature, td) {
    const ck = card._instanceId;
    if (!_skillDisables[ck]) _skillDisables[ck] = [];
    _skillDisables[ck].push({
      skillName: null,
      nature: nature,
      turnsLeft: td?.turns || 1,
    });
    if (typeof logMsg === 'function') logMsg('sys', 'Drain', `${shortName(getCardName(card))} ${nature} skills drained for ${td?.turns || 1} turns!`);
  }

  /**
   * _applyState(card, raw)
   * Handles Apply_State:Sixth_Man:Priority:-10:Targetable_Via_Teammate etc.
   */
  function _applyState(card, raw) {
    const parts = raw.split(':');
    const stateName = parts[0];
    switch (stateName) {
      case 'Sixth_Man':
        card._state = 'SIXTH_MAN';
        // Parse priority modifier
        const prIdx = parts.indexOf('Priority');
        if (prIdx >= 0) card._priorityBonus = (card._priorityBonus || 1) + (parseInt(parts[prIdx + 1]) || 0);
        // Targetable via teammate flag
        if (raw.includes('Targetable_Via_Teammate')) card._sixthManTargetViaTeammate = true;
        break;
      default:
        card._state = stateName;
    }
  }

  /**
   * _clearDebuffsOnCard(card) — nullify removes all global debuffs on target
   */
  function _clearDebuffsOnCard(card) {
    const ck = card._instanceId;
    delete _globalDebuffs[ck];
    delete _skillDisables[ck];
    if (typeof _frozen !== 'undefined') delete _frozen[ck];
    if (typeof _drained !== 'undefined') delete _drained[ck];
    if (typeof _shutdown !== 'undefined') delete _shutdown[ck];
  }

  /**
   * _processGrantedExtraMove(card, act, isPlayer)
   * Handles the extra move flag set by Grant_Extra_Move.
   */
  async function _processGrantedExtraMove(card, act, isPlayer) {
    const extraNature = card._grantedExtraMove;
    delete card._grantedExtraMove;
    const ck = card._instanceId;

    // Loop guard — already used
    if (_extraMoveUsedThisTurn.has(ck)) return;
    _extraMoveUsedThisTurn.add(ck);

    if (typeof logMsg === 'function') logMsg('sys', 'Extra Move', `${shortName(getCardName(card))} gets an extra move!`);

    // For bots, choose a skill or basic
    if (!isPlayer) {
      const atks = enemyActive;
      const defs = playerActive;
      const chosen = botChooseSkill(card, atks, defs);
      if (chosen) {
        await executeSkillAction({ ...act, skillIdx: chosen.skillIdx, targetIdx: chosen.targetIdx, actionType: 'skill' }, isPlayer);
      } else {
        const vt = typeof getValidTargets === 'function' ? getValidTargets(card, defs) : [];
        if (vt.length) await executeBasicAction({ ...act, targetIdx: vt[0].i, actionType: 'basic' }, isPlayer);
      }
    }
    // For player: the UI in OTHER.html will re-open the action panel flagged with extraNature filter
    // (flag is set via card._grantedExtraMove before deletion; UI checks it before deletion)
  }

  // ─────────────────────────────────────────────────────────────
  // PUBLIC API
  // ─────────────────────────────────────────────────────────────

  return {
    // Lifecycle
    initSkillCounters,
    resetSkillTurnCounters,
    resetExtraMoveGuards,

    // Use gate
    canUseSkill,
    consumeSkillUse,
    refundSkillUse,
    isSkillDisabled,

    // Core execution
    executeSkillAction,
    executeBasicAction,

    // Phase / nature helpers
    resolveSkillPhases,
    getSkillNature,
    skillHasProperty,
    getEffectivePriority,
    isDualUseSkill,
    resolveDualUseBranch,

    // Damage
    computeSkillDamage,

    // Reactions
    promptReactiveSkills,
    resolveDefensiveAction,
    resolveStealSkill,
    checkReboundTriggers,
    checkTeammateFail,

    // Stacking
    processStackingTriggers,

    // Modifiers
    executeModifier,
    consumeScreenGuarantee,
    resolveRedirection,
    clearRedirectionFlag,

    // Global debuffs
    applyGlobalDebuffEffects,
    tickGlobalDebuffs,
    gcGlobalDebuffsForCard,

    // Disables
    tickSkillDisables,

    // AI
    botChooseSkill,

    // End-of-turn cleanup delegates (called by OTHER.html's endOfTurnCleanup)
    tickAll() {
      tickGlobalDebuffs();
      tickSkillDisables();
      resetExtraMoveGuards();
    },

    // Expose internal state for OTHER.html's renderArena status badges
    get globalDebuffs() { return _globalDebuffs; },
    get skillDisables() { return _skillDisables; },
    get screenGuarantees() { return _screenGuarantee; },
    get permanentStacks() { return _permanentStacks; },
  };

})();

<script>
// ============================================================
// OTHER.html — SECTIONS 2–9 + CARDS DATABASE

// DEPENDENCIES (must be loaded BEFORE this file in order):
//   1. PARSER.html   — provides global PARSER object
//   2. ABILITY_ENGINE.html — provides global ABILITY_ENGINE (aliased ENGINE)
//   3. SKILL_ENGINE.html   — provides global SKILL_ENGINE
//   4. THIS FILE
//   5. const CARDS = [...] — card database (paste below)
//
// SECTION INDEX:
//   §1  Global Constants & Utilities
//   §2  Data Layer & Card Cloning
//   §3  Battle State Variables
//   §4  Turn Flow & Action Resolution
//   §5  Combat & Damage System (animation, KO, survive)
//   §6  State & Effect Management
//   §7  Roster & Synergy Events
//   §8  Helper Functions & Utilities
//   §9  UI — Battle Log, Effects Panel, Tooltip, Audio
//   §10 UI — Drag & Drop (Draft / Setup)
//   §11 UI — Catalogue Screen
//   §12 UI — Draft Screen
//   §13 UI — Setup Screen
//   §14 UI — Battle Arena (rendering, target selection)
//   §15 UI — Action Panel, Staging, Bench Fan
//   §16 UI — Coin Flip Animation, Modal System
//   §17 UI — Buff Popup, Enemy Bench Tooltip
// ============================================================


// ============================================================
// §1 — GLOBAL CONSTANTS & UTILITIES
// ============================================================

const $ = id => document.getElementById(id);
const GITHUB = 'https://raw.githubusercontent.com/baobi-rockers/NBA-Pellop-Hoops-Unleashed/main/';
const POSITIONS = ['PG','SG','SF','PF','C'];

// TARGET_MATRIX: which enemy positions a given position can attack
// PG→PG/SG, SG→SG/SF, SF→SG/SF/PF, PF→PF/C, C→C/PF
const TARGET_MATRIX = {PG:['PG','SG'],SG:['SG','SF'],SF:['SG','SF','PF'],PF:['PF','C'],C:['C','PF']};

let _ic = 0;
const mkId = (team, name) => `${team}_${(name||'card').replace(/\s+/g,'_')}_${++_ic}`;
const delay = ms => new Promise(r => setTimeout(r, ms));

//--- Card accessors ---
function getCardName(c) { return c?.UI_Frontend_Data?.Formatted_Name || c?.UI_Frontend_Data?.Name || 'Unknown'; }
function getCardRawName(c) { return c?.UI_Frontend_Data?.Name || ''; }
function getCardVariant(c) { const fn = getCardName(c); const m = fn.match(/\((.+)\)$/); return m ? m[1] : ''; }
function getCardImg(c) { return c?.UI_Frontend_Data?.Image_File || ''; }
function getCardHP(c) { return c?.UI_Frontend_Data?.Stats?.HP || 0; }
function getCardDMG(c) { return c?.UI_Frontend_Data?.Stats?.Base_DMG || 0; }
function getCardSPD(c) { return c?.UI_Frontend_Data?.Stats?.Speed || 0; }
function getCardHeight(c) { return c?.UI_Frontend_Data?.Height || ''; }
function getCardTeam(c) { return c?.UI_Frontend_Data?.Team_ID || c?.UI_Frontend_Data?.Team || ''; }
function getCardTier(c) { return c?.UI_Frontend_Data?.Tier || ''; }
function getCardPos(c) { const p = c?.UI_Frontend_Data?.Positions; return p ? [p.Primary, p.Secondary, p.Third].filter(Boolean) : []; }
function getCardPosStr(c) { const p = c?.UI_Frontend_Data?.Positions; return p ? p.Primary + (p.Secondary ? '/' + p.Secondary : '') : 'N/A'; }
function getCardSkills(c) { return c?.Skills || []; }
function getAbility(c) { return c?.Ability || null; }

function shortName(n) { return n ? n.replace(/ \(.+?\)$/, '') : 'Unknown'; }
function getTruncatedName(fullName) {
  if (!fullName) return '';
  const clean = fullName.replace(/ \(.+?\)$/, '').trim();
  const parts = clean.split(' ');
  if (parts.length > 1) return parts[0][0] + '. ' + parts.slice(1).join(' ');
  return clean;
}
function getImgUrl(f, n) { return (!f || f.length < 3) ? `https://placehold.co/400x560/1a1a2e/FFD166?text=${encodeURIComponent(shortName(n))}` : GITHUB + encodeURI(f); }
function handleImgError(el, n) { el.onerror = null; el.src = `https://placehold.co/400x560/1a1a2e/FFD166?text=${encodeURIComponent(shortName(n))}`; }
function escapeJS(s) { return s ? s.toString().replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/`/g,'\\`') : ''; }
function getDBShortName(f) { if(!f)return'Unknown'; const clean=f.replace(/ \(.+?\)$/, '').trim(); const p=clean.split(' '); if(p.length>1){const fi=p.shift();return fi[0]+'. '+p.join(' ');} return clean; }

function getSearchText(c) {
  const parts = [getCardRawName(c).toLowerCase(), getCardName(c).toLowerCase(), getCardVariant(c).toLowerCase(), getCardTeam(c).toLowerCase()];
  getCardSkills(c).forEach(sk => { parts.push((sk.Name || '').toLowerCase()); parts.push((sk.Description_UI || '').toLowerCase()); });
  const ab = getAbility(c);
  if (ab) { parts.push((ab.Name || '').toLowerCase()); parts.push((ab.Description_UI || '').toLowerCase()); }
  return parts.join(' ');
}

//--- cloneCard: deep-copy a card and wire up ENGINE counters ---
/**
 * cloneCard(c, team)
 * Creates a battle-ready instance of a card for use in playerActive / enemyActive.
 * Boots all passive abilities via ENGINE and initialises skill use counters.
 */
function cloneCard(c, team) {
  const cc = JSON.parse(JSON.stringify(c));
  cc.currentHp      = getCardHP(cc);
  cc.isDead         = false;
  cc._instanceId    = mkId(team, getCardName(cc));
  cc._priorityMult  = 1;
  cc._activeRound   = 0;   // incremented each turn the card is active

  // Boot passive ability flags (ON:ALWAYS + ON:DEPLOY rules)
  ENGINE.bootPassiveAbilities(cc, [], null);

  // Init skill use counters from UM string
  (cc.Skills || []).forEach(sk => {
    const um = ENGINE.parseUM(sk.UM);
    sk._usesLeft      = isFinite(um.maxUses)    ? um.maxUses    : Infinity;
    sk._usesThisTurn  = 0;
    sk._priority      = um.priority;
    sk._usesPerTurn   = isFinite(um.usesPerTurn)? um.usesPerTurn: Infinity;
    sk._td            = ENGINE.parseTD(sk.TD || sk.td || 'DEFAULT');
    sk._isReactive    = (sk.Timing || '').startsWith('Reactive');
    sk._isFree        = (sk.Timing || '').includes('_Free');
  });
  return cc;
}

//--- buildEnemyRoster: random valid enemy team ---
/**
 * buildEnemyRoster()
 * Builds the enemy's 5 starters + 5 bench from CARDS.
 * Fires ENTER_ACTIVE_LINEUP and ROSTER_JOIN events for starters.
 */
function buildEnemyRoster() {
  const dr = {PG:[],SG:[],SF:[],PF:[],C:[]};
  const p = [...CARDS].sort(() => Math.random() - .5);
  for (const c of p) {
    for (const po of getCardPos(c)) {
      if (POSITIONS.includes(po) && dr[po].length < 2) {
        if (!POSITIONS.some(x => dr[x].some(y => getCardName(y) === getCardName(c)))) {
          dr[po].push(c); break;
        }
      }
    }
    if (POSITIONS.every(x => dr[x].length >= 2)) break;
  }
  const st = [], be = [];
  POSITIONS.forEach(po => {
    if (dr[po][0]) { const c = cloneCard(dr[po][0],'enemy'); c.battleRole=po; c._activeRound=1; st.push(c); }
    if (dr[po][1]) { const c = cloneCard(dr[po][1],'enemy'); c.battleRole=po; be.push(c); }
  });
  _fireEnterActiveLineupEffects(st, be, 'enemy');
  _evalFullRosterSynergies(st, [...st,...be], 'own');
  return {st, be};
}

let playerActive=[], playerBench=[], enemyActive=[], enemyBench=[];
let playerScore=0, enemyScore=0, turnCount=1, isAnimating=false;

//--- STAGING PHASE ---
/**
 * startBattle()
 * Initialises all battle state, fires boot ability events, renders the arena.
 * Called from Setup screen "START BATTLE" button.
 */
function startBattle() {
  playerActive = POSITIONS.map(po => {
    if (!activeLineup[po]) return null;
    const c = cloneCard(activeLineup[po], 'player');
    c.battleRole = po;
    c._activeRound = 1;
    return c;
  }).filter(Boolean);

  playerBench = benchRoster
    .filter(c => !playerActive.some(ac => getCardName(ac) === getCardName(c)))
    .map(c => cloneCard(c, 'player'));

  const eR = buildEnemyRoster();
  enemyActive = eR.st;
  enemyBench  = eR.be;

  // Reset all battle state
  playerScore=0; enemyScore=0; turnCount=1; stagedActions=[]; uiState='IDLE';
  _statBuffs={}; _activeEffects=[]; _synergyApplied=new Set();
  _frozen={}; _shutdown={}; _shutdownDelays={}; _drained={};
  _invulnerable={}; _screened={}; _surviveUsed={};

  // Boot enter-active-lineup for starting 5
  _fireEnterActiveLineupEffects(playerActive, playerBench, 'player');
  // Roster synergy events for both teams
  _evalFullRosterSynergies(playerActive, [...playerActive,...playerBench], 'own');
  _evalFullRosterSynergies(enemyActive,  [...enemyActive,...enemyBench],   'own');

  $('battle-log').innerHTML = '';
  logMsg('sys','System','Match initiated. First to 8 KOs wins.');
  $('score-player').textContent='0'; $('score-enemy').textContent='0';
  $('checkout-panel').style.display='none';
  $('turn-indicator').textContent='TURN 1 — STAGING';
  showScreen('battle-screen'); initBattleAudio(); renderArena();
}

//--- Fire ON:ENTER_ACTIVE_LINEUP for every card in a starting lineup ---
function _fireEnterActiveLineupEffects(activeArr, benchArr, side) {
  activeArr.forEach(card => {
    if (!card) return;
    card._activeRound = 1;
    const effects = ENGINE.bootEnterActiveLineup(card, activeArr, [...activeArr,...benchArr]);
    effects.forEach(({ targetCard, action, td }) => {
      if (action.type === 'UNTARGETABLE_BY') {
        ENGINE._applyUntargetableFlags(targetCard, action.spec);
        if (!targetCard._timedUntargetable) targetCard._timedUntargetable = [];
        targetCard._timedUntargetable.push({ spec: action.spec, expires: turnCount + (td.turns || 1) });
      } else {
        ENGINE.applyPassiveFlag(targetCard, action);
      }
    });
  });
}

//--- Evaluate all ROSTER_JOIN synergies for a full starting lineup ---
function _evalFullRosterSynergies(activeArr, fullRoster, side) {
  activeArr.forEach(card => {
    if (!card) return;
    ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', side, card, activeArr, fullRoster);
    ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', side, card, activeArr, fullRoster);
  });
}

//--- PRIORITY ORDER ---
/**
 * _getSortedActions(actions, isPlayerTurn)
 * Sort staged actions by SPD + priorityMult for both teams combined.
 * Higher total priority resolves FIRST.
 * ⭐ Apply_Priority multipliers are checked here via ENGINE.getPriorityBoost.
 */
function _getSortedActions(actions) {
  return [...actions].sort((a, b) => {
    const aTeam  = a.execTeam === 'player' ? playerActive : enemyActive;
    const bTeam  = b.execTeam === 'player' ? playerActive : enemyActive;
    const aC = aTeam[a.actorIdx];
    const bC = bTeam[b.actorIdx];
    if (!aC || !bC) return 0;
    const aSk = a.actionType === 'skill' && a.skillIdx != null ? aC.Skills?.[a.skillIdx] : null;
    const bSk = b.actionType === 'skill' && b.skillIdx != null ? bC.Skills?.[b.skillIdx] : null;
    const aPri = (getCardSPD(aC) + ENGINE.getPriorityBoost(aC, aSk?.Nature || 'Base')) * (aC._priorityMult || 1);
    const bPri = (getCardSPD(bC) + ENGINE.getPriorityBoost(bC, bSk?.Nature || 'Base')) * (bC._priorityMult || 1);
    return bPri - aPri; // descending
  });
}

//--- ACTION EXECUTION ---
/**
 * confirmMovesPhase()
 * Called when player clicks "LOCK IN MOVES".
 * Bot AI fills its moves, all actions are sorted by priority and executed in order.
 * ⭐ After each KO, remaining actions targeting a dead card must re-target or cancel.
 */
async function confirmMovesPhase() {
  if (isAnimating) return;
  isAnimating = true;
  setTooltipEnabled(false);
  $('checkout-panel').style.display='none';
  $('action-panels-wrapper').classList.remove('visible');
  $('turn-indicator').textContent = `TURN ${turnCount} — EXECUTING`;

  // Bot AI stages moves
  const botActions = _botStageMoves();
  const allActions = _getSortedActions([...stagedActions, ...botActions]);

  // Execute each action in priority order
  for (const act of allActions) {
    const team = act.execTeam === 'player' ? playerActive : enemyActive;
    const actor = team[act.actorIdx];
    if (!actor || actor.isDead) continue;

    if (act.actionType === 'skill') {
      // ⭐ Delegate to SKILL_ENGINE for full skill pipeline
      await SKILL_ENGINE.executeSkillAction(act, act.execTeam === 'player');
    } else if (act.actionType === 'basic') {
      await SKILL_ENGINE.executeBasicAction(act, act.execTeam === 'player');
    } else if (act.actionType === 'swap') {
      await _executeSwap(act);
    } else if (act.actionType === 'pass') {
      logMsg('sys', act.execTeam === 'player' ? 'You' : 'Bot',
        `${shortName(getCardName(actor))} passes.`);
    }

    // Check end game after every action
    if (_checkEndGame()) { isAnimating = false; return; }
    await delay(120);
  }

  // ── END OF TURN CLEANUP ──
  _endOfTurnCleanup();
  turnCount++;
  $('turn-indicator').textContent = `TURN ${turnCount} — STAGING`;

  // Reset for next turn
  stagedActions = [];
  _resetTurnCounters();

  // Increment _activeRound for all active cards
  [...playerActive, ...enemyActive].forEach(c => { if (c && !c.isDead) c._activeRound = (c._activeRound || 0) + 1; });

  // Fire ON:TURN_START_AFTER_SURVIVE for any card that survived at 1 HP last turn
  [...playerActive, ...enemyActive].forEach(c => {
    if (c && !c.isDead && c._survivedLastTurn) {
      const act = ENGINE.evalTurnStartAfterSurvive(c, c._teamRef === 'player' ? playerActive : enemyActive);
      if (act) ENGINE.applyPassiveFlag(c, act);
      c._survivedLastTurn = false;
    }
  });

  isAnimating = false;
  setTooltipEnabled(true);
  renderArena();
}

//--- END OF TURN CLEANUP ---
/**
 * _endOfTurnCleanup()
 * Ticks down all timed buffs, skill disables, REST_OF_TURN effects.
 * ⭐ REST_OF_TURN expires after current turn, not per-action.
 */
function _endOfTurnCleanup() {
  // Tick timed buffs (handles delay > 0 activation)
  tickBuffs();
  // Tick skill disables
  tickSkillDisables();
  // Tick contest tracking (global debuffs)
  tickContestTracking();
  // Tick general active effects log
  tickEffects();
  // Tick per-card timed effects via ENGINE
  const all = [...playerActive, ...enemyActive];
  all.forEach(c => { if (c && !c.isDead) ENGINE.tickCardEffects(c); });
  // Clear REST_OF_TURN flags (untargetable, etc.)
  ENGINE.clearRestOfTurnFlags(all);
  // Clear skill-engine extra-move guards to prevent carry-over
  if (SKILL_ENGINE.resetExtraMoveGuards) SKILL_ENGINE.resetExtraMoveGuards();
  // Render updated effects panel
  if (currentLogTab === 'effects') renderEffectsPanel();
}

//--- RESET TURN COUNTERS (usesThisTurn) ---
function _resetTurnCounters() {
  [...playerActive, ...playerBench, ...enemyActive, ...enemyBench].forEach(c => {
    if (!c) return;
    (c.Skills || []).forEach(sk => { sk._usesThisTurn = 0; });
    c._priorityMult = 1; // reset priority multiplier
  });
}

//--- SWAP ACTION ---
/**
 * _executeSwap(act)
 * Swaps a bench card into the active lineup.
 * Fires GC (aura cleanup), ENTER_ACTIVE_LINEUP, ROSTER_JOIN/LEAVE, and CARD_EXIT triggers.
 */
async function _executeSwap(act) {
  const isP  = act.execTeam === 'player';
  const atks = isP ? playerActive : enemyActive;
  const bArr = isP ? playerBench  : enemyBench;
  const leavingCard = atks[act.actorIdx];
  const incoming    = bArr[act.targetIdx];
  if (!incoming || !leavingCard) return;

  const whoLabel = isP ? 'You' : 'Bot';
  const fullAll = [...atks, ...bArr];

  // ⭐ GC: remove all non-persistent auras sourced from the leaving card
  ENGINE.gcAuras(leavingCard, fullAll);

  // Swap positions in arrays
  incoming.battleRole = leavingCard.battleRole;
  if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
  atks[act.actorIdx] = incoming;
  bArr[act.targetIdx] = leavingCard;

  logMsg('sys', whoLabel, `Swap: ${shortName(getCardName(leavingCard))} → ${shortName(getCardName(incoming))}`);

  // Boot incoming card
  incoming._activeRound = 1;
  incoming._teamRef = act.execTeam;
  ENGINE.bootPassiveAbilities(incoming, atks, incoming.battleRole);

  // Fire ENTER_ACTIVE_LINEUP effects for incoming card
  const effects = ENGINE.bootEnterActiveLineup(incoming, atks, [...atks,...bArr]);
  effects.forEach(({ targetCard, action }) => {
    if (action.type === 'UNTARGETABLE_BY') ENGINE._applyUntargetableFlags(targetCard, action.spec);
    else ENGINE.applyPassiveFlag(targetCard, action);
  });

  // Fire ROSTER_JOIN events
  const fullRoster = [...atks, ...bArr];
  ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', 'own', incoming, atks, fullRoster);
  ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', 'own', incoming, atks, fullRoster);

  // Fire CARD_EXIT for the leaving card
  const exitId = leavingCard.UI_Frontend_Data?.Player_ID || leavingCard._instanceId;
  ENGINE.evalCardExitTriggers(exitId, atks, fullRoster);

  renderArena(); renderBenchStacks();
  await delay(700);
}

//--- COMBAT ANIMATION ---
/**
 * playCombatAnimation(atkId, defId, dmgIn, targetObj, defIdx, defTeamStr)
 * Plays the attack waft, shake, and damage popup.
 * Also applies reactive flat damage reduction if pending.
 */
async function playCombatAnimation(atkId, defId, dmgIn, targetObj, defIdx, defTeamStr) {
  const aE = document.getElementById(`wrap-${atkId}`);
  const dE = document.getElementById(`wrap-${defId}`);
  if (aE) aE.classList.add('doing-attack');
  await delay(360);

  let dmg = dmgIn;
  // ⭐ Reactive flat reduction (Rodman, Wallace) — consume on hit
  if (targetObj._dmgReductionFlat && !targetObj._passiveReductionApplied) {
    dmg = Math.max(0, dmg - targetObj._dmgReductionFlat);
    targetObj._dmgReductionFlat = 0;
    logMsg('block','Mitigation',`Damage reduced! → ${dmg}`);
  }
  playAttackSound();
  if (dE && dmg > 0) {
    dE.querySelector('.battle-card')?.classList.add('anim-shake');
    const p = document.createElement('div'); p.className='dmg-popup'; p.textContent=`-${dmg}`;
    (dE.querySelector('.battle-card')||dE).appendChild(p);
    setTimeout(() => { dE.querySelector('.battle-card')?.classList.remove('anim-shake'); p.remove(); }, 900);
  }
  targetObj.currentHp = Math.max(0, targetObj.currentHp - dmg);
  const hpMax = getCardHP(targetObj);
  const pct   = Math.max(0, (targetObj.currentHp / hpMax) * 100);
  const fill  = document.getElementById(`hpf-${defId}`);
  if (fill) { fill.style.width=pct+'%'; fill.style.background=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B'; }
  const hpt = document.getElementById(`hpt-${defId}`);
  if (hpt) hpt.textContent = `${targetObj.currentHp}/${hpMax}`;
  await delay(660);
  if (aE) aE.classList.remove('doing-attack');
}

//--- KO & SCORE ---
/**
 * handleKO(defCard, teamStr, dIdx)
 * Called when a card's HP reaches 0.
 * ⭐ Checks Survive_At_1HP first, then fires GC + ROSTER_LEAVE events.
 */
function handleKO(defCard, teamStr, dIdx) {
  if (defCard.currentHp > 0) return;
  if (_tryActivateSurvive(defCard)) { renderArena(); return; }
  defCard.isDead = true;

  // GC: clear all auras this card was the source of
  const allCards = [...playerActive,...playerBench,...enemyActive,...enemyBench];
  ENGINE.gcAuras(defCard, allCards);
  ENGINE.clearCardAuras(defCard);

  // Update score
  if (teamStr === 'enemy') playerScore++; else enemyScore++;
  $('score-player').textContent = playerScore;
  $('score-enemy').textContent  = enemyScore;

  const cardEl = document.getElementById(`card-${teamStr}-${dIdx}`);
  if (cardEl) cardEl.classList.add('dead-card');
  logMsg('ko','KO',`${shortName(getCardName(defCard))} knocked out!`);
  removeEffectsForTarget(defCard._instanceId);

  // ⭐ Fire ROSTER_LEAVE and LEAVE_LAST for dead card
  const isPlayer = teamStr === 'player';
  const ownTeam  = isPlayer ? playerActive : enemyActive;
  const ownBench = isPlayer ? playerBench  : enemyBench;
  const fullRoster = [...ownTeam, ...ownBench].filter(c => c && !c.isDead);
  const exitId = defCard.UI_Frontend_Data?.Player_ID || defCard._instanceId;
  ENGINE.evalCardExitTriggers(exitId, ownTeam, fullRoster);

  // Check for auto-sub from bench
  _autoSubFromBench(teamStr, dIdx);
}

//--- AUTO-SUB: bring in bench card when active card is KO'd ---
function _autoSubFromBench(teamStr, dIdx) {
  const isP  = teamStr === 'player';
  const atks = isP ? playerActive : enemyActive;
  const bArr = isP ? playerBench  : enemyBench;
  const alive = bArr.filter(c => c && !c.isDead);
  if (!alive.length) return;
  const incoming = alive[0];
  incoming.battleRole = atks[dIdx].battleRole;
  if (!incoming.currentHp) incoming.currentHp = getCardHP(incoming);
  atks[dIdx] = incoming;
  // Remove from bench
  const bi = bArr.indexOf(incoming);
  if (bi !== -1) bArr.splice(bi, 1);
  incoming._activeRound = 1;
  incoming._teamRef = teamStr;
  ENGINE.bootPassiveAbilities(incoming, atks, incoming.battleRole);
  const fullRoster = [...atks, ...bArr];
  _fireEnterActiveLineupEffects([incoming], bArr, isP ? 'player' : 'enemy');
  ENGINE.evalRosterEvent('JOIN', 'TEAM_MATCH', 'own', incoming, atks, fullRoster);
  ENGINE.evalRosterEvent('JOIN', 'CARD_MATCH', 'own', incoming, atks, fullRoster);
  logMsg('sys', isP?'You':'Bot', `${shortName(getCardName(incoming))} enters the game!`);
  renderArena(); renderBenchStacks();
}

//--- SURVIVE AT 1 HP ---
/**
 * _tryActivateSurvive(card)
 * Checks ENGINE for Survive_At_1HP ability and applies it.
 * ⭐ Marks card as _survivedLastTurn so TURN_START_AFTER_SURVIVE fires next turn.
 */
function _tryActivateSurvive(card) {
  if (!card || card.currentHp > 0) return false;
  const id = card._instanceId;
  if (_surviveUsed[id]) return false;

  // Check HP_THRESHOLD heal (fire before survive check)
  const threshold = ENGINE.checkHPThreshold(card, []);
  if (threshold && (threshold.type === 'STAT_BUFF_HP' || threshold.type === 'STAT_BUFF_MAX_HP')) {
    _surviveUsed[id] = true;
    ENGINE.applyPassiveFlag(card, threshold);
    card.currentHp = Math.max(1, card.currentHp);
    logMsg('sys','System',`${shortName(getCardName(card))} survives with ${card.currentHp} HP!`);
    addTrackedEffect('HP Threshold', id, shortName(getCardName(card)), 'survive', 'Survived — HP recovered', 1);
    return true;
  }

  if (!ENGINE.checkSurviveAbility(card)) return false;

  _surviveUsed[id] = true;
  card.currentHp = 1;
  _frozen[id] = true; // frozen for rest of this action
  card._survivedLastTurn = true; // ⭐ triggers TURN_START_AFTER_SURVIVE next turn
  logMsg('sys','System',`${shortName(getCardName(card))} survives at 1 HP!`);
  addTrackedEffect('Survive', id, shortName(getCardName(card)), 'survive', 'Survived at 1 HP', 1);
  // Immediately fire HP_STATE checks (Luka untargetable, etc.)
  _checkHPTriggers(card, []);
  return true;
}

//--- HP THRESHOLD / STATE TRIGGERS ---
/**
 * _checkHPTriggers(card, ownTeam)
 * Called after any HP damage. Fires HP_THRESHOLD_ONCE and HP_STATE ability events.
 */
function _checkHPTriggers(card, ownTeam) {
  // HP_THRESHOLD_ONCE — fires once when HP crosses threshold
  const threshold = ENGINE.checkHPThreshold(card, ownTeam);
  if (threshold) {
    logMsg('sys','System',`${shortName(getCardName(card))} HP Threshold triggered!`);
    ENGINE.applyPassiveFlag(card, threshold);
  }
  // HP_STATE — fires every time HP matches exact condition
  const states = ENGINE.checkHPState(card, ownTeam);
  states.forEach(action => {
    ENGINE.applyPassiveFlag(card, action);
    if (action.type === 'APPLY_PROP_UNTARGETABLE') {
      logMsg('sys','System',`${shortName(getCardName(card))} is untargetable this turn!`);
      addTrackedEffect('HP Event', card._instanceId, shortName(getCardName(card)), 'untargetable', 'Untargetable: REST_OF_TURN', 1);
    }
  });
}

//--- END GAME CHECK ---
function _checkEndGame() {
  if (playerScore >= 8 || !playerActive.some(c=>c&&!c.isDead) && !playerBench.some(c=>c&&!c.isDead)) {
    _showEndGame(playerScore >= 8 ? 'YOU WIN!' : 'YOU LOSE!', playerScore >= 8 ? '🏆 First to 8 KOs — Victory!' : '😤 All cards eliminated.');
    return true;
  }
  if (enemyScore >= 8 || !enemyActive.some(c=>c&&!c.isDead) && !enemyBench.some(c=>c&&!c.isDead)) {
    _showEndGame('YOU LOSE!', `Opponent reached ${enemyScore} KOs.`);

//--- VALID TARGETS ---
/**
 * getValidTargets(attacker, enemyTeam)
 * Returns [{c, i}] array of targetable enemy cards based on TARGET_MATRIX.
 * ⭐ Respects _fullyUntargetable, shutdown, Sixth_Man targeting rules.
 */
function getValidTargets(attacker, enemyTeam) {
  const role = attacker.battleRole || 'PG';
  const allowed = TARGET_MATRIX[role] || POSITIONS;
  return enemyTeam
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => {
      if (!c || c.isDead) return false;
      if (c._fullyUntargetable) return false;
      // Shutdown check
      const dck = c._instanceId;
      if (_shutdown[dck]) {
        const sdDelay = (_shutdownDelays && _shutdownDelays[dck]) || 0;
        if (_shutdown[dck] > sdDelay) return false;
      }
      // Sixth_Man: can only be targeted if a teammate is present
      if (c._state === 'Sixth_Man') {
        const hasTeammate = enemyTeam.some(t => t && !t.isDead && t !== c);
        if (!hasTeammate) return false;
      }
      return allowed.includes(c.battleRole);
    });
}

//--- STAT BUFF SYSTEM ---
// _statBuffs: instanceId → { dmgBonus, basicBonus, skillBonus, turnsLeft, delay, started }
let _statBuffs = {};
// ⭐ _stackBuffs live on each card as card._stackBuffs[stat] (permanent stacking)

function ensureBuff(id) {
  if (!_statBuffs[id]) _statBuffs[id] = {dmgBonus:0,basicBonus:0,skillBonus:0,turnsLeft:999,started:true,delay:0};
}
function getBuff(id) {
  const b = _statBuffs[id];
  if (!b || !b.started || b.delay > 0) return null;
  return b;
}

/**
 * getEffectiveDMG(card, isSkill, castNature)
 * Returns the card's damage after timed buffs + permanent stack buffs.
 * ⭐ Stack_Per_Hit/Miss Permanent buffs live on card._stackBuffs.
 */
function getEffectiveDMG(card, isSkill = false, castNature = '') {
  const base = getCardDMG(card);
  const b    = getBuff(card._instanceId);
  let total  = base + (b ? (b.dmgBonus || 0) + (isSkill ? (b.skillBonus||0) : (b.basicBonus||0)) : 0);
  // Add permanent stack buffs
  if (card._stackBuffs) {
    total += card._stackBuffs.DMG || 0;
    if (isSkill) total += card._stackBuffs.Skill_DMG || 0;
    else         total += card._stackBuffs.Basic_DMG  || 0;
  }
  // Add THIS_ATTACK one-shot buffs
  if (card._thisAttackBuffs) {
    total += card._thisAttackBuffs.DMG || 0;
    if (isSkill) total += card._thisAttackBuffs.Skill_DMG || 0;
    else         total += card._thisAttackBuffs.Basic_DMG  || 0;
  }
  return Math.max(0, total);
}

/**
 * tickBuffs()
 * Called at end of turn. Decrements turnsLeft, handles delay activation.
 * ⭐ turnsLeft === 999 = permanent (never expires).
 */
function tickBuffs() {
  Object.keys(_statBuffs).forEach(k => {
    const b = _statBuffs[k];
    if (!b.started) {
      b.delay--;
      if (b.delay <= 0) { b.started = true; logMsg('eff','Effect',`Delayed buff activates!`); }
      return;
    }
    if (b.turnsLeft !== 999) { b.turnsLeft--; if (b.turnsLeft <= 0) delete _statBuffs[k]; }
  });
}

/**
 * addTimedBuff(card, bonusObj, turns, delayTurns)
 * Adds a timed stat buff. delay > 0 means it won't activate until N turns pass.
 */
function addTimedBuff(card, bonusObj, turns, delayTurns) {
  ensureBuff(card._instanceId);
  const b = _statBuffs[card._instanceId];
  Object.assign(b, bonusObj);
  b.turnsLeft = turns || 999;
  b.delay = delayTurns || 0;
  b.started = (b.delay <= 0);
}

//--- SKILL DISABLES ---
// _skillDisables: instanceId → [{skillName, turnsLeft, sourceName, all}]
let _skillDisables = {};

function tickSkillDisables() {
  Object.keys(_skillDisables).forEach(k => {
    _skillDisables[k] = _skillDisables[k].filter(d => { d.turnsLeft--; return d.turnsLeft > 0; });
    if (_skillDisables[k].length === 0) delete _skillDisables[k];
  });
}
function isSkillDisabled(targetId, skillName) {
  const dis = _skillDisables[targetId];
  if (!dis) return false;
  return dis.some(d => d.all || d.skillName === skillName);
}
/**
 * addSkillDisable(targetId, skillName, turnsLeft, sourceName, all)
 * ⭐ all=true disables every skill on the card (Hard_Disable_Shutdown:All).
 */
function addSkillDisable(targetId, skillName, turnsLeft, sourceName, all) {
  if (!_skillDisables[targetId]) _skillDisables[targetId] = [];
  _skillDisables[targetId].push({ skillName, turnsLeft, sourceName, all: !!all });
}

//--- CONTEST TRACKING (global debuffs, e.g. Bird jump-shot contest) ---
// _contestTracking: instanceId → {turnsLeft, natureFilter, sourceName, refund}
let _contestTracking = {};

function tickContestTracking() {
  Object.keys(_contestTracking).forEach(k => {
    _contestTracking[k].turnsLeft--;
    if (_contestTracking[k].turnsLeft <= 0) delete _contestTracking[k];
  });
}
function isGloballyContested(natureFilter) {
  for (const k of Object.keys(_contestTracking)) {
    const ct = _contestTracking[k];
    const nLow = (ct.natureFilter || '').toLowerCase();
    const aLow = (natureFilter || '').toLowerCase();
    if (nLow && aLow.includes(nLow.replace('offensive:', ''))) return true;
  }
  return false;
}

function addTrackedEffect(sourceName, targetId, targetName, type, description, turnsLeft) {
  _effectIdCounter++;

// §7 — ROSTER & SYNERGY EVENTS
// ============================================================

// All roster/synergy events are delegated to ABILITY_ENGINE.
// This section documents the wiring so the engine hooks are clear.
// ENGINE.evalRosterEvent  — called on swap in, KO sub, startBattle
// ENGINE.evalCardExitTriggers — called on KO, swap out
// ENGINE.gcAuras           — called on KO, swap out
// ENGINE.checkAndPair      — periodically checked (see _checkAndPairs below)

/**
 * _checkAndPairs(changedCard, side)
 * Called whenever the active lineup changes (swap, KO sub).
 * ⭐ AND_PAIR checks require both cards to be present simultaneously.
 */
function _checkAndPairs(changedCard, side) {
  const ownTeam    = side === 'player' ? playerActive : enemyActive;
  const fullRoster = side === 'player' ? [...playerActive,...playerBench] : [...enemyActive,...enemyBench];
  ownTeam.forEach(c => {
    if (!c || c.isDead) return;
    const result = ENGINE.checkAndPair(c, ownTeam, fullRoster);
    if (result) {
      ENGINE.applyPassiveFlag(c, result.action);
      addTrackedEffect('AND_PAIR', c._instanceId, shortName(getCardName(c)), 'buff',
        result.description || 'AND_PAIR synergy active', result.turnsLeft || 999);
    }
  });
}

/**
 * renderFanned(team, isEnemy)
 * Renders the fan-spread of battle cards with HP bars, status badges, and click handlers.
 */
function renderFanned(team, isEnemy){
  const n=team.length; if(!n) return '';
  return team.map((c,i)=>{
    const mid=(n-1)/2,offset=i-mid,arcY=isEnemy?-(offset*offset*12):(offset*offset*12),rot=isEnemy?(-offset*8):(offset*8);
    const hpMax=getCardHP(c),pct=Math.max(0,(c.currentHp/hpMax)*100),clr=pct>50?'#40E0A0':pct>20?'#FFD166':'#FF6B6B';
    const isStaged=!isEnemy&&stagedActions.some(a=>a.actorIdx===i);
    let isValidTgt=false;
    if(isEnemy&&uiState==='AWAITING_TARGET'&&pendingAction){const actor=playerActive[pendingAction.actorIdx];if(actor)isValidTgt=getValidTargets(actor,enemyActive).some(v=>v.i===i);}
    const ck=c._instanceId;
    let badges='';

    if(_shutdown[ck]) badges+=`<div class="card-status-badge badge-shutdown">🚫 SHUTDOWN</div>`;
    if(_statBuffs[ck]&&_statBuffs[ck].started) badges+=`<div class="card-status-badge badge-buffed">⬆ BUFFED</div>`;
    if(_screened[ck]) badges+=`<div class="card-status-badge badge-screened">🛡 SCREENED</div>`;
    const wrapClass=isEnemy?'enemy-card-wrap':'active-card-wrap';

    const tN=escapeJS(getCardName(c));

      style="--base-rot:${rot}deg;--base-y:${arcY}px;transform:rotate(var(--base-rot)) translateY(var(--base-y));transform-origin:${isEnemy?'top center':'bottom center'};"
      onclick="onCardClick('${isEnemy?'enemy':'player'}',${i},event)"
      onmousemove="handleTooltipHover(event,'${tN}',this)" onmouseleave="hideTooltip()">
      ${isEnemy?`<div class="hp-bar-container"><div class="hp-fill" id="hpf-enemy-${i}" style="width:${pct}%;background:${clr};"></div></div>`:''}
      <div class="${cardClass}" id="card-${isEnemy?'enemy':'player'}-${i}">

/**
 * onCardClick(side, idx, event)
 * Central click handler for battle cards.
 * Routes to: select active player card → show action panel, or select target.
 */
function onCardClick(side, idx, event) {
  event.stopPropagation();
  if (isAnimating) return;

  if (side === 'player') {
    const card = playerActive[idx];
    if (!card || card.isDead) return;
    // If already staged, ignore
    if (stagedActions.some(a => a.actorIdx === idx)) return;
    // Show action panel for this card
    showActionPanel(card, idx);
  } else {
    // Enemy card clicked — resolve pending target selection
    if (uiState === 'AWAITING_TARGET' && pendingAction) {
      const actor = playerActive[pendingAction.actorIdx];
      if (!actor) return;
      const vt = getValidTargets(actor, enemyActive);
      if (!vt.some(v => v.i === idx)) return; // invalid target
      pendingAction.targetIdx = idx;
      stageAction(pendingAction);
      uiState = 'IDLE';
      pendingAction = null;
      $('action-panels-wrapper').classList.remove('visible');
      renderArena();
    }
  }
}

/**
 * handleCourtClick(event)
 * Clicking the court (not a card) cancels pending target selection.
 */
function handleCourtClick(event) {
  if (uiState === 'AWAITING_TARGET') {
    uiState = 'IDLE';
    pendingAction = null;
    $('action-panels-wrapper').classList.remove('visible');
    renderArena();
  }
}
